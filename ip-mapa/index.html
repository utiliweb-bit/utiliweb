<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IP no Mapa | UtiliWeb</title>

<link rel="stylesheet" href="../../assets/style.css">

<style>
.box {
    margin-top: 20px;
    padding: 20px;
    background: #fff;
    border-radius: 12px;
}

#map {
    width: 100%;
    height: 300px;
    margin-top: 15px;
}
</style>

</head>

<body>

<header>
<h1>🗺️ Meu IP no Mapa</h1>
</header>

<div class="container">

<a href="../../index.html">← Voltar</a>

<div class="box">

<p id="info">Carregando...</p>

<div id="map"></div>

</div>

</div>

<script>

async function load() {
    const ipRes = await fetch("https://api.ipify.org?format=json");
    const ip = await ipRes.json();

    const geoRes = await fetch(`https://ipapi.co/${ip.ip}/json/`);
    const geo = await geoRes.json();

    document.getElementById("info").innerHTML =
        `IP: <b>${ip.ip}</b><br>
        ${geo.city}, ${geo.country_name}`;

    const mapUrl = `https://maps.google.com/maps?q=${geo.latitude},${geo.longitude}&z=12&output=embed`;

    document.getElementById("map").innerHTML =
        `<iframe width="100%" height="300" src="${mapUrl}"></iframe>`;
}

load();

</script>

</body>
</html>
