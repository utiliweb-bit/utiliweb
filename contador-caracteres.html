<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contador de Caracteres | UtiliWeb</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width: 800px;
    margin: 40px auto;
    padding: 20px;
}

textarea{
    width: 100%;
    height: 200px;
    padding: 10px;
    font-size: 16px;
}

.resultado{
    margin-top: 20px;
    font-size: 18px;
}
</style>
</head>
<body>

<h1>Contador de Caracteres</h1>

<p>Digite ou cole um texto abaixo:</p>

<textarea id="texto"></textarea>

<div class="resultado">
    <p><strong>Caracteres:</strong> <span id="caracteres">0</span></p>
    <p><strong>Palavras:</strong> <span id="palavras">0</span></p>
    <p><strong>Linhas:</strong> <span id="linhas">0</span></p>
</div>

<script>
const texto = document.getElementById("texto");

texto.addEventListener("input", function() {

    const conteudo = texto.value;

    document.getElementById("caracteres").textContent =
        conteudo.length;

    const palavras = conteudo.trim() === ""
        ? 0
        : conteudo.trim().split(/\s+/).length;

    document.getElementById("palavras").textContent =
        palavras;

    const linhas = conteudo === ""
        ? 0
        : conteudo.split("\n").length;

    document.getElementById("linhas").textContent =
        linhas;

});
</script>

</body>
</html>
