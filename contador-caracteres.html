<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contador de Caracteres | UtiliWeb</title>

<link rel="stylesheet" href="../assets/style.css">
</head>

<body>

<header>
    <h1>Contador de Caracteres</h1>
</header>

<div class="container">

    <a href="../index.html">← Voltar para o início</a>

    <p>Digite ou cole seu texto abaixo:</p>

    <textarea id="text" placeholder="Comece a digitar..."></textarea>

    <div class="result">
        <p>Caracteres: <span id="chars">0</span></p>
        <p>Palavras: <span id="words">0</span></p>
        <p>Linhas: <span id="lines">0</span></p>
    </div>

</div>

<script>
const text = document.getElementById("text");

text.addEventListener("input", () => {
    let value = text.value;

    // Caracteres
    document.getElementById("chars").textContent = value.length;

    // Palavras
    document.getElementById("words").textContent =
        value.trim() === "" ? 0 : value.trim().split(/\s+/).length;

    // Linhas
    document.getElementById("lines").textContent =
        value === "" ? 0 : value.split("\n").length;
});
</script>

</body>
</html>
