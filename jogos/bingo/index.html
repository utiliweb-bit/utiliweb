<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bingo — UtiliWeb</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:    #0d1b2a;
  --navy-2:  #132236;
  --navy-3:  #1a2f46;
  --border:  #1e3248;
  --gold:    #f5b800;
  --gold-lt: #ffd452;
  --gold-dim:#7a5c00;
  --text:    #e8edf3;
  --muted:   #6b8099;
  --red:     #ef4444;
  --B: #3b82f6; --I: #a855f7; --N: #f5b800; --G: #22c55e; --O: #f97316;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100dvh;
  background: var(--navy);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 16px 60px;
}

/* ── HEADER ── */
header {
  width: 100%;
  max-width: 680px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 0 14px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 32px;
}
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 38px;
  letter-spacing: 0.12em;
  color: var(--gold);
  line-height: 1;
  text-shadow: 0 0 24px rgba(245,184,0,0.35);
}
.logo span {
  display: block;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.04em;
  color: var(--muted);
  margin-top: 1px;
}
.nav-back { font-size: 12px; color: var(--muted); text-decoration: none; }
.nav-back:hover { color: var(--text); }

/* ── BALL ── */
.ball-wrap {
  width: 100%;
  max-width: 680px;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 28px;
}

.ball {
  width: 180px;
  height: 180px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 32%, #fff5 0%, transparent 55%),
              radial-gradient(circle at 60% 65%, #0003 0%, transparent 50%),
              var(--gold);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 60px rgba(245,184,0,0.45), 0 12px 40px rgba(0,0,0,0.6);
  transition: background 0.3s, box-shadow 0.3s;
  position: relative;
}
.ball.idle {
  background: radial-gradient(circle at 35% 32%, #fff2 0%, transparent 55%),
              var(--navy-3);
  box-shadow: 0 0 0px rgba(0,0,0,0), 0 8px 24px rgba(0,0,0,0.5);
}
.ball.B { background: radial-gradient(circle at 35% 32%, #fff5 0%, transparent 55%), radial-gradient(circle at 60% 65%, #0003 0%, transparent 50%), var(--B); box-shadow: 0 0 60px rgba(59,130,246,0.5), 0 12px 40px rgba(0,0,0,0.6); }
.ball.I { background: radial-gradient(circle at 35% 32%, #fff5 0%, transparent 55%), radial-gradient(circle at 60% 65%, #0003 0%, transparent 50%), var(--I); box-shadow: 0 0 60px rgba(168,85,247,0.5), 0 12px 40px rgba(0,0,0,0.6); }
.ball.N { background: radial-gradient(circle at 35% 32%, #fff5 0%, transparent 55%), radial-gradient(circle at 60% 65%, #0003 0%, transparent 50%), var(--N); box-shadow: 0 0 60px rgba(245,184,0,0.5), 0 12px 40px rgba(0,0,0,0.6); }
.ball.G { background: radial-gradient(circle at 35% 32%, #fff5 0%, transparent 55%), radial-gradient(circle at 60% 65%, #0003 0%, transparent 50%), var(--G); box-shadow: 0 0 60px rgba(34,197,94,0.5), 0 12px 40px rgba(0,0,0,0.6); }
.ball.O { background: radial-gradient(circle at 35% 32%, #fff5 0%, transparent 55%), radial-gradient(circle at 60% 65%, #0003 0%, transparent 50%), var(--O); box-shadow: 0 0 60px rgba(249,115,22,0.5), 0 12px 40px rgba(0,0,0,0.6); }

.ball.pop { animation: pop 0.45s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes pop {
  0%   { transform: scale(0.55); opacity: 0.3; }
  70%  { transform: scale(1.08); }
  100% { transform: scale(1); opacity: 1; }
}

.ball-letter {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 0.12em;
  color: rgba(255,255,255,0.75);
  line-height: 1;
}
.ball-number {
  font-family: 'JetBrains Mono', monospace;
  font-size: 72px;
  font-weight: 700;
  color: #fff;
  line-height: 1;
  text-shadow: 0 2px 12px rgba(0,0,0,0.35);
}
.ball.idle .ball-letter { display: none; }
.ball.idle .ball-number {
  font-size: 28px;
  color: var(--muted);
  font-weight: 500;
}

.ball-sub {
  margin-top: 14px;
  font-size: 13px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
}
.ball-sub strong { color: var(--gold); }

/* ── BUTTON ── */
.btn-draw {
  width: 100%;
  max-width: 680px;
  padding: 18px;
  background: var(--gold);
  color: #000;
  border: none;
  border-radius: 14px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 0.12em;
  cursor: pointer;
  box-shadow: 0 4px 24px rgba(245,184,0,0.35);
  transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
  margin-bottom: 24px;
}
.btn-draw:hover:not(:disabled) { background: var(--gold-lt); box-shadow: 0 6px 32px rgba(245,184,0,0.55); }
.btn-draw:active:not(:disabled) { transform: scale(0.98); }
.btn-draw:disabled { background: #1e3248; color: var(--muted); cursor: default; box-shadow: none; }

/* ── BINGO GRID (all 75) ── */
.grid-panel {
  width: 100%;
  max-width: 680px;
  background: var(--navy-2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px 16px 16px;
  margin-bottom: 16px;
}
.col-headers {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px;
  margin-bottom: 6px;
}
.col-hd {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 0.12em;
  text-align: center;
}
.col-hd.B { color: var(--B); }
.col-hd.I { color: var(--I); }
.col-hd.N { color: var(--N); }
.col-hd.G { color: var(--G); }
.col-hd.O { color: var(--O); }

.num-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px;
}
.num-col { display: flex; flex-direction: column; gap: 4px; }

.num-cell {
  height: 38px;
  border-radius: 8px;
  background: var(--navy-3);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 500;
  color: var(--muted);
  transition: background 0.25s, color 0.25s, border-color 0.25s, transform 0.15s;
}
.num-cell.hit { color: #fff; border-color: transparent; }
.num-cell.hit.B { background: var(--B); }
.num-cell.hit.I { background: var(--I); }
.num-cell.hit.N { background: var(--N); color: #000; }
.num-cell.hit.G { background: var(--G); color: #000; }
.num-cell.hit.O { background: var(--O); }
.num-cell.latest { box-shadow: 0 0 0 2px #fff; transform: scale(1.07); }

/* ── HISTORY ── */
.history-panel {
  width: 100%;
  max-width: 680px;
  background: var(--navy-2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px 16px 16px;
  margin-bottom: 16px;
}
.panel-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}
.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  padding: 5px 10px;
  border-radius: 8px;
  color: #fff;
  line-height: 1;
}
.chip.B { background: var(--B); }
.chip.I { background: var(--I); }
.chip.N { background: var(--N); color: #000; }
.chip.G { background: var(--G); color: #000; }
.chip.O { background: var(--O); }
.chip.latest-chip { box-shadow: 0 0 0 2px #fff; }
.chips-empty { font-size: 13px; color: var(--muted); }

/* ── RESET ── */
.btn-reset {
  width: 100%;
  max-width: 680px;
  padding: 12px;
  background: transparent;
  border: 1.5px solid #3a1a1a;
  border-radius: 12px;
  color: #6b3333;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.btn-reset:hover { border-color: var(--red); color: var(--red); }

@media (prefers-reduced-motion: reduce) {
  .ball.pop { animation: none; }
}
</style>
</head>
<body>

<header>
  <div class="logo">BINGO<span>UtiliWeb</span></div>
  <a class="nav-back" href="/">← UtiliWeb</a>
</header>

<!-- Bola -->
<div class="ball-wrap">
  <div class="ball idle" id="ball">
    <div class="ball-letter" id="ballLetter"></div>
    <div class="ball-number" id="ballNumber">Sortear</div>
  </div>
  <div class="ball-sub"><strong id="drawnCount">0</strong> de 75 sorteados</div>
</div>

<!-- Botão -->
<button class="btn-draw" id="btnDraw" onclick="draw()">🎱 Sortear número</button>

<!-- Grade 75 números -->
<div class="grid-panel">
  <div class="col-headers">
    <div class="col-hd B">B</div>
    <div class="col-hd I">I</div>
    <div class="col-hd N">N</div>
    <div class="col-hd G">G</div>
    <div class="col-hd O">O</div>
  </div>
  <div class="num-grid" id="numGrid"></div>
</div>

<!-- Histórico -->
<div class="history-panel">
  <div class="panel-label">Ordem de sorteio — mais recente primeiro</div>
  <div class="chips" id="chips"><span class="chips-empty">Nenhum número sorteado ainda.</span></div>
</div>

<button class="btn-reset" onclick="resetGame()">↺ Reiniciar jogo</button>

<script>
const COLS   = ['B','I','N','G','O'];
const RANGES = { B:[1,15], I:[16,30], N:[31,45], G:[46,60], O:[61,75] };

let pool = [], drawn = [];

function numToCol(n) {
  if (n <= 15) return 'B';
  if (n <= 30) return 'I';
  if (n <= 45) return 'N';
  if (n <= 60) return 'G';
  return 'O';
}

// Build grid
function buildGrid() {
  const grid = document.getElementById('numGrid');
  grid.innerHTML = '';
  COLS.forEach(col => {
    const [lo, hi] = RANGES[col];
    const colDiv = document.createElement('div');
    colDiv.className = 'num-col';
    for (let n = lo; n <= hi; n++) {
      const cell = document.createElement('div');
      cell.className = 'num-cell';
      cell.id = `n${n}`;
      cell.textContent = n;
      colDiv.appendChild(cell);
    }
    grid.appendChild(colDiv);
  });
}

function resetGame() {
  pool  = Array.from({length:75}, (_,i) => i+1);
  drawn = [];
  document.getElementById('drawnCount').textContent = '0';
  document.getElementById('btnDraw').disabled = false;
  document.getElementById('btnDraw').textContent = '🎱 Sortear número';
  // Reset ball
  const ball = document.getElementById('ball');
  ball.className = 'ball idle';
  document.getElementById('ballLetter').textContent = '';
  document.getElementById('ballNumber').textContent = 'Sortear';
  // Reset grid
  document.querySelectorAll('.num-cell').forEach(el => el.className = 'num-cell');
  // Reset history
  document.getElementById('chips').innerHTML = '<span class="chips-empty">Nenhum número sorteado ainda.</span>';
}

function draw() {
  if (pool.length === 0) return;

  const idx = Math.floor(Math.random() * pool.length);
  const num = pool.splice(idx, 1)[0];
  drawn.push(num);
  const col = numToCol(num);

  // Ball
  const ball = document.getElementById('ball');
  ball.className = `ball ${col} pop`;
  document.getElementById('ballLetter').textContent = col;
  document.getElementById('ballNumber').textContent = num;
  ball.addEventListener('animationend', () => ball.classList.remove('pop'), { once: true });

  // Counter
  document.getElementById('drawnCount').textContent = drawn.length;
  if (pool.length === 0) {
    document.getElementById('btnDraw').disabled = true;
    document.getElementById('btnDraw').textContent = 'Todos os 75 números sorteados!';
  }

  // Grid — remove previous "latest", mark new
  document.querySelectorAll('.num-cell.latest').forEach(el => el.classList.remove('latest'));
  const cell = document.getElementById(`n${num}`);
  if (cell) cell.className = `num-cell hit ${col} latest`;

  // History
  const chipsEl = document.getElementById('chips');
  // Remove "latest-chip" from previous
  chipsEl.querySelectorAll('.latest-chip').forEach(el => el.classList.remove('latest-chip'));
  // Remove empty placeholder
  const empty = chipsEl.querySelector('.chips-empty');
  if (empty) empty.remove();
  // Prepend new chip
  const chip = document.createElement('span');
  chip.className = `chip ${col} latest-chip`;
  chip.textContent = `${col}${num}`;
  chipsEl.prepend(chip);
}

buildGrid();
resetGame();
</script>
</body>
</html>
