<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Master — 500 Perguntas</title>
    <!-- Adicionando um parâmetro de versão no CSS para forçar o navegador a recarregar o estilo -->
    <link rel="stylesheet" href="style.css?v=2.0">
</head>
<body>

<div id="app">

  <!-- TELA INICIAL -->
  <div id="home" class="screen active">
    <h1 class="home-title">Quiz Master</h1>
    <p class="home-sub">O maior desafio de conhecimentos gerais com 500 questões exclusivas.</p>

    <div class="section">
        <label class="section-label">Escolha um Tema</label>
        <div class="cat-grid" id="cat-grid"></div>
    </div>

    <div class="section">
        <label class="section-label">Dificuldade</label>
        <div class="btn-row" id="diff-row">
            <button class="pill-btn" data-v="Fácil">Fácil</button>
            <button class="pill-btn" data-v="Médio">Médio</button>
            <button class="pill-btn" data-v="Difícil">Difícil</button>
            <button class="pill-btn active" data-v="Todas">Todas</button>
        </div>
    </div>

    <div class="section">
        <label class="section-label">Quantidade</label>
        <div class="btn-row" id="qty-row">
            <button class="pill-btn active" data-v="10">10</button>
            <button class="pill-btn" data-v="20">20</button>
            <button class="pill-btn" data-v="30">30</button>
            <button class="pill-btn" data-v="50">50</button>
        </div>
    </div>

    <button class="start-btn" id="start-btn" disabled>Selecione um tema</button>
  </div>

  <!-- TELA DO QUIZ -->
  <div id="quiz" class="screen">
    <div class="stats-bar">
      <span>Acertos: <b id="live-score">0</b></span>
      <span>Questão: <b id="q-cur">1</b>/<b id="q-tot">10</b></span>
    </div>
    
    <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
    
    <div class="cat-badge" id="q-cat"></div>
    <p class="question" id="q-text">Carregando pergunta...</p>
    
    <div class="options" id="opts"></div>
    
    <div class="explanation" id="expl"></div>
    
    <button class="next-btn" id="next-btn" style="display:none">Próxima Pergunta</button>
  </div>

  <!-- TELA DE RESULTADO -->
  <div id="result" class="screen">
    <div class="result-header">
      <p class="section-label">Resultado Final</p>
      <div class="result-pct" id="r-pct">0%</div>
      <p class="result-msg" id="r-msg">Incrível!</p>
    </div>

    <div class="result-grid">
      <div class="result-card">
        <div class="result-card-label">Acertos</div>
        <div class="result-card-val" id="r-cor">0</div>
      </div>
      <div class="result-card">
        <div class="result-card-label">Erros</div>
        <div class="result-card-val" id="r-wrg">0</div>
      </div>
      <div class="result-card">
        <div class="result-card-label">Tema</div>
        <div class="result-card-val" id="r-cat">-</div>
      </div>
      <div class="result-card">
        <div class="result-card-label">Dificuldade</div>
        <div class="result-card-val" id="r-dif">-</div>
      </div>
    </div>

    <button class="next-btn" id="replay-btn">Jogar Novamente</button>
    <button class="secondary-btn" id="home-btn">Mudar Categoria</button>
  </div>

</div>

<script src="questions.js"></script>
<script src="script.js"></script>
</body>
</html>
