<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Sorteador de Números Profissional | UtiliWeb</title>
    <meta name="description" content="Ferramenta profissional para gerar números aleatórios com múltiplas opções, histórico e animações.">
    <meta name="keywords" content="sorteador, números aleatórios, gerador, random, loteria">
    <meta name="robots" content="index, follow">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.3s ease;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        /* CONTAINER PRINCIPAL */
        .container {
            width: 100%;
            max-width: 1300px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15), 0 0 1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
        }

        body.dark-mode .container {
            background: #2d2d2d;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4), 0 0 1px rgba(0, 0, 0, 0.2);
        }

        /* HEADER */
        .header {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .header p {
            font-size: 15px;
            opacity: 0.95;
            font-weight: 300;
        }

        /* PAINÉIS */
        .panel {
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        .panel.left {
            border-right: 1px solid #f0f0f0;
        }

        .panel.right {
            background: #fafafa;
        }

        body.dark-mode .panel.left {
            border-right-color: #444;
        }

        body.dark-mode .panel.right {
            background: #252525;
        }

        /* SEÇÃO */
        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: #667eea;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        body.dark-mode .section-title {
            color: #8194f2;
        }

        .section-title i {
            font-size: 16px;
        }

        /* INPUTS */
        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        body.dark-mode .input-label {
            color: #ccc;
        }

        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: #fff;
            color: #333;
        }

        body.dark-mode input[type="number"],
        body.dark-mode input[type="text"] {
            background: #333;
            border-color: #444;
            color: #eee;
        }

        input[type="number"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input[type="number"]::placeholder,
        input[type="text"]::placeholder {
            color: #999;
        }

        /* CHECKBOX */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 10px;
        }

        body.dark-mode .checkbox-group {
            background: #3d3d3d;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .checkbox-group label {
            cursor: pointer;
            font-size: 14px;
            color: #333;
            margin: 0;
        }

        body.dark-mode .checkbox-group label {
            color: #ccc;
        }

        /* BOTÕES */
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 120px;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        body.dark-mode .btn-secondary {
            background: #3d3d3d;
            border-color: #555;
            color: #eee;
        }

        .btn-secondary:hover {
            background: #e8e8e8;
            border-color: #d0d0d0;
        }

        body.dark-mode .btn-secondary:hover {
            background: #4d4d4d;
            border-color: #666;
        }

        /* RESULTADO */
        .result-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .result-display {
            text-align: center;
        }

        .result-label {
            font-size: 14px;
            color: #999;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .result-number {
            font-size: 120px;
            font-weight: 900;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 20px;
            animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            0% {
                transform: scale(0.3) rotate(-180deg);
                opacity: 0;
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        .result-info {
            font-size: 13px;
            color: #999;
            margin-top: 16px;
        }

        /* HISTÓRICO */
        .history-section {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e0e0e0;
        }

        body.dark-mode .history-section {
            border-top-color: #444;
        }

        .history-title {
            font-size: 12px;
            font-weight: 700;
            color: #667eea;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        body.dark-mode .history-title {
            color: #8194f2;
        }

        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 100px;
            overflow-y: auto;
        }

        .history-item {
            background: #f5f5f5;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            color: #667eea;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        body.dark-mode .history-item {
            background: #3d3d3d;
            color: #8194f2;
        }

        .history-item:hover {
            background: #667eea;
            color: #fff;
        }

        /* ESTATÍSTICAS */
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        body.dark-mode .stats {
            border-top-color: #444;
        }

        .stat-item {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        body.dark-mode .stat-item {
            background: #3d3d3d;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #667eea;
        }

        body.dark-mode .stat-value {
            color: #8194f2;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        /* BOTÃO MODO ESCURO */
        .dark-mode-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .dark-mode-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        /* RESPONSIVO */
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }

            .panel.left {
                border-right: none;
                border-bottom: 1px solid #f0f0f0;
            }

            .panel.right {
                background: #ffffff;
            }

            body.dark-mode .panel.right {
                background: #2d2d2d;
            }
        }

        @media (max-width: 768px) {
            html, body {
                padding: 12px;
            }

            .header {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .panel {
                padding: 24px;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            .result-number {
                font-size: 80px;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 20px;
                flex-direction: column;
                gap: 8px;
            }

            .result-number {
                font-size: 60px;
            }

            .dark-mode-toggle {
                width: 45px;
                height: 45px;
                font-size: 18px;
                bottom: 15px;
                right: 15px;
            }
        }

        /* SCROLLBAR CUSTOMIZADA */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        body.dark-mode ::-webkit-scrollbar-track {
            background: #3d3d3d;
        }

        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <button class="dark-mode-toggle" id="darkModeBtn" title="Alternar modo escuro">
        <i class="fas fa-moon"></i>
    </button>

    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <h1>
                <i class="fas fa-dice"></i>
                Sorteador de Números Profissional
            </h1>
            <p>Gere números aleatórios com múltiplas opções e histórico de sorteios</p>
        </div>

        <!-- PAINEL ESQUERDO - CONTROLES -->
        <div class="panel left">
            <div class="section-title">
                <i class="fas fa-sliders-h"></i>
                Configurações
            </div>

            <div class="input-group">
                <label class="input-label">Número Mínimo</label>
                <input type="number" id="minimo" value="1" placeholder="Digite o valor mínimo">
            </div>

            <div class="input-group">
                <label class="input-label">Número Máximo</label>
                <input type="number" id="maximo" value="100" placeholder="Digite o valor máximo">
            </div>

            <div class="input-group">
                <label class="input-label">Quantidade de Sorteios</label>
                <input type="number" id="quantidade" value="1" min="1" max="10" placeholder="Quantos números sortear?">
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="semRepeticao">
                <label for="semRepeticao">Sem repetição</label>
            </div>

            <div class="button-group">
                <button class="btn-primary" onclick="sortear()">
                    <i class="fas fa-random"></i>
                    Sortear
                </button>
                <button class="btn-secondary" onclick="limpar()">
                    <i class="fas fa-trash"></i>
                    Limpar
                </button>
            </div>

            <div class="history-section">
                <div class="history-title">
                    <i class="fas fa-history"></i>
                    Últimos Sorteios
                </div>
                <div class="history-list" id="history"></div>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalSorteios">0</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="maiorNumero">-</div>
                    <div class="stat-label">Maior</div>
                </div>
            </div>
        </div>

        <!-- PAINEL DIREITO - RESULTADO -->
        <div class="panel right">
            <div class="result-wrapper">
                <div class="result-display">
                    <div class="result-label">Número Sorteado</div>
                    <div class="result-number" id="resultado">-</div>
                    <div class="result-info" id="resultInfo"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const minimoEl = document.getElementById("minimo");
        const maximoEl = document.getElementById("maximo");
        const quantidadeEl = document.getElementById("quantidade");
        const semRepeticaoEl = document.getElementById("semRepeticao");
        const resultadoEl = document.getElementById("resultado");
        const resultInfoEl = document.getElementById("resultInfo");
        const historyEl = document.getElementById("history");
        const darkModeBtn = document.getElementById("darkModeBtn");
        const totalSorteiosEl = document.getElementById("totalSorteios");
        const maiorNumeroEl = document.getElementById("maiorNumero");

        let historico = [];
        let totalSorteios = 0;
        let maiorNumero = 0;

        // MODO ESCURO
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            darkModeBtn.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            localStorage.setItem('darkMode', isDark);
        }

        darkModeBtn.addEventListener('click', toggleDarkMode);

        if (localStorage.getItem('darkMode') === 'true') {
            toggleDarkMode();
        }

        // CARREGAR HISTÓRICO
        function carregarHistorico() {
            const saved = localStorage.getItem('sorteadorHistorico');
            if (saved) {
                historico = JSON.parse(saved);
                atualizarHistorico();
            }
        }

        function atualizarHistorico() {
            historyEl.innerHTML = '';
            historico.slice(-10).reverse().forEach(num => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.textContent = num;
                item.onclick = () => resultadoEl.textContent = num;
                historyEl.appendChild(item);
            });
        }

        function salvarHistorico() {
            localStorage.setItem('sorteadorHistorico', JSON.stringify(historico));
        }

        function sortear() {
            const min = parseInt(minimoEl.value, 10);
            const max = parseInt(maximoEl.value, 10);
            const quantidade = parseInt(quantidadeEl.value, 10) || 1;
            const semRep = semRepeticaoEl.checked;

            if (isNaN(min) || isNaN(max)) {
                resultInfoEl.textContent = "❌ Valores inválidos";
                return;
            }

            if (min > max) {
                resultInfoEl.textContent = "❌ Mínimo não pode ser maior que máximo";
                return;
            }

            if (semRep && quantidade > (max - min + 1)) {
                resultInfoEl.textContent = "❌ Quantidade maior que intervalo disponível";
                return;
            }

            // Efeito de animação antes do resultado final
            let contador = 0;
            const intervalo = setInterval(() => {
                resultadoEl.textContent = Math.floor(Math.random() * (max - min + 1)) + min;
                contador++;
                if (contador > 10) {
                    clearInterval(intervalo);
                    processarSorteio(min, max, quantidade, semRep);
                }
            }, 50);
        }

        function processarSorteio(min, max, quantidade, semRep) {
            const numeros = [];
            if (semRep) {
                const disponivel = Array.from({ length: max - min + 1 }, (_, i) => min + i);
                for (let i = 0; i < quantidade; i++) {
                    const idx = Math.floor(Math.random() * disponivel.length);
                    numeros.push(disponivel[idx]);
                    disponivel.splice(idx, 1);
                }
            } else {
                for (let i = 0; i < quantidade; i++) {
                    numeros.push(Math.floor(Math.random() * (max - min + 1)) + min);
                }
            }

            const resultado = quantidade === 1 ? numeros[0] : numeros.join(", ");
            resultadoEl.textContent = resultado;
            resultadoEl.style.animation = 'none';
            resultadoEl.offsetHeight; // trigger reflow
            resultadoEl.style.animation = null;

            if (quantidade === 1) {
                historico.push(numeros[0]);
                totalSorteios++;
                if (numeros[0] > maiorNumero) maiorNumero = numeros[0];
                maiorNumeroEl.textContent = maiorNumero;
            } else {
                const max_resultado = Math.max(...numeros);
                if (max_resultado > maiorNumero) maiorNumero = max_resultado;
                maiorNumeroEl.textContent = maiorNumero;
                totalSorteios += quantidade;
                numeros.forEach(n => historico.push(n));
            }

            totalSorteiosEl.textContent = totalSorteios;
            resultInfoEl.textContent = `✓ ${quantidade} número${quantidade > 1 ? 's' : ''} sorteado${quantidade > 1 ? 's' : ''}`;
            atualizarHistorico();
            salvarHistorico();
        }

        function limpar() {
            minimoEl.value = 1;
            maximoEl.value = 100;
            quantidadeEl.value = 1;
            semRepeticaoEl.checked = false;
            resultadoEl.textContent = "-";
            resultInfoEl.textContent = "";
        }

        function aoApertarEnter(event) {
            if (event.key === "Enter") sortear();
        }

        minimoEl.addEventListener("keydown", aoApertarEnter);
        maximoEl.addEventListener("keydown", aoApertarEnter);
        quantidadeEl.addEventListener("keydown", aoApertarEnter);

        // Inicializar
        carregarHistorico();
        totalSorteiosEl.textContent = totalSorteios;
        maiorNumeroEl.textContent = maiorNumero || "-";
    </script>
</body>
</html>
