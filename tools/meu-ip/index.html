<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Descobrir Meu IP Online | UtiliWeb</title>

<meta name="description" content="Descubra seu endereço IP público online de forma rápida e gratuita. Ferramenta simples do UtiliWeb.">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="../../assets/style.css">
</head>

<body>

<header>
    <h1>Descobrir Meu IP</h1>
    <p>Veja seu endereço IP público instantaneamente</p>
</header>

<div class="container">

    <a href="../../index.html">← Voltar</a>

    <div style="margin-top:20px;">
        <button onclick="buscarIP()">Mostrar meu IP</button>

        <div style="margin-top:20px;">
            <p><strong>Seu IP:</strong></p>
            <p id="ip">---</p>
        </div>
    </div>

    <section style="margin-top:40px;">
        <h2>Como funciona</h2>
        <p>Esta ferramenta mostra seu IP público usando uma API simples diretamente no navegador.</p>
    </section>

</div>

<script>
function buscarIP() {
    fetch("https://api.ipify.org?format=json")
    .then(res => res.json())
    .then(data => {
        document.getElementById("ip").textContent = data.ip;
    })
    .catch(() => {
        document.getElementById("ip").textContent = "Erro ao buscar IP";
    });
}
</script>

</body>
</html>
