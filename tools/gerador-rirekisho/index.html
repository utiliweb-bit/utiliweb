<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Gerador de Currículo (Rirekisho) — UtiliWeb</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  
  <style>
    :root {
      --primary: #10b981;
      --primary-dark: #059669;
      --primary-light: #ecfdf5;
      --neutral-50: #f9fafb;
      --neutral-100: #f3f4f6;
      --neutral-200: #e5e7eb;
      --neutral-400: #9ca3af;
      --neutral-500: #6b7280;
      --neutral-700: #374151;
      --neutral-800: #1f2937;
      --neutral-900: #111827;
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      --radius-md: 12px;
      --radius-lg: 16px;
      --transition: all 0.25s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--neutral-50); color: var(--neutral-800); line-height: 1.5; }
    header { background: var(--neutral-900); color: #fff; padding: 48px 24px; text-align: center; }
    .container { max-width: 900px; margin: 0 auto; padding: 40px 24px; }
    .form-section { background: #fff; border-radius: var(--radius-lg); padding: 32px; margin-bottom: 24px; box-shadow: var(--shadow-md); }
    .form-section h2 { font-size: 1.25rem; margin-bottom: 24px; border-bottom: 2px solid var(--neutral-100); padding-bottom: 12px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 0.9375rem; font-weight: 600; margin-bottom: 8px; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border: 1px solid var(--neutral-200); border-radius: var(--radius-md); font-size: 0.9375rem; }
    .form-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .hint { font-size: 0.8125rem; color: var(--neutral-500); margin-top: 4px; }
    .btn { padding: 14px 32px; border-radius: var(--radius-md); border: none; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
    .btn-primary { background: var(--primary); color: #fff; }
    .entry-box { background: var(--neutral-50); border: 1px solid var(--neutral-200); border-radius: var(--radius-md); padding: 16px; margin-bottom: 16px; position: relative; }
    .add-button { background: var(--primary-light); color: var(--primary-dark); border: 1px solid var(--primary); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 12px; }
    .remove-button { position: absolute; top: 12px; right: 12px; color: #ef4444; border: none; background: none; cursor: pointer; font-size: 0.75rem; font-weight: 600; }
    @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header>
  <h1>Gerador de Rirekisho</h1>
  <p>Preencha os campos abaixo para gerar seu currículo japonês em PDF.</p>
</header>

<div class="container">
  <form id="rirekisho-form">
    <div class="form-section">
      <h2>📋 Dados Pessoais</h2>
      <div class="form-row">
        <div class="form-group">
          <label for="name">Nome Completo (Português)</label>
          <input type="text" id="name" name="name" placeholder="Ex: João Silva" required>
        </div>
        <div class="form-group">
          <label for="name-jp">Nome em Katakana (Japonês)</label>
          <input type="text" id="name-jp" name="name-jp" placeholder="Ex: ジョアン・シルバ">
          <div class="hint">Escreva apenas em Katakana. Ex: ジョアン</div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="birth-date">Data de Nascimento (YYYY/MM/DD)</label>
          <input type="text" id="birth-date" name="birth-date" placeholder="Ex: 1990/05/15" required>
        </div>
        <div class="form-group">
          <label for="gender">Gênero</label>
          <select id="gender" name="gender" required>
            <option value="">Selecione...</option>
            <option value="Masculino">Masculino (男)</option>
            <option value="Feminino">Feminino (女)</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="address">Endereço no Japão (Japonês)</label>
        <input type="text" id="address" name="address" placeholder="Ex: 東京都渋谷区道玄坂1-2-3" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="phone">Telefone</label>
          <input type="tel" id="phone" name="phone" placeholder="Ex: 090-1234-5678" required>
        </div>
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="Ex: seu@email.com" required>
        </div>
      </div>
      
      <div class="form-group">
        <label for="application-date">Data da Candidatura (YYYY年MM月DD日)</label>
        <input type="text" id="application-date" name="application-date" placeholder="Ex: 2024年1月15日" required>
      </div>
    </div>

    <div class="form-section">
      <h2>🎓 Educação</h2>
      <div id="education-entries"></div>
      <button type="button" class="add-button" onclick="addEducation()">+ Adicionar Educação</button>
    </div>

    <div class="form-section">
      <h2>💼 Experiência Profissional</h2>
      <div id="experience-entries"></div>
      <button type="button" class="add-button" onclick="addExperience()">+ Adicionar Experiência</button>
    </div>

    <div class="form-section">
      <h2>🏆 Qualificações e Observações</h2>
      <div class="form-group">
        <label for="qualifications">Qualificações (JLPT, Carteira de Motorista, etc.)</label>
        <textarea id="qualifications" name="qualifications" rows="4" placeholder="Uma por linha..."></textarea>
      </div>
      <div class="form-group">
        <label for="notes">Motivação / Observações</label>
        <textarea id="notes" name="notes" rows="4" placeholder="Por que você quer esta vaga?"></textarea>
      </div>
    </div>

    <div style="text-align: center; margin-top: 40px;">
      <button type="button" class="btn btn-primary" onclick="generatePDF()">📥 Gerar PDF do Currículo</button>
    </div>
  </form>
</div>

<script>
  let eduCount = 0, expCount = 0;
  function addEducation() {
    const id = eduCount++;
    const html = `<div class="entry-box" id="edu-${id}">
      <button type="button" class="remove-button" onclick="document.getElementById('edu-${id}').remove()">✕ Remover</button>
      <div class="form-row">
        <div class="form-group"><label>Início (YYYY/MM)</label><input type="text" class="edu-start" placeholder="2015/04"></div>
        <div class="form-group"><label>Fim (YYYY/MM)</label><input type="text" class="edu-end" placeholder="2019/03"></div>
      </div>
      <div class="form-group"><label>Escola / Curso</label><input type="text" class="edu-school" placeholder="Ex: Universidade de São Paulo - Engenharia"></div>
    </div>`;
    document.getElementById('education-entries').insertAdjacentHTML('beforeend', html);
  }

  function addExperience() {
    const id = expCount++;
    const html = `<div class="entry-box" id="exp-${id}">
      <button type="button" class="remove-button" onclick="document.getElementById('exp-${id}').remove()">✕ Remover</button>
      <div class="form-row">
        <div class="form-group"><label>Início (YYYY/MM)</label><input type="text" class="exp-start" placeholder="2019/04"></div>
        <div class="form-group"><label>Fim (YYYY/MM)</label><input type="text" class="exp-end" placeholder="Atualmente"></div>
      </div>
      <div class="form-group"><label>Empresa / Cargo</label><input type="text" class="exp-company" placeholder="Ex: Toyota - Operador de Produção"></div>
    </div>`;
    document.getElementById('experience-entries').insertAdjacentHTML('beforeend', html);
  }

  function generatePDF() {
    const data = {
      name: document.getElementById('name').value,
      nameJp: document.getElementById('name-jp').value,
      birth: document.getElementById('birth-date').value,
      gender: document.getElementById('gender').value,
      address: document.getElementById('address').value,
      phone: document.getElementById('phone').value,
      email: document.getElementById('email').value,
      date: document.getElementById('application-date').value,
      edu: Array.from(document.querySelectorAll('#education-entries .entry-box')).map(el => ({
        period: `${el.querySelector('.edu-start').value} ~ ${el.querySelector('.edu-end').value}`,
        info: el.querySelector('.edu-school').value
      })),
      exp: Array.from(document.querySelectorAll('#experience-entries .entry-box')).map(el => ({
        period: `${el.querySelector('.exp-start').value} ~ ${el.querySelector('.exp-end').value}`,
        info: el.querySelector('.exp-company').value
      })),
      qual: document.getElementById('qualifications').value,
      notes: document.getElementById('notes').value
    };

    const element = document.createElement('div');
    element.style.padding = '30px';
    element.style.fontSize = '12px';
    element.style.color = '#000';
    element.style.backgroundColor = '#fff';
    element.innerHTML = `
      <div style="border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end;">
        <h1 style="font-size: 24px; margin: 0;">履 歴 書</h1>
        <span style="font-size: 11px;">${data.date} 現在</span>
      </div>
      <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
        <tr>
          <td style="width: 80%;">
            <div style="border: 1px solid #000; padding: 5px; font-size: 10px;">ふりがna: ${data.nameJp}</div>
            <div style="border: 1px solid #000; border-top: none; padding: 10px; font-size: 18px; font-weight: bold;">氏 名: ${data.name}</div>
            <div style="border: 1px solid #000; border-top: none; padding: 8px;">生年月日: ${data.birth} 生 ( ${data.gender} )</div>
          </td>
          <td style="width: 20%; border: 1px solid #000; border-left: none; text-align: center; vertical-align: middle; color: #ccc;">写真貼付</td>
        </tr>
      </table>
      <div style="border: 1px solid #000; padding: 8px; margin-bottom: 20px;">
        <div>現住所: ${data.address}</div>
        <div style="margin-top: 5px;">電話: ${data.phone} / Email: ${data.email}</div>
      </div>
      <table style="width: 100%; border-collapse: collapse; border: 1px solid #000;">
        <tr style="background: #f5f5f5;"><th style="border: 1px solid #000; padding: 5px; width: 25%;">年 月</th><th style="border: 1px solid #000; padding: 5px;">学歴 ・ 職歴</th></tr>
        <tr><td colspan="2" style="border: 1px solid #000; text-align: center; padding: 3px; font-weight: bold;">学 歴</td></tr>
        ${data.edu.map(e => `<tr><td style="border: 1px solid #000; padding: 5px; text-align: center;">${e.period}</td><td style="border: 1px solid #000; padding: 5px;">${e.info}</td></tr>`).join('')}
        <tr><td colspan="2" style="border: 1px solid #000; text-align: center; padding: 3px; font-weight: bold;">職 歴</td></tr>
        ${data.exp.map(e => `<tr><td style="border: 1px solid #000; padding: 5px; text-align: center;">${e.period}</td><td style="border: 1px solid #000; padding: 5px;">${e.info}</td></tr>`).join('')}
      </table>
      <div style="border: 1px solid #000; border-top: none; padding: 8px; margin-bottom: 20px;">
        <div style="font-weight: bold; margin-bottom: 5px;">免許 ・ 資格</div>
        <div style="white-space: pre-wrap;">${data.qual}</div>
      </div>
      <div style="border: 1px solid #000; padding: 8px;">
        <div style="font-weight: bold; margin-bottom: 5px;">志望の動機、特技、好きな学科、アピールポイントなど</div>
        <div style="white-space: pre-wrap;">${data.notes}</div>
      </div>
    `;

    const opt = { margin: 10, filename: 'rirekisho.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
    html2pdf().set(opt).from(element).save();
  }
  
  addEducation();
  addExperience();
</script>
</body>
</html>
