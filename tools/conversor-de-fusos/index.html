<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Conversor de Fusos | UtiliWeb</title>
<meta name="description" content="Converta horários entre cidades do mundo em tempo real.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  /* Slate scale */
  --s0:#f8f9fb;
  --s1:#f0f2f5;
  --s2:#e2e6ec;
  --s3:#c8d0da;
  --s4:#97a3b4;
  --s5:#5c6b80;
  --s6:#3d4f62;
  --s7:#253244;
  --s8:#182030;
  --s9:#0f1520;

  /* Amber accent */
  --a0:#fffbf0;
  --a1:#fef3c7;
  --a2:#fde68a;
  --a3:#f59e0b;
  --a4:#d97706;
  --a5:#b45309;
  --a6:#78350f;

  /* Semantic */
  --emerald:#059669;
  --emerald-bg:#ecfdf5;
  --rose:#dc2626;
  --rose-bg:#fef2f2;

  --font:'DM Sans',system-ui,sans-serif;
  --mono:'DM Mono',monospace;

  --panel-l:var(--s9);
  --panel-r:var(--s0);
  --border-dark:rgba(255,255,255,.07);
  --border-light:rgba(15,21,32,.08);
  --r:12px;
}

*{margin:0;padding:0;box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;}
body{
  font-family:var(--font);
  background:var(--s8);
  background-image:
    radial-gradient(ellipse 55% 45% at 15% 0%, rgba(93,150,210,.12), transparent),
    radial-gradient(ellipse 45% 55% at 85% 100%, rgba(245,158,11,.07), transparent);
  min-height:100dvh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:24px 14px;
}

.wrapper{
  width:100%;
  max-width:1100px;
  display:grid;
  grid-template-columns:400px 1fr;
  min-height:580px;
  border-radius:20px;
  overflow:hidden;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.06),
    0 32px 80px rgba(0,0,0,.55),
    0 8px 24px rgba(0,0,0,.3);
}

/* ─── LEFT ─── */
.left{
  background:var(--panel-l);
  padding:36px 32px 32px;
  display:flex;
  flex-direction:column;
  gap:0;
  overflow-y:auto;
  border-right:1px solid rgba(255,255,255,.05);
}
.left::-webkit-scrollbar{width:2px;}
.left::-webkit-scrollbar-thumb{background:var(--s7);border-radius:2px;}

.back-link{
  display:inline-flex;
  align-items:center;
  gap:5px;
  color:var(--s5);
  text-decoration:none;
  font-size:11.5px;
  font-weight:500;
  letter-spacing:.03em;
  margin-bottom:32px;
  transition:color .15s;
}
.back-link:hover{color:var(--s4);}
.back-link svg{opacity:.6;}

.wordmark{
  font-size:10px;
  font-weight:600;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--a3);
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:8px;
}
.wordmark-line{flex:none;width:20px;height:1.5px;background:var(--a3);opacity:.6;border-radius:1px;}

h1{
  font-family:var(--font);
  font-size:24px;
  font-weight:600;
  color:#f4f6f9;
  letter-spacing:-.025em;
  line-height:1.2;
  margin-bottom:5px;
}
.subtitle{
  font-size:13px;
  color:var(--s5);
  margin-bottom:32px;
  line-height:1.55;
  font-weight:400;
}

.form-block{margin-bottom:18px;}

.form-label{
  font-size:10.5px;
  font-weight:600;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--s5);
  margin-bottom:7px;
  display:block;
}

.city-selector{position:relative;}
.city-selector select{
  width:100%;
  padding:11px 36px 11px 13px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.09);
  border-radius:var(--r);
  color:#eef1f5;
  font-size:13.5px;
  font-family:var(--font);
  font-weight:500;
  appearance:none;
  cursor:pointer;
  transition:border-color .15s, background .15s;
}
.city-selector select:focus{
  outline:none;
  border-color:var(--a3);
  background:rgba(255,255,255,.08);
}
.city-selector select:hover{border-color:rgba(255,255,255,.16);}
.city-selector::after{
  content:"";
  pointer-events:none;
  position:absolute;
  right:13px;top:50%;
  transform:translateY(-50%);
  width:10px;height:6px;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='rgba(92,107,128,0.9)' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
  background-repeat:no-repeat;
  background-position:center;
}
.city-selector select option{background:#182030;color:#eef1f5;}

.datetime-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
input[type="date"],input[type="time"]{
  width:100%;
  padding:11px 13px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.09);
  border-radius:var(--r);
  color:#eef1f5;
  font-size:13.5px;
  font-family:var(--font);
  font-weight:500;
  transition:border-color .15s, background .15s;
  color-scheme:dark;
}
input[type="date"]:focus,input[type="time"]:focus{
  outline:none;
  border-color:var(--a3);
  background:rgba(255,255,255,.08);
}
input[type="date"]:hover,input[type="time"]:hover{border-color:rgba(255,255,255,.16);}

.divider{
  display:flex;align-items:center;gap:10px;
  margin:6px 0;
}
.divider-line{flex:1;height:1px;background:rgba(255,255,255,.06);}
.btn-swap{
  width:32px;height:32px;
  border-radius:50%;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.09);
  color:var(--s4);
  font-size:13px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s, color .15s, transform .25s;
  flex:none;
  font-family:var(--mono);
}
.btn-swap:hover{
  background:rgba(255,255,255,.12);
  color:#eef1f5;
  transform:rotate(180deg);
}

.btn-convert{
  width:100%;
  padding:13px;
  background:var(--a3);
  border:none;
  border-radius:var(--r);
  color:var(--a6);
  font-family:var(--font);
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  letter-spacing:.01em;
  margin-top:8px;
  transition:background .15s, transform .12s;
}
.btn-convert:hover{background:var(--a4);transform:translateY(-1px);}
.btn-convert:active{transform:translateY(0);}

/* ─── RIGHT ─── */
.right{
  background:var(--panel-r);
  padding:36px 32px 32px;
  display:flex;
  flex-direction:column;
  overflow-y:auto;
}
.right::-webkit-scrollbar{width:2px;}
.right::-webkit-scrollbar-thumb{background:var(--s2);border-radius:2px;}

.right-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:24px;
}
h2{
  font-size:15px;
  font-weight:600;
  color:var(--s7);
  letter-spacing:-.01em;
}
.dst-badge{
  display:flex;align-items:center;gap:6px;
  background:var(--emerald-bg);
  border:1px solid rgba(5,150,105,.15);
  border-radius:20px;
  padding:4px 12px;
  font-size:11px;
  font-weight:600;
  color:var(--emerald);
  letter-spacing:.01em;
}
.dst-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--emerald);
  animation:pulse 2.2s infinite;
}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}

/* Empty state */
.empty-state{
  flex:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;color:var(--s4);text-align:center;
  padding:40px 20px;
  border:1.5px dashed var(--s2);
  border-radius:16px;
}
.empty-state p{font-size:13.5px;max-width:24ch;line-height:1.6;color:var(--s4);font-weight:400;}

/* Results */
.result-wrap{display:flex;flex-direction:column;gap:14px;}

.conversion-pair{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:12px;
  align-items:center;
}
.city-card{
  background:#fff;
  border:1px solid var(--s2);
  border-radius:14px;
  padding:18px 16px;
}
.city-card.dest{
  border-color:var(--a3);
  border-width:1.5px;
}
.cc-tag{
  font-size:10px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;
  color:var(--s4);margin-bottom:10px;
}
.city-card.dest .cc-tag{color:var(--a4);}
.cc-name{
  font-size:14px;font-weight:600;color:var(--s7);
  margin-bottom:6px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.cc-time{
  font-family:var(--mono);
  font-size:34px;font-weight:500;
  color:var(--s8);
  letter-spacing:-.02em;
  line-height:1;margin-bottom:5px;
}
.city-card.dest .cc-time{color:var(--a4);}
.cc-date{font-size:11.5px;color:var(--s4);margin-bottom:9px;line-height:1.4;}
.cc-offset{
  display:inline-block;
  padding:3px 8px;border-radius:6px;
  font-size:10px;font-weight:600;
  font-family:var(--mono);
  background:var(--s1);color:var(--s5);
  letter-spacing:.03em;
}
.city-card.dest .cc-offset{background:var(--a1);color:var(--a5);}

.arrow-col{
  display:flex;flex-direction:column;align-items:center;gap:5px;
}
.arrow-icon{font-size:16px;color:var(--s3);}
.diff-pill{
  background:var(--s1);
  border:1px solid var(--s2);
  border-radius:20px;
  padding:4px 10px;
  font-size:10px;font-weight:600;
  color:var(--s5);white-space:nowrap;text-align:center;
  font-family:var(--mono);
}

/* Timeline */
.timeline-section{
  background:#fff;
  border:1px solid var(--s2);
  border-radius:14px;
  padding:16px 18px;
}
.section-label{
  font-size:10px;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;color:var(--s4);margin-bottom:12px;
}
.timeline-hours{
  display:flex;justify-content:space-between;
  font-size:9px;font-weight:500;font-family:var(--mono);
  color:var(--s4);margin-bottom:7px;
}
.timeline-bar{
  height:5px;border-radius:3px;
  background:var(--s1);position:relative;overflow:visible;
}
.tl-night{
  position:absolute;height:100%;
  background:rgba(37,50,68,.08);border-radius:3px;
}
.tl-marker{
  position:absolute;top:-8px;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:3px;
  transition:left .4s cubic-bezier(.34,1.4,.64,1);
}
.tl-pin{
  width:19px;height:19px;border-radius:50%;
  border:2.5px solid var(--s0);
}
.tl-pin.origin{background:var(--s6);}
.tl-pin.dest{background:var(--a3);}
.tl-lbl{
  font-size:9px;font-weight:600;font-family:var(--mono);
  color:var(--s5);white-space:nowrap;
}
.tl-marker.dest-m .tl-lbl{color:var(--a4);}
.tl-legend{
  display:flex;gap:16px;margin-top:16px;
  font-size:11px;font-weight:500;color:var(--s5);
}
.tl-leg-dot{
  width:9px;height:9px;border-radius:50%;flex:none;margin-top:1px;
}

/* World clocks */
.world-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
}
.world-card{
  background:#fff;border:1px solid var(--s2);
  border-radius:var(--r);padding:12px 14px;
  transition:border-color .15s;
}
.world-card:hover{border-color:var(--s3);}
.wc-city{
  font-size:9.5px;font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;color:var(--s4);margin-bottom:4px;
}
.wc-time{
  font-family:var(--mono);font-size:20px;font-weight:500;
  color:var(--s7);letter-spacing:-.01em;line-height:1.1;
}
.wc-date{font-size:10.5px;color:var(--s4);margin-top:3px;}
.wc-badge{
  display:inline-block;font-size:9px;font-weight:700;
  padding:1px 6px;border-radius:5px;margin-left:4px;vertical-align:2px;
}
.wc-badge.ahead{background:var(--emerald-bg);color:var(--emerald);}
.wc-badge.behind{background:var(--rose-bg);color:var(--rose);}

.day-badge{
  display:inline-block;font-size:9.5px;font-weight:700;
  padding:2px 8px;border-radius:6px;margin-left:6px;vertical-align:3px;
}
.day-badge.next{background:var(--a1);color:var(--a5);}
.day-badge.prev{background:var(--rose-bg);color:var(--rose);}

.footnote{
  font-size:11px;color:var(--s4);margin-top:6px;line-height:1.5;
}

@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}

@media(max-width:900px){
  body{align-items:flex-start;padding:10px;}
  .wrapper{grid-template-columns:1fr;border-radius:16px;}
  .left,.right{overflow-y:visible;}
  h1{font-size:21px;}
  .world-grid{grid-template-columns:repeat(2,1fr);}
  .conversion-pair{grid-template-columns:1fr;gap:8px;}
  .arrow-col{flex-direction:row;}
  .arrow-icon{transform:rotate(90deg);}
}
@media(max-width:480px){
  .world-grid{grid-template-columns:1fr 1fr;}
  .datetime-row{grid-template-columns:1fr;}
  .left,.right{padding:24px 18px;}
}
</style>
</head>

  <div id="resultado" style="display:none">
    <div class="result-wrap" id="result-inner"></div>
  </div>
</div>

</div>

];

const DIAS=["dom","seg","ter","qua","qui","sex","sáb"];
const MESES_C=["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
const MESES_L=["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];

function fmtLong(d){return`${DIAS[d.getDay()]}, ${d.getDate()} de ${MESES_L[d.getMonth()]}`;}
function fmtShort(d){return`${d.getDate()} ${MESES_C[d.getMonth()]}`;}
function fmtTime(d){return d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',hour12:false});}

function getOffset(tz,date){
  const utc=new Date(date.toLocaleString('en-US',{timeZone:'UTC'}));
  const loc=new Date(date.toLocaleString('en-US',{timeZone:tz}));
  return(loc-utc)/60000;
}
function offsetLabel(m){
  const s=m>=0?'+':'-';const a=Math.abs(m);
  return`UTC${s}${String(Math.floor(a/60)).padStart(2,'0')}:${String(a%60).padStart(2,'0')}`;
}

function convertToTZ(dateStr,timeStr,fromTZ,toTZ){
  const approx=new Date(`${dateStr}T${timeStr}:00`);
  const fromOffset=getOffset(fromTZ,approx);
  const utcMs=approx.getTime()-fromOffset*60000;
  const utcDate=new Date(utcMs);
  const toOffset=getOffset(toTZ,utcDate);
  return{destDate:new Date(utcMs+toOffset*60000),utcDate,fromOffset,toOffset};
}

function dayDiffBadge(dest,origin){
  const diff=dest.getDate()-origin.getDate();
  const md=dest.getMonth()-origin.getMonth();
  if(diff===1||diff<-20||md>0)return'<span class="day-badge next">+1 dia</span>';
  if(diff===-1||diff>20||md<0)return'<span class="day-badge prev">−1 dia</span>';
  return'';
}

function buildTimeline(oh,om,dh,dm,oLbl,dLbl){
  const op=Math.max(1,Math.min(99,((oh*60+om)/(1440))*100));
  const dp=Math.max(1,Math.min(99,((dh*60+dm)/(1440))*100));
  const hrs=[0,4,8,12,16,20,24].map(h=>`<span>${h===24?'24h':h+'h'}</span>`).join('');
  return`
<div class="timeline-section">
  <div class="section-label">Posição nas 24h do dia</div>
  <div class="timeline-hours">${hrs}</div>
  <div class="timeline-bar">
    <div class="tl-night" style="left:0;width:33.3%"></div>
    <div class="tl-night" style="left:83.3%;width:16.7%"></div>
    <div class="tl-marker" style="left:${op}%">
      <div class="tl-pin origin"></div>
      <div class="tl-lbl">${String(oh).padStart(2,'0')}:${String(om).padStart(2,'0')}</div>
    </div>
    <div class="tl-marker dest-m" style="left:${dp}%">
      <div class="tl-pin dest"></div>
      <div class="tl-lbl">${String(dh).padStart(2,'0')}:${String(dm).padStart(2,'0')}</div>
    </div>
  </div>
  <div class="tl-legend">
    <div style="display:flex;align-items:center;gap:7px;">
      <div class="tl-leg-dot" style="background:#3d4f62"></div>${oLbl}
    </div>
    <div style="display:flex;align-items:center;gap:7px;">
      <div class="tl-leg-dot" style="background:#f59e0b"></div>${dLbl}
    </div>
  </div>
</div>`;
}

function buildSelects(){
  const o=document.getElementById('origem');
  const d=document.getElementById('destino');
  FUSOS.forEach((f,i)=>{
    o.innerHTML+=`<option value="${i}">${f.label}</option>`;
    d.innerHTML+=`<option value="${i}">${f.label}</option>`;
  });
  o.value=0;
  d.value=FUSOS.findIndex(f=>f.tz==='Asia/Tokyo');
  document.getElementById('data').value=new Date().toISOString().slice(0,10);
}

function inverter(){
  const o=document.getElementById('origem');
  const d=document.getElementById('destino');
  const t=o.value;o.value=d.value;d.value=t;
  converter();
}

function converter(){
  const oi=parseInt(document.getElementById('origem').value);
  const di=parseInt(document.getElementById('destino').value);
  const dv=document.getElementById('data').value;
  const hv=document.getElementById('hora').value;
  const el=document.getElementById('result-inner');
  const empty=document.getElementById('empty');
  const rw=document.getElementById('resultado');

  if(!dv||!hv){empty.style.display='flex';rw.style.display='none';return;}

  const fTZ=FUSOS[oi].tz,tTZ=FUSOS[di].tz;
  const fLbl=FUSOS[oi].label.split(' — ')[0];
  const tLbl=FUSOS[di].label.split(' — ')[0];

  const{destDate,fromOffset,toOffset}=convertToTZ(dv,hv,fTZ,tTZ);
  const diffMin=toOffset-fromOffset;

  const[oy,om,od]=dv.split('-').map(Number);
  const[oh,omi]=hv.split(':').map(Number);
  const oriObj=new Date(oy,om-1,od,oh,omi);
  const badge=dayDiffBadge(destDate,oriObj);

  const diffPill=diffMin===0?'Mesmo fuso':(()=>{
    const a=Math.abs(diffMin),h=Math.floor(a/60),m=a%60;
    const p=[];if(h>0)p.push(`${h}h`);if(m>0)p.push(`${m}min`);
    return(diffMin>0?'▲ ':'▼ ')+p.join(' ');
  })();

  const worldHtml=WORLD_CLOCKS.map(wc=>{
    const{destDate:wd}=convertToTZ(dv,hv,fTZ,wc.tz);
    const diff=wd.getDate()-oriObj.getDate();
    const md=wd.getMonth()-oriObj.getMonth();
    let b2='';
    if(diff===1||diff<-20||md>0)b2='<span class="wc-badge ahead">+1</span>';
    if(diff===-1||diff>20||md<0)b2='<span class="wc-badge behind">−1</span>';
    return`<div class="world-card">
      <div class="wc-city">${wc.city}</div>
      <div class="wc-time">${fmtTime(wd)}${b2}</div>
      <div class="wc-date">${fmtShort(wd)}</div>
    </div>`;
  }).join('');

  el.innerHTML=`
<div class="conversion-pair">
  <div class="city-card">
    <div class="cc-tag">Origem</div>
    <div class="cc-name">${fLbl}</div>
    <div class="cc-time">${hv}</div>
    <div class="cc-date">${fmtLong(oriObj)}</div>
    <span class="cc-offset">${offsetLabel(fromOffset)}</span>
  </div>
  <div class="arrow-col">
    <div class="arrow-icon">→</div>
    <div class="diff-pill">${diffPill}</div>
  </div>
  <div class="city-card dest">
    <div class="cc-tag">Destino</div>
    <div class="cc-name">${tLbl}</div>
    <div class="cc-time">${fmtTime(destDate)}${badge}</div>
    <div class="cc-date">${fmtLong(destDate)}</div>
    <span class="cc-offset">${offsetLabel(toOffset)}</span>
  </div>
</div>

${buildTimeline(oh,omi,destDate.getHours(),destDate.getMinutes(),fLbl,tLbl)}

<div>
  <div class="section-label" style="margin-bottom:10px">Outras cidades neste horário</div>
  <div class="world-grid">${worldHtml}</div>
</div>

<p class="footnote">DST aplicado automaticamente pelo navegador. Resultados baseados nos dados de fuso do sistema.</p>
`;

  empty.style.display='none';
  rw.style.display='block';
}

buildSelects();
</script>
</body>
</html>
