<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Conversor de Fusos | UtiliWeb</title>
<meta name="description" content="Converta horários entre cidades do mundo em tempo real.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --night:#0c0c14;
  --night-2:#13131f;
  --night-3:#1c1c2e;
  --night-4:#252540;
  --night-5:#2e2e52;
  --amber:#e8a020;
  --amber-dim:#c4861a;
  --amber-pale:rgba(232,160,32,.12);
  --amber-glow:rgba(232,160,32,.22);
  --paper:#f9f8f5;
  --paper-dim:#f1f0eb;
  --paper-deep:#e8e6df;
  --ink:#0c0c14;
  --ink-2:#2a2a3e;
  --ink-3:#4a4a6a;
  --ink-4:#8888aa;
  --ink-5:#b8b8cc;
  --line-dark:rgba(255,255,255,.07);
  --line-light:rgba(12,12,20,.08);
  --blue-accent:#4060e0;
  --green-soft:#1a8a4a;
  --green-bg:#e6f5ed;
  --red-soft:#c02020;
  --red-bg:#fce8e8;
  --font-display:'Space Grotesk',sans-serif;
  --font-body:'Inter',system-ui,sans-serif;
  --r-sm:10px;
  --r-md:14px;
  --r-lg:18px;
  --r-xl:24px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;}
body{
  font-family:var(--font-body);
  background:var(--night);
  background-image:
    radial-gradient(ellipse 60% 50% at 20% 0%, rgba(64,96,224,.18), transparent),
    radial-gradient(ellipse 40% 60% at 80% 100%, rgba(232,160,32,.1), transparent);
  min-height:100dvh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:24px 14px;
  color:var(--ink);
}
.wrapper{
  width:100%;
  max-width:1120px;
  display:grid;
  grid-template-columns:420px 1fr;
  min-height:560px;
  border-radius:var(--r-xl);
  overflow:hidden;
  box-shadow:0 60px 120px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.06);
}

/* ─── LEFT PANEL ─── */
.left{
  background:var(--night-2);
  background-image:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(64,96,224,.14), transparent);
  padding:36px 32px;
  display:flex;
  flex-direction:column;
  gap:0;
  overflow-y:auto;
  position:relative;
}
.left::-webkit-scrollbar{width:3px;}
.left::-webkit-scrollbar-thumb{background:var(--night-5);border-radius:3px;}

.back-link{
  display:inline-flex;
  align-items:center;
  gap:5px;
  color:var(--ink-4);
  text-decoration:none;
  font-size:12px;
  font-weight:600;
  letter-spacing:.04em;
  margin-bottom:28px;
  transition:color .15s;
}
.back-link:hover{color:var(--ink-5);}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:6px;
}
.brand-dot{
  width:8px;height:8px;
  border-radius:50%;
  background:var(--amber);
  box-shadow:0 0 10px var(--amber);
}
.eyebrow{
  font-size:10px;
  font-weight:700;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--ink-4);
}
h1{
  font-family:var(--font-display);
  font-size:26px;
  font-weight:700;
  color:#fdfcfa;
  letter-spacing:-.02em;
  line-height:1.15;
  margin-bottom:4px;
}
.subtitle{
  font-size:13px;
  color:var(--ink-4);
  margin-bottom:30px;
  line-height:1.5;
}

.form-block{margin-bottom:20px;}

.form-label{
  font-size:10px;
  font-weight:700;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--ink-4);
  margin-bottom:7px;
  display:block;
}

.city-selector{
  position:relative;
}
.city-selector select{
  width:100%;
  padding:12px 36px 12px 14px;
  background:var(--night-3);
  border:1.5px solid var(--line-dark);
  border-radius:var(--r-sm);
  color:#fdfcfa;
  font-size:14px;
  font-family:var(--font-display);
  font-weight:500;
  appearance:none;
  cursor:pointer;
  transition:border-color .15s, background .15s;
}
.city-selector select:focus{
  outline:none;
  border-color:var(--amber);
  background:var(--night-4);
}
.city-selector select:hover{border-color:rgba(255,255,255,.18);}
.city-selector::after{
  content:"";
  pointer-events:none;
  position:absolute;
  right:14px;top:50%;
  transform:translateY(-50%);
  width:10px;height:10px;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M1 3.5l4 3.5 4-3.5' stroke='rgba(136,136,170,0.8)' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
  background-repeat:no-repeat;
  background-position:center;
}
.city-selector select option{background:var(--night-2);color:#fdfcfa;}

.datetime-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.field-wrap{position:relative;}
input[type="date"],input[type="time"]{
  width:100%;
  padding:11px 14px;
  background:var(--night-3);
  border:1.5px solid var(--line-dark);
  border-radius:var(--r-sm);
  color:#fdfcfa;
  font-size:14px;
  font-family:var(--font-display);
  font-weight:500;
  transition:border-color .15s, background .15s;
  color-scheme:dark;
}
input[type="date"]:focus,input[type="time"]:focus{
  outline:none;
  border-color:var(--amber);
  background:var(--night-4);
}
input[type="date"]:hover,input[type="time"]:hover{border-color:rgba(255,255,255,.18);}

.swap-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin:4px 0;
}
.swap-line{flex:1;height:1px;background:var(--line-dark);}
.btn-swap{
  width:34px;height:34px;
  border-radius:50%;
  background:var(--night-4);
  border:1.5px solid var(--line-dark);
  color:var(--ink-4);
  font-size:14px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s, border-color .15s, color .15s, transform .2s;
  flex:none;
}
.btn-swap:hover{
  background:var(--night-5);
  border-color:rgba(255,255,255,.2);
  color:#fdfcfa;
  transform:rotate(180deg);
}

.btn-convert{
  width:100%;
  padding:14px;
  background:var(--amber);
  border:none;
  border-radius:var(--r-sm);
  color:var(--night);
  font-family:var(--font-display);
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  letter-spacing:.01em;
  margin-top:6px;
  transition:background .15s, transform .12s, box-shadow .15s;
  box-shadow:0 4px 18px rgba(232,160,32,.3);
}
.btn-convert:hover{
  background:#f0ab25;
  transform:translateY(-1px);
  box-shadow:0 8px 24px rgba(232,160,32,.4);
}
.btn-convert:active{transform:translateY(0);}

/* ─── RIGHT PANEL ─── */
.right{
  background:var(--paper);
  padding:36px 36px;
  display:flex;
  flex-direction:column;
  overflow-y:auto;
}
.right::-webkit-scrollbar{width:3px;}
.right::-webkit-scrollbar-thumb{background:var(--paper-deep);border-radius:3px;}

.right-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:24px;
}
h2{
  font-family:var(--font-display);
  font-size:18px;
  font-weight:700;
  color:var(--ink-2);
  letter-spacing:-.01em;
}
.live-badge{
  display:flex;
  align-items:center;
  gap:6px;
  background:var(--paper-dim);
  border:1px solid var(--line-light);
  border-radius:20px;
  padding:5px 12px;
  font-size:11px;
  font-weight:600;
  color:var(--ink-3);
}
.live-dot{
  width:6px;height:6px;
  border-radius:50%;
  background:var(--green-soft);
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%,100%{opacity:1;}
  50%{opacity:.4;}
}

.empty-state{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:12px;
  color:var(--ink-5);
  text-align:center;
  padding:40px 20px;
  border:1.5px dashed var(--line-light);
  border-radius:var(--r-lg);
}
.empty-state svg{opacity:.4;}
.empty-state p{font-size:14px;max-width:22ch;line-height:1.55;color:var(--ink-4);}

/* Result layout */
.result-wrap{display:flex;flex-direction:column;gap:12px;}

.conversion-pair{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:12px;
  align-items:center;
}
.city-card{
  background:#fff;
  border:1px solid var(--line-light);
  border-radius:var(--r-md);
  padding:18px 16px;
  box-shadow:0 2px 8px rgba(12,12,20,.05);
}
.city-card.dest{
  border-color:var(--amber);
  border-width:1.5px;
  background:#fff;
}
.city-card .cc-tag{
  font-size:10px;
  font-weight:700;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--ink-4);
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:6px;
}
.city-card.dest .cc-tag{color:var(--amber-dim);}
.city-card .cc-name{
  font-family:var(--font-display);
  font-size:15px;
  font-weight:700;
  color:var(--ink-2);
  margin-bottom:6px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.city-card .cc-time{
  font-family:var(--font-display);
  font-size:36px;
  font-weight:700;
  color:var(--ink);
  letter-spacing:-.03em;
  line-height:1;
  margin-bottom:4px;
}
.city-card.dest .cc-time{color:var(--amber-dim);}
.city-card .cc-date{
  font-size:12px;
  color:var(--ink-4);
  margin-bottom:8px;
  line-height:1.4;
}
.city-card .cc-offset{
  display:inline-block;
  padding:3px 9px;
  border-radius:6px;
  font-size:10.5px;
  font-weight:700;
  background:var(--paper-dim);
  color:var(--ink-3);
  letter-spacing:.04em;
}
.city-card.dest .cc-offset{
  background:var(--amber-pale);
  color:var(--amber-dim);
}

.arrow-col{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
}
.arrow-chevron{
  font-size:18px;
  color:var(--ink-5);
  line-height:1;
}
.diff-pill{
  background:var(--paper-dim);
  border:1px solid var(--line-light);
  border-radius:20px;
  padding:4px 10px;
  font-size:10.5px;
  font-weight:700;
  color:var(--ink-3);
  white-space:nowrap;
  text-align:center;
}

/* Timeline */
.timeline-section{
  background:#fff;
  border:1px solid var(--line-light);
  border-radius:var(--r-md);
  padding:16px 18px;
  box-shadow:0 2px 8px rgba(12,12,20,.04);
}
.timeline-label{
  font-size:10px;
  font-weight:700;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--ink-4);
  margin-bottom:12px;
}
.timeline-track-wrap{
  position:relative;
  margin-bottom:10px;
}
.timeline-hours{
  display:flex;
  justify-content:space-between;
  font-size:9.5px;
  font-weight:600;
  color:var(--ink-5);
  margin-bottom:6px;
  letter-spacing:.02em;
}
.timeline-bar{
  height:6px;
  border-radius:3px;
  background:var(--paper-dim);
  position:relative;
  overflow:visible;
}
.timeline-bar-night{
  position:absolute;
  height:100%;
  background:rgba(12,12,40,.08);
  border-radius:3px;
}
.tl-marker{
  position:absolute;
  top:-7px;
  transform:translateX(-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:2px;
  transition:left .4s cubic-bezier(.34,1.4,.64,1);
}
.tl-marker-pin{
  width:20px;height:20px;
  border-radius:50%;
  border:2.5px solid var(--paper);
  box-shadow:0 0 0 1.5px currentColor, 0 2px 8px rgba(0,0,0,.15);
  display:flex;align-items:center;justify-content:center;
}
.tl-marker-pin.origin{color:var(--ink-2);background:var(--ink-2);}
.tl-marker-pin.dest{color:var(--amber);background:var(--amber);}
.tl-marker-label{
  font-size:9px;
  font-weight:700;
  color:var(--ink-3);
  white-space:nowrap;
  letter-spacing:.02em;
}
.tl-marker.dest-m .tl-marker-label{color:var(--amber-dim);}

/* World clocks */
.world-section{}
.world-label{
  font-size:10px;
  font-weight:700;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--ink-4);
  margin-bottom:10px;
}
.world-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}
.world-card{
  background:#fff;
  border:1px solid var(--line-light);
  border-radius:var(--r-sm);
  padding:11px 13px;
  box-shadow:0 1px 4px rgba(12,12,20,.04);
  transition:border-color .15s;
}
.world-card:hover{border-color:var(--line-light);box-shadow:0 2px 8px rgba(12,12,20,.08);}
.wc-city{
  font-size:9.5px;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--ink-4);
  margin-bottom:4px;
}
.wc-time{
  font-family:var(--font-display);
  font-size:21px;
  font-weight:700;
  color:var(--ink);
  letter-spacing:-.02em;
  line-height:1.1;
}
.wc-date{
  font-size:10.5px;
  color:var(--ink-5);
  margin-top:3px;
}
.wc-badge{
  display:inline-block;
  font-size:9px;
  font-weight:700;
  padding:1px 6px;
  border-radius:5px;
  margin-left:4px;
  vertical-align:2px;
}
.wc-badge.ahead{background:var(--green-bg);color:var(--green-soft);}
.wc-badge.behind{background:var(--red-bg);color:var(--red-soft);}

.footnote{
  font-size:11px;
  color:var(--ink-5);
  margin-top:8px;
  line-height:1.5;
}

/* Day change badge */
.day-badge{
  display:inline-block;
  font-size:10px;
  font-weight:700;
  padding:2px 8px;
  border-radius:6px;
  margin-left:6px;
  vertical-align:3px;
}
.day-badge.next{background:#faeeda;color:#633806;}
.day-badge.prev{background:var(--red-bg);color:var(--red-soft);}

@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}

@media(max-width:960px){
  body{align-items:flex-start;padding:12px 10px;}
  .wrapper{grid-template-columns:1fr;border-radius:var(--r-lg);}
  .left,.right{overflow-y:visible;}
  h1{font-size:22px;}
  .world-grid{grid-template-columns:repeat(2,1fr);}
  .conversion-pair{grid-template-columns:1fr;gap:8px;}
  .arrow-col{flex-direction:row;}
  .arrow-chevron{transform:rotate(90deg);}
}
@media(max-width:480px){
  .world-grid{grid-template-columns:1fr 1fr;}
  .datetime-row{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="wrapper">

<!-- ─── LEFT ─── -->
<div class="left">
  <a href="../../index.html" class="back-link">← UtiliWeb</a>

  <div class="brand">
    <div class="brand-dot"></div>
    <span class="eyebrow">Ferramenta UtiliWeb</span>
  </div>

  <h1>Conversor de Fusos Horários</h1>
  <p class="subtitle">Converta horários entre qualquer cidade do mundo</p>

  <div class="form-block">
    <label class="form-label" for="origem">Cidade de origem</label>
    <div class="city-selector">
      <select id="origem"></select>
    </div>
  </div>

  <div class="swap-row">
    <div class="swap-line"></div>
    <button class="btn-swap" onclick="inverter()" title="Inverter cidades" aria-label="Inverter cidades">⇅</button>
    <div class="swap-line"></div>
  </div>

  <div class="form-block">
    <label class="form-label" for="destino">Converter para</label>
    <div class="city-selector">
      <select id="destino"></select>
    </div>
  </div>

  <div class="form-block">
    <label class="form-label">Data e horário de origem</label>
    <div class="datetime-row">
      <div class="field-wrap">
        <input type="date" id="data">
      </div>
      <div class="field-wrap">
        <input type="time" id="hora" value="12:00">
      </div>
    </div>
  </div>

  <button class="btn-convert" onclick="converter()" type="button">Converter horário</button>
</div>

<!-- ─── RIGHT ─── -->
<div class="right">
  <div class="right-head">
    <h2>Resultado</h2>
    <div class="live-badge">
      <div class="live-dot"></div>
      <span>DST automático</span>
    </div>
  </div>

  <div id="empty" class="empty-state">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
      <circle cx="12" cy="12" r="9"/>
      <path d="M12 7v5l3 3"/>
      <path d="M3.6 9h.4M3.6 15h.4M20 9h.4M20 15h.4M9 3.6v.4M15 3.6v.4M9 20v.4M15 20v.4"/>
    </svg>
    <p>Selecione as cidades e clique em Converter</p>
  </div>

  <div id="resultado" style="display:none">
    <div class="result-wrap" id="result-inner"></div>
  </div>
</div>

</div>

  {label:"Karachi — Paquistão",tz:"Asia/Karachi"},
  {label:"Mumbai — Índia",tz:"Asia/Kolkata"},
  {label:"Nova Délhi — Índia",tz:"Asia/Kolkata"},
  {label:"Colombo — Sri Lanka",tz:"Asia/Colombo"},
  {label:"Dhaka — Bangladesh",tz:"Asia/Dhaka"},
  {label:"Bancoque — Tailândia",tz:"Asia/Bangkok"},
  {label:"Jacarta — Indonésia",tz:"Asia/Jakarta"},
  {label:"Kuala Lumpur — Malásia",tz:"Asia/Kuala_Lumpur"},
  {label:"Singapura",tz:"Asia/Singapore"},
  {label:"Manila — Filipinas",tz:"Asia/Manila"},
  {label:"Hong Kong",tz:"Asia/Hong_Kong"},
  {label:"Xangai — China",tz:"Asia/Shanghai"},
  {label:"Pequim — China",tz:"Asia/Shanghai"},
  {label:"Taipé — Taiwan",tz:"Asia/Taipei"},
  {label:"Seul — Coreia do Sul",tz:"Asia/Seoul"},
  {label:"Tóquio — Japão",tz:"Asia/Tokyo"},
  {label:"Sydney — Austrália",tz:"Australia/Sydney"},
  {label:"Melbourne — Austrália",tz:"Australia/Melbourne"},
  {label:"Brisbane — Austrália",tz:"Australia/Brisbane"},
  {label:"Perth — Austrália",tz:"Australia/Perth"},
  {label:"Auckland — Nova Zelândia",tz:"Pacific/Auckland"},
  {label:"Honolulu — Havaí (EUA)",tz:"Pacific/Honolulu"},
  {label:"Anchorage — Alaska (EUA)",tz:"America/Anchorage"},
];

const WORLD_CLOCKS=[
  {city:"Nova York",tz:"America/New_York"},
  {city:"Londres",tz:"Europe/London"},
  {city:"Dubai",tz:"Asia/Dubai"},
  {city:"Tóquio",tz:"Asia/Tokyo"},
  {city:"Sydney",tz:"Australia/Sydney"},
  {city:"Los Angeles",tz:"America/Los_Angeles"},
];

const DIAS_PT=["dom","seg","ter","qua","qui","sex","sáb"];
const MESES_PT=["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
const MESES_LONGO=["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];

function formatDateLong(d){return `${DIAS_PT[d.getDay()]}, ${d.getDate()} de ${MESES_LONGO[d.getMonth()]}`;}
function formatDateShort(d){return `${d.getDate()} ${MESES_PT[d.getMonth()]}`;}
function formatTime(d){return d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',hour12:false});}

function getOffset(tz,date){
  const utc=new Date(date.toLocaleString('en-US',{timeZone:'UTC'}));
  const local=new Date(date.toLocaleString('en-US',{timeZone:tz}));
  return (local-utc)/60000;
}
function offsetLabel(min){
  const sign=min>=0?'+':'-';
  const abs=Math.abs(min);
  const h=Math.floor(abs/60);
  const m=abs%60;
  return `UTC${sign}${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function convertToTZ(dateStr,timeStr,fromTZ,toTZ){
  const localStr=`${dateStr}T${timeStr}:00`;
  const approx=new Date(localStr);
  const fromOffset=getOffset(fromTZ,approx);
  const utcMs=approx.getTime()-fromOffset*60000;
  const utcDate=new Date(utcMs);
  const toOffset=getOffset(toTZ,utcDate);
  const destMs=utcMs+toOffset*60000;
  const destDate=new Date(destMs);
  return {destDate,utcDate,fromOffset,toOffset};
}

function buildTimeline(originHour, originMin, destHour, destMin, originLabel, destLabel){
  const originPct=((originHour*60+originMin)/(24*60))*100;
  const destPct=((destHour*60+destMin)/(24*60))*100;
  const originPctClamped=Math.max(1,Math.min(99,originPct));
  const destPctClamped=Math.max(1,Math.min(99,destPct));

  const hourMarks=[0,4,8,12,16,20,24];
  const hoursHtml=hourMarks.map(h=>`<span>${h===24?'24h':h+'h'}</span>`).join('');

  return `
    <div class="timeline-section">
      <div class="timeline-label">Posição nas 24h do dia</div>
      <div class="timeline-hours">${hoursHtml}</div>
      <div class="timeline-bar">
        <div class="timeline-bar-night" style="left:0;width:33.3%"></div>
        <div class="timeline-bar-night" style="left:83.3%;width:16.7%"></div>
        <div class="tl-marker" style="left:${originPctClamped}%">
          <div class="tl-marker-pin origin"></div>
          <div class="tl-marker-label">${String(originHour).padStart(2,'0')}:${String(originMin).padStart(2,'0')}</div>
        </div>
        <div class="tl-marker dest-m" style="left:${destPctClamped}%;margin-top:0">
          <div class="tl-marker-pin dest"></div>
          <div class="tl-marker-label" style="color:var(--amber-dim)">${String(destHour).padStart(2,'0')}:${String(destMin).padStart(2,'0')}</div>
        </div>
      </div>
      <div style="display:flex;gap:14px;margin-top:16px;font-size:11px;font-weight:600;color:var(--ink-4);">
        <div style="display:flex;align-items:center;gap:5px;">
          <div style="width:10px;height:10px;border-radius:50%;background:var(--ink-2)"></div>
          ${originLabel}
        </div>
        <div style="display:flex;align-items:center;gap:5px;">
          <div style="width:10px;height:10px;border-radius:50%;background:var(--amber)"></div>
          ${destLabel}
        </div>
      </div>
    </div>`;
}

function buildDiffText(diffMin,fromLabel,toLabel){
  if(diffMin===0) return 'Mesmo fuso horário';
  const ahead=diffMin>0;
  const abs=Math.abs(diffMin);
  const h=Math.floor(abs/60);
  const m=abs%60;
  const partes=[];
  if(h>0) partes.push(`${h}h`);
  if(m>0) partes.push(`${m}min`);
  return `${toLabel} está <strong style="color:var(--ink-2)">${partes.join(' ')}</strong> ${ahead?'à frente':'atrás'} de ${fromLabel}`;
}

function dayDiffBadge(destDate,origemDate){
  const diff=destDate.getDate()-origemDate.getDate();
  const monthDiff=destDate.getMonth()-origemDate.getMonth();
  if(diff===1||diff<-20||monthDiff>0) return '<span class="day-badge next">+1 dia</span>';
  if(diff===-1||diff>20||monthDiff<0) return '<span class="day-badge prev">−1 dia</span>';
  return '';
}

function buildSelects(){
  const o=document.getElementById('origem');
  const d=document.getElementById('destino');
  FUSOS.forEach((f,i)=>{
    o.innerHTML+=`<option value="${i}">${f.label}</option>`;
    d.innerHTML+=`<option value="${i}">${f.label}</option>`;
  });
  o.value=0;
  d.value=FUSOS.findIndex(f=>f.tz==='Asia/Tokyo');
  document.getElementById('data').value=new Date().toISOString().slice(0,10);
}

function inverter(){
  const o=document.getElementById('origem');
  const d=document.getElementById('destino');
  const tmp=o.value; o.value=d.value; d.value=tmp;
  converter();
}

function converter(){
  const oriIdx=parseInt(document.getElementById('origem').value);
  const dstIdx=parseInt(document.getElementById('destino').value);
  const dataVal=document.getElementById('data').value;
  const horaVal=document.getElementById('hora').value;

  const el=document.getElementById('result-inner');
  const empty=document.getElementById('empty');
  const resWrap=document.getElementById('resultado');

  if(!dataVal||!horaVal){
    empty.style.display='flex'; resWrap.style.display='none';
    return;
  }

  const fromTZ=FUSOS[oriIdx].tz;
  const toTZ=FUSOS[dstIdx].tz;
  const fromLabel=FUSOS[oriIdx].label.split(' — ')[0];
  const toLabel=FUSOS[dstIdx].label.split(' — ')[0];

  const {destDate,fromOffset,toOffset}=convertToTZ(dataVal,horaVal,fromTZ,toTZ);
  const diffMin=toOffset-fromOffset;

  const [oy,om,od]=dataVal.split('-').map(Number);
  const [oh,omi]=horaVal.split(':').map(Number);
  const origemDateObj=new Date(oy,om-1,od,oh,omi);
  const badge=dayDiffBadge(destDate,origemDateObj);

  const diffPill=diffMin===0?'Mesmo fuso':(()=>{
    const ahead=diffMin>0;
    const abs=Math.abs(diffMin);
    const h=Math.floor(abs/60);
    const m=abs%60;
    const p=[];
    if(h>0)p.push(`${h}h`);
    if(m>0)p.push(`${m}min`);
    return (ahead?'▲ ':'▼ ')+p.join(' ');
  })();

  // World clocks
  const worldHtml=WORLD_CLOCKS.map(wc=>{
    const {destDate:wd}=convertToTZ(dataVal,horaVal,fromTZ,wc.tz);
    const diff=wd.getDate()-origemDateObj.getDate();
    const mDiff=wd.getMonth()-origemDateObj.getMonth();
    let badge2='';
    if(diff===1||diff<-20||mDiff>0) badge2=`<span class="wc-badge ahead">+1</span>`;
    if(diff===-1||diff>20||mDiff<0) badge2=`<span class="wc-badge behind">−1</span>`;
    return `<div class="world-card">
      <div class="wc-city">${wc.city}</div>
      <div class="wc-time">${formatTime(wd)}${badge2}</div>
      <div class="wc-date">${formatDateShort(wd)}</div>
    </div>`;
  }).join('');

  const tlHour=destDate.getHours();
  const tlMin=destDate.getMinutes();

  el.innerHTML=`
    <div class="conversion-pair">
      <div class="city-card">
        <div class="cc-tag">Origem</div>
        <div class="cc-name">${fromLabel}</div>
        <div class="cc-time">${horaVal}</div>
        <div class="cc-date">${formatDateLong(origemDateObj)}</div>
        <span class="cc-offset">${offsetLabel(fromOffset)}</span>
      </div>
      <div class="arrow-col">
        <div class="arrow-chevron">→</div>
        <div class="diff-pill">${diffPill}</div>
      </div>
      <div class="city-card dest">
        <div class="cc-tag">Destino</div>
        <div class="cc-name">${toLabel}</div>
        <div class="cc-time">${formatTime(destDate)}${badge}</div>
        <div class="cc-date">${formatDateLong(destDate)}</div>
        <span class="cc-offset">${offsetLabel(toOffset)}</span>
      </div>
    </div>

    ${buildTimeline(oh,omi,tlHour,tlMin,fromLabel,toLabel)}

    <div class="world-section">
      <div class="world-label">Outras cidades neste horário</div>
      <div class="world-grid">${worldHtml}</div>
    </div>

    <p class="footnote">Horário de verão (DST) aplicado automaticamente pelo sistema. Resultados baseados nos dados de fuso do navegador.</p>
  `;

  empty.style.display='none';
  resWrap.style.display='block';
}

buildSelects();
</script>
</body>
