<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Lista de Compras вҖ” JapГЈo рҹӣ’</title>
<meta name="theme-color" content="#1F4E5F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Compras JP">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231F4E5F'/%3E%3Ctext x='50' y='66' font-size='54' text-anchor='middle'%3Eрҹӣ’%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --bg: #E4E1D6;
    --surface: #FBFAF6;
    --surface-2: #F1EEE4;
    --ink: #22282B;
    --ink-soft: #5B6266;
    --indigo: #1F4E5F;
    --indigo-deep: #163945;
    --hanko: #C1432E;
    --gold: #C99A3E;
    --line: #D8D3C5;
    --shadow: 0 8px 24px rgba(20,24,26,0.10);
    --radius: 14px;
  }
  [data-theme="dark"]{
    --bg: #111516;
    --surface: #1C2224;
    --surface-2: #232A2C;
    --ink: #ECE7DA;
    --ink-soft: #A9ADA3;
    --indigo: #6FB6CA;
    --indigo-deep: #4D8C9C;
    --hanko: #E2604A;
    --gold: #D9B25C;
    --line: #323a3c;
    --shadow: 0 8px 24px rgba(0,0,0,0.45);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;
    -webkit-tap-highlight-color:transparent;
  }
  .app{
    max-width:560px;
    margin:0 auto;
    background:var(--surface);
    min-height:100vh;
    box-shadow:var(--shadow);
    position:relative;
    padding-bottom:90px;
  }
  /* ---------- Header ---------- */
  .topbar{
    display:flex;align-items:flex-end;justify-content:space-between;
    padding:18px 18px 14px;
    background:var(--indigo);
    color:#fff;
    border-bottom:4px solid var(--hanko);
  }
  .brand-kicker{
    display:block;font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    opacity:.75;margin-bottom:4px;font-weight:600;
  }
  .topbar h1{
    margin:0;font-size:21px;line-height:1.25;font-weight:800;letter-spacing:-.01em;
  }
  .jp-sub{font-weight:500;font-size:14px;opacity:.8;margin-left:6px;}
  .icon-btn{
    background:rgba(255,255,255,0.14);border:none;color:#fff;
    width:42px;height:42px;border-radius:50%;font-size:18px;cursor:pointer;
    flex-shrink:0;display:flex;align-items:center;justify-content:center;
    transition:background .15s;
  }
  .icon-btn:hover{background:rgba(255,255,255,0.24);}
  /* ---------- Search ---------- */
  .search-wrap{
    position:relative;padding:14px 18px 0;
  }
  #searchInput{
    width:100%;padding:12px 38px 12px 14px;border-radius:10px;border:1.5px solid var(--line);
    background:var(--surface-2);color:var(--ink);font-size:14.5px;outline:none;
    transition:border-color .15s;
  }
  #searchInput:focus{border-color:var(--indigo);}
  .clear-btn{
    position:absolute;right:26px;top:22px;background:none;border:none;color:var(--ink-soft);
    font-size:20px;cursor:pointer;line-height:1;padding:4px;
  }
  /* ---------- Chips ---------- */
  .chip-row{
    display:flex;gap:8px;padding:14px 18px 4px;overflow-x:auto;scrollbar-width:none;
  }
  .chip-row::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;border:1.5px solid var(--line);background:var(--surface);color:var(--ink);
    padding:8px 13px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;
    white-space:nowrap;transition:all .15s;
  }
  .chip.active{background:var(--indigo);border-color:var(--indigo);color:#fff;}
  /* ---------- Category grid ---------- */
  .cat-grid{
    display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px 18px 8px;
  }
  .cat-card{
    background:var(--surface-2);border:none;border-top:4px solid var(--indigo);
    border-radius:10px;padding:14px 6px 10px;cursor:pointer;text-align:center;
    display:flex;flex-direction:column;align-items:center;gap:4px;
    transition:transform .12s;color:var(--ink);
  }
  .cat-card:active{transform:scale(.96);}
  .cat-card.accent-1{border-top-color:var(--hanko);}
  .cat-card.accent-2{border-top-color:var(--gold);}
  .cat-icon{font-size:26px;}
  .cat-label{font-size:12px;font-weight:700;line-height:1.2;}
  .cat-count{font-size:10.5px;color:var(--ink-soft);}
  /* ---------- List view ---------- */
  .list-view{padding:6px 18px 12px;}
  .list-header{display:flex;align-items:center;gap:10px;padding:10px 0 8px;}
  .back-btn{
    background:none;border:none;color:var(--indigo-deep);font-weight:700;font-size:14px;
    cursor:pointer;padding:6px 0;
  }
  [data-theme="dark"] .back-btn{color:var(--indigo);}
  #listTitle{font-size:15px;margin:0;font-weight:700;color:var(--ink-soft);}
  .prod-list{list-style:none;margin:0;padding:0;}
  .prod-row{
    display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px dashed var(--line);
  }
  .prod-row.has-qty{background:linear-gradient(90deg,transparent, rgba(31,78,95,0.06));border-radius:6px;}
  .fav-btn{
    background:none;border:none;font-size:19px;color:var(--line);cursor:pointer;flex-shrink:0;
    width:26px;
  }
  .fav-btn.active{color:var(--gold);}
  .prod-main{flex:1;min-width:0;}
  .prod-name{font-size:14.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .prod-name .romaji{font-weight:500;color:var(--ink-soft);font-size:12.5px;}
  .prod-pt{font-size:12.5px;color:var(--ink-soft);margin-top:1px;}
  .price-btn{
    background:none;border:none;color:var(--hanko);font-weight:700;font-size:13px;cursor:pointer;
    font-variant-numeric:tabular-nums;flex-shrink:0;padding:2px 4px;border-bottom:1px dotted var(--hanko);
    display:flex;flex-direction:column;align-items:center;line-height:1.15;
  }
  .price-hint{font-size:9px;font-weight:600;color:var(--ink-soft);letter-spacing:.02em;}
  .qty-stepper{
    display:flex;align-items:center;gap:6px;flex-shrink:0;background:var(--surface-2);
    border-radius:999px;padding:3px;
  }
  .qty-stepper button{
    width:24px;height:24px;border-radius:50%;border:none;background:var(--surface);
    color:var(--indigo-deep);font-size:15px;font-weight:700;cursor:pointer;
    display:flex;align-items:center;justify-content:center;box-shadow:0 1px 2px rgba(0,0,0,0.12);
  }
  [data-theme="dark"] .qty-stepper button{color:var(--indigo);}
  .qty-val{min-width:16px;text-align:center;font-weight:700;font-size:13.5px;font-variant-numeric:tabular-nums;}
  .empty-state{
    text-align:center;color:var(--ink-soft);font-size:13.5px;padding:40px 10px;line-height:1.5;
  }
  /* ---------- Footer ---------- */
  .app-footer{padding:18px;text-align:center;}
  .app-footer p{font-size:11.5px;color:var(--ink-soft);line-height:1.5;margin:0;}
  /* ---------- Cart bar ---------- */
  .cart-bar{
    position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:center;z-index:30;
    padding:0 0 14px;pointer-events:none;
  }
  .cart-summary{
    pointer-events:auto;
    width:calc(100% - 36px);max-width:524px;
    background:var(--indigo-deep);color:#fff;border:none;border-radius:14px;
    padding:13px 18px;display:flex;align-items:center;gap:10px;cursor:pointer;
    box-shadow:0 6px 20px rgba(0,0,0,0.28);font-size:14px;font-weight:700;
  }
  .cart-icon{font-size:18px;}
  #cartCount{flex:1;text-align:left;font-weight:600;opacity:.9;}
  .cart-total{font-variant-numeric:tabular-nums;font-size:16px;}
  .cart-arrow{opacity:.7;font-size:11px;}
  /* ---------- Cart modal / receipt ---------- */
  .cart-modal{
    position:fixed;inset:0;z-index:40;display:flex;align-items:flex-end;justify-content:center;
    background:rgba(10,12,12,0.55);
  }
  .receipt{
    width:100%;max-width:560px;max-height:86vh;display:flex;flex-direction:column;
    background:var(--surface);border-radius:18px 18px 0 0;overflow:hidden;
    animation:slideUp .22s ease-out;
  }
  @keyframes slideUp{from{transform:translateY(40px);opacity:.4;}to{transform:translateY(0);opacity:1;}}
  .receipt-top, .receipt-bottom{
    height:14px;flex-shrink:0;
    background-image:linear-gradient(135deg, var(--bg) 8px, transparent 8.5px),
                      linear-gradient(225deg, var(--bg) 8px, transparent 8.5px);
    background-position:0 0, 7px 0;background-size:14px 14px;background-repeat:repeat-x;
    background-color:var(--surface);
  }
  .receipt-bottom{transform:rotate(180deg);}
  .receipt-head{
    display:flex;align-items:center;justify-content:space-between;padding:4px 20px 10px;
  }
  .receipt-head h2{font-size:16px;margin:0;font-weight:800;}
  .close-btn{background:none;border:none;font-size:24px;color:var(--ink-soft);cursor:pointer;line-height:1;}
  .receipt-items{list-style:none;margin:0;padding:0 20px;overflow-y:auto;flex:1;}
  .receipt-item{
    display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px dotted var(--line);font-size:13px;
  }
  .receipt-item .ri-name{flex:1;min-width:0;}
  .receipt-item .ri-name b{font-size:13.5px;}
  .receipt-item .ri-name span{display:block;color:var(--ink-soft);font-size:11.5px;}
  .receipt-item .ri-sub{font-variant-numeric:tabular-nums;font-weight:700;color:var(--hanko);}
  .ri-remove{background:none;border:none;color:var(--ink-soft);font-size:18px;cursor:pointer;padding:2px 4px;}
  .receipt-total-row{
    display:flex;justify-content:space-between;align-items:center;padding:14px 20px;
    border-top:2px solid var(--ink);margin:0 20px;font-weight:800;font-size:15px;
  }
  #cartTotalBig{font-size:21px;font-variant-numeric:tabular-nums;color:var(--hanko);}
  .receipt-actions{display:flex;gap:8px;padding:14px 20px 6px;flex-wrap:wrap;}
  .btn{
    flex:1;min-width:100px;padding:11px 10px;border-radius:10px;border:1.5px solid var(--line);
    background:var(--surface-2);color:var(--ink);font-weight:700;font-size:12.5px;cursor:pointer;
  }
  .btn.primary{background:var(--indigo);border-color:var(--indigo);color:#fff;}
  .btn.danger{color:var(--hanko);}
  .toast{
    position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--surface);
    padding:10px 18px;border-radius:999px;font-size:13px;font-weight:600;z-index:60;opacity:0;
    transition:opacity .25s,transform .25s;pointer-events:none;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
  [hidden]{display:none !important;}
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition:none !important;}
  }
  :focus-visible{outline:2px solid var(--hanko);outline-offset:2px;}
  @media (min-width:600px){
    .cat-grid{grid-template-columns:repeat(4,1fr);}
  }
</style>
</head>

      <div class="receipt-total-row">
        <span>TOTAL</span>

      </div>
      <div class="receipt-actions">
        <button id="shareBtn" class="btn primary">рҹ“Ө Compartilhar</button>
        <button id="exportBtn" class="btn">в¬ҮпёҸ Exportar .txt</button>
        <button id="clearCartBtn" class="btn danger">рҹ—‘пёҸ Limpar</button>
      </div>
      <div class="receipt-bottom"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
</div>

  {key:"marmita", label:"Marmita da semana", icon:"рҹҚұ"},
  {key:"all", label:"Todos os produtos", icon:"рҹ—ӮпёҸ"}
];

/* ===================== ESTADO ===================== */
var STORAGE_KEY = "jpComprasState_v1";
var state = { qty:{}, fav:[], prices:{}, theme:"light" };

function loadState(){
  try{
    var raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      var parsed = JSON.parse(raw);
      state.qty = parsed.qty || {};
      state.fav = parsed.fav || [];
      state.prices = parsed.prices || {};
      state.theme = parsed.theme || "light";
    }
  }catch(e){ /* ignora estado corrompido */ }
}
function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
}

var view = { type:"home", key:null, q:"" };

/* ===================== HELPERS ===================== */
function normalize(str){
  return String(str).normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase();
}
function getPrice(p){
  var custom = state.prices[p.id];
  return (typeof custom === "number" && !isNaN(custom)) ? custom : p.pr;
}
function getQty(id){ return state.qty[id] || 0; }
function fmtYen(n){ return "ВҘ" + Math.round(n).toLocaleString("ja-JP"); }
function showToast(msg){
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(showToast._tm);
  showToast._tm = setTimeout(function(){ t.classList.remove("show"); }, 2200);
}

function matchesQuery(p, q){
  var nq = normalize(q);
  if(normalize(p.p).indexOf(nq) !== -1) return true;
  if(normalize(p.r).indexOf(nq) !== -1) return true;
  if(p.j.indexOf(q) !== -1) return true;
  return false;
}

function getCategoryCount(key){
  var n=0; for(var i=0;i<PRODUCTS.length;i++){ if(PRODUCTS[i].c===key) n++; } return n;
}

function getViewProducts(){
  if(view.q && view.q.trim()){
    var q = view.q.trim();
    return PRODUCTS.filter(function(p){ return matchesQuery(p,q); });
  }
  if(view.type === "cat"){
    return PRODUCTS.filter(function(p){ return p.c === view.key; });
  }
  if(view.type === "quick"){
    if(view.key === "fav") return PRODUCTS.filter(function(p){ return state.fav.indexOf(p.id) !== -1; });
    if(view.key === "all") return PRODUCTS.slice();
    return PRODUCTS.filter(function(p){ return p.t.indexOf(view.key) !== -1; });
  }
  return [];
}

function getViewTitle(){
  if(view.q && view.q.trim()) return "Resultados para \u201c" + view.q.trim() + "\u201d";
  if(view.type === "cat"){
    var cat = CATEGORIES.filter(function(c){return c.key===view.key;})[0];
    return cat ? (cat.icon + " " + cat.label) : "";
  }
  if(view.type === "quick"){
    var qf = QUICK_FILTERS.filter(function(q){return q.key===view.key;})[0];
    return qf ? (qf.icon + " " + qf.label) : "";
  }
  return "";
}

function getEmptyMessage(){
  if(view.q && view.q.trim()) return "Nenhum produto encontrado. Tente buscar em portuguГӘs, romaji ou japonГӘs.";
  if(view.type === "quick" && view.key === "fav") return "Nenhum favorito ainda. Toque na estrela вӯҗ de um produto para guardГЎ-lo aqui.";
  if(view.type === "quick") return "Nenhum produto marcado nesta lista ainda.";
  return "Nenhum produto nesta categoria.";
}

/* ===================== RENDER ===================== */
var elHomeGrid = document.getElementById("homeGrid");
var elListView = document.getElementById("listView");
var elChipRow = document.getElementById("chipRow");
var elProductList = document.getElementById("productList");
var elListTitle = document.getElementById("listTitle");
var elEmptyState = document.getElementById("emptyState");
var elSearchInput = document.getElementById("searchInput");
var elClearSearch = document.getElementById("clearSearch");

function renderChips(){
  var html = "";
  for(var i=0;i<QUICK_FILTERS.length;i++){
    var qf = QUICK_FILTERS[i];
    var active = (view.type === "quick" && view.key === qf.key);
    html += '<button class="chip' + (active ? ' active' : '') + '" data-action="quick" data-key="' + qf.key + '">' + qf.icon + ' ' + qf.label + '</button>';
  }
  elChipRow.innerHTML = html;
}

function renderHomeGrid(){
  var html = "";
  for(var i=0;i<CATEGORIES.length;i++){
    var cat = CATEGORIES[i];
    html += '<button class="cat-card accent-' + (i % 3) + '" data-action="cat" data-key="' + cat.key + '">' +
      '<span class="cat-icon">' + cat.icon + '</span>' +
      '<span class="cat-label">' + cat.label + '</span>' +
      '<span class="cat-count">' + getCategoryCount(cat.key) + ' itens</span>' +
      '</button>';
  }
  elHomeGrid.innerHTML = html;
}

function renderProductRow(p){
  var qty = getQty(p.id);
  var price = getPrice(p);
  var isFav = state.fav.indexOf(p.id) !== -1;
  return '<li class="prod-row' + (qty>0 ? ' has-qty' : '') + '" data-id="' + p.id + '">' +
    '<button class="fav-btn' + (isFav ? ' active' : '') + '" data-action="fav" data-id="' + p.id + '" aria-label="Favoritar">' + (isFav ? 'вҳ…' : 'вҳҶ') + '</button>' +
    '<div class="prod-main">' +
      '<div class="prod-name">' + p.j + ' <span class="romaji">(' + p.r + ')</span></div>' +
      '<div class="prod-pt">' + p.p + '</div>' +
    '</div>' +
    '<button class="price-btn" data-action="price" data-id="' + p.id + '" title="Toque para ajustar este preГ§o">' + fmtYen(price) + '<span class="price-hint">вңҺ ajustar</span></button>' +
    '<div class="qty-stepper">' +
      '<button data-action="dec" data-id="' + p.id + '" aria-label="Diminuir">\u2013</button>' +
      '<span class="qty-val">' + qty + '</span>' +
      '<button data-action="inc" data-id="' + p.id + '" aria-label="Aumentar">+</button>' +
    '</div>' +
  '</li>';
}

function renderListView(){
  var inHome = (view.type === "home");
  elHomeGrid.hidden = !inHome;
  elListView.hidden = inHome;
  if(inHome) return;

  elListTitle.textContent = getViewTitle();
  var items = getViewProducts();
  if(items.length === 0){
    elProductList.innerHTML = "";
    elEmptyState.hidden = false;
    elEmptyState.textContent = getEmptyMessage();
  }else{
    elEmptyState.hidden = true;
    elProductList.innerHTML = items.map(renderProductRow).join("");
  }
}

function renderCart(){
  var bar = document.getElementById("cartBar");
  var count = 0, total = 0;
  PRODUCTS.forEach(function(p){
    var q = getQty(p.id);
    if(q>0){ count += q; total += q * getPrice(p); }
  });
  if(count === 0){
    bar.hidden = true;
  }else{
    bar.hidden = false;
    document.getElementById("cartCount").textContent = count + (count===1 ? " item" : " itens");
    document.getElementById("cartTotal").textContent = fmtYen(total);
  }
  return { count:count, total:total };
}

function renderCartModal(){
  var list = document.getElementById("cartItems");
  var chosen = PRODUCTS.filter(function(p){ return getQty(p.id) > 0; });
  var total = 0;
  list.innerHTML = chosen.map(function(p){
    var q = getQty(p.id), price = getPrice(p), sub = q*price;
    total += sub;
    return '<li class="receipt-item" data-id="' + p.id + '">' +
      '<div class="ri-name"><b>' + p.j + ' (' + p.r + ')</b><span>' + p.p + ' &middot; ' + q + ' x ' + fmtYen(price) + '</span></div>' +
      '<div class="ri-sub">' + fmtYen(sub) + '</div>' +
      '<button class="ri-remove" data-action="remove" data-id="' + p.id + '" aria-label="Remover">Г—</button>' +
    '</li>';
  }).join("");
  document.getElementById("cartTotalBig").textContent = fmtYen(total);
  return total;
}

function renderAll(){
  renderChips();
  renderHomeGrid();
  renderListView();
  renderCart();
}

/* ===================== AГҮГ•ES ===================== */
function setQty(id, delta){
  var cur = getQty(id);
  var next = Math.max(0, Math.min(99, cur + delta));
  if(next === 0) delete state.qty[id]; else state.qty[id] = next;
  saveState();
}
function toggleFav(id){
  var idx = state.fav.indexOf(id);
  if(idx === -1) state.fav.push(id); else state.fav.splice(idx,1);
  saveState();
}
function editPrice(p){
  var cur = getPrice(p);
  var val = window.prompt("PreГ§o estimado em ВҘ para " + p.p + " (deixe vazio para usar o padrГЈo de ВҘ" + p.pr + "):", String(cur));
  if(val === null) return;
  val = val.trim();
  if(val === ""){
    delete state.prices[p.id];
  }else{
    var n = parseInt(val.replace(/[^0-9]/g,""), 10);
    if(!isNaN(n) && n >= 0) state.prices[p.id] = n;
  }
  saveState();
}
function clearCart(){
  state.qty = {};
  saveState();
  renderAll();
  closeCartModal();
}
function buildShareText(){
  var lines = [];
  lines.push("\uD83D\uDED2 Lista de Compras - JapГЈo");
  var total = 0;
  PRODUCTS.forEach(function(p){
    var q = getQty(p.id);
    if(q>0){
      var price = getPrice(p), sub = q*price;
      total += sub;
      lines.push("- " + p.j + " (" + p.r + ") вҖ” " + p.p + " x" + q + " = " + fmtYen(sub));
    }
  });
  lines.push("");
  lines.push("Total: " + fmtYen(total));
  return lines.join("\n");
}
function shareList(){
  var text = buildShareText();
  if(navigator.share){
    navigator.share({ title:"Lista de Compras - JapГЈo", text:text }).catch(function(){});
  }else if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){
      showToast("Lista copiada! Cole no LINE, WhatsApp etc.");
    }).catch(function(){
      showToast("NГЈo foi possГӯvel copiar automaticamente.");
    });
  }else{
    showToast("Compartilhamento nГЈo suportado neste navegador.");
  }
}
function exportTxt(){
  var text = buildShareText();
  var blob = new Blob([text], {type:"text/plain;charset=utf-8"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  var d = new Date();
  var stamp = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  a.href = url;
  a.download = "lista-compras-japao-" + stamp + ".txt";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
}
function openCartModal(){
  renderCartModal();
  document.getElementById("cartModal").hidden = false;
}
function closeCartModal(){
  document.getElementById("cartModal").hidden = true;
}
function applyTheme(){
  if(state.theme === "dark"){
    document.documentElement.setAttribute("data-theme","dark");
    document.getElementById("themeToggle").textContent = "вҳҖпёҸ";
  }else{
    document.documentElement.removeAttribute("data-theme");
    document.getElementById("themeToggle").textContent = "рҹҢҷ";
  }
}
function toggleTheme(){
  state.theme = (state.theme === "dark") ? "light" : "dark";
  saveState();
  applyTheme();
}

/* ===================== EVENTOS ===================== */
document.getElementById("themeToggle").addEventListener("click", toggleTheme);

elSearchInput.addEventListener("input", function(){
  var val = elSearchInput.value;
  elClearSearch.hidden = !val;
  view = val.trim() ? { type:"search", key:null, q:val } : { type:"home", key:null, q:"" };
  renderListView();
  renderChips();
});
elClearSearch.addEventListener("click", function(){
  elSearchInput.value = "";
  elClearSearch.hidden = true;
  view = { type:"home", key:null, q:"" };
  renderAll();
});

elChipRow.addEventListener("click", function(e){
  var btn = e.target.closest("button[data-action='quick']");
  if(!btn) return;
  elSearchInput.value = "";
  elClearSearch.hidden = true;
  view = { type:"quick", key:btn.getAttribute("data-key"), q:"" };
  renderAll();
});

elHomeGrid.addEventListener("click", function(e){
  var btn = e.target.closest("button[data-action='cat']");
  if(!btn) return;
  view = { type:"cat", key:btn.getAttribute("data-key"), q:"" };
  renderListView();
  renderChips();
});

document.getElementById("backBtn").addEventListener("click", function(){
  elSearchInput.value = "";
  elClearSearch.hidden = true;
  view = { type:"home", key:null, q:"" };
  renderAll();
});

elProductList.addEventListener("click", function(e){
  var btn = e.target.closest("button[data-action]");
  if(!btn) return;
  var id = btn.getAttribute("data-id");
  var action = btn.getAttribute("data-action");
  var product = PRODUCTS.filter(function(p){return p.id===id;})[0];
  if(!product) return;
  if(action === "inc") setQty(id, 1);
  else if(action === "dec") setQty(id, -1);
  else if(action === "fav") toggleFav(id);
  else if(action === "price") editPrice(product);
  renderListView();
  renderCart();
});

document.getElementById("cartToggle").addEventListener("click", openCartModal);
document.getElementById("closeCart").addEventListener("click", closeCartModal);
document.getElementById("cartModal").addEventListener("click", function(e){
  if(e.target.id === "cartModal") closeCartModal();
});
document.getElementById("cartItems").addEventListener("click", function(e){
  var btn = e.target.closest("button[data-action='remove']");
  if(!btn) return;
  var id = btn.getAttribute("data-id");
  state.qty[id] = 0;
  delete state.qty[id];
  saveState();
  renderCartModal();
  renderListView();
  renderCart();
});
document.getElementById("shareBtn").addEventListener("click", shareList);
document.getElementById("exportBtn").addEventListener("click", exportTxt);
document.getElementById("clearCartBtn").addEventListener("click", function(){
  if(window.confirm("Limpar todos os itens da lista?")) clearCart();
});

/* ===================== INIT ===================== */
loadState();
applyTheme();
renderAll();

})();
</script>
</body>
</html>
