<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>📸 Tradutor de Cartas Japão</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
background:#c62828;
color:white;
padding:25px;
text-align:center;
}

main{
max-width:750px;
margin:auto;
padding:15px;
}

.box{

background:white;
padding:18px;
margin:15px 0;
border-radius:15px;
box-shadow:0 3px 10px #ddd;

}

button{

padding:12px;
border:0;
border-radius:10px;
background:#c62828;
color:white;
margin:5px;

}

textarea{

width:100%;
height:160px;

}


.tag{

display:inline-block;
background:#eee;
padding:8px;
border-radius:8px;
margin:4px;

}

.jp{

font-size:20px;

}


</style>

</head>


<body>


<header>

<h1>📸 Tradutor de Cartas Japão</h1>

<p>Entenda documentos japoneses</p>

</header>


<main>


<div class="box">


<h2>📷 Escolha a foto</h2>


<input 
type="file"
id="foto"
accept="image/*"
capture="environment">


<button onclick="ler()">

🔎 Analisar documento

</button>


</div>



<div class="box">


<h2>🇯🇵 Japonês encontrado</h2>


<textarea id="texto"></textarea>


<button onclick="copiar()">

📋 Copiar

</button>


</div>



<div class="box">


<h2>📝 Explicação</h2>


<div id="resultado">

Nenhum documento analisado.

</div>


</div>



<div class="box">


<h2>📚 Histórico</h2>

<div id="hist"></div>


</div>



</main>




<script>


const banco={


"国民健康保険":
["Seguro Nacional de Saúde",
"Documento relacionado ao seguro médico obrigatório"],


"健康保険":
["Seguro Saúde",
"Informação sobre plano de saúde"],


"市役所":
["Prefeitura",
"Documento oficial da prefeitura"],


"区役所":
["Subprefeitura",
"Serviço administrativo local"],


"納付":
["Pagamento",
"Pode indicar cobrança ou boleto"],


"納期限":
["Prazo de pagamento",
"Data limite para pagar"],


"住民税":
["Imposto residencial",
"Imposto municipal"],


"銀行":
["Banco",
"Documento bancário"],


"学校":
["Escola",
"Aviso escolar"],


"配達":
["Entrega",
"Relacionado a correio"],


"不在票":
["Aviso de ausência",
"Correio tentou entregar"],


"病院":
["Hospital",
"Documento médico"]


};





async function ler(){


let img=
document.getElementById("foto").files[0];


if(!img){

alert("Escolha uma imagem");

return;

}


document.getElementById("texto").value="Lendo...";


let r =
await Tesseract.recognize(

img,

'jpn'

);



let texto=r.data.text;


document.getElementById("texto")
.value=texto;



analisar(texto);



salvar(texto);



}




function analisar(texto){


let html="";


html+="<div class='jp'>Documento analisado</div><br>";



for(let termo in banco){


if(texto.includes(termo)){


html+=`

<div class="tag">

<b>${termo}</b><br>

${banco[termo][0]}

<br>

${banco[termo][1]}

</div>

`;

}


}




let valor=
texto.match(/¥[0-9,]+/);



if(valor){


html+=`

<div class="tag">

💴 Valor encontrado:

${valor[0]}

</div>

`;

}




let reiwa=
texto.match(/令和(\d+)年/);



if(reiwa){


let ano=
2018+
Number(reiwa[1]);


html+=`

<div class="tag">

📅 Ano:

${ano}

</div>

`;

}




if(html==""){

html="Não encontrei termos conhecidos. Copie o texto para traduzir.";

}


document.getElementById("resultado")
.innerHTML=html;


}





function copiar(){


navigator.clipboard.writeText(

document.getElementById("texto").value

);


alert("Copiado");

}




function salvar(t){


let h=

JSON.parse(

localStorage.getItem("cartas")||"[]"

);


h.unshift(t);


localStorage.setItem(

"cartas",

JSON.stringify(h.slice(0,10))

);


mostrar();

}





function mostrar(){


let h=

JSON.parse(

localStorage.getItem("cartas")||"[]"

);



document.getElementById("hist").innerHTML=

h.map(x=>

"📄 "+x.substring(0,80)+"..."

).join("<br><br>");


}



mostrar();



</script>


</body>

</html>
