<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>📸 Tradutor de Cartas Japão</title>


<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>


<style>


*{
box-sizing:border-box;
}


body{

margin:0;
background:#f2f2f2;
font-family:Arial,sans-serif;

}


header{

background:#1565c0;
color:white;
padding:25px;
text-align:center;

}


main{

max-width:750px;
margin:auto;
padding:15px;

}



.box{

background:white;
padding:20px;
border-radius:18px;
margin:15px 0;
box-shadow:0 3px 12px #ddd;

}



button{

background:#1565c0;
color:white;
border:0;
padding:12px 15px;
border-radius:12px;
margin:5px;
cursor:pointer;

}



button:hover{

opacity:.85;

}



textarea{

width:100%;
height:170px;
padding:10px;
font-size:16px;

}



.resultado{

background:#eef5ff;
padding:15px;
border-radius:12px;

}



.tag{

display:block;
background:white;
border-left:5px solid #1565c0;
padding:12px;
margin:10px 0;
border-radius:8px;

}



.jp{

font-size:20px;
font-weight:bold;

}



.small{

color:#666;

}



</style>


</head>


<body>



<header>

<h1>📸 Tradutor de Cartas Japão</h1>

<p>Entenda avisos e documentos japoneses</p>

</header>




<main>



<div class="box">


<h2>📷 Foto do documento</h2>


<input 
type="file"
id="foto"
accept="image/*"
capture="environment">


<br>


<button onclick="lerDocumento()">

🔎 Analisar documento

</button>


</div>





<div class="box">


<h2>🇯🇵 Texto japonês encontrado</h2>


<textarea id="texto"
placeholder="O texto aparecerá aqui">

</textarea>


<br>


<button onclick="copiar()">

📋 Copiar

</button>


<button onclick="abrirTradutor()">

🌎 Abrir Tradutor

</button>


</div>





<div class="box">


<h2>📝 Entendimento</h2>


<div 
id="resultado"
class="resultado">


Aguardando documento...


</div>


</div>





<div class="box">


<h2>📂 Histórico</h2>


<div id="historico">

</div>


</div>



</main>





<script>


const banco = {


"国民健康保険":
{
nome:"Seguro Nacional de Saúde",
desc:"Documento relacionado ao seguro médico obrigatório."
},


"健康保険":
{
nome:"Seguro Saúde",
desc:"Informação relacionada ao seguro de saúde."
},


"市役所":
{
nome:"Prefeitura",
desc:"Documento oficial da prefeitura japonesa."
},


"区役所":
{
nome:"Subprefeitura",
desc:"Serviço administrativo local."
},


"納付":
{
nome:"Pagamento",
desc:"Pode indicar cobrança ou pagamento."
},


"納期限":
{
nome:"Prazo de pagamento",
desc:"Data limite para realizar pagamento."
},


"住民税":
{
nome:"Imposto residencial",
desc:"Imposto municipal japonês."
},


"銀行":
{
nome:"Banco",
desc:"Documento bancário."
},


"学校":
{
nome:"Escola",
desc:"Aviso ou documento escolar."
},


"配達":
{
nome:"Entrega",
desc:"Relacionado ao correio."
},


"不在票":
{
nome:"Aviso de ausência",
desc:"Tentativa de entrega do correio."
},


"病院":
{
nome:"Hospital",
desc:"Documento médico."
},


"契約":
{
nome:"Contrato",
desc:"Documento contratual."
}


};





async function lerDocumento(){


let arquivo =
document.getElementById("foto").files[0];



if(!arquivo){

alert("Escolha uma imagem");

return;

}



document.getElementById("texto")
.value="Lendo imagem...";



let resultado = await Tesseract.recognize(

arquivo,

'jpn'

);



let texto =
resultado.data.text;



document.getElementById("texto")
.value=texto;



interpretar(texto);



salvarHistorico(texto);



}







function interpretar(texto){


let html="";


let encontrado=false;



for(let termo in banco){



if(texto.includes(termo)){


encontrado=true;


html += `

<div class="tag">


<div class="jp">

${termo}

</div>


<b>${banco[termo].nome}</b>


<br>


<span class="small">

${banco[termo].desc}

</span>


</div>


`;


}



}






let valor =
texto.match(/¥[\d,]+/);



if(valor){


encontrado=true;


html +=`

<div class="tag">

💴 Valor encontrado:

<b>${valor[0]}</b>


</div>

`;


}






let reiwa =
texto.match(/令和(\d+)年/);



if(reiwa){


encontrado=true;


let ano =
2018 + Number(reiwa[1]);



html +=`

<div class="tag">

📅 Data japonesa:

令和${reiwa[1]}年

<br>

Equivale ao ano:

<b>${ano}</b>

</div>

`;



}





if(!encontrado){


html=

"Não encontrei termos conhecidos.<br><br>"+
"Use o botão 🌎 Abrir Tradutor para ver a tradução completa.";

}




document.getElementById("resultado")
.innerHTML=html;



}






function abrirTradutor(){


let texto =
document.getElementById("texto").value;



if(!texto){

alert("Nenhum texto encontrado");

return;

}



let url =

"https://translate.google.com/?sl=ja&tl=pt&text="
+
encodeURIComponent(texto);



window.open(url,"_blank");


}







function copiar(){


let texto =
document.getElementById("texto").value;



navigator.clipboard.writeText(texto);



alert("Texto copiado");


}







function salvarHistorico(texto){


let lista =

JSON.parse(

localStorage.getItem("documentos") || "[]"

);



lista.unshift(texto);



localStorage.setItem(

"documentos",

JSON.stringify(lista.slice(0,10))

);



mostrarHistorico();


}






function mostrarHistorico(){


let lista =

JSON.parse(

localStorage.getItem("documentos") || "[]"

);



document.getElementById("historico")
.innerHTML =



lista.map(x=>


`

<div>

📄 ${x.substring(0,100)}...

</div>

<hr>


`

).join("");



}



mostrarHistorico();



</script>


</body>

</html>
