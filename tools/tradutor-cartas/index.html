<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>📸 Tradutor de Cartas Japão</title>


<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>


<style>


body{

margin:0;
background:#f1f3f5;
font-family:Arial;

}


header{

background:#1565c0;
color:white;
padding:25px;
text-align:center;

}


.container{

max-width:750px;
margin:auto;
padding:15px;

}



.card{

background:white;
padding:20px;
border-radius:18px;
margin:15px 0;
box-shadow:0 4px 12px #ddd;

}



button{

background:#1565c0;
color:white;
border:0;
padding:12px;
border-radius:12px;
margin:5px;

}



textarea{

width:100%;
height:160px;
font-size:16px;

}



.result{

background:#eef5ff;
padding:15px;
border-radius:12px;

}



.tag{

background:#eee;
padding:8px;
border-radius:8px;
display:inline-block;
margin:3px;

}


</style>

</head>



<body>


<header>

<h1>📸 Tradutor de Cartas Japão</h1>

<p>Entenda documentos japoneses</p>

</header>



<div class="container">



<div class="card">

<h2>📷 Foto da carta</h2>


<input 
type="file"
id="foto"
accept="image/*"
capture="environment">


<button onclick="processar()">

🔎 Ler documento

</button>


</div>




<div class="card">


<h2>🔤 Texto japonês</h2>


<textarea id="texto"></textarea>


<button onclick="traduzir()">

🌎 Traduzir

</button>


<button onclick="copiar()">

📋 Copiar

</button>


</div>




<div class="card">


<h2>📝 Explicação</h2>


<div id="explicacao" class="result">

Aguardando documento...

</div>


</div>




<div class="card">


<h2>📂 Histórico</h2>

<div id="historico"></div>


</div>




</div>





<script>


async function processar(){


let file =
document.getElementById("foto").files[0];


if(!file){

alert("Escolha uma imagem");

return;

}



let img =
await melhorarImagem(file);



document.getElementById("texto").value =
"Lendo japonês...";



let resultado =
await Tesseract.recognize(

img,

'jpn',

{

logger:e=>console.log(e)

}

);



let texto =
resultado.data.text;


document.getElementById("texto")
.value=texto;


analisar(texto);


salvar(texto);


}





function melhorarImagem(file){


return new Promise(resolve=>{


let img=new Image();


img.onload=function(){


let canvas=document.createElement("canvas");


let ctx=canvas.getContext("2d");



canvas.width=img.width*2;

canvas.height=img.height*2;



ctx.drawImage(
img,
0,
0,
canvas.width,
canvas.height
);



let dados=
ctx.getImageData(
0,
0,
canvas.width,
canvas.height
);



for(let i=0;i<dados.data.length;i+=4){


let media=
(
dados.data[i]+
dados.data[i+1]+
dados.data[i+2]
)/3;



dados.data[i]=media;
dados.data[i+1]=media;
dados.data[i+2]=media;



}



ctx.putImageData(
dados,
0,
0
);



canvas.toBlob(
b=>resolve(b)
);



}



img.src=
URL.createObjectURL(file);


});


}





function analisar(texto){


let r="";


if(texto.includes("保険")){


r+="🏥 Parece ser documento de seguro saúde<br>";

}


if(texto.includes("税")){


r+="💴 Pode ser imposto ou pagamento<br>";

}


if(texto.includes("市役所")){


r+="🏢 Documento da prefeitura<br>";

}


if(texto.includes("学校")){


r+="🏫 Documento escolar<br>";

}


if(texto.includes("銀行")){


r+="🏦 Documento bancário<br>";

}


let data=
texto.match(/令和(\d+)年/);



if(data){


let ano=
2018+
parseInt(data[1]);


r+="📅 Ano japonês detectado: "+ano+"<br>";

}



if(!r){

r="Não identifiquei a categoria. Use o botão traduzir.";

}


document.getElementById("explicacao")
.innerHTML=r;



}





function traduzir(){


let texto=
document.getElementById("texto").value;


window.open(

"https://translate.google.com/?sl=ja&tl=pt&text="+
encodeURIComponent(texto)

);


}





function copiar(){


navigator.clipboard.writeText(

document.getElementById("texto").value

);


alert("Copiado");

}





function salvar(t){


let h=
JSON.parse(
localStorage.getItem("docs")||"[]"
);


h.unshift(t);


localStorage.setItem(

"docs",

JSON.stringify(h.slice(0,10))

);


mostrar();


}





function mostrar(){


let h=
JSON.parse(
localStorage.getItem("docs")||"[]"
);



document.getElementById("historico")
.innerHTML=
h.map(x=>

"<p>📄 "+x.substring(0,100)+"...</p>"

).join("");

}


mostrar();


</script>


</body>

</html>
