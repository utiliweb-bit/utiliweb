<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teste de Internet | UtiliWeb</title>

<link rel="stylesheet" href="../../assets/style.css">

<style>
.box {
    margin-top: 20px;
    padding: 20px;
    background: #fff;
    border-radius: 12px;
    text-align:center;
}

.result {
    font-size: 22px;
    margin-top: 15px;
}
button {
    padding:10px 15px;
    margin-top:10px;
    border:none;
    background:#111;
    color:#fff;
    border-radius:8px;
}
</style>

</head>

<body>

<header>
<h1>⚡ Teste de Internet</h1>
</header>

<div class="container">

<a href="../../index.html">← Voltar</a>

<div class="box">

<button onclick="test()">Testar conexão</button>

<div class="result" id="r">Clique para testar</div>

</div>

</div>

<script>

async function test() {
    const el = document.getElementById("r");

    el.innerText = "Testando...";

    const start = performance.now();

    try {
        await fetch("https://api.ipify.org?format=json", { cache: "no-store" });

        const end = performance.now();

        const latency = (end - start).toFixed(0);

        let quality = "";

        if (latency < 100) quality = "🟢 Excelente";
        else if (latency < 300) quality = "🟡 Boa";
        else quality = "🔴 Lenta";

        el.innerHTML = `
            Latência: <b>${latency}ms</b><br>
            Qualidade: ${quality}
        `;

    } catch (e) {
        el.innerText = "Erro ao testar conexão";
    }
}

</script>

</body>
</html>
