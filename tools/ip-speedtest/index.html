<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Teste de Velocidade | UtiliWeb</title>

<meta name="description" content="Teste ping e qualidade da sua conexão em segundos.">
<meta name="robots" content="index, follow">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html, body {
    width: 100%;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
    background: linear-gradient(135deg, #2ecc71, #27ae60);
}

/* CONTAINER */
.wrapper {
    width: 100%;
    max-width: 1000px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
}

/* PAINÉIS */
.left, .right {
    padding: 28px;
}

/* TÍTULOS */
h1 {
    font-size: 22px;
    margin-bottom: 6px;
}

p {
    font-size: 12px;
    color: #777;
}

/* BOTÃO */
button {
    width: 100%;
    padding: 14px;
    margin-top: 16px;
    border: none;
    border-radius: 10px;
    background: #27ae60;
    color: #fff;
    font-weight: 700;
    cursor: pointer;
}

button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

/* RESULTADO PRINCIPAL */
.ping {
    font-size: 52px;
    font-weight: 800;
    text-align: center;
    margin: 20px 0;
}

/* STATUS */
.status {
    text-align: center;
    font-size: 18px;
    font-weight: 700;
    color: #333;
}

/* PROGRESS BAR */
.progress {
    width: 100%;
    height: 12px;
    background: #eee;
    border-radius: 20px;
    overflow: hidden;
    margin-top: 16px;
}

.bar {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #3b82f6, #22c55e);
    transition: 0.4s;
}

/* INFO */
.info {
    margin-top: 16px;
    background: #f4f4f4;
    padding: 14px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.6;
}

/* RESPONSIVO */
@media (max-width: 768px) {
    .wrapper {
        grid-template-columns: 1fr;
    }

    html, body {
        padding: 12px;
    }

    .left, .right {
        padding: 18px;
    }
}
</style>

</head>

<body>

<div class="wrapper">

    <!-- INPUT -->
    <div class="left">

        <h1>⚡ Teste de Velocidade</h1>
        <p>Ping e qualidade da sua conexão em segundos</p>

        <button id="startBtn" onclick="testSpeed()">Iniciar teste</button>

        <div class="ping" id="ping">--</div>

        <div class="status" id="status" aria-live="polite">Clique para iniciar</div>

        <div class="progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="progressWrap">
            <div class="bar" id="bar"></div>
        </div>

    </div>

    <!-- RESULTADO -->
    <div class="right">

        <h2>Detalhes</h2>

        <div class="info" id="info" aria-live="polite">Nenhum teste realizado</div>

    </div>

</div>

<script>

const startBtn = document.getElementById("startBtn");
const pingEl = document.getElementById("ping");
const statusEl = document.getElementById("status");
const infoEl = document.getElementById("info");
const barEl = document.getElementById("bar");
const progressWrap = document.getElementById("progressWrap");

const TIMEOUT_MS = 5000;
const SAMPLE_COUNT = 3;

function setProgress(percent) {
    barEl.style.width = `${percent}%`;
    progressWrap.setAttribute("aria-valuenow", String(percent));
}

// Faz uma requisição e mede o tempo de resposta, com timeout via AbortController
async function timedRequest(timeoutMs) {

    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);

    // cache-buster na própria URL, além do header, pra evitar cache intermediário
    const url = `https://api.ipify.org?format=json&_=${Date.now()}`;

    const start = performance.now();

    try {
        await fetch(url, { cache: "no-store", signal: controller.signal });
        return performance.now() - start;
    } finally {
        clearTimeout(timer);
    }
}

async function testSpeed() {

    if (startBtn.disabled) return;

    startBtn.disabled = true;
    pingEl.textContent = "...";
    infoEl.innerHTML = "";
    setProgress(0);

    const samples = [];

    try {

        // aquecimento: primeira conexão paga DNS/TLS e distorce o resultado, então é descartada
        statusEl.textContent = "Aquecendo conexão...";
        await timedRequest(TIMEOUT_MS);
        setProgress(15);

        for (let i = 0; i < SAMPLE_COUNT; i++) {
            statusEl.textContent = `Medindo conexão (${i + 1}/${SAMPLE_COUNT})...`;
            const latency = await timedRequest(TIMEOUT_MS);
            samples.push(latency);
            setProgress(15 + Math.round((i + 1) * (85 / SAMPLE_COUNT)));
        }

        setProgress(100);

        const avg = Math.round(samples.reduce((a, b) => a + b, 0) / samples.length);
        const jitter = Math.round(Math.max(...samples) - Math.min(...samples));

        pingEl.textContent = `${avg} ms`;

        let quality = "";
        let use = "";

        if (avg < 100) {
            quality = "🟢 Excelente";
            use = "Streaming, jogos online, chamadas";
        }
        else if (avg < 300) {
            quality = "🟡 Boa";
            use = "Navegação e vídeos (jogos podem atrasar)";
        }
        else {
            quality = "🔴 Lenta";
            use = "Uso básico, pode haver travamentos";
        }

        statusEl.textContent = quality;

        infoEl.innerHTML = `
            <strong>Ping médio:</strong> ${avg} ms (${SAMPLE_COUNT} amostras)<br>
            <strong>Variação (jitter):</strong> ${jitter} ms<br>
            <strong>Qualidade:</strong> ${quality}<br>
            <strong>Uso recomendado:</strong> ${use}<br>
            <strong>Horário:</strong> ${new Date().toLocaleString("pt-BR")}
        `;

    } catch (e) {

        pingEl.textContent = "--";
        setProgress(0);

        if (e.name === "AbortError") {
            statusEl.textContent = "⏱️ Tempo limite excedido";
            infoEl.innerHTML = "Não foi possível medir o ping a tempo. Verifique sua conexão e tente novamente.";
        } else {
            statusEl.textContent = "Erro no teste";
            infoEl.innerHTML = "Não foi possível completar o teste. Verifique sua conexão e tente novamente.";
        }

    } finally {
        startBtn.disabled = false;
    }
}
</script>

</body>
</html>
