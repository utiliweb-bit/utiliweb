<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teste de Velocidade da Internet | UtiliWeb</title>

<meta name="description" content="Teste gratuitamente a qualidade da sua conexão de internet. Veja o ping e a classificação da rede.">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="../../assets/style.css">

<style>
.container {
    max-width: 900px;
}

.box {
    display: grid;
    gap: 15px;
    text-align: center;
}

.speed-number {
    font-size: 48px;
    font-weight: 800;
    margin: 10px 0;
}

.status {
    font-size: 20px;
    font-weight: 600;
}

.progress {
    width: 100%;
    height: 14px;
    background: #e5e7eb;
    border-radius: 20px;
    overflow: hidden;
}

.progress-bar {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #3b82f6, #22c55e);
    transition: 0.4s;
}

.info {
    text-align: left;
    font-size: 14px;
    line-height: 1.6;
    background: rgba(0,0,0,0.03);
    padding: 12px;
    border-radius: 10px;
}
</style>

</head>

<body>

<header>
    <h1>⚡ Teste de Velocidade</h1>
    <p>Ping e qualidade da sua conexão em segundos</p>
</header>

<div class="container">

    <a href="../../index.html">← Voltar</a>

    <div class="box">

        <button onclick="testSpeed()">Iniciar teste</button>

        <div class="speed-number" id="ping">--</div>

        <div class="status" id="quality">
            Clique para iniciar
        </div>

        <div class="progress">
            <div class="progress-bar" id="bar"></div>
        </div>

        <div class="info" id="details"></div>

    </div>

</div>

<script>
async function testSpeed() {

    const ping = document.getElementById("ping");
    const quality = document.getElementById("quality");
    const details = document.getElementById("details");
    const bar = document.getElementById("bar");

    ping.textContent = "...";
    quality.textContent = "Testando conexão...";
    details.innerHTML = "";
    bar.style.width = "10%";

    try {

        const start = performance.now();

        await fetch("https://api.ipify.org?format=json", {
            cache: "no-store"
        });

        const end = performance.now();
        const latency = Math.round(end - start);

        bar.style.width = "100%";
        ping.textContent = `${latency} ms`;

        let status = "";
        let use = "";

        if (latency < 100) {
            status = "🟢 Excelente";
            use = "Navegação, streaming, chamadas e jogos online";
        } 
        else if (latency < 300) {
            status = "🟡 Boa";
            use = "Navegação e streaming (jogos podem ter atraso)";
        } 
        else {
            status = "🔴 Lenta";
            use = "Navegação básica, streaming pode travar";
        }

        quality.textContent = status;

        details.innerHTML = `
            <strong>Ping:</strong> ${latency} ms<br>
            <strong>Uso recomendado:</strong> ${use}<br>
            <strong>Data:</strong> ${new Date().toLocaleString("pt-BR")}
        `;

    } catch (e) {

        ping.textContent = "--";
        quality.textContent = "Erro ao testar conexão.";
        bar.style.width = "0%";

    }
}
</script>

</body>
</html>
