<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teste de Internet | UtiliWeb</title>

<meta name="description" content="Teste a latência da sua conexão de internet online e gratuitamente.">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="../../assets/style.css">

</head>

<body>

<header>
    <h1>⚡ Teste de Internet</h1>
    <p>Verifique a resposta da sua conexão</p>
</header>

<div class="container">

    <a href="../../index.html">← Voltar</a>

    <div class="box">

        <button onclick="test()">
            Testar conexão
        </button>

        <br><br>

        <div class="result" id="r">
            Clique no botão para iniciar
        </div>

    </div>

</div>

<script>

async function test() {

    const el = document.getElementById("r");

    el.textContent = "Testando...";

    const start = performance.now();

    try {

        await fetch(
            "https://api.ipify.org?format=json",
            { cache: "no-store" }
        );

        const end = performance.now();

        const latency = (end - start).toFixed(0);

        let quality = "";

        if (latency < 100) {
            quality = "🟢 Excelente";
        } else if (latency < 300) {
            quality = "🟡 Boa";
        } else {
            quality = "🔴 Lenta";
        }

        el.innerHTML = `
            <strong>Latência:</strong> ${latency} ms
            <br><br>
            <strong>Qualidade:</strong> ${quality}
        `;

    } catch {

        el.textContent = "Erro ao testar conexão.";

    }

}

</script>

</body>
</html>
