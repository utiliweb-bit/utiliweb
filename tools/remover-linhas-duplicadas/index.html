<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Remover Linhas Duplicadas | UtiliWeb</title>
<meta name="description" content="Remova linhas repetidas de textos e listas automaticamente.">
<meta name="robots" content="index, follow">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}
html, body {
    width: 100%;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
    background: linear-gradient(135deg, #2ecc71, #27ae60);
}
/* WRAPPER */
.wrapper {
    width: 100%;
    max-width: 1100px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
}
/* PAINÉIS */
.left, .right {
    padding: 28px;
}
/* TITULOS */
h1 {
    font-size: 22px;
    margin-bottom: 6px;
}
p {
    font-size: 12px;
    color: #777;
}
/* INPUT */
textarea {
    width: 100%;
    min-height: 200px;
    margin-top: 12px;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 14px;
    resize: vertical;
}
textarea:focus {
    outline: none;
    border-color: #27ae60;
}
/* BOTÕES */
.btns {
    display: flex;
    gap: 10px;
    margin-top: 14px;
    flex-wrap: wrap;
}
button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-weight: 700;
    cursor: pointer;
}
.primary {
    background: #27ae60;
    color: #fff;
}
.secondary {
    background: #f4f4f4;
    color: #333;
}
.copy-msg {
    margin-top: 10px;
    color: #27ae60;
    font-size: 14px;
    font-weight: 600;
    display: none;
}
/* RESULTADO */
.result {
    background: #f4f4f4;
    padding: 14px;
    border-radius: 10px;
    font-size: 13px;
    white-space: pre-wrap;
    min-height: 120px;
}
/* RESPONSIVO */
@media (max-width: 768px) {
    .wrapper {
        grid-template-columns: 1fr;
    }
    html, body {
        padding: 12px;
    }
    .left, .right {
        padding: 18px;
    }
}
</style>
</head>
<body>
<div class="wrapper">
    <!-- INPUT -->
    <div class="left">
        <h1>🧾 Remover Linhas Duplicadas</h1>
        <p>Limpe listas removendo itens repetidos automaticamente</p>
        <textarea id="text" placeholder="Digite ou cole sua lista aqui..."></textarea>
        <div class="btns">
            <button class="primary" onclick="removeDup()">Remover</button>
            <button class="secondary" onclick="copyText()">Copiar</button>
            <button class="secondary" onclick="resetAll()">Limpar</button>
        </div>
        <div class="copy-msg" id="copyMsg">✓ Texto copiado com sucesso</div>
    </div>
    <!-- RESULTADO -->
    <div class="right">
        <h2>Resultado</h2>
        <div id="result" class="result" aria-live="polite">---</div>
    </div>
</div>
<script>

const input = document.getElementById("text");
const result = document.getElementById("result");
const copyMsg = document.getElementById("copyMsg");

const PLACEHOLDER_INICIAL = "---";
const MENSAGEM_VAZIA = "Nada para processar";

function removeDup() {

    const vistos = new Set();
    const unicas = [];

    (input.value || "")
        .split("\n")
        .forEach(linha => {

            // normaliza forma Unicode (evita que acentos representados de
            // jeitos diferentes escapem da deduplicação) e colapsa espaços internos
            const limpa = linha
                .normalize("NFC")
                .replace(/\s+/g, " ")
                .trim();

            if (!limpa || vistos.has(limpa)) return;

            vistos.add(limpa);
            unicas.push(limpa);
        });

    result.textContent = unicas.length ? unicas.join("\n") : MENSAGEM_VAZIA;
}

async function copyText() {

    const texto = result.textContent.trim();

    if (
        !texto ||
        texto === PLACEHOLDER_INICIAL ||
        texto === MENSAGEM_VAZIA
    ) {
        return;
    }

    try {

        await navigator.clipboard.writeText(texto);

        copyMsg.style.display = "block";

        setTimeout(() => {
            copyMsg.style.display = "none";
        }, 2000);

    } catch (error) {

        alert("Não foi possível copiar o texto.");
    }
}

function resetAll() {
    input.value = "";
    result.textContent = PLACEHOLDER_INICIAL;
}

/* UX automático */
input.addEventListener("input", removeDup);
</script>
</body>
</html>
