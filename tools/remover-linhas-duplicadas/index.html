<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Remover Linhas Duplicadas Online | UtiliWeb</title>

<meta name="description" content="Remova linhas repetidas de textos e listas online gratuitamente com o UtiliWeb.">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="../../assets/style.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    background: linear-gradient(135deg, #2ecc71, #27ae60);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.wrapper {
    width: 100%;
    max-width: 1200px;
    min-height: 700px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
}

.left-panel, .right-panel {
    padding: 30px;
    overflow-y: auto;
}

.left-panel {
    border-right: 1px solid #eee;
}

.right-panel {
    background: #eafaf1;
}

header h1 {
    font-size: 26px;
    margin-bottom: 5px;
}

.subtitle {
    font-size: 14px;
    color: #777;
}

textarea {
    width: 100%;
    min-height: 180px;
    padding: 12px;
    border: 2px solid #ddd;
    border-radius: 10px;
    margin-top: 10px;
    font-size: 14px;
    resize: vertical;
}

textarea:focus {
    outline: none;
    border-color: #27ae60;
}

button {
    padding: 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.btn-primary {
    background: #27ae60;
    color: white;
}

.btn-secondary {
    background: white;
    border: 2px solid #27ae60;
    color: #27ae60;
}

.card {
    background: white;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 14px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
}
</style>

</head>

<body>

<div class="wrapper">

    <!-- ESQUERDA -->
    <div class="left-panel">

        <header>
            <h1>🧾 Remover Linhas Duplicadas</h1>
            <p class="subtitle">Limpe listas removendo itens repetidos automaticamente</p>
        </header>

        <br>

        <a href="../../index.html">← Voltar</a>

        <div class="box">

            <label>Lista original</label>
            <textarea id="text" placeholder="Digite ou cole sua lista aqui..."></textarea>

            <div style="margin-top:15px; display:flex; gap:10px; flex-wrap:wrap;">
                <button class="btn-primary" onclick="removeDuplicates()">Remover duplicadas</button>
                <button class="btn-secondary" onclick="copyResult()">Copiar</button>
                <button class="btn-secondary" onclick="resetAll()">Limpar</button>
            </div>

        </div>

    </div>

    <!-- DIREITA -->
    <div class="right-panel">

        <h2>Resultado</h2>

        <div class="grid">
            <div class="card">
                Linhas únicas serão exibidas abaixo
            </div>
        </div>

        <br>

        <div class="card">
            <strong>Resultado:</strong>
            <div id="result" style="margin-top:10px; white-space:pre-wrap;">---</div>
        </div>

    </div>

</div>

<script>
const input = document.getElementById("text");
const result = document.getElementById("result");

function removeDuplicates() {

    const lines = (input.value || "")
        .split("\n")
        .map(l => l.trim())
        .filter(l => l !== "");

    const unique = [...new Set(lines)];

    result.textContent = unique.length ? unique.join("\n") : "Nada para processar";
}

function copyResult() {
    if (!result.textContent || result.textContent === "---") return;
    navigator.clipboard.writeText(result.textContent);
}

function resetAll() {
    input.value = "";
    result.textContent = "---";
}

// UX PRO: auto atualização
input.addEventListener("input", removeDuplicates);
</script>

</body>
</html>
