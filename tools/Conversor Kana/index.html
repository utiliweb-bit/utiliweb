<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Conversor de Hiragana e Katakana para Meia Largura (Half-Width)">
    <meta name="keywords" content="hiragana, katakana, meia largura, half-width, japonês, converter">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Conversor Kana</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            margin: 0;
        }

        .wrapper {
            width: 100%;
            max-width: 1200px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: grid;
            grid-template-columns: 1fr 1fr;
            overflow: hidden;
            max-height: 90vh;
        }

        .left-panel {
            padding: 32px;
            overflow-y: auto;
            border-right: 1px solid #e0e0e0;
            -webkit-overflow-scrolling: touch;
        }

        .right-panel {
            padding: 32px;
            background: linear-gradient(135deg, #e8f8f5 0%, #d5f4e6 100%);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        header {
            margin-bottom: 24px;
            text-align: center;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 6px;
            font-weight: 700;
        }

        .subtitle {
            color: #999;
            font-size: 13px;
            font-weight: 500;
        }

        .info-box {
            background: linear-gradient(135deg, #e8f8f5 0%, #d5f4e6 100%);
            border-left: 4px solid #27ae60;
            padding: 12px;
            border-radius: 8px;
            font-size: 11px;
            color: #27ae60;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .info-box strong {
            color: #27ae60;
            font-weight: 700;
        }

        .modos {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 24px;
        }

        .modo-btn {
            padding: 10px 6px;
            background: #e0e0e0;
            color: #666;
            border: none;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            line-height: 1.4;
            -webkit-appearance: none;
            appearance: none;
        }

        .modo-btn.ativo {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
        }

        .modo-btn:active {
            transform: scale(0.98);
        }

        .section-title {
            font-size: 12px;
            font-weight: 700;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #27ae60;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-label {
            font-size: 11px;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 6px;
            display: block;
        }

        textarea {
            width: 100%;
            padding: 11px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            background: white;
            color: #333;
            transition: all 0.2s ease;
            -webkit-appearance: none;
            appearance: none;
            resize: vertical;
            min-height: 90px;
            font-family: inherit;
            line-height: 1.5;
        }

        textarea:focus {
            outline: none;
            border-color: #27ae60;
            background: #f0f9f7;
        }

        textarea[readonly] {
            background: #f9f9f9;
            color: #444;
            cursor: default;
        }

        .btn-calcular {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3);
            margin-top: 4px;
            -webkit-appearance: none;
            appearance: none;
        }

        .btn-calcular:active {
            transform: scale(0.98);
        }

        .resultado-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .resultado-header {
            font-size: 12px;
            font-weight: 700;
            color: #27ae60;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #27ae60;
        }

        .resultado-total {
            display: flex;
            flex-direction: column;
            padding: 14px;
            background: white;
            border-radius: 10px;
            border: 2px solid #27ae60;
            margin-bottom: 12px;
        }

        .resultado-total-label {
            font-size: 11px;
            font-weight: 700;
            color: #27ae60;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .resultado-texto {
            font-size: 20px;
            font-weight: 700;
            color: #27ae60;
            font-family: 'Courier New', monospace;
            word-break: break-all;
            line-height: 1.4;
        }

        .botoes {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }

        button {
            padding: 11px;
            border: none;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            -webkit-appearance: none;
            appearance: none;
        }

        .btn-copiar {
            background: white;
            color: #27ae60;
            border: 2px solid #27ae60;
        }

        .btn-copiar:active {
            background: #27ae60;
            color: white;
            transform: scale(0.98);
        }

        .btn-trocar {
            background: white;
            color: #27ae60;
            border: 2px solid #27ae60;
        }

        .btn-trocar:active {
            background: #27ae60;
            color: white;
            transform: scale(0.98);
        }

        .btn-limpar {
            background: rgba(255, 255, 255, 0.5);
            color: #27ae60;
            border: 2px solid rgba(39, 174, 96, 0.3);
        }

        .btn-limpar:active {
            background: rgba(255, 255, 255, 0.8);
            transform: scale(0.98);
        }

        .tabela-ref {
            margin-top: 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .tabela-titulo {
            font-size: 11px;
            font-weight: 700;
            color: #27ae60;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 2px solid rgba(39, 174, 96, 0.3);
        }

        .tabela-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .tabela-item {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(39, 174, 96, 0.2);
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 11px;
            color: #27ae60;
            white-space: nowrap;
            font-family: 'Courier New', monospace;
            font-weight: 600;
        }

        .status {
            text-align: center;
            font-size: 11px;
            color: #27ae60;
            margin-top: 8px;
            min-height: 16px;
            font-weight: 700;
        }

        /* RESPONSIVO */
        @media (max-width: 1024px) {
            .wrapper {
                grid-template-columns: 1fr;
                max-height: none;
                border-radius: 12px;
            }
            .left-panel {
                border-right: none;
                border-bottom: 1px solid #e0e0e0;
                padding: 24px;
            }
            .right-panel {
                padding: 24px;
            }
            h1 { font-size: 24px; }
        }

        @media (max-width: 768px) {
            html, body { padding: 12px; }
            .wrapper { grid-template-columns: 1fr; max-height: none; border-radius: 12px; }
            .left-panel { border-right: none; border-bottom: 1px solid #e0e0e0; padding: 16px; }
            .right-panel { padding: 16px; }
            h1 { font-size: 22px; }
            .subtitle { font-size: 12px; }
            .info-box { font-size: 10px; padding: 10px; margin-bottom: 16px; }
            .modos { gap: 6px; margin-bottom: 16px; }
            .modo-btn { padding: 9px 4px; font-size: 10px; }
            .section-title { font-size: 11px; margin-bottom: 10px; padding-bottom: 6px; }
            .input-label { font-size: 10px; }
            textarea { font-size: 15px; min-height: 80px; padding: 10px; }
            .btn-calcular { padding: 12px; font-size: 12px; }
            .resultado-header { font-size: 11px; margin-bottom: 10px; }
            .resultado-total { padding: 12px; margin-bottom: 10px; }
            .resultado-total-label { font-size: 10px; }
            .resultado-texto { font-size: 17px; }
            .botoes { gap: 6px; margin-bottom: 10px; }
            button { padding: 10px; font-size: 10px; }
            .tabela-titulo { font-size: 10px; }
            .tabela-item { font-size: 10px; padding: 3px 6px; }
            .status { font-size: 10px; min-height: 14px; }
        }

        @media (max-width: 480px) {
            html, body { padding: 8px; }
            .wrapper { border-radius: 10px; }
            .left-panel, .right-panel { padding: 12px; }
            h1 { font-size: 20px; margin-bottom: 4px; }
            .subtitle { font-size: 11px; }
            .info-box { font-size: 9px; padding: 8px; margin-bottom: 12px; }
            .modos { gap: 5px; margin-bottom: 12px; }
            .modo-btn { padding: 8px 3px; font-size: 9px; }
            .section-title { font-size: 10px; margin-bottom: 8px; padding-bottom: 4px; }
            .input-label { font-size: 9px; margin-bottom: 4px; }
            textarea { font-size: 14px; min-height: 70px; padding: 9px; }
            .btn-calcular { padding: 11px; font-size: 11px; }
            .resultado-total { padding: 10px; margin-bottom: 8px; }
            .resultado-texto { font-size: 15px; }
            .botoes { gap: 5px; margin-bottom: 8px; }
            button { padding: 9px; font-size: 9px; }
            .tabela-item { font-size: 9px; padding: 3px 5px; }
            .status { font-size: 9px; min-height: 12px; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="left-panel">
            <header>
                <h1>🔤 Conversor Kana</h1>
                <p class="subtitle">Hiragana e Katakana para meia largura</p>
            </header>

            <div class="info-box">
                <strong>Dica:</strong> Dakuten (が→ｶﾞ) e handakuten (ぱ→ﾊﾟ) são convertidos automaticamente. Use "Trocar" para inverter entrada e resultado.
            </div>

            <div class="modos">
                <button class="modo-btn ativo" id="btn-hira" onclick="setModo('hira')">ひ Hiragana<br>→ Half</button>
                <button class="modo-btn" id="btn-kata" onclick="setModo('kata')">ア Katakana<br>→ Half</button>
                <button class="modo-btn" id="btn-half" onclick="setModo('half')">ｱ Half<br>→ Katakana</button>
            </div>

            <div class="section-title" id="titulo-secao">Hiragana → Meia Largura</div>

            <div class="input-group">
                <label class="input-label" id="label-entrada">Entrada (Hiragana)</label>
                <textarea id="input" placeholder="Digite ou cole aqui..." oninput="converter()"></textarea>
            </div>

            <button class="btn-calcular" onclick="converter()">Converter</button>
        </div>

        <div class="right-panel">
            <div class="resultado-section">
                <div class="resultado-header">Resultado</div>

                <div class="resultado-total" id="resultado-box" style="display:none;">
                    <span class="resultado-total-label" id="label-saida">Meia largura (Half-Width)</span>
                    <span class="resultado-texto" id="output">-</span>
                </div>

                <div class="botoes">
                    <button class="btn-copiar" onclick="copiar(event)">📋 Copiar</button>
                    <button class="btn-trocar" onclick="trocar()">🔄 Trocar</button>
                    <button class="btn-limpar" onclick="limpar()">🗑️ Limpar</button>
                </div>

                <div class="tabela-ref">
                    <div class="tabela-titulo">📖 Tabela de referência</div>
                    <div class="tabela-grid" id="tabela"></div>
                </div>

                <div class="status" id="status"></div>
            </div>
        </div>
    </div>

    <script>
        const KATA_TO_HALF = {
            'ア':'ｱ','イ':'ｲ','ウ':'ｳ','エ':'ｴ','オ':'ｵ',
            'カ':'ｶ','キ':'ｷ','ク':'ｸ','ケ':'ｹ','コ':'ｺ',
            'サ':'ｻ','シ':'ｼ','ス':'ｽ','セ':'ｾ','ソ':'ｿ',
            'タ':'ﾀ','チ':'ﾁ','ツ':'ﾂ','テ':'ﾃ','ト':'ﾄ',
            'ナ':'ﾅ','ニ':'ﾆ','ヌ':'ﾇ','ネ':'ﾈ','ノ':'ﾉ',
            'ハ':'ﾊ','ヒ':'ﾋ','フ':'ﾌ','ヘ':'ﾍ','ホ':'ﾎ',
            'マ':'ﾏ','ミ':'ﾐ','ム':'ﾑ','メ':'ﾒ','モ':'ﾓ',
            'ヤ':'ﾔ','ユ':'ﾕ','ヨ':'ﾖ',
            'ラ':'ﾗ','リ':'ﾘ','ル':'ﾙ','レ':'ﾚ','ロ':'ﾛ',
            'ワ':'ﾜ','ヲ':'ｦ','ン':'ﾝ',
            'ァ':'ｧ','ィ':'ｨ','ゥ':'ｩ','ェ':'ｪ','ォ':'ｫ',
            'ッ':'ｯ','ャ':'ｬ','ュ':'ｭ','ョ':'ｮ',
            'ガ':'ｶﾞ','ギ':'ｷﾞ','グ':'ｸﾞ','ゲ':'ｹﾞ','ゴ':'ｺﾞ',
            'ザ':'ｻﾞ','ジ':'ｼﾞ','ズ':'ｽﾞ','ゼ':'ｾﾞ','ゾ':'ｿﾞ',
            'ダ':'ﾀﾞ','ヂ':'ﾁﾞ','ヅ':'ﾂﾞ','デ':'ﾃﾞ','ド':'ﾄﾞ',
            'バ':'ﾊﾞ','ビ':'ﾋﾞ','ブ':'ﾌﾞ','ベ':'ﾍﾞ','ボ':'ﾎﾞ',
            'パ':'ﾊﾟ','ピ':'ﾋﾟ','プ':'ﾌﾟ','ペ':'ﾍﾟ','ポ':'ﾎﾟ',
            'ヴ':'ｳﾞ',
            '。':'｡','「':'｢','」':'｣','、':'､','・':'･','ー':'ｰ'
        };

        const HIRA_TO_KATA = {};
        for (let i = 0x3041; i <= 0x3096; i++) {
            HIRA_TO_KATA[String.fromCodePoint(i)] = String.fromCodePoint(i + 0x60);
        }

        const HALF_TO_KATA = {};
        for (const [k, v] of Object.entries(KATA_TO_HALF)) {
            if (v.length === 1) HALF_TO_KATA[v] = k;
        }
        const DAKUTEN_MAP = {};
        for (const [k, v] of Object.entries(KATA_TO_HALF)) {
            if (v.length === 2) DAKUTEN_MAP[v] = k;
        }

        let modo = 'hira';

        const configs = {
            hira: {
                titulo: 'Hiragana → Meia Largura',
                labelEntrada: 'Entrada (Hiragana)',
                labelSaida: 'Meia largura (Half-Width)',
                placeholder: 'Ex: あいうえお、がぎぐげご...'
            },
            kata: {
                titulo: 'Katakana → Meia Largura',
                labelEntrada: 'Entrada (Katakana)',
                labelSaida: 'Meia largura (Half-Width)',
                placeholder: 'Ex: アイウエオ、ガギグゲゴ...'
            },
            half: {
                titulo: 'Meia Largura → Katakana',
                labelEntrada: 'Entrada (Half-Width)',
                labelSaida: 'Katakana (largura normal)',
                placeholder: 'Ex: ｱｲｳｴｵ、ｶﾞｷﾞｸﾞ...'
            }
        };

        function setModo(m) {
            modo = m;
            document.querySelectorAll('.modo-btn').forEach(b => b.classList.remove('ativo'));
            document.getElementById('btn-' + m).classList.add('ativo');
            const c = configs[m];
            document.getElementById('titulo-secao').textContent = c.titulo;
            document.getElementById('label-entrada').textContent = c.labelEntrada;
            document.getElementById('label-saida').textContent = c.labelSaida;
            document.getElementById('input').placeholder = c.placeholder;
            document.getElementById('input').value = '';
            document.getElementById('resultado-box').style.display = 'none';
            renderTabela();
        }

        function hiraToHalf(str) {
            return str.split('').map(c => {
                const kata = HIRA_TO_KATA[c] || c;
                return KATA_TO_HALF[kata] || kata;
            }).join('');
        }

        function kataToHalf(str) {
            return str.split('').map(c => KATA_TO_HALF[c] || c).join('');
        }

        function halfToKata(str) {
            let result = '';
            let i = 0;
            while (i < str.length) {
                const pair = str[i] + (str[i + 1] || '');
                if (DAKUTEN_MAP[pair]) {
                    result += DAKUTEN_MAP[pair];
                    i += 2;
                } else {
                    result += HALF_TO_KATA[str[i]] || str[i];
                    i++;
                }
            }
            return result;
        }

        function converter() {
            const val = document.getElementById('input').value;
            if (!val.trim()) {
                document.getElementById('resultado-box').style.display = 'none';
                return;
            }
            let res = '';
            if (modo === 'hira') res = hiraToHalf(val);
            else if (modo === 'kata') res = kataToHalf(val);
            else res = halfToKata(val);
            document.getElementById('output').textContent = res;
            document.getElementById('resultado-box').style.display = 'flex';
        }

        function copiar(evt) {
            const val = document.getElementById('output').textContent;
            if (!val || val === '-') return;
            navigator.clipboard.writeText(val).then(() => {
                const btn = evt.target;
                const orig = btn.textContent;
                btn.textContent = '✓ Copiado!';
                setTimeout(() => btn.textContent = orig, 1500);
            });
        }

        function trocar() {
            const resultado = document.getElementById('output').textContent;
            if (!resultado || resultado === '-') return;
            document.getElementById('input').value = resultado;
            converter();
            mostrarStatus('✓ Campos trocados');
        }

        function limpar() {
            document.getElementById('input').value = '';
            document.getElementById('resultado-box').style.display = 'none';
        }

        function mostrarStatus(msg) {
            const s = document.getElementById('status');
            s.textContent = msg;
            setTimeout(() => s.textContent = '', 2000);
        }

        function renderTabela() {
            const tabela = document.getElementById('tabela');
            let pares = [];

            if (modo === 'hira') {
                for (const [h, k] of Object.entries(HIRA_TO_KATA)) {
                    const half = KATA_TO_HALF[k];
                    if (half) pares.push([h, half]);
                }
            } else if (modo === 'kata') {
                for (const [k, v] of Object.entries(KATA_TO_HALF)) {
                    pares.push([k, v]);
                }
            } else {
                for (const [k, v] of Object.entries(KATA_TO_HALF)) {
                    pares.push([v, k]);
                }
            }

            tabela.innerHTML = pares.map(([a, b]) =>
                `<span class="tabela-item">${a} → ${b}</span>`
            ).join('');
        }

        window.addEventListener('load', () => {
            renderTabela();
        });
    </script>
</body>
</html>
