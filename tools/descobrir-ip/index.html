<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Descobrir Meu IP | UtiliWeb</title>

<meta name="description" content="Descubra seu endereço IP público de forma rápida e gratuita.">
<meta name="keywords" content="meu ip, ip público, utiliweb, ip online">

<style>
:root{
    --pad: clamp(10px, 2vw, 20px);
    --radius: 18px;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    width:100%;
    min-height:100dvh;
    font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial;
    background:linear-gradient(135deg,#2ecc71,#27ae60);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:var(--pad);
}

/* WRAPPER */
.wrapper{
    width:100%;
    max-width:900px;
    background:#fff;
    border-radius:var(--radius);
    box-shadow:0 20px 60px rgba(0,0,0,.3);
    display:grid;
    grid-template-columns:1fr 1fr;
    overflow:hidden;
}

/* PAINÉIS */
.left-panel,
.right-panel{
    padding:clamp(16px, 3vw, 30px);
}

/* ESQUERDA */
.left-panel{
    border-right:1px solid #eee;
}

/* TIPOGRAFIA */
header h1{
    font-size:clamp(20px, 2.2vw, 26px);
}

.subtitle{
    font-size:clamp(12px, 1.4vw, 14px);
    color:#777;
}

/* RESULTADO */
.result{
    margin-top:20px;
    font-size:clamp(18px, 2.4vw, 28px);
    font-weight:700;
    color:#27ae60;
    word-break:break-all;
}

/* BOTÃO */
button{
    margin-top:18px;
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    font-weight:700;
    background:#27ae60;
    color:#fff;
    min-height:44px;
    touch-action:manipulation;
}

button:disabled{
    opacity:.6;
}

/* DIREITA */
.right-panel{
    background:#eafaf1;
}

/* RESPONSIVO */
@media (max-width: 900px){
    .wrapper{
        grid-template-columns:1fr;
    }

    .left-panel{
        border-right:none;
        border-bottom:1px solid #eee;
    }
}

@media (max-width: 480px){
    html, body{
        padding:10px;
    }

    button{
        font-size:13px;
        padding:11px;
    }
}
</style>
</head>

<body>

<div class="wrapper">

    <!-- ESQUERDA -->
    <div class="left-panel">

        <header>
            <h1>🌍 Descobrir Meu IP</h1>
            <p class="subtitle">IP público em tempo real</p>
        </header>

        <br>

        <a href="../../index.html">← Voltar</a>

        <br><br>

        <p>Seu IP público é:</p>

        <div class="result" id="ip">Clique no botão abaixo</div>

        <button id="btn" onclick="buscarIP()">Mostrar meu IP</button>

    </div>

    <!-- DIREITA -->
    <div class="right-panel">

        <h2>Como funciona</h2>
        <p>
            Esta ferramenta consulta um serviço externo seguro e retorna seu IP público atual.
            Não armazenamos dados.
        </p>

    </div>

</div>

<script>
async function buscarIP() {
    const ipEl = document.getElementById("ip");
    const btn = document.getElementById("btn");

    btn.disabled = true;
    ipEl.textContent = "Carregando...";

    try {
        const res = await fetch("https://api.ipify.org?format=json", {
            cache: "no-store"
        });

        const data = await res.json();
        ipEl.textContent = data.ip;

    } catch (e) {
        ipEl.textContent = "Erro ao obter IP";
    } finally {
        btn.disabled = false;
    }
}
</script>

</body>
</html>
