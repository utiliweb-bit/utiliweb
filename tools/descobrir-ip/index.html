<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Descobrir Meu IP Online | UtiliWeb</title>

<meta name="description" content="Descubra seu endereço IP público online de forma rápida e gratuita.">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="../../assets/style.css">

</head>

<body>

<header>
    <h1>🌍 Descobrir Meu IP</h1>
    <p>Veja seu IP público em tempo real</p>
</header>

<div class="container">

    <a href="../../index.html">← Voltar</a>

    <div class="box">

        <p>Seu IP público é:</p>

        <div class="result" id="ip">
            Clique no botão abaixo
        </div>

        <br>

        <button id="btn" onclick="buscarIP()">
            Mostrar meu IP
        </button>

    </div>

</div>

<script>

async function buscarIP() {

    const ipEl = document.getElementById("ip");
    const btn = document.getElementById("btn");

    btn.disabled = true;
    ipEl.textContent = "Carregando...";

    try {

        const res = await fetch("https://api.ipify.org?format=json", {
            cache: "no-store"
        });

        const data = await res.json();

        ipEl.textContent = data.ip;

    } catch {

        ipEl.textContent = "Erro ao obter IP";

    } finally {

        btn.disabled = false;

    }

}

</script>

</body>
</html>
