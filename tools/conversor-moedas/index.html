<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Conversor de Moedas | UtiliWeb</title>

<meta name="description" content="Converta moedas online de forma rápida e gratuita.">
<meta name="keywords" content="utiliweb, conversor de moedas, iene, real, dólar">

<link rel="stylesheet" href="../../assets/style.css">
</head>

<body>

<header>
    <h1>💱 Conversor de Moedas</h1>
    <p>Converta valores em tempo real</p>
</header>

<div class="container">

    <a href="../../index.html">← Voltar</a>

    <div class="box">

        <label>Valor</label>
        <input id="valor" type="number" placeholder="Ex: 100">

        <label style="margin-top:12px;">Moeda de origem</label>
        <select id="de">
            <option value="BRL">Real (BRL)</option>
            <option value="USD">Dólar (USD)</option>
            <option value="JPY">Iene (JPY)</option>
        </select>

        <label style="margin-top:12px;">Moeda de destino</label>
        <select id="para">
            <option value="JPY">Iene (JPY)</option>
            <option value="USD">Dólar (USD)</option>
            <option value="BRL">Real (BRL)</option>
        </select>

        <div style="margin-top:15px;">
            <button onclick="converter()">Converter</button>
            <button class="btn-secondary" onclick="limpar()">Limpar</button>
        </div>

        <div id="resultado" class="result hidden"></div>

    </div>

</div>

<script>
const taxas = {
    BRL: { USD: 0.20, JPY: 30 },
    USD: { BRL: 5.0, JPY: 150 },
    JPY: { BRL: 0.033, USD: 0.0067 }
};

function converter() {
    const valor = parseFloat(document.getElementById("valor").value);
    const de = document.getElementById("de").value;
    const para = document.getElementById("para").value;
    const resultado = document.getElementById("resultado");

    if (isNaN(valor)) {
        resultado.classList.remove("hidden");
        resultado.textContent = "Digite um valor válido.";
        return;
    }

    if (de === para) {
        resultado.classList.remove("hidden");
        resultado.textContent = `Resultado: ${valor.toFixed(2)} ${para}`;
        return;
    }

    const taxa = taxas[de][para];

    if (!taxa) {
        resultado.classList.remove("hidden");
        resultado.textContent = "Conversão não disponível.";
        return;
    }

    const convertido = valor * taxa;

    resultado.classList.remove("hidden");
    resultado.innerHTML = `
        <strong>${valor} ${de}</strong> =
        <strong>${convertido.toFixed(2)} ${para}</strong>
    `;
}

function limpar() {
    document.getElementById("valor").value = "";
    document.getElementById("resultado").classList.add("hidden");
}
</script>

</body>
</html>
