<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Conversor de Moedas Online | UtiliWeb</title>

<meta name="description" content="Converta moedas online gratuitamente. Transforme Real, Dólar, Euro, Iene e outras moedas de forma rápida com o UtiliWeb.">

<link rel="stylesheet" href="../../assets/style.css">
</head>

<body>

<header>
    <h1>Conversor de Moedas</h1>
    <p>Converta valores entre diferentes moedas em tempo real</p>
</header>

<div class="container">

    <a href="../../index.html">← Voltar</a>

    <div style="margin-top:20px;">

        <label for="valor">Valor</label>

        <input
            type="number"
            id="valor"
            value="1"
            min="0"
            step="0.01"
            style="width:100%; margin-top:10px;">

    </div>

    <div style="margin-top:20px;">

        <label for="origem">De</label>

        <select
            id="origem"
            style="width:100%; margin-top:10px;">

            <option value="BRL">Real Brasileiro (BRL)</option>
            <option value="USD">Dólar Americano (USD)</option>
            <option value="EUR">Euro (EUR)</option>
            <option value="JPY">Iene Japonês (JPY)</option>
            <option value="GBP">Libra Esterlina (GBP)</option>
            <option value="CAD">Dólar Canadense (CAD)</option>
            <option value="AUD">Dólar Australiano (AUD)</option>
            <option value="CHF">Franco Suíço (CHF)</option>
            <option value="CNY">Yuan Chinês (CNY)</option>
            <option value="KRW">Won Sul-Coreano (KRW)</option>
            <option value="ARS">Peso Argentino (ARS)</option>

        </select>

    </div>

    <div style="margin-top:20px;">

        <label for="destino">Para</label>

        <select
            id="destino"
            style="width:100%; margin-top:10px;">

            <option value="USD">Dólar Americano (USD)</option>
            <option value="BRL">Real Brasileiro (BRL)</option>
            <option value="EUR">Euro (EUR)</option>
            <option value="JPY">Iene Japonês (JPY)</option>
            <option value="GBP">Libra Esterlina (GBP)</option>
            <option value="CAD">Dólar Canadense (CAD)</option>
            <option value="AUD">Dólar Australiano (AUD)</option>
            <option value="CHF">Franco Suíço (CHF)</option>
            <option value="CNY">Yuan Chinês (CNY)</option>
            <option value="KRW">Won Sul-Coreano (KRW)</option>
            <option value="ARS">Peso Argentino (ARS)</option>

        </select>

    </div>

    <div style="margin-top:20px;">

        <button onclick="converterMoeda()">
            Converter
        </button>

    </div>

    <div class="result" id="resultado" style="margin-top:20px;">
        -
    </div>

    <section style="margin-top:40px;">
        <h2>Como usar</h2>

        <p>
            Digite um valor, selecione a moeda de origem e a moeda de destino.
            Clique em "Converter" para obter a cotação atual.
        </p>
    </section>

</div>

<script>
async function converterMoeda() {

    const valor = parseFloat(document.getElementById("valor").value);
    const origem = document.getElementById("origem").value;
    const destino = document.getElementById("destino").value;
    const resultado = document.getElementById("resultado");

    if (isNaN(valor) || valor <= 0) {
        resultado.textContent = "Informe um valor válido.";
        return;
    }

    if (origem === destino) {
        resultado.textContent = `${valor} ${origem}`;
        return;
    }

    resultado.textContent = "Convertendo...";

    try {

        const response = await fetch(
            `https://open.er-api.com/v6/latest/${origem}`
        );

        const data = await response.json();

        if (!data.rates || !data.rates[destino]) {
            resultado.textContent = "Cotação indisponível.";
            return;
        }

        const convertido = valor * data.rates[destino];

        resultado.innerHTML = `
            <strong>${valor} ${origem}</strong><br><br>
            = ${convertido.toFixed(2)} ${destino}<br><br>
            <small>
                1 ${origem} = ${data.rates[destino].toFixed(4)} ${destino}
            </small>
        `;

    } catch (erro) {

        resultado.textContent = "Erro ao obter a cotação.";

    }
}
</script>

</body>
</html>
