<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Conversor de Moedas Online | UtiliWeb</title>

<meta name="description" content="Converta moedas online gratuitamente. Transforme Real, Dólar, Euro, Iene e outras moedas de forma rápida com o UtiliWeb.">

<link rel="stylesheet" href="../../assets/style.css">
</head>

<body>

<header>
    <h1>Conversor de Moedas</h1>
    <p>Converta valores entre diferentes moedas</p>
</header>

<div class="container">

    <a href="../../index.html">← Voltar</a>

    <div style="margin-top:20px;">

        <label>Valor</label>
        <input
            type="number"
            id="valor"
            value="1"
            step="0.01"
            style="width:100%; margin-top:10px;">

    </div>

    <div style="margin-top:20px;">

        <label>De</label>
        <select id="origem" style="width:100%; margin-top:10px;">
            <option value="BRL">Real Brasileiro (BRL)</option>
            <option value="USD">Dólar Americano (USD)</option>
            <option value="EUR">Euro (EUR)</option>
            <option value="JPY">Iene Japonês (JPY)</option>
        </select>

    </div>

    <div style="margin-top:20px;">

        <label>Para</label>
        <select id="destino" style="width:100%; margin-top:10px;">
            <option value="USD">Dólar Americano (USD)</option>
            <option value="BRL">Real Brasileiro (BRL)</option>
            <option value="EUR">Euro (EUR)</option>
            <option value="JPY">Iene Japonês (JPY)</option>
        </select>

    </div>

    <div style="margin-top:20px;">

        <button onclick="converterMoeda()">
            Converter
        </button>

    </div>

    <div class="result" id="resultado" style="margin-top:20px;">
        -
    </div>

    <section style="margin-top:40px;">
        <h2>Como usar</h2>

        <p>
            Informe um valor, escolha a moeda de origem e a moeda de destino e clique em "Converter".
        </p>
    </section>

</div>

<script>
async function converterMoeda() {

    const valor = document.getElementById("valor").value;
    const origem = document.getElementById("origem").value;
    const destino = document.getElementById("destino").value;
    const resultado = document.getElementById("resultado");

    if (origem === destino) {
        resultado.textContent = valor;
        return;
    }

    resultado.textContent = "Convertendo...";

    try {

        const response = await fetch(
            `https://api.exchangerate.host/convert?from=${origem}&to=${destino}&amount=${valor}`
        );

        const data = await response.json();

        resultado.textContent =
            `${valor} ${origem} = ${data.result.toFixed(2)} ${destino}`;

    } catch {

        resultado.textContent =
            "Erro ao obter a cotação.";

    }

}
</script>

</body>
</html>
