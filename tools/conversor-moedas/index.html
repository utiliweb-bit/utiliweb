<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Conversor de Moedas PRO | UtiliWeb</title>

<meta name="description" content="Conversor de moedas em tempo real com histórico e cotação atualizada.">
<meta name="keywords" content="conversor de moedas, dolar, iene, euro, utiliweb">

<link rel="stylesheet" href="../../assets/style.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial;
    background: linear-gradient(135deg, #2ecc71, #27ae60);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

/* WRAPPER */
.wrapper {
    width: 100%;
    max-width: 1100px;
    min-height: 650px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
}

/* ESQUERDA */
.left-panel {
    padding: 30px;
    border-right: 1px solid #eee;
}

header h1 {
    font-size: 26px;
}

.subtitle {
    font-size: 14px;
    color: #777;
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 12px;
    border: 2px solid #ddd;
    border-radius: 8px;
    margin-top: 6px;
    font-size: 14px;
}

input:focus, select:focus {
    border-color: #27ae60;
    outline: none;
}

/* ROW */
.row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 10px;
    align-items: end;
}

.swap button {
    padding: 10px 14px;
    border-radius: 10px;
    border: 2px solid #27ae60;
    background: #fff;
    cursor: pointer;
    font-weight: bold;
}

/* BOTÕES */
.actions {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

button {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

.btn-primary {
    background: #27ae60;
    color: white;
}

.btn-secondary {
    background: white;
    border: 2px solid #27ae60;
    color: #27ae60;
}

/* RESULTADO */
.result {
    margin-top: 20px;
    font-size: 22px;
    font-weight: bold;
}

.small {
    font-size: 13px;
    color: #777;
    margin-top: 5px;
}

/* HISTÓRICO */
.history {
    margin-top: 20px;
    display: grid;
    gap: 8px;
}

.history-item {
    background: #f7f7f7;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 13px;
}

/* DIREITA */
.right-panel {
    padding: 30px;
    background: #eafaf1;
}

/* RESPONSIVO */
@media (max-width: 900px) {
    .wrapper {
        grid-template-columns: 1fr;
    }

    .left-panel {
        border-right: none;
        border-bottom: 1px solid #eee;
    }

    .row {
        grid-template-columns: 1fr;
    }

    .swap {
        display: flex;
        justify-content: center;
    }
}
</style>

</head>

<body>

<div class="wrapper">

    <!-- ESQUERDA -->
    <div class="left-panel">

        <header>
            <h1>💱 Conversor de Moedas PRO</h1>
            <p class="subtitle">Cotação em tempo real</p>
        </header>

        <br>

        <a href="../../index.html">← Voltar</a>

        <label>Valor</label>
        <input type="number" id="valor" value="1">

        <div class="row">

            <div>
                <label>De</label>
                <select id="origem">
                    <option value="BRL">BRL</option>
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                    <option value="JPY">JPY</option>
                    <option value="GBP">GBP</option>
                    <option value="CAD">CAD</option>
                    <option value="AUD">AUD</option>
                    <option value="CHF">CHF</option>
                    <option value="CNY">CNY</option>
                    <option value="KRW">KRW</option>
                </select>
            </div>

            <div class="swap">
                <button onclick="trocar()">⇅</button>
            </div>

            <div>
                <label>Para</label>
                <select id="destino">
                    <option value="USD">USD</option>
                    <option value="BRL">BRL</option>
                    <option value="EUR">EUR</option>
                    <option value="JPY">JPY</option>
                    <option value="GBP">GBP</option>
                    <option value="CAD">CAD</option>
                    <option value="AUD">AUD</option>
                    <option value="CHF">CHF</option>
                    <option value="CNY">CNY</option>
                    <option value="KRW">KRW</option>
                </select>
            </div>

        </div>

        <div class="actions">
            <button class="btn-primary" onclick="converter()">Converter</button>
            <button class="btn-secondary" onclick="copiar()">Copiar</button>
            <button class="btn-secondary" onclick="limpar()">Limpar</button>
        </div>

        <div class="result" id="resultado">Digite um valor</div>
        <div class="small" id="info"></div>

    </div>

    <!-- DIREITA -->
    <div class="right-panel">

        <h2>Histórico</h2>
        <div class="history" id="history"></div>

    </div>

</div>

<script>
let ultimoResultado = "";

async function converter() {
    const valor = parseFloat(document.getElementById("valor").value);
    const origem = document.getElementById("origem").value;
    const destino = document.getElementById("destino").value;

    const resultado = document.getElementById("resultado");
    const info = document.getElementById("info");

    if (!valor || valor <= 0) {
        resultado.textContent = "Valor inválido";
        return;
    }

    resultado.textContent = "Convertendo...";

    try {
        const res = await fetch(`https://open.er-api.com/v6/latest/${origem}`);
        const data = await res.json();

        const taxa = data.rates[destino];
        const convertido = valor * taxa;

        ultimoResultado = `${valor} ${origem} = ${convertido.toFixed(2)} ${destino}`;

        resultado.textContent = ultimoResultado;
        info.textContent = `1 ${origem} = ${taxa.toFixed(4)} ${destino}`;

        salvarHistorico(ultimoResultado);

    } catch (e) {
        resultado.textContent = "Erro na cotação";
    }
}

function trocar() {
    const o = document.getElementById("origem");
    const d = document.getElementById("destino");

    const temp = o.value;
    o.value = d.value;
    d.value = temp;
}

function copiar() {
    if (!ultimoResultado) return;
    navigator.clipboard.writeText(ultimoResultado);
}

function limpar() {
    document.getElementById("valor").value = 1;
    document.getElementById("resultado").textContent = "Digite um valor";
    document.getElementById("info").textContent = "";
}

function salvarHistorico(texto) {
    let hist = JSON.parse(localStorage.getItem("moedas-historico") || "[]");

    hist.unshift({
        texto,
        time: new Date().toLocaleString()
    });

    hist = hist.slice(0, 8);

    localStorage.setItem("moedas-historico", JSON.stringify(hist));
    renderHistorico();
}

function renderHistorico() {
    const box = document.getElementById("history");
    const hist = JSON.parse(localStorage.getItem("moedas-historico") || "[]");

    if (!hist.length) {
        box.innerHTML = "<div class='history-item'>Sem histórico</div>";
        return;
    }

    box.innerHTML = hist.map(h =>
        `<div class="history-item">${h.texto}<br><small>${h.time}</small></div>`
    ).join("");
}

window.onload = renderHistorico;
</script>

</body>
</html>
