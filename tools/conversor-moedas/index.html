<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversor de Moedas | UtiliWeb</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100vh;
    font-family: system-ui, Arial;
    background: linear-gradient(135deg, #2ecc71, #27ae60);
    display: flex;
    justify-content: center;
    align-items: center;
}

.wrapper {
    width: 100%;
    max-width: 1200px;
    height: 100%;
    max-height: 800px;
    background: white;
    border-radius: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
}

.left-panel {
    padding: 40px;
    border-right: 1px solid #ddd;
    overflow-y: auto;
}

.right-panel {
    padding: 40px;
    background: #e8f8f5;
}

h1 {
    font-size: 28px;
    margin-bottom: 20px;
}

input, select {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    margin-bottom: 16px;
}

button {
    width: 100%;
    padding: 14px;
    border: none;
    background: linear-gradient(135deg, #2ecc71, #27ae60);
    color: white;
    font-weight: bold;
    cursor: pointer;
    border-radius: 10px;
}

.result {
    font-size: 22px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="wrapper">

    <!-- ESQUERDA -->
    <div class="left-panel">

        <h1>💱 Conversor de Moedas</h1>

        <label>Valor</label>
        <input id="valor" type="number">

        <label>De</label>
        <select id="de">
            <option value="BRL">BRL</option>
            <option value="USD">USD</option>
            <option value="JPY">JPY</option>
        </select>

        <label>Para</label>
        <select id="para">
            <option value="JPY">JPY</option>
            <option value="USD">USD</option>
            <option value="BRL">BRL</option>
        </select>

        <button onclick="calcular()">Converter</button>

    </div>

    <!-- DIREITA -->
    <div class="right-panel">

        <h2>Resultado</h2>
        <div class="result" id="resultado">-</div>

    </div>

</div>

<script>
const taxas = {
    BRL: { USD: 0.20, JPY: 30 },
    USD: { BRL: 5, JPY: 150 },
    JPY: { BRL: 0.033, USD: 0.0067 }
};

function $(id){ return document.getElementById(id); }

function calcular() {
    const v = parseFloat($("valor").value);
    const de = $("de").value;
    const para = $("para").value;

    if (!v) return $("resultado").innerText = "Valor inválido";

    if (de === para) return $("resultado").innerText = v + " " + para;

    const r = v * taxas[de][para];

    $("resultado").innerText = r.toFixed(2) + " " + para;
}
</script>

</body>
</html>
