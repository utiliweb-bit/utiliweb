<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Conversor de Moedas | UtiliWeb</title>

<meta name="description" content="Converta BRL, USD e JPY rapidamente online.">
<meta name="robots" content="index, follow">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html, body {
    width: 100%;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
    background: linear-gradient(135deg, #2ecc71, #27ae60);
}

/* WRAPPER */
.wrapper {
    width: 100%;
    max-width: 1100px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
}

/* PAINÉIS */
.left, .right {
    padding: 28px;
}

/* TITULOS */
h1 {
    font-size: 22px;
    margin-bottom: 6px;
}

p {
    font-size: 12px;
    color: #777;
}

/* INPUTS */
label {
    font-size: 12px;
    font-weight: 700;
    display: block;
    margin-top: 12px;
}

input, select {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 14px;
}

input:focus, select:focus {
    outline: none;
    border-color: #27ae60;
}

/* BOTÃO */
button {
    width: 100%;
    margin-top: 16px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-weight: 800;
    cursor: pointer;
    background: #27ae60;
    color: #fff;
}

/* RESULTADO */
.result {
    font-size: 26px;
    font-weight: 800;
    color: #27ae60;
    margin-top: 10px;
}

/* RESPONSIVO */
@media (max-width: 768px) {
    .wrapper {
        grid-template-columns: 1fr;
    }

    html, body {
        padding: 12px;
    }

    .left, .right {
        padding: 18px;
    }
}
</style>

</head>

<body>

<div class="wrapper">

    <!-- INPUT -->
    <div class="left">

        <h1>💱 Conversor de Moedas</h1>
        <p>Converta BRL, USD e JPY em segundos</p>

        <label>Valor</label>
        <input id="valor" type="number" placeholder="Ex: 1000">

        <label>De</label>
        <select id="de">
            <option value="BRL">BRL</option>
            <option value="USD">USD</option>
            <option value="JPY">JPY</option>
        </select>

        <label>Para</label>
        <select id="para">
            <option value="JPY">JPY</option>
            <option value="USD">USD</option>
            <option value="BRL">BRL</option>
        </select>

        <button onclick="converter()">Converter</button>

    </div>

    <!-- RESULTADO -->
    <div class="right">

        <h2>Resultado</h2>

        <div class="result" id="resultado">-</div>

    </div>

</div>

<script>
const taxas = {
    BRL: { USD: 0.20, JPY: 30 },
    USD: { BRL: 5, JPY: 150 },
    JPY: { BRL: 0.033, USD: 0.0067 }
};

function converter() {

    const valor = parseFloat(document.getElementById("valor").value);
    const de = document.getElementById("de").value;
    const para = document.getElementById("para").value;
    const out = document.getElementById("resultado");

    if (!valor || valor <= 0) {
        out.textContent = "Valor inválido";
        return;
    }

    if (de === para) {
        out.textContent = `${valor} ${para}`;
        return;
    }

    const result = valor * taxas[de][para];

    out.textContent = `${result.toFixed(2)} ${para}`;
}
</script>

</body>
</html>
