<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Conversor de Moedas PRO | UtiliWeb</title>
<meta name="description" content="Conversor de moedas em tempo real com histórico, swap rápido e cotação atualizada.">

<link rel="stylesheet" href="../../assets/style.css">

<style>
.container {
    max-width: 900px;
}

.box {
    display: grid;
    gap: 16px;
}

.row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 12px;
    align-items: end;
}

.swap {
    display: flex;
    align-items: center;
    justify-content: center;
}

.swap button {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 10px 14px;
    cursor: pointer;
}

.swap button:hover {
    border-color: var(--primary);
}

.result-box {
    font-size: 22px;
    font-weight: 700;
}

.small {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
}

.actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.actions button {
    flex: 1;
}

.history {
    margin-top: 20px;
    display: grid;
    gap: 8px;
}

.history-item {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 10px;
    border-radius: 10px;
    font-size: 13px;
    color: var(--muted);
}

@media (max-width: 600px) {
    .row {
        grid-template-columns: 1fr;
    }

    .swap {
        order: 3;
    }
}
</style>
</head>

<body>

<header>
    <h1>💱 Conversor de Moedas PRO</h1>
    <p>Cotações em tempo real + histórico inteligente</p>
</header>

<div class="container">

    <a href="../../index.html">← Voltar</a>

    <div class="box">

        <div>
            <label>Valor</label>
            <input type="number" id="valor" value="1" min="0">
        </div>

        <div class="row">

            <div>
                <label>De</label>
                <select id="origem">
                    <option value="BRL">BRL - Real</option>
                    <option value="USD">USD - Dólar</option>
                    <option value="EUR">EUR - Euro</option>
                    <option value="JPY">JPY - Iene</option>
                    <option value="GBP">GBP - Libra</option>
                    <option value="CAD">CAD - Canadá</option>
                    <option value="AUD">AUD - Austrália</option>
                    <option value="CHF">CHF - Suíça</option>
                    <option value="CNY">CNY - Yuan</option>
                    <option value="KRW">KRW - Won</option>
                </select>
            </div>

            <div class="swap">
                <button onclick="trocar()">⇅</button>
            </div>

            <div>
                <label>Para</label>
                <select id="destino">
                    <option value="USD">USD - Dólar</option>
                    <option value="BRL">BRL - Real</option>
                    <option value="EUR">EUR - Euro</option>
                    <option value="JPY">JPY - Iene</option>
                    <option value="GBP">GBP - Libra</option>
                    <option value="CAD">CAD - Canadá</option>
                    <option value="AUD">AUD - Austrália</option>
                    <option value="CHF">CHF - Suíça</option>
                    <option value="CNY">CNY - Yuan</option>
                    <option value="KRW">KRW - Won</option>
                </select>
            </div>

        </div>

        <div class="actions">
            <button onclick="converter()">Converter</button>
            <button onclick="copiar()">Copiar</button>
            <button onclick="limpar()">Limpar</button>
        </div>

        <div id="resultado" class="result-box">Digite um valor e converta</div>
        <div id="info" class="small"></div>

        <h3 style="margin-top:20px;">Histórico</h3>
        <div id="history" class="history"></div>

    </div>
</div>

<script>
let ultimoResultado = "";

async function converter() {
    const valor = parseFloat(document.getElementById("valor").value);
    const origem = document.getElementById("origem").value;
    const destino = document.getElementById("destino").value;

    const resultado = document.getElementById("resultado");
    const info = document.getElementById("info");

    if (!valor || valor <= 0) {
        resultado.textContent = "Valor inválido.";
        return;
    }

    resultado.textContent = "Convertendo...";
    info.textContent = "";

    try {
        const res = await fetch(`https://open.er-api.com/v6/latest/${origem}`);
        const data = await res.json();

        const taxa = data.rates[destino];
        if (!taxa) {
            resultado.textContent = "Cotação indisponível.";
            return;
        }

        const convertido = valor * taxa;

        ultimoResultado = `${valor} ${origem} = ${convertido.toFixed(2)} ${destino}`;

        resultado.textContent = ultimoResultado;
        info.textContent = `1 ${origem} = ${taxa.toFixed(4)} ${destino}`;

        salvarHistorico(ultimoResultado);

    } catch (e) {
        resultado.textContent = "Erro ao buscar cotação.";
    }
}

function trocar() {
    const origem = document.getElementById("origem");
    const destino = document.getElementById("destino");

    const temp = origem.value;
    origem.value = destino.value;
    destino.value = temp;
}

function copiar() {
    if (!ultimoResultado) return;

    navigator.clipboard.writeText(ultimoResultado);
}

function limpar() {
    document.getElementById("valor").value = 1;
    document.getElementById("resultado").textContent = "Digite um valor e converta";
    document.getElementById("info").textContent = "";
    ultimoResultado = "";
}

function salvarHistorico(texto) {
    let hist = JSON.parse(localStorage.getItem("moedas-historico") || "[]");

    hist.unshift({
        texto,
        time: new Date().toLocaleString()
    });

    hist = hist.slice(0, 8);

    localStorage.setItem("moedas-historico", JSON.stringify(hist));
    renderHistorico();
}

function renderHistorico() {
    const box = document.getElementById("history");
    const hist = JSON.parse(localStorage.getItem("moedas-historico") || "[]");

    if (!hist.length) {
        box.innerHTML = "<div class='history-item'>Sem histórico</div>";
        return;
    }

    box.innerHTML = hist.map(h =>
        `<div class="history-item">${h.texto}<br><small>${h.time}</small></div>`
    ).join("");
}

window.onload = renderHistorico;
</script>

</body>
</html>
