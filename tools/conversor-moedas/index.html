<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FinTrack | Conversor de Moedas Global</title>
    <meta name="description" content="Conversor de moedas profissional com taxas em tempo real.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #0066FF;
            --brand-light: #E6F0FF;
            --bg: #F8FAFC;
            --surface: #FFFFFF;
            --text-main: #0F172A;
            --text-muted: #64748B;
            --border: #E2E8F0;
            --success: #10B981;
            --radius-xl: 24px;
            --radius-lg: 16px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .dashboard {
            width: 100%;
            max-width: 1100px;
            background: var(--surface);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            display: grid;
            grid-template-columns: 1fr 400px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        /* PAINEL ESQUERDO (CONTROLES) */
        .controls {
            padding: 48px;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .header {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 24px;
            color: var(--brand);
            margin-bottom: 8px;
        }

        .brand-logo span {
            background: var(--brand);
            color: white;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 18px;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 16px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .field-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            justify-content: space-between;
        }

        .field-label span {
            color: var(--brand);
            cursor: pointer;
        }

        .amount-input-wrapper {
            position: relative;
        }

        .amount-input-wrapper input {
            width: 100%;
            padding: 16px 20px;
            font-size: 24px;
            font-weight: 700;
            border: 2px solid var(--border);
            border-radius: var(--radius-lg);
            font-family: 'Outfit', sans-serif;
            transition: all 0.2s;
            background: #F1F5F9;
        }

        .amount-input-wrapper input:focus {
            outline: none;
            border-color: var(--brand);
            background: white;
            box-shadow: 0 0 0 4px rgba(0, 102, 255, 0.1);
        }

        .converter-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 16px;
        }

        .currency-selector {
            position: relative;
        }

        .currency-trigger {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: white;
            border: 2px solid var(--border);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .currency-trigger:hover {
            border-color: var(--brand);
        }

        .currency-trigger .flag {
            font-size: 24px;
            line-height: 1;
        }

        .currency-trigger .code {
            font-weight: 700;
            font-size: 16px;
            flex: 1;
        }

        .currency-trigger .chevron {
            color: var(--text-muted);
            font-size: 12px;
        }

        .swap-button {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--brand);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: var(--shadow-md);
            z-index: 2;
        }

        .swap-button:hover {
            transform: scale(1.1) rotate(180deg);
        }

        .quick-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chip {
            padding: 8px 14px;
            border-radius: 100px;
            background: white;
            border: 1px solid var(--border);
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .chip:hover {
            border-color: var(--brand);
            color: var(--brand);
            background: var(--brand-light);
        }

        /* PAINEL DIREITO (RESULTADO) */
        .summary {
            background: #0F172A;
            color: white;
            padding: 48px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .summary::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 102, 255, 0.15) 0%, transparent 70%);
            pointer-events: none;
        }

        .summary-label {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--brand);
            margin-bottom: 16px;
        }

        .result-main {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 40px;
        }

        .result-from {
            font-size: 18px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .result-to {
            font-family: 'Outfit', sans-serif;
            font-size: 48px;
            font-weight: 800;
            line-height: 1.1;
            word-break: break-all;
        }

        .rate-info-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-lg);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .rate-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        .rate-row span:first-child {
            color: var(--text-muted);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #94A3B8;
            margin-top: auto;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
        }

        .dot.loading { background: #F59E0B; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* DROPDOWN CUSTOMIZADO */
        .dropdown {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            z-index: 100;
            display: none;
            flex-direction: column;
            overflow: hidden;
            max-height: 400px;
        }

        .dropdown.active { display: flex; }

        .search-box {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-size: 14px;
        }

        .options-list {
            overflow-y: auto;
            padding: 8px;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .option-item:hover { background: var(--bg); }

        .option-item .code { font-weight: 700; width: 45px; }
        .option-item .name { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        @media (max-width: 950px) {
            .dashboard { grid-template-columns: 1fr; }
            .summary { padding: 40px; }
            .controls { padding: 32px; }
        }

        @media (max-width: 600px) {
            .converter-row { grid-template-columns: 1fr; }
            .swap-button { justify-self: center; transform: rotate(90deg); }
            .swap-button:hover { transform: scale(1.1) rotate(270deg); }
            h1 { font-size: 26px; }
            .result-to { font-size: 36px; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="controls">
        <div class="header">
            <div class="brand-logo"><span>⇄</span> FinTrack</div>
            <h1>Conversor de Moedas</h1>
            <p class="subtitle">Taxas de câmbio globais atualizadas em tempo real.</p>
        </div>

        <div class="input-group">
            <div class="field-label">
                <label for="valor">VALOR PARA CONVERTER</label>
                <span onclick="document.getElementById('valor').value=''; converter()">Limpar</span>
            </div>
            <div class="amount-input-wrapper">
                <input id="valor" type="number" inputmode="decimal" placeholder="0.00" oninput="converter()">
            </div>
        </div>

        <div class="input-group">
            <label class="field-label">SELECIONE AS MOEDAS</label>
            <div class="converter-row">
                <div class="currency-selector">
                    <button class="currency-trigger" id="triggerDe" onclick="toggleDropdown('De')">
                        <span class="flag" id="flagDe">🇧🇷</span>
                        <span class="code" id="codeDe">BRL</span>
                        <span class="chevron">▼</span>
                    </button>
                    <div class="dropdown" id="dropdownDe">
                        <div class="search-box"><input type="text" placeholder="Buscar moeda..." id="searchDe" oninput="filterList('De')"></div>
                        <div class="options-list" id="listDe"></div>
                    </div>
                </div>

                <button class="swap-button" onclick="swapCurrencies()" title="Inverter">⇄</button>

                <div class="currency-selector">
                    <button class="currency-trigger" id="triggerPara" onclick="toggleDropdown('Para')">
                        <span class="flag" id="flagPara">🇺🇸</span>
                        <span class="code" id="codePara">USD</span>
                        <span class="chevron">▼</span>
                    </button>
                    <div class="dropdown" id="dropdownPara">
                        <div class="search-box"><input type="text" placeholder="Buscar moeda..." id="searchPara" oninput="filterList('Para')"></div>
                        <div class="options-list" id="listPara"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="input-group">
            <label class="field-label">MOEDAS POPULARES</label>
            <div class="quick-chips" id="chips"></div>
        </div>
    </div>

    <div class="summary">
        <div class="summary-label">Resultado da Conversão</div>
        
        <div class="result-main">
            <div class="result-from" id="resFrom">1,00 BRL =</div>
            <div class="result-to" id="resTo">0,18 USD</div>
        </div>

        <div class="rate-info-box">
            <div class="rate-row">
                <span>Taxa de Câmbio</span>
                <span id="rateValue">1 BRL = 0.1824 USD</span>
            </div>
            <div class="rate-row">
                <span>Inverso</span>
                <span id="rateInverse">1 USD = 5.4821 BRL</span>
            </div>
        </div>

        <div class="status-badge">
            <div class="dot" id="statusDot"></div>
            <span id="statusText">Buscando cotações...</span>
        </div>
    </div>
</div>

<script>
    const CATALOGO = {
        AED: ["Dirham dos Emirados Árabes", "🇦🇪"], ARS: ["Peso argentino", "🇦🇷"], AUD: ["Dólar australiano", "🇦🇺"],
        BRL: ["Real brasileiro", "🇧🇷"], CAD: ["Dólar canadense", "🇨🇦"], CHF: ["Franco suíço", "🇨🇭"],
        CLP: ["Peso chileno", "🇨🇱"], CNY: ["Yuan chinês", "🇨🇳"], COP: ["Peso colombiano", "🇨🇴"],
        CZK: ["Coroa tcheca", "🇨🇿"], DKK: ["Coroa dinamarquesa", "🇩🇰"], EGP: ["Libra egípcia", "🇪🇬"],
        EUR: ["Euro", "🇪🇺"], GBP: ["Libra esterlina", "🇬🇧"], HKD: ["Dólar de Hong Kong", "🇭🇰"],
        HUF: ["Florim húngaro", "🇭🇺"], IDR: ["Rupia indonésia", "🇮🇩"], ILS: ["Novo shekel israelense", "🇮🇱"],
        INR: ["Rupia indiana", "🇮🇳"], JPY: ["Iene japonês", "🇯🇵"], KRW: ["Won sul-coreano", "🇰🇷"],
        MXN: ["Peso mexicano", "🇲🇽"], MYR: ["Ringgit malaio", "🇲🇾"], NOK: ["Coroa norueguesa", "🇳🇴"],
        NZD: ["Dólar neozelandês", "🇳🇿"], PHP: ["Peso filipino", "🇵🇭"], PLN: ["Zloty polonês", "🇵🇱"],
        RON: ["Leu romeno", "🇷🇴"], RUB: ["Rublo russo", "🇷🇺"], SAR: ["Rial saudita", "🇸🇦"],
        SEK: ["Coroa sueca", "🇸🇪"], SGD: ["Dólar de Singapura", "🇸🇬"], THB: ["Baht tailandês", "🇹🇭"],
        TRY: ["Lira turca", "🇹🇷"], TWD: ["Novo dólar taiwanês", "🇹🇼"], USD: ["Dólar americano", "🇺🇸"],
        UYU: ["Peso uruguaio", "🇺🇾"], ZAR: ["Rand sul-africano", "🇿🇦"]
    };

    const DESTAQUES = ["BRL", "USD", "EUR", "GBP", "JPY", "ARS", "CAD", "CNY"];
    let taxas = {};
    let moedaDe = "BRL";
    let moedaPara = "USD";

    async function fetchRates() {
        const dot = document.getElementById('statusDot');
        const text = document.getElementById('statusText');
        dot.className = 'dot loading';
        text.textContent = 'Atualizando taxas...';

        try {
            const res = await fetch('https://open.er-api.com/v6/latest/USD');
            const data = await res.json();
            taxas = data.rates;
            dot.className = 'dot';
            text.textContent = 'Taxas atualizadas em tempo real';
            renderChips();
            renderList('De');
            renderList('Para');
            converter();
        } catch (e) {
            text.textContent = 'Erro ao carregar taxas. Usando offline.';
            dot.className = 'dot';
        }
    }

    function renderChips() {
        const container = document.getElementById('chips');
        container.innerHTML = DESTAQUES.map(c => `
            <div class="chip" onclick="selectPara('${c}')">${CATALOGO[c][1]} ${c}</div>
        `).join('');
    }

    function renderList(lado) {
        const container = document.getElementById('list' + lado);
        const search = document.getElementById('search' + lado).value.toLowerCase();
        
        const html = Object.keys(CATALOGO)
            .filter(c => c.toLowerCase().includes(search) || CATALOGO[c][0].toLowerCase().includes(search))
            .map(c => `
                <div class="option-item" onclick="selectCurrency('${lado}', '${c}')">
                    <span class="flag">${CATALOGO[c][1]}</span>
                    <span class="code">${c}</span>
                    <span class="name">${CATALOGO[c][0]}</span>
                </div>
            `).join('');
        container.innerHTML = html;
    }

    function toggleDropdown(lado) {
        const d = document.getElementById('dropdown' + lado);
        const isOpen = d.classList.contains('active');
        document.querySelectorAll('.dropdown').forEach(el => el.classList.remove('active'));
        if (!isOpen) {
            d.classList.add('active');
            document.getElementById('search' + lado).focus();
        }
    }

    function selectCurrency(lado, code) {
        if (lado === 'De') moedaDe = code;
        else moedaPara = code;
        
        document.getElementById('flag' + lado).textContent = CATALOGO[code][1];
        document.getElementById('code' + lado).textContent = code;
        document.querySelectorAll('.dropdown').forEach(el => el.classList.remove('active'));
        converter();
    }

    function selectPara(code) {
        moedaPara = code;
        if (moedaDe === moedaPara) moedaDe = code === 'USD' ? 'BRL' : 'USD';
        selectCurrency('De', moedaDe);
        selectCurrency('Para', moedaPara);
    }

    function swapCurrencies() {
        const temp = moedaDe;
        moedaDe = moedaPara;
        moedaPara = temp;
        selectCurrency('De', moedaDe);
        selectCurrency('Para', moedaPara);
    }

    function filterList(lado) { renderList(lado); }

    function converter() {
        const valor = parseFloat(document.getElementById('valor').value) || 1;
        if (!taxas[moedaDe] || !taxas[moedaPara]) return;

        const baseUSD = valor / taxas[moedaDe];
        const resultado = baseUSD * taxas[moedaPara];
        
        const taxaDireta = taxas[moedaPara] / taxas[moedaDe];
        const taxaInversa = taxas[moedaDe] / taxas[moedaPara];

        document.getElementById('resFrom').textContent = `${valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})} ${moedaDe} =`;
        document.getElementById('resTo').textContent = `${resultado.toLocaleString('pt-BR', {minimumFractionDigits: 2})} ${moedaPara}`;
        
        document.getElementById('rateValue').textContent = `1 ${moedaDe} = ${taxaDireta.toFixed(4)} ${moedaPara}`;
        document.getElementById('rateInverse').textContent = `1 ${moedaPara} = ${taxaInversa.toFixed(4)} ${moedaDe}`;
    }

    // Fechar dropdown ao clicar fora
    window.onclick = function(event) {
        if (!event.target.closest('.currency-selector')) {
            document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('active'));
        }
    };

    fetchRates();
</script>

</body>
</html>
