<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de Juros Compostos | UtiliWeb</title>

<meta name="description" content="Calcule juros compostos online gratuitamente. Veja crescimento do investimento com aportes mensais.">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="../../assets/style.css">

<style>
.container {
    max-width: 900px;
}

.box {
    display: grid;
    gap: 14px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid var(--border, #ddd);
    font-size: 14px;
}

label {
    font-size: 13px;
    font-weight: 600;
    margin-top: 10px;
    display: block;
}

.result {
    margin-top: 10px;
    padding: 14px;
    border-radius: 10px;
    background: rgba(0,0,0,0.03);
    line-height: 1.7;
    font-size: 14px;
}

button {
    margin-top: 10px;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #111;
    color: #fff;
    font-weight: 600;
    cursor: pointer;
}
</style>

</head>

<body>

<header>
    <h1>📈 Juros Compostos</h1>
    <p>Simule o crescimento do seu investimento</p>
</header>

<div class="container">

    <a href="../../index.html">← Voltar</a>

    <div class="box">

        <label>Valor inicial (R$)</label>
        <input id="capital" type="number" min="0" step="0.01">

        <label>Aporte mensal (R$)</label>
        <input id="aporte" type="number" min="0" step="0.01" value="0">

        <label>Taxa de juros mensal (%)</label>
        <input id="taxa" type="number" min="0" step="0.01">

        <label>Período (meses)</label>
        <input id="meses" type="number" min="1">

        <button onclick="calcular()">Calcular</button>

        <div class="result" id="resultado">Preencha os dados e clique em calcular</div>

    </div>

</div>

<script>
function calcular() {

    const capital = parseFloat(document.getElementById("capital").value) || 0;
    const aporte = parseFloat(document.getElementById("aporte").value) || 0;
    const taxa = (parseFloat(document.getElementById("taxa").value) || 0) / 100;
    const meses = parseInt(document.getElementById("meses").value);

    const resultado = document.getElementById("resultado");

    if (!meses || meses <= 0) {
        resultado.textContent = "Informe um período válido.";
        return;
    }

    let saldo = capital;

    for (let i = 0; i < meses; i++) {
        saldo = saldo * (1 + taxa);
        saldo += aporte;
    }

    const investido = capital + (aporte * meses);
    const juros = saldo - investido;

    resultado.innerHTML = `
        <strong>Total investido:</strong> R$ ${investido.toLocaleString("pt-BR",{minimumFractionDigits:2})}<br>
        <strong>Juros obtidos:</strong> R$ ${juros.toLocaleString("pt-BR",{minimumFractionDigits:2})}<br>
        <strong>Valor final:</strong> R$ ${saldo.toLocaleString("pt-BR",{minimumFractionDigits:2})}
    `;
}
</script>

</body>
</html>
