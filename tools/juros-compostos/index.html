<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de Juros Compostos Online | UtiliWeb</title>

<meta name="description" content="Calcule juros compostos online gratuitamente. Descubra o valor final do investimento com aportes e rendimento mensal.">

<meta name="robots" content="index, follow">

<link rel="stylesheet" href="../../assets/style.css">
</head>

<body>

<header>
    <h1>Calculadora de Juros Compostos</h1>
    <p>Simule investimentos e descubra o crescimento do seu dinheiro</p>
</header>

<div class="container">

    <a href="../../index.html">← Voltar</a>

    <div style="margin-top:20px;">

        <label>Valor Inicial (R$)</label>
        <input id="capital" type="number" min="0" step="0.01">

        <label style="display:block; margin-top:15px;">
            Aporte Mensal (R$)
        </label>
        <input id="aporte" type="number" min="0" step="0.01" value="0">

        <label style="display:block; margin-top:15px;">
            Taxa de Juros ao Mês (%)
        </label>
        <input id="taxa" type="number" min="0" step="0.01">

        <label style="display:block; margin-top:15px;">
            Período (meses)
        </label>
        <input id="meses" type="number" min="1">

        <button style="margin-top:20px;" onclick="calcular()">
            Calcular
        </button>

    </div>

    <div class="result" id="resultado" style="margin-top:20px;">
        -
    </div>

    <section style="margin-top:40px;">
        <h2>Como usar</h2>

        <p>
            Informe o valor inicial, o aporte mensal, a taxa de juros e o período desejado.
            A calculadora mostrará o valor acumulado e os juros obtidos.
        </p>

    </section>

</div>

<script>
function calcular() {

    const capital = parseFloat(document.getElementById("capital").value) || 0;
    const aporte = parseFloat(document.getElementById("aporte").value) || 0;
    const taxa = (parseFloat(document.getElementById("taxa").value) || 0) / 100;
    const meses = parseInt(document.getElementById("meses").value);

    const resultado = document.getElementById("resultado");

    if (!meses || meses <= 0) {
        resultado.textContent = "Informe um período válido.";
        return;
    }

    let saldo = capital;

    for (let i = 0; i < meses; i++) {
        saldo = saldo * (1 + taxa);
        saldo += aporte;
    }

    const investido = capital + (aporte * meses);
    const juros = saldo - investido;

    resultado.innerHTML = `
        <strong>Total Investido:</strong>
        R$ ${investido.toLocaleString("pt-BR", {minimumFractionDigits:2})}
        <br><br>

        <strong>Juros Obtidos:</strong>
        R$ ${juros.toLocaleString("pt-BR", {minimumFractionDigits:2})}
        <br><br>

        <strong>Valor Final:</strong>
        R$ ${saldo.toLocaleString("pt-BR", {minimumFractionDigits:2})}
    `;
}
</script>

</body>
</html>
