<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Juros Compostos | UtiliWeb</title>

<meta name="description" content="Simule juros compostos com aportes mensais e veja o crescimento do seu investimento.">
<meta name="robots" content="index, follow">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html, body {
    width: 100%;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
    background: linear-gradient(135deg, #2ecc71, #27ae60);
}

/* CONTAINER */
.wrapper {
    width: 100%;
    max-width: 1100px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
}

/* PAINÉIS */
.left, .right {
    padding: 28px;
}

/* TITULOS */
h1 {
    font-size: 22px;
    margin-bottom: 6px;
}

p {
    font-size: 12px;
    color: #777;
}

/* INPUTS */
label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    margin-top: 12px;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 14px;
}

input:focus {
    outline: none;
    border-color: #27ae60;
}

/* BOTÃO */
button {
    width: 100%;
    margin-top: 16px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-weight: 800;
    cursor: pointer;
    background: #27ae60;
    color: #fff;
}

/* RESULTADO */
.result {
    margin-top: 10px;
    padding: 14px;
    border-radius: 10px;
    background: #f4f4f4;
    font-size: 14px;
    line-height: 1.6;
}

/* RESPONSIVO */
@media (max-width: 768px) {
    .wrapper {
        grid-template-columns: 1fr;
    }

    html, body {
        padding: 12px;
    }

    .left, .right {
        padding: 18px;
    }
}
</style>

</head>

<body>

<div class="wrapper">

    <!-- INPUT -->
    <div class="left">

        <h1>📈 Juros Compostos</h1>
        <p>Simule o crescimento do seu investimento</p>

        <label>Capital inicial (R$)</label>
        <input id="capital" type="number" min="0">

        <label>Aporte mensal (R$)</label>
        <input id="aporte" type="number" min="0" value="0">

        <label>Taxa de juros mensal (%)</label>
        <input id="taxa" type="number" min="0" step="0.01">

        <label>Período (meses)</label>
        <input id="meses" type="number" min="1">

        <button onclick="calcular()">Calcular</button>

    </div>

    <!-- RESULTADO -->
    <div class="right">

        <h2>Resultado</h2>

        <div id="resultado" class="result">
            Preencha os dados e clique em calcular
        </div>

    </div>

</div>

<script>
function calcular() {

    const capital = parseFloat(document.getElementById("capital").value) || 0;
    const aporte = parseFloat(document.getElementById("aporte").value) || 0;
    const taxa = (parseFloat(document.getElementById("taxa").value) || 0) / 100;
    const meses = parseInt(document.getElementById("meses").value);

    const out = document.getElementById("resultado");

    if (!meses || meses <= 0) {
        out.textContent = "Informe um período válido.";
        return;
    }

    let saldo = capital;

    for (let i = 0; i < meses; i++) {
        saldo = saldo * (1 + taxa);
        saldo += aporte;
    }

    const investido = capital + (aporte * meses);
    const juros = saldo - investido;

    out.innerHTML = `
        <strong>Total investido:</strong> R$ ${investido.toLocaleString("pt-BR",{minimumFractionDigits:2})}<br>
        <strong>Juros ganhos:</strong> R$ ${juros.toLocaleString("pt-BR",{minimumFractionDigits:2})}<br>
        <strong>Valor final:</strong> R$ ${saldo.toLocaleString("pt-BR",{minimumFractionDigits:2})}
    `;
}
</script>

</body>
</html>
