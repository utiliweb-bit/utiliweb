<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Simulador de Juros Compostos | UtiliWeb</title>
<meta name="description" content="Simule juros compostos com aportes mensais, visualize gráficos interativos e exporte sua evolução financeira.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
/* ─── RESET & BASE ─────────────────────────────────────────────────────────── */
*, *::before, *::after {
  margin: 0; padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --brand:        #10b981;
  --brand-dark:   #059669;
  --brand-light:  #d1fae5;
  --brand-xlight: #ecfdf5;
  --accent:       #6366f1;
  --text-primary: #0f172a;
  --text-secondary:#475569;
  --text-muted:   #94a3b8;
  --border:       #e2e8f0;
  --surface:      #ffffff;
  --surface-alt:  #f8fafc;
  --shadow-sm:    0 1px 3px rgba(0,0,0,.08);
  --shadow-md:    0 4px 16px rgba(0,0,0,.08);
  --shadow-lg:    0 20px 60px rgba(0,0,0,.14);
  --radius-sm:    8px;
  --radius-md:    12px;
  --radius-lg:    20px;
  --transition:   .18s ease;
}

html, body {
  width: 100%; min-height: 100vh;
  font-family: 'Inter', -apple-system, sans-serif;
  background: linear-gradient(135deg, #064e3b 0%, #065f46 40%, #047857 100%);
  display: flex; justify-content: center; align-items: flex-start;
  padding: 24px 16px;
  color: var(--text-primary);
  line-height: 1.5;
}

/* ─── WRAPPER ──────────────────────────────────────────────────────────────── */
.wrapper {
  width: 100%; max-width: 1160px;
  background: var(--surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  display: grid;
  grid-template-columns: 380px 1fr;
  overflow: hidden;
}

/* ─── PANELS ───────────────────────────────────────────────────────────────── */
.panel-left {
  padding: 36px 32px;
  border-right: 1px solid var(--border);
  overflow-y: auto;
}

.panel-right {
  padding: 36px 40px;
  background: var(--surface-alt);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 32px;
}

/* ─── COMPONENTS ───────────────────────────────────────────────────────────── */
.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 600;
  color: var(--brand-dark); text-decoration: none;
  margin-bottom: 24px;
}

.page-header h1 {
  font-size: 26px; font-weight: 800;
  letter-spacing: -0.5px; margin-bottom: 6px;
}

.page-header p {
  font-size: 14px; color: var(--text-secondary);
  margin-bottom: 28px;
}

/* ─── FORM ─────────────────────────────────────────────────────────────────── */
.form-group { margin-bottom: 20px; }

.form-group label {
  display: block; font-size: 12px; font-weight: 700;
  color: var(--text-secondary); text-transform: uppercase;
  letter-spacing: 0.05em; margin-bottom: 8px;
}

.input-with-icon {
  position: relative;
  display: flex; align-items: center;
}

.input-icon {
  position: absolute; left: 14px;
  font-size: 14px; font-weight: 600; color: var(--text-muted);
}

input {
  width: 100%; padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 15px; font-family: inherit;
  transition: all var(--transition);
}

.has-icon input { padding-left: 40px; }

input:focus {
  outline: none; border-color: var(--brand);
  box-shadow: 0 0 0 4px var(--brand-xlight);
}

.grid-2 {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
}

select {
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  font-size: 14px; font-weight: 600;
  cursor: pointer;
}

.btn-calc {
  width: 100%; margin-top: 12px;
  padding: 14px; border: none;
  border-radius: var(--radius-md);
  background: var(--brand); color: #fff;
  font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all var(--transition);
  box-shadow: 0 4px 12px rgba(16,185,129,0.2);
}

.btn-calc:hover {
  background: var(--brand-dark);
  transform: translateY(-1px);
  box-shadow: 0 6px 16px rgba(16,185,129,0.3);
}

/* ─── RESULTS DASHBOARD ────────────────────────────────────────────────────── */
.dashboard {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
}

.dash-card {
  background: var(--surface);
  padding: 20px; border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
  text-align: center;
}

.dash-card.highlight {
  background: var(--brand-xlight);
  border-color: var(--brand-light);
}

.dash-label {
  font-size: 11px; font-weight: 700;
  color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 0.05em; margin-bottom: 6px;
}

.dash-value {
  font-size: 18px; font-weight: 800;
  color: var(--text-primary);
}

.dash-card.highlight .dash-value { color: var(--brand-dark); }

/* ─── CHART SECTION ────────────────────────────────────────────────────────── */
.chart-section {
  background: var(--surface);
  padding: 24px; border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}

.section-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px;
}

.section-title {
  font-size: 16px; font-weight: 700; color: var(--text-primary);
}

.chart-container {
  height: 320px; position: relative;
}

.chart-placeholder {
  height: 100%; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--text-muted); gap: 12px;
}

/* ─── TABLE SECTION ────────────────────────────────────────────────────────── */
.table-section {
  background: var(--surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  overflow: hidden;
}

.table-controls {
  padding: 16px 24px;
  background: var(--surface-alt);
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}

.btn-export {
  padding: 8px 16px; font-size: 12px; font-weight: 700;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 6px; cursor: pointer; transition: all var(--transition);
}
.btn-export:hover { border-color: var(--brand); color: var(--brand); }

.table-scroll {
  max-height: 400px; overflow-y: auto;
}

table {
  width: 100%; border-collapse: collapse; font-size: 13px;
}

th {
  position: sticky; top: 0; background: var(--surface-alt);
  padding: 12px 20px; text-align: right;
  font-weight: 700; color: var(--text-secondary);
  border-bottom: 2px solid var(--border);
}

td {
  padding: 12px 20px; text-align: right;
  border-bottom: 1px solid var(--surface-alt);
  color: var(--text-secondary);
}

tr:hover td { background: var(--brand-xlight); }

th:first-child, td:first-child { text-align: left; }

.text-success { color: var(--brand-dark); font-weight: 600; }

/* ─── RESPONSIVE ───────────────────────────────────────────────────────────── */
@media (max-width: 960px) {
  .wrapper { grid-template-columns: 1fr; border-radius: var(--radius-md); }
  .panel-left { border-right: none; border-bottom: 1px solid var(--border); }
}

@media (max-width: 520px) {
  html, body { padding: 0; }
  .wrapper { border-radius: 0; border: none; }
  .panel-left, .panel-right { padding: 24px 16px; }
  .dashboard { grid-template-columns: 1fr; }
  .chart-container { height: 260px; }
  .page-header h1 { font-size: 24px; }
}
</style>
</head>

<body>

<div class="wrapper">
  
  <!-- LEFT: INPUTS -->
  <aside class="panel-left">
    <a href="../../index.html" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Voltar
    </a>

    <header class="page-header">
      <h1>Simulador</h1>
      <p>Projete seu futuro financeiro com o poder dos juros compostos.</p>
    </header>

    <div class="form-group">
      <label for="capital">Capital Inicial</label>
      <div class="input-with-icon has-icon">
        <span class="input-icon">R$</span>
        <input type="number" id="capital" placeholder="0,00" step="0.01">
      </div>
    </div>

    <div class="form-group">
      <label for="aporte">Aporte Mensal</label>
      <div class="input-with-icon has-icon">
        <span class="input-icon">R$</span>
        <input type="number" id="aporte" placeholder="0,00" step="0.01">
      </div>
    </div>

    <div class="form-group">
      <label for="taxa">Taxa de Juros</label>
      <div class="grid-2">
        <input type="number" id="taxa" placeholder="0.00" step="0.01">
        <select id="tipoTaxa">
          <option value="mensal">% ao mês</option>
          <option value="anual">% ao ano</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label for="periodo">Período</label>
      <div class="grid-2">
        <input type="number" id="periodo" placeholder="0">
        <select id="unidadePeriodo">
          <option value="meses">Meses</option>
          <option value="anos">Anos</option>
        </select>
      </div>
    </div>

    <button class="btn-calc" id="btnCalcular">Calcular Evolução</button>
  </aside>

  <!-- RIGHT: RESULTS -->
  <main class="panel-right">
    
    <!-- DASHBOARD -->
    <section class="dashboard">
      <div class="dash-card">
        <div class="dash-label">Total Investido</div>
        <div class="dash-value" id="resInvestido">R$ 0,00</div>
      </div>
      <div class="dash-card">
        <div class="dash-label">Total em Juros</div>
        <div class="dash-value text-success" id="resJuros">R$ 0,00</div>
      </div>
      <div class="dash-card highlight">
        <div class="dash-label">Montante Final</div>
        <div class="dash-value" id="resFinal">R$ 0,00</div>
      </div>
    </section>

    <!-- CHART -->
    <section class="chart-section">
      <div class="section-header">
        <h2 class="section-title">Evolução Patrimonial</h2>
      </div>
      <div class="chart-container">
        <div id="chartPlaceholder" class="chart-placeholder">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
          <p>Insira os dados e calcule para ver o gráfico</p>
        </div>
        <canvas id="mainChart" style="display:none"></canvas>
      </div>
    </section>

    <!-- TABLE -->
    <section class="table-section" id="tableSection" style="display:none">
      <div class="table-controls">
        <h2 class="section-title">Detalhamento Mensal</h2>
        <button class="btn-export" id="btnExport">Exportar CSV</button>
      </div>
      <div class="table-scroll">
        <table id="dataTable">
          <thead>
            <tr>
              <th>Mês</th>
              <th>Aporte</th>
              <th>Juros</th>
              <th>Total Juros</th>
              <th>Saldo Final</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>

  </main>

</div>

<div class="toast-wrap">
  <div class="toast" id="toast"></div>
</div>

<script>
/* ─── HELPERS ───────────────────────────────────────────────────────────── */
const fmt = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast visible";
  setTimeout(() => t.className = "toast", 2500);
}

/* ─── CORE ──────────────────────────────────────────────────────────────── */
let myChart = null;
let currentData = [];

function calculate() {
  const capital = parseFloat(document.getElementById("capital").value) || 0;
  const aporte = parseFloat(document.getElementById("aporte").value) || 0;
  const taxaRaw = parseFloat(document.getElementById("taxa").value) || 0;
  const tipoTaxa = document.getElementById("tipoTaxa").value;
  const periodoRaw = parseInt(document.getElementById("periodo").value) || 0;
  const unidade = document.getElementById("unidadePeriodo").value;

  if (periodoRaw <= 0 || (capital === 0 && aporte === 0)) {
    showToast("Preencha os valores corretamente!");
    return;
  }

  // Converter taxa para mensal
  let taxaMensal = taxaRaw / 100;
  if (tipoTaxa === "anual") {
    taxaMensal = Math.pow(1 + taxaMensal, 1/12) - 1;
  }

  // Converter período para meses
  const totalMeses = unidade === "anos" ? periodoRaw * 12 : periodoRaw;

  if (totalMeses > 600) {
    showToast("Limite de 50 anos (600 meses) para simulação.");
    return;
  }

  const data = [];
  let saldo = capital;
  let totalInvestido = capital;
  let totalJuros = 0;

  data.push({
    mes: 0,
    aporte: 0,
    juros: 0,
    totalJuros: 0,
    saldo: capital,
    investido: capital
  });

  for (let i = 1; i <= totalMeses; i++) {
    const jurosMes = saldo * taxaMensal;
    saldo = saldo + jurosMes + aporte;
    totalInvestido += aporte;
    totalJuros += jurosMes;

    data.push({
      mes: i,
      aporte: i === 0 ? 0 : aporte,
      juros: jurosMes,
      totalJuros: totalJuros,
      saldo: saldo,
      investido: totalInvestido
    });
  }

  currentData = data;
  updateUI(data);
}

function updateUI(data) {
  const final = data[data.length - 1];
  
  document.getElementById("resInvestido").textContent = fmt.format(final.investido);
  document.getElementById("resJuros").textContent = fmt.format(final.totalJuros);
  document.getElementById("resFinal").textContent = fmt.format(final.saldo);

  updateChart(data);
  updateTable(data);
  
  document.getElementById("tableSection").style.display = "block";
}

function updateChart(data) {
  const ctx = document.getElementById('mainChart');
  const placeholder = document.getElementById('chartPlaceholder');
  
  ctx.style.display = "block";
  placeholder.style.display = "none";

  const labels = data.map(d => d.mes);
  const investido = data.map(d => d.investido);
  const saldo = data.map(d => d.saldo);

  if (myChart) myChart.destroy();

  myChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'Total Investido',
          data: investido,
          borderColor: '#94a3b8',
          backgroundColor: 'transparent',
          borderWidth: 2,
          pointRadius: 0,
          borderDash: [5, 5]
        },
        {
          label: 'Patrimônio Total',
          data: saldo,
          borderColor: '#10b981',
          backgroundColor: 'rgba(16, 185, 129, 0.1)',
          borderWidth: 3,
          fill: true,
          pointRadius: 0,
          tension: 0.3
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom' },
        tooltip: {
          mode: 'index',
          intersect: false,
          callbacks: {
            label: (context) => `${context.dataset.label}: ${fmt.format(context.raw)}`
          }
        }
      },
      scales: {
        y: {
          ticks: { callback: (value) => fmt.format(value).split(',')[0] }
        },
        x: {
          grid: { display: false },
          ticks: { maxTicksLimit: 12 }
        }
      }
    }
  });
}

function updateTable(data) {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = data.map(d => `
    <tr>
      <td>${d.mes}</td>
      <td>${fmt.format(d.aporte)}</td>
      <td>${fmt.format(d.juros)}</td>
      <td>${fmt.format(d.totalJuros)}</td>
      <td class="text-success">${fmt.format(d.saldo)}</td>
    </tr>
  `).join('');
}

/* ─── EXPORT ────────────────────────────────────────────────────────────── */
document.getElementById("btnExport").addEventListener("click", () => {
  if (currentData.length === 0) return;
  
  let csv = "Mes;Aporte;Juros;Total Juros;Saldo Final\n";
  currentData.forEach(d => {
    csv += `${d.mes};${d.aporte.toFixed(2)};${d.juros.toFixed(2)};${d.totalJuros.toFixed(2)};${d.saldo.toFixed(2)}\n`;
  });

  const blob = new Blob([csv], { type: 'text/csv' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.setAttribute('href', url);
  a.setAttribute('download', 'simulacao-juros-compostos.csv');
  a.click();
});

/* ─── INIT ──────────────────────────────────────────────────────────────── */
document.getElementById("btnCalcular").addEventListener("click", calculate);
</script>

</body>
</html>
