<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contador de Caracteres | UtiliWeb</title>

<link rel="stylesheet" href="../../assets/style.css">
</head>

<body>

<header>
    <h1>✍️ Contador de Texto</h1>
</header>

<div class="container">

<a href="../../index.html">← Voltar</a>

<div class="box">

<textarea id="text" placeholder="Digite aqui..."></textarea>

<div class="grid">
    <div class="card">Caracteres: <span id="chars">0</span></div>
    <div class="card">Palavras: <span id="words">0</span></div>
</div>

</div>

</div>

<script>
text.oninput = () => {
    const v = text.value.trim();
    chars.textContent = text.value.length;
    words.textContent = v ? v.split(/\s+/).length : 0;
};
</script>

</body>
</html>
