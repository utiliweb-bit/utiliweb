<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contador de Caracteres | UtiliWeb</title>

<meta name="description" content="Conte caracteres e palavras em tempo real de forma simples e rápida.">
<meta name="keywords" content="contador de texto, caracteres, palavras, utiliweb">

<link rel="stylesheet" href="../../assets/style.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial;
    background: linear-gradient(135deg, #2ecc71, #27ae60);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.wrapper {
    width: 100%;
    max-width: 1100px;
    min-height: 600px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
}

/* ESQUERDA */
.left-panel {
    padding: 30px;
    border-right: 1px solid #eee;
    overflow-y: auto;
}

header h1 {
    font-size: 26px;
}

.subtitle {
    font-size: 14px;
    color: #777;
}

/* INPUT */
textarea {
    width: 100%;
    height: 200px;
    padding: 12px;
    border: 2px solid #ddd;
    border-radius: 8px;
    resize: none;
    font-size: 14px;
    margin-top: 10px;
}

textarea:focus {
    outline: none;
    border-color: #27ae60;
}

/* GRID RESULTADO */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 15px;
}

.card {
    background: #f9f9f9;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-weight: bold;
}

/* DIREITA */
.right-panel {
    padding: 30px;
    background: #eafaf1;
}

/* RESPONSIVO */
@media (max-width: 900px) {
    .wrapper {
        grid-template-columns: 1fr;
    }

    .left-panel {
        border-right: none;
        border-bottom: 1px solid #eee;
    }
}

@media (max-width: 600px) {
    body {
        padding: 10px;
    }

    .wrapper {
        border-radius: 12px;
    }

    .grid {
        grid-template-columns: 1fr;
    }
}
</style>

</head>

<body>

<div class="wrapper">

    <!-- ESQUERDA -->
    <div class="left-panel">

        <header>
            <h1>✍️ Contador de Texto</h1>
            <p class="subtitle">Contagem em tempo real</p>
        </header>

        <br>

        <a href="../../index.html">← Voltar</a>

        <label>Digite seu texto</label>
        <textarea id="text" placeholder="Digite aqui..."></textarea>

        <div class="grid">
            <div class="card">Caracteres: <span id="chars">0</span></div>
            <div class="card">Palavras: <span id="words">0</span></div>
        </div>

    </div>

    <!-- DIREITA -->
    <div class="right-panel">
        <h2>Resultado ao vivo</h2>
        <p>Os dados são atualizados automaticamente conforme você digita.</p>
    </div>

</div>

<script>
const text = document.getElementById("text");
const chars = document.getElementById("chars");
const words = document.getElementById("words");

text.addEventListener("input", () => {
    const value = text.value;
    const trimmed = value.trim();

    chars.textContent = value.length;
    words.textContent = trimmed ? trimmed.split(/\s+/).length : 0;
});
</script>

</body>
</html>
