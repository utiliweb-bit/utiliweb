<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Contador de Texto | UtiliWeb</title>

<meta name="description" content="Conte caracteres e palavras em tempo real de forma rápida e precisa.">
<meta name="robots" content="index, follow">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html, body {
    width: 100%;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
    background: linear-gradient(135deg, #2ecc71, #27ae60);
}

/* WRAPPER */
.wrapper {
    width: 100%;
    max-width: 1100px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
}

/* PAINÉIS */
.left, .right {
    padding: 28px;
}

/* HEADER */
h1 {
    font-size: 22px;
    margin-bottom: 6px;
}

p {
    font-size: 12px;
    color: #777;
}

/* TEXTAREA */
textarea {
    width: 100%;
    min-height: 220px;
    margin-top: 12px;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 14px;
    resize: none;
}

textarea:focus {
    outline: none;
    border-color: #27ae60;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 14px;
}

.card {
    background: #f4f4f4;
    padding: 14px;
    border-radius: 10px;
    font-weight: 800;
    font-size: 14px;
}

/* RESPONSIVO */
@media (max-width: 768px) {
    .wrapper {
        grid-template-columns: 1fr;
    }

    html, body {
        padding: 12px;
    }

    .left, .right {
        padding: 18px;
    }
}
</style>

</head>

<body>

<div class="wrapper">

    <!-- INPUT -->
    <div class="left">

        <h1>✍️ Contador de Texto</h1>
        <p>Contagem em tempo real</p>

        <textarea id="text" placeholder="Digite seu texto aqui..."></textarea>

        <div class="grid">
            <div class="card">Caracteres: <span id="chars">0</span></div>
            <div class="card">Palavras: <span id="words">0</span></div>
        </div>

    </div>

    <!-- RESULTADO -->
    <div class="right">

        <h2>Resultado ao vivo</h2>
        <p>Atualização automática conforme digitação.</p>

    </div>

</div>

<script>
const text = document.getElementById("text");
const chars = document.getElementById("chars");
const words = document.getElementById("words");

text.addEventListener("input", () => {

    const value = text.value;
    const trimmed = value.trim();

    chars.textContent = value.length;
    words.textContent = trimmed ? trimmed.split(/\s+/).length : 0;
});
</script>

</body>
</html>
