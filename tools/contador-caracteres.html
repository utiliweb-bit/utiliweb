<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contador de Caracteres | UtiliWeb</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #0b1220;
    color: #e5e7eb;
}

header {
    padding: 20px;
    text-align: center;
    background: #1d4ed8;
}

.container {
    max-width: 800px;
    margin: 30px auto;
    padding: 20px;
}

textarea {
    width: 100%;
    height: 200px;
    padding: 15px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 16px;
}

.result {
    margin-top: 20px;
    font-size: 18px;
    background: #111827;
    padding: 15px;
    border-radius: 10px;
}
a {
    color: #60a5fa;
    text-decoration: none;
}
</style>
</head>

<body>

<header>
    <h1>Contador de Caracteres</h1>
</header>

<div class="container">

    <a href="../index.html">← Voltar</a>

    <p>Digite ou cole seu texto abaixo:</p>

    <textarea id="text"></textarea>

    <div class="result">
        <p>Caracteres: <span id="chars">0</span></p>
        <p>Palavras: <span id="words">0</span></p>
        <p>Linhas: <span id="lines">0</span></p>
    </div>

</div>

<script>
const text = document.getElementById("text");

text.addEventListener("input", () => {
    let value = text.value;

    document.getElementById("chars").textContent = value.length;

    document.getElementById("words").textContent =
        value.trim() === "" ? 0 : value.trim().split(/\s+/).length;

    document.getElementById("lines").textContent =
        value === "" ? 0 : value.split("\n").length;
});
</script>

</body>
</html>
