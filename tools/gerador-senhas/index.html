<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerador de Senhas Seguras Online | UtiliWeb</title>

<meta name="description" content="Gere senhas fortes e seguras online de forma gratuita. Ferramenta rápida do UtiliWeb para criar passwords seguras.">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="../../assets/style.css">
</head>

<body>

<header>
    <h1>Gerador de Senhas</h1>
    <p>Crie senhas fortes e seguras</p>
</header>

<div class="container">

    <a href="../../index.html">← Voltar</a>

    <p style="margin-top:20px;">
        Clique no botão para gerar uma senha segura automaticamente.
    </p>

    <button onclick="gerarSenha()">Gerar Senha</button>

    <div class="result">
        <p><strong>Sua senha:</strong></p>
        <p id="senha">---</p>
    </div>

</div>

<script>
function gerarSenha() {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()";
    let senha = "";
    
    for (let i = 0; i < 12; i++) {
        senha += chars.charAt(Math.floor(Math.random() * chars.length));
    }

    document.getElementById("senha").textContent = senha;
}
</script>

</body>
</html>
