<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de Porcentagem Online Grátis | UtiliWeb</title>

<meta name="description" content="Calcule porcentagens de forma rápida e gratuita. Ferramenta simples online do UtiliWeb para cálculos precisos.">
<meta name="keywords" content="calculadora de porcentagem, porcentagem online, cálculo rápido, utiliweb, matemática online">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="../assets/style.css">
</head>

<body>

<header>
    <h1>Calculadora de Porcentagem</h1>
    <p>Calcule valores de forma rápida e gratuita</p>
</header>

<div class="container">

    <a href="../index.html">← Voltar para o início</a>

    <p style="margin-top:20px;">
        Digite o valor e a porcentagem para calcular o resultado automaticamente.
    </p>

    <label>Valor:</label>
    <input type="number" id="valor" placeholder="Ex: 200">

    <label>Porcentagem (%):</label>
    <input type="number" id="porcentagem" placeholder="Ex: 10">

    <button onclick="calcular()">Calcular</button>

    <div class="result">
        <p><strong>Resultado:</strong> <span id="resultado">0</span></p>
    </div>

    <div style="margin-top:40px; font-size:14px; color:#94a3b8;">
        <p>
            Ferramenta gratuita do <strong>UtiliWeb</strong> para cálculos rápidos de porcentagem.
            Sem cadastro e sem instalação.
        </p>
    </div>

</div>

<script>
function calcular() {
    const valor = parseFloat(document.getElementById("valor").value) || 0;
    const porcentagem = parseFloat(document.getElementById("porcentagem").value) || 0;

    const resultado = (valor * porcentagem) / 100;

    document.getElementById("resultado").textContent = resultado;
}
</script>

</body>
</html>
