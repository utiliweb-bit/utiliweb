<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Contador de Palavras | UtiliWeb</title>
<meta name="description" content="Conte palavras e caracteres em tempo real online.">
<meta name="keywords" content="contador de palavras, contador de texto, utiliweb">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --ink:#0e2419;
    --forest:#0f3326;
    --forest-deep:#0a2018;
    --mint:#5fe3a8;
    --mint-soft:#bff5da;
    --paper:#fbfaf6;
    --paper-dim:#f1efe6;
    --line:rgba(15,51,38,.12);
    --font-display:'Fraunces',serif;
    --font-body:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    -webkit-text-size-adjust:100%;
}

body{
    font-family:var(--font-body);
    background:var(--forest-deep);
    background-image:
        radial-gradient(circle at 15% 10%, rgba(95,227,168,.10), transparent 45%),
        radial-gradient(circle at 85% 90%, rgba(232,184,109,.08), transparent 50%);
    min-height:100dvh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:28px 16px;
    color:var(--ink);
}

.wrapper{
    width:100%;
    max-width:980px;
    background:var(--paper);
    border-radius:26px;
    overflow:hidden;
    display:grid;
    grid-template-columns:1.2fr 1fr;
    box-shadow:0 40px 90px rgba(0,0,0,.45);
    border:1px solid rgba(255,255,255,.06);
}

/* ---------- LEFT ---------- */

.left{
    background:var(--forest);
    background-image:radial-gradient(circle at 30% 0%, rgba(95,227,168,.18), transparent 55%);
    color:var(--paper);
    padding:34px 32px;
}

.eyebrow{
    font-size:11px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--mint);
    font-weight:700;
    margin-bottom:14px;
}

h1{
    font-family:var(--font-display);
    font-weight:600;
    font-size:27px;
    line-height:1.1;
    margin-bottom:6px;
    letter-spacing:-.01em;
}

.subtitle{
    color:rgba(251,250,246,.6);
    font-size:13.5px;
    margin-bottom:18px;
}

.back-link{
    display:inline-flex;
    align-items:center;
    gap:6px;
    margin-bottom:20px;
    text-decoration:none;
    color:rgba(251,250,246,.55);
    font-weight:600;
    font-size:13px;
    transition:color .15s ease;
}

.back-link:hover{
    color:var(--mint);
}

textarea{
    width:100%;
    height:230px;
    padding:16px;
    border-radius:14px;
    border:1.5px solid rgba(255,255,255,.14);
    background:rgba(255,255,255,.05);
    color:var(--paper);
    font-size:14.5px;
    font-family:var(--font-body);
    line-height:1.6;
    resize:vertical;
}

textarea::placeholder{
    color:rgba(251,250,246,.35);
}

textarea:focus-visible{
    outline:2px solid var(--mint);
    outline-offset:1px;
    border-color:var(--mint);
}

.actions{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-top:12px;
}

button{
    font-family:var(--font-body);
    cursor:pointer;
}

.btn{
    padding:11px;
    border-radius:11px;
    font-weight:700;
    font-size:13.5px;
    border:1.5px solid rgba(255,255,255,.18);
    background:transparent;
    color:rgba(251,250,246,.75);
    transition:border-color .15s ease, color .15s ease;
}

.btn:hover{
    border-color:var(--mint);
    color:var(--mint);
}

.btn:focus-visible{
    outline:2px solid var(--mint);
    outline-offset:2px;
}

.btn.danger:hover{
    border-color:#e08a8a;
    color:#e08a8a;
}

.toast{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%) translateY(8px);
    background:var(--forest-deep);
    color:var(--paper);
    border:1px solid var(--mint);
    padding:10px 18px;
    border-radius:999px;
    font-size:13px;
    font-weight:600;
    opacity:0;
    pointer-events:none;
    transition:opacity .2s ease, transform .2s ease;
    white-space:nowrap;
    z-index:200;
}

.toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
}

/* ---------- RIGHT ---------- */

.right{
    padding:34px 32px;
    background:var(--paper);
}

h2{
    font-family:var(--font-display);
    font-size:18px;
    font-weight:600;
    color:var(--forest-deep);
    margin-bottom:4px;
}

.right-note{
    font-size:13px;
    color:rgba(14,36,25,.5);
    margin-bottom:22px;
    line-height:1.5;
}

.hero-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-bottom:16px;
}

.hero-card{
    background:var(--forest);
    border-radius:16px;
    padding:18px 16px;
    color:var(--paper);
}

.hero-card .num{
    font-family:var(--font-display);
    font-size:36px;
    font-weight:600;
    line-height:1;
    color:var(--mint);
}

.hero-card .lbl{
    font-size:11.5px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.05em;
    color:rgba(251,250,246,.55);
    margin-top:6px;
}

.mini-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.mini-card{
    background:var(--paper-dim);
    border:1px solid var(--line);
    border-radius:13px;
    padding:13px 14px;
}

.mini-card .v{
    font-family:var(--font-display);
    font-size:19px;
    font-weight:600;
    color:var(--forest-deep);
}

.mini-card .l{
    font-size:11px;
    color:rgba(14,36,25,.5);
    font-weight:600;
    margin-top:3px;
}

@media(prefers-reduced-motion: reduce){
    *{
        transition:none !important;
    }
}

@media(max-width:820px){

    body{
        align-items:flex-start;
        padding:16px 12px;
    }

    .wrapper{
        grid-template-columns:1fr;
        border-radius:22px;
    }

    .left, .right{
        padding:28px 24px;
    }

    h1{
        font-size:24px;
    }

    textarea{
        height:200px;
    }
}

@media(max-width:480px){

    .hero-grid, .mini-grid{
        grid-template-columns:1fr 1fr;
    }

    .actions{
        grid-template-columns:1fr;
    }
}

</style>
</head>
<body>

<div class="wrapper">

<div class="left">

<a href="../../index.html" class="back-link">← Voltar ao UtiliWeb</a>

<div class="eyebrow">Ferramenta UtiliWeb</div>

<h1>Contador de Palavras</h1>
<p class="subtitle">Contagem em tempo real, conforme você digita ou cola o texto.</p>

<textarea id="text" placeholder="Digite ou cole seu texto aqui..." aria-label="Texto para contagem"></textarea>

<div class="actions">
<button class="btn" onclick="copiarTexto()" type="button">Copiar texto</button>
<button class="btn danger" onclick="limparTexto()" type="button">Limpar</button>
</div>

</div>

<div class="right">

<h2>Resultado</h2>
<p class="right-note">Atualizado automaticamente, sem precisar clicar em nada.</p>

<div class="hero-grid">
<div class="hero-card">
<div class="num" id="words" aria-live="polite">0</div>
<div class="lbl">Palavras</div>
</div>
<div class="hero-card">
<div class="num" id="chars" aria-live="polite">0</div>
<div class="lbl">Caracteres</div>
</div>
</div>

<div class="mini-grid">
<div class="mini-card">
<div class="v" id="charsNoSpace">0</div>
<div class="l">Sem espaços</div>
</div>
<div class="mini-card">
<div class="v" id="reading">0 min</div>
<div class="l">Tempo de leitura</div>
</div>
</div>

</div>

</div>

<div class="toast" id="toast"></div>

<script>

const text = document.getElementById("text");
const charsEl = document.getElementById("chars");
const wordsEl = document.getElementById("words");
const charsNoSpaceEl = document.getElementById("charsNoSpace");
const readingEl = document.getElementById("reading");
const toastEl = document.getElementById("toast");

const segmentador = (typeof Intl !== "undefined" && Intl.Segmenter)
    ? new Intl.Segmenter("pt-BR", { granularity: "grapheme" })
    : null;

function contarCaracteres(str){
    if(segmentador){
        return Array.from(segmentador.segment(str)).length;
    }
    return Array.from(str).length;
}

function atualizar(){
    const value = text.value;
    const trimmed = value.trim();

    const totalChars = contarCaracteres(value);
    const totalWords = trimmed ? trimmed.split(/\s+/).length : 0;
    const noSpace = contarCaracteres(value.replace(/\s/g, ''));
    const reading = Math.max(0, Math.ceil(totalWords / 200));

    charsEl.textContent = totalChars.toLocaleString('pt-BR');
    wordsEl.textContent = totalWords.toLocaleString('pt-BR');
    charsNoSpaceEl.textContent = noSpace.toLocaleString('pt-BR');
    readingEl.textContent = (totalWords ? Math.max(1, reading) : 0) + ' min';
}

let toastTimer = null;

function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1800);
}

function copiarTexto(){
    if(!text.value.trim()){
        showToast('Nenhum texto para copiar');
        return;
    }
    navigator.clipboard.writeText(text.value);
    showToast('Texto copiado!');
}

function limparTexto(){
    if(!text.value.trim()) return;
    if(!confirm('Limpar todo o texto?')) return;
    text.value = '';
    atualizar();
    text.focus();
}

text.addEventListener("input", atualizar);

atualizar();

</script>

</body>
</html>
