<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contador de Palavras | UtiliWeb</title>

<meta name="description" content="Conte palavras e caracteres em tempo real online.">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="../../assets/style.css">
</head>

<body>

<header>
    <h1>📝 Contador de Palavras</h1>
    <p>Texto em tempo real</p>
</header>

<div class="container">

    <a href="../../index.html">← Voltar</a>

    <div class="box">

        <textarea id="text" placeholder="Digite ou cole seu texto aqui..."></textarea>

        <div class="grid">
            <div class="card">
                <strong>Palavras</strong>
                <div id="words" class="result">0</div>
            </div>

            <div class="card">
                <strong>Caracteres</strong>
                <div id="chars" class="result">0</div>
            </div>
        </div>

    </div>

    <div class="box">
        <h2>Como usar</h2>
        <p>Digite ou cole seu texto e a contagem será atualizada automaticamente.</p>
    </div>

</div>

<script>
const text = document.getElementById("text");

text.addEventListener("input", () => {
    const value = text.value.trim();

    document.getElementById("chars").textContent = text.value.length;
    document.getElementById("words").textContent = value ? value.split(/\s+/).length : 0;
});
</script>

</body>
</html>
