<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inverter Texto Online | UtiliWeb</title>

<meta name="description" content="Inverta palavras e frases online gratuitamente. Ferramenta simples e rápida do UtiliWeb.">

<link rel="stylesheet" href="../../assets/style.css">
</head>

<body>

<header>
    <h1>Inverter Texto</h1>
    <p>Escreva palavras e frases ao contrário instantaneamente</p>
</header>

<div class="container">

    <a href="../../index.html">← Voltar</a>

    <textarea
        id="text"
        placeholder="Digite ou cole seu texto aqui..."
        style="width:100%; height:150px; margin-top:20px;"></textarea>

    <div style="margin-top:20px; display:flex; gap:10px; flex-wrap:wrap;">

        <button onclick="inverterTexto()">
            Inverter Texto
        </button>

        <button onclick="copiarResultado()">
            Copiar
        </button>

    </div>

    <textarea
        id="resultado"
        readonly
        placeholder="O resultado aparecerá aqui..."
        style="width:100%; height:150px; margin-top:20px;"></textarea>

    <section style="margin-top:40px;">
        <h2>Como usar</h2>

        <p>
            Digite ou cole o texto na caixa acima e clique em
            "Inverter Texto". O conteúdo será exibido na ordem inversa.
        </p>
    </section>

</div>

<script>
const text = document.getElementById("text");
const resultado = document.getElementById("resultado");

function inverterTexto() {
    resultado.value = text.value.split("").reverse().join("");
}

function copiarResultado() {
    if (!resultado.value) return;

    navigator.clipboard.writeText(resultado.value);
    alert("Texto copiado!");
}
</script>

</body>
</html>
