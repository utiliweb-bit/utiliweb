<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inverter Texto Online | UtiliWeb</title>

<meta name="description" content="Inverta palavras e frases online gratuitamente. Ferramenta simples e rápida do UtiliWeb.">

<link rel="stylesheet" href="../../assets/style.css">

<style>
.container {
    max-width: 800px;
}

.box {
    display: grid;
    gap: 15px;
}

textarea {
    width: 100%;
    min-height: 140px;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid var(--border, #ccc);
    font-size: 14px;
    resize: vertical;
}

.actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

button {
    padding: 12px 14px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    background: #111;
    color: #fff;
    transition: 0.2s;
}

button:hover {
    opacity: 0.85;
}

.result {
    font-weight: 600;
}
</style>
</head>

<body>

<header>
    <h1>🔁 Inverter Texto</h1>
    <p>Texto ao contrário em tempo real</p>
</header>

<div class="container">

    <a href="../../index.html">← Voltar</a>

    <div class="box">

        <label>Digite seu texto</label>
        <textarea id="text" placeholder="Digite ou cole seu texto aqui..."></textarea>

        <div class="actions">
            <button onclick="inverterTexto()">Inverter</button>
            <button onclick="copiarResultado()">Copiar</button>
            <button onclick="limpar()">Limpar</button>
        </div>

        <label>Resultado</label>
        <textarea id="resultado" readonly placeholder="Resultado aparecerá aqui..."></textarea>

    </div>

</div>

<script>
const text = document.getElementById("text");
const resultado = document.getElementById("resultado");

function inverterTexto() {
    resultado.value = text.value.split("").reverse().join("");
}

function copiarResultado() {
    if (!resultado.value) return;
    navigator.clipboard.writeText(resultado.value);
}

function limpar() {
    text.value = "";
    resultado.value = "";
}
</script>

</body>
</html>
