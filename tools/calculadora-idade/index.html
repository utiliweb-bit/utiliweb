<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de Idade | UtiliWeb</title>

<meta name="description" content="Calcule sua idade exata em anos, meses e dias com precisão.">
<meta name="keywords" content="utiliweb, idade, calculadora de idade, idade exata">

<link rel="stylesheet" href="../../assets/style.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    background: linear-gradient(135deg, #2ecc71, #27ae60);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.wrapper {
    width: 100%;
    max-width: 1100px;
    background: #fff;
    border-radius: 18px;
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr 1fr;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
}

.left, .right {
    padding: 25px;
}

.left {
    border-right: 1px solid #eee;
}

h1 {
    font-size: 26px;
    margin-bottom: 5px;
}

.subtitle {
    color: #666;
    font-size: 14px;
    margin-bottom: 15px;
}

label {
    display: block;
    margin-top: 12px;
    font-size: 14px;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border-radius: 10px;
    border: 2px solid #ddd;
}

input:focus {
    outline: none;
    border-color: #27ae60;
}

button {
    margin-top: 15px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    background: #27ae60;
    color: #fff;
}

.result-box {
    font-size: 18px;
    line-height: 1.6;
    background: #f6fff8;
    border: 1px solid #d7f5e3;
    padding: 18px;
    border-radius: 10px;
    min-height: 120px;
}

a {
    display: inline-block;
    margin-bottom: 10px;
    text-decoration: none;
    color: #27ae60;
    font-weight: bold;
}

/* RESPONSIVO */
@media(max-width: 900px) {
    .wrapper {
        grid-template-columns: 1fr;
    }

    .left {
        border-right: none;
        border-bottom: 1px solid #eee;
    }
}
</style>

</head>

<body>

<div class="wrapper">

    <!-- ESQUERDA -->
    <div class="left">

        <h1>🎂 Calculadora de Idade</h1>
        <p class="subtitle">Idade exata em anos, meses e dias</p>

        <a href="../../index.html">← Voltar</a>

        <label>Data de nascimento</label>
        <input type="date" id="nascimento">

        <button onclick="calcular()">Calcular idade</button>

    </div>

    <!-- DIREITA -->
    <div class="right">

        <h2>Resultado</h2>

        <div class="result-box" id="resultado">
            Selecione sua data de nascimento
        </div>

    </div>

</div>

<script>
function calcular() {

    const nascimento = document.getElementById("nascimento").value;
    const res = document.getElementById("resultado");

    if (!nascimento) {
        res.textContent = "Selecione uma data válida.";
        return;
    }

    const nasc = new Date(nascimento);
    const hoje = new Date();

    let anos = hoje.getFullYear() - nasc.getFullYear();
    let meses = hoje.getMonth() - nasc.getMonth();
    let dias = hoje.getDate() - nasc.getDate();

    if (dias < 0) {
        meses--;
        const ultimoMes = new Date(hoje.getFullYear(), hoje.getMonth(), 0).getDate();
        dias += ultimoMes;
    }

    if (meses < 0) {
        anos--;
        meses += 12;
    }

    const totalDias = Math.floor((hoje - nasc) / (1000 * 60 * 60 * 24));

    res.innerHTML = `
        <strong>${anos}</strong> anos<br>
        <strong>${meses}</strong> meses<br>
        <strong>${dias}</strong> dias<br><br>
        📊 Total de dias: <strong>${totalDias.toLocaleString("pt-BR")}</strong>
    `;
}
</script>

</body>
</html>
