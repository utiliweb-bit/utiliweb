<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de Idade | UtiliWeb</title>

<meta name="description" content="Calcule sua idade em anos, meses e dias com precisão.">
<link rel="stylesheet" href="../../assets/style.css">
</head>

<body>

<header>
    <h1>🎂 Calculadora de Idade</h1>
    <p>Descubra sua idade exata em segundos</p>
</header>

<div class="container">

    <a href="../../index.html">← Voltar</a>

    <div class="box">

        <label>Data de nascimento</label>

        <input type="date" id="nascimento">

        <div style="margin-top:15px;">
            <button onclick="calcularIdade()">Calcular Idade</button>
        </div>

        <div id="resultado" class="result hidden"></div>

    </div>

    <div class="box">
        <h2>Como funciona</h2>
        <p>
            Selecione sua data de nascimento e o sistema calcula sua idade
            exata em anos, meses, dias e total de dias vividos.
        </p>
    </div>

</div>

<script>
function calcularIdade() {

    const nascimento = document.getElementById("nascimento").value;
    const resultado = document.getElementById("resultado");

    if (!nascimento) {
        resultado.classList.remove("hidden");
        resultado.textContent = "Selecione uma data válida.";
        return;
    }

    const dataNascimento = new Date(nascimento);
    const hoje = new Date();

    let anos = hoje.getFullYear() - dataNascimento.getFullYear();
    let meses = hoje.getMonth() - dataNascimento.getMonth();
    let dias = hoje.getDate() - dataNascimento.getDate();

    if (dias < 0) {
        meses--;
        const ultimoMes = new Date(
            hoje.getFullYear(),
            hoje.getMonth(),
            0
        ).getDate();
        dias += ultimoMes;
    }

    if (meses < 0) {
        anos--;
        meses += 12;
    }

    const totalDias = Math.floor((hoje - dataNascimento) / (1000 * 60 * 60 * 24));

    resultado.classList.remove("hidden");
    resultado.innerHTML = `
        <strong>${anos} anos</strong>, 
        <strong>${meses} meses</strong> e 
        <strong>${dias} dias</strong>
        <br><br>
        📊 Total de dias vividos: <strong>${totalDias.toLocaleString("pt-BR")}</strong>
    `;
}
</script>

</body>
</html>
