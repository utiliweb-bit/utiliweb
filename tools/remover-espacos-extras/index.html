<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Remover Espaços Extras Online | UtiliWeb</title>

<meta name="description" content="Remova espaços extras, linhas em branco e organize textos online gratuitamente com o UtiliWeb.">

<link rel="stylesheet" href="../../assets/style.css">
</head>

<body>

<header>
    <h1>Remover Espaços Extras</h1>
    <p>Limpe textos rapidamente e deixe tudo organizado</p>
</header>

<div class="container">

    <a href="../../index.html">← Voltar</a>

    <textarea
        id="text"
        placeholder="Digite ou cole seu texto aqui..."
        style="width:100%; height:150px; margin-top:20px;"></textarea>

    <div style="margin-top:20px; display:flex; gap:10px; flex-wrap:wrap;">

        <button onclick="removerEspacos()">
            Remover Espaços Extras
        </button>

        <button onclick="copiarResultado()">
            Copiar
        </button>

    </div>

    <textarea
        id="resultado"
        readonly
        placeholder="O resultado aparecerá aqui..."
        style="width:100%; height:150px; margin-top:20px;"></textarea>

    <section style="margin-top:40px;">
        <h2>Como usar</h2>

        <p>
            Cole o texto na caixa acima e clique em "Remover Espaços Extras".
            A ferramenta elimina espaços duplicados no início, no fim e entre as palavras.
        </p>
    </section>

</div>

<script>
const text = document.getElementById("text");
const resultado = document.getElementById("resultado");

function removerEspacos() {
    resultado.value = text.value
        .replace(/\s+/g, " ")
        .trim();
}

function copiarResultado() {
    if (!resultado.value) return;

    navigator.clipboard.writeText(resultado.value);
    alert("Texto copiado!");
}
</script>

</body>
</html>
