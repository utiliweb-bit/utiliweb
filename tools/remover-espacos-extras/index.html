<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Remover Espaços Extras | UtiliWeb</title>

<meta name="description" content="Limpe textos removendo espaços extras e organize automaticamente.">
<meta name="robots" content="index, follow">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html, body {
    width: 100%;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
    background: linear-gradient(135deg, #2ecc71, #27ae60);
}

/* CONTAINER */
.wrapper {
    width: 100%;
    max-width: 1100px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
}

/* PAINÉIS */
.left, .right {
    padding: 28px;
}

/* TÍTULOS */
h1 {
    font-size: 22px;
    margin-bottom: 6px;
}

p {
    font-size: 12px;
    color: #777;
}

/* TEXTAREA */
textarea {
    width: 100%;
    min-height: 180px;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    margin-top: 12px;
    font-size: 14px;
    resize: vertical;
}

textarea:focus {
    outline: none;
    border-color: #27ae60;
}

/* BOTÕES */
.btns {
    display: flex;
    gap: 10px;
    margin-top: 14px;
    flex-wrap: wrap;
}

button {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-weight: 700;
    cursor: pointer;
}

.primary {
    background: #27ae60;
    color: #fff;
}

.secondary {
    background: #f4f4f4;
    color: #333;
}

/* RESULTADO */
.result {
    background: #f4f4f4;
    padding: 14px;
    border-radius: 10px;
    font-size: 13px;
    word-break: break-word;
    min-height: 120px;
}

/* RESPONSIVO */
@media (max-width: 768px) {
    .wrapper {
        grid-template-columns: 1fr;
    }

    html, body {
        padding: 12px;
    }

    .left, .right {
        padding: 18px;
    }
}
</style>

</head>

<body>

<div class="wrapper">

    <!-- INPUT -->
    <div class="left">

        <h1>🧹 Remover Espaços Extras</h1>
        <p>Limpe textos e organize automaticamente</p>

        <textarea id="text" placeholder="Digite ou cole seu texto aqui..."></textarea>

        <div class="btns">
            <button class="primary" onclick="cleanText()">Limpar</button>
            <button class="secondary" onclick="copyText()">Copiar</button>
            <button class="secondary" onclick="resetAll()">Reset</button>
        </div>

    </div>

    <!-- RESULTADO -->
    <div class="right">

        <h2>Resultado</h2>

        <div id="result" class="result">---</div>

    </div>

</div>

<script>
const input = document.getElementById("text");
const result = document.getElementById("result");

function cleanText() {
    const cleaned = (input.value || "")
        .replace(/\s+/g, " ")
        .trim();

    result.textContent = cleaned || "Nada para limpar";
}

function copyText() {
    if (!result.textContent || result.textContent === "---") return;
    navigator.clipboard.writeText(result.textContent);
}

function resetAll() {
    input.value = "";
    result.textContent = "---";
}

// UX automático (tempo real)
input.addEventListener("input", cleanText);
</script>

</body>
</html>
