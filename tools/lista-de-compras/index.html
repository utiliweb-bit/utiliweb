```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lista de Compras Visual | UtiliWeb</title>

<meta name="description" content="Monte sua lista de compras tocando nas categorias. Rápido, simples e ideal para celular.">

<style>
:root{
    --forest:#0f3326;
    --forest-light:#1b4d3a;
    --mint:#59d99b;
    --paper:#f8f7f3;
    --card:#ffffff;
    --border:#e4e4e4;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:var(--paper);
    color:#222;
}

header{
    background:var(--forest);
    color:#fff;
    text-align:center;
    padding:25px;
}

header h1{
    font-size:28px;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:15px;
}

.card{
    background:var(--card);
    border-radius:16px;
    padding:20px;
    text-align:center;
    cursor:pointer;
    transition:.2s;
    box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.card:hover{
    transform:translateY(-3px);
}

.card .icon{
    font-size:48px;
}

.card .name{
    margin-top:10px;
    font-weight:bold;
}

.lista-box{
    margin-top:25px;
    background:#fff;
    padding:20px;
    border-radius:16px;
    box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.lista-box h2{
    margin-bottom:15px;
}

.item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 0;
    border-bottom:1px solid #eee;
}

.item:last-child{
    border-bottom:none;
}

.item span{
    flex:1;
}

.comprado{
    text-decoration:line-through;
    opacity:.5;
}

.btn-remove{
    background:#e74c3c;
    color:#fff;
    border:none;
    border-radius:8px;
    padding:6px 10px;
    cursor:pointer;
}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);
    z-index:1000;
}

.modal-content{
    background:#fff;
    max-width:500px;
    margin:60px auto;
    border-radius:16px;
    padding:20px;
}

.modal-content h3{
    margin-bottom:15px;
}

.produto{
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
    margin-bottom:8px;
    cursor:pointer;
}

.produto:hover{
    background:#f3f3f3;
}

.close{
    float:right;
    cursor:pointer;
    font-size:22px;
}

.acoes{
    margin-top:20px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    border:none;
    cursor:pointer;
    padding:12px 16px;
    border-radius:10px;
    font-weight:bold;
}

.btn-share{
    background:var(--mint);
}

.btn-clear{
    background:#e74c3c;
    color:white;
}

.stats{
    margin-top:15px;
    font-weight:bold;
}
</style>
</head>
<body>

<header>
    <h1>🛒 Lista de Compras</h1>
    <p>Toque na categoria e escolha os produtos</p>
</header>

<div class="container">

    <div class="grid">

        <div class="card" onclick="abrirCategoria('carnes')">
            <div class="icon">🥩</div>
            <div class="name">Carnes</div>
        </div>

        <div class="card" onclick="abrirCategoria('laticinios')">
            <div class="icon">🥛</div>
            <div class="name">Laticínios</div>
        </div>

        <div class="card" onclick="abrirCategoria('frutas')">
            <div class="icon">🍎</div>
            <div class="name">Frutas</div>
        </div>

        <div class="card" onclick="abrirCategoria('verduras')">
            <div class="icon">🥦</div>
            <div class="name">Verduras</div>
        </div>

        <div class="card" onclick="abrirCategoria('mercearia')">
            <div class="icon">🍚</div>
            <div class="name">Mercearia</div>
        </div>

        <div class="card" onclick="abrirCategoria('limpeza')">
            <div class="icon">🧹</div>
            <div class="name">Limpeza</div>
        </div>

        <div class="card" onclick="abrirCategoria('higiene')">
            <div class="icon">🧻</div>
            <div class="name">Higiene</div>
        </div>

    </div>

    <div class="lista-box">

        <h2>Minha Lista</h2>

        <div id="lista"></div>

        <div class="stats">
            <span id="total">0 itens</span>
        </div>

        <div class="acoes">
            <button class="btn-share" onclick="compartilharLista()">
                📤 Compartilhar
            </button>

            <button class="btn-clear" onclick="limparLista()">
                🗑 Limpar Lista
            </button>
        </div>

    </div>

</div>

<div class="modal" id="modal">
    <div class="modal-content">

        <span class="close" onclick="fecharModal()">✖</span>

        <h3 id="tituloModal"></h3>

        <div id="produtos"></div>

    </div>
</div>

<script>

const categorias = {

carnes:[
'Carne bovina',
'Carne suína',
'Frango',
'Peixe',
'Costela',
'Linguiça',
'Hambúrguer',
'Bacon'
],

laticinios:[
'Leite',
'Queijo',
'Iogurte',
'Requeijão',
'Manteiga',
'Creme de leite'
],

frutas:[
'Banana',
'Maçã',
'Laranja',
'Manga',
'Uva',
'Morango',
'Melancia'
],

verduras:[
'Alface',
'Tomate',
'Cebola',
'Cenoura',
'Batata',
'Brócolis'
],

mercearia:[
'Arroz',
'Feijão',
'Café',
'Macarrão',
'Açúcar',
'Farinha'
],

limpeza:[
'Detergente',
'Sabão em pó',
'Água sanitária',
'Desinfetante'
],

higiene:[
'Papel higiênico',
'Shampoo',
'Sabonete',
'Creme dental'
]

};

let lista =
JSON.parse(
localStorage.getItem('listaComprasVisual')
) || [];

function salvar(){
localStorage.setItem(
'listaComprasVisual',
JSON.stringify(lista)
);
}

function abrirCategoria(cat){

const modal =
document.getElementById('modal');

document.getElementById('tituloModal')
.innerText = cat.toUpperCase();

const produtos =
document.getElementById('produtos');

produtos.innerHTML='';

categorias[cat].forEach(item=>{

const div =
document.createElement('div');

div.className='produto';

div.textContent=item;

div.onclick=()=>{
adicionarItem(item);
};

produtos.appendChild(div);

});

modal.style.display='block';
}

function fecharModal(){
document.getElementById('modal').style.display='none';
}

function adicionarItem(nome){

if(lista.some(i=>i.nome===nome)){
return;
}

lista.push({
nome:nome,
comprado:false
});

salvar();
renderizar();
}

function alternar(index){

lista[index].comprado =
!lista[index].comprado;

salvar();
renderizar();
}

function remover(index){

lista.splice(index,1);

salvar();
renderizar();
}

function renderizar(){

const el =
document.getElementById('lista');

if(lista.length===0){

el.innerHTML =
'<p>Nenhum item adicionado.</p>';

document.getElementById('total')
.innerText='0 itens';

return;
}

el.innerHTML='';

lista.forEach((item,index)=>{

el.innerHTML += `
<div class="item">

<input
type="checkbox"
${item.comprado ? 'checked' : ''}
onchange="alternar(${index})">

<span class="${item.comprado ? 'comprado' : ''}">
${item.nome}
</span>

<button
class="btn-remove"
onclick="remover(${index})">
❌
</button>

</div>
`;

});

document.getElementById('total')
.innerText =
lista.length + ' itens';
}

function compartilharLista(){

let texto =
'🛒 LISTA DE COMPRAS\n\n';

lista.forEach(item=>{

texto +=
(item.comprado ? '☑ ' : '☐ ')
+ item.nome + '\n';

});

if(navigator.share){

navigator.share({
text:texto
});

}else{

navigator.clipboard.writeText(texto);

alert('Lista copiada!');
}
}

function limparLista(){

if(!confirm(
'Deseja apagar toda a lista?'
)) return;

lista=[];

salvar();
renderizar();
}

renderizar();

</script>

</body>
</html>
```
