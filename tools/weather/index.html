<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UtiliWeb Weather Pro</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <div id="bg"></div>

  <div class="app">

    <div class="search">
      <input id="cityInput" placeholder="Buscar cidade..." />
      <button onclick="searchCity()">Buscar</button>
    </div>

    <div class="location" id="location">Detectando localização...</div>

    <div class="current">
      <div class="temp" id="temp">--°</div>
      <div class="icon" id="icon">⛅</div>
    </div>

    <div class="desc" id="desc">Carregando clima...</div>

    <div class="meta">
      <div>💨 <span id="wind">--</span> km/h</div>
      <div>💧 <span id="humidity">--</span>%</div>
    </div>

    <div class="divider"></div>

    <div class="forecast" id="forecast"></div>

  </div>

  <script src="app.js"></script>
</body>
</html>
