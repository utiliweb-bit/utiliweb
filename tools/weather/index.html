<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="description" content="Previsão do tempo em tempo real com interface moderna e responsiva."/>
  <meta name="theme-color" content="#0a0f1f"/>
  <title>Previsão do Tempo</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css"/>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

<div id="bg"></div>
<canvas id="fx"></canvas>

<div class="app">

  <div class="search-bar" role="search">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input 
      id="cityInput" 
      type="text"
      placeholder="Buscar cidade..." 
      autocomplete="off" 
      aria-label="Buscar cidade"
      onkeydown="if(event.key==='Enter') searchCity()" 
    />
    <button 
      onclick="searchCity()"
      aria-label="Buscar"
      title="Buscar"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
        <path d="m9 18 6-6-6-6"/>
      </svg>
    </button>
  </div>

  <div class="hero-card" role="region" aria-label="Condições atuais do tempo">
    <div class="hero-top">
      <div class="location-row">
        <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14" style="opacity:.6;flex-shrink:0" aria-hidden="true">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
        </svg>
        <span class="location shimmer" id="location" onclick="clearSavedLocation()" title="Toque para redefinir localização" style="cursor:pointer">Carregando...</span>
      </div>
      <div class="updated-badge" id="updatedBadge" aria-live="polite">—</div>
    </div>

    <div class="hero-main">
      <div class="temp-col">
        <div class="temp shimmer" id="temp" role="status" aria-label="Temperatura atual">—</div>
        <div class="desc" id="desc">Atualizando...</div>
      </div>
      <div class="icon-col">
        <div class="weather-icon" id="icon" aria-label="Ícone do tempo" role="img">⛅</div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" aria-hidden="true">
          <path d="M12 2a4 4 0 0 1 4 4c0 4-4 8-4 14C12 14 8 10 8 6a4 4 0 0 1 4-4z"/>
        </svg>
        <div>
          <div class="stat-val" id="humidity">—</div>
          <div class="stat-lbl">Umidade</div>
        </div>
      </div>
      <div class="stat-divider" aria-hidden="true"></div>
      <div class="stat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" aria-hidden="true">
          <path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/>
        </svg>
        <div>
          <div class="stat-val" id="wind">—</div>
          <div class="stat-lbl">Vento km/h</div>
        </div>
      </div>
    </div>
  </div>

  <div class="section-label">Próximas 48 horas</div>
  <div class="scroll-row" id="hourly" role="region" aria-label="Previsão por hora"></div>

  <div class="section-label">Próximos dias</div>
  <div class="scroll-row" id="forecast" role="region" aria-label="Previsão diária"></div>

</div>

<script src="app.js"></script>
</body>
</html>
