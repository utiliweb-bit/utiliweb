<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UtiliWeb Weather</title>

<link rel="stylesheet" href="style.css"/>
<meta name="theme-color" content="#0b1d2a"/>
</head>

<body>

<div id="bg"></div>
<canvas id="fx"></canvas>

<div class="app">

  <div class="top">
    <input id="cityInput" placeholder="Buscar cidade..." />
    <button onclick="searchCity()">Buscar</button>
  </div>

  <div class="location shimmer" id="location">Carregando...</div>

  <div class="main">
    <div class="temp shimmer" id="temp">--°</div>
    <div class="icon" id="icon">⛅</div>
  </div>

  <div class="desc" id="desc">Atualizando clima...</div>

  <div class="meta">
    <div>💨 <span id="wind">--</span> km/h</div>
    <div>💧 <span id="humidity">--</span>%</div>
  </div>

  <div class="divider"></div>

  <canvas id="chart"></canvas>

  <div class="section-title">Próximas 48h</div>
  <div class="hourly" id="hourly"></div>

  <div class="section-title">Próximos dias</div>
  <div class="forecast" id="forecast"></div>

</div>

<script src="app.js"></script>
</body>
</html>
