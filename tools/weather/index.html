<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UtiliWeb Weather</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <div class="bg" id="bg"></div>
  <div class="overlay"></div>

  <div class="app">

    <div class="topbar">
      <input id="city" placeholder="Buscar cidade" />
      <button onclick="searchCity()">+</button>
    </div>

    <div class="location" id="location">Minha Localização</div>

    <div class="main">
      <div class="temp" id="temp">--°</div>
      <div class="icon" id="icon">⛅</div>
    </div>

    <div class="desc" id="desc">Carregando clima...</div>

    <div class="meta">
      <div>Vento <span id="wind">--</span> km/h</div>
      <div>Umidade <span id="humidity">--</span>%</div>
    </div>

    <div class="divider"></div>

    <div class="forecast" id="forecast"></div>

  </div>

  <script src="app.js"></script>
</body>
</html>
