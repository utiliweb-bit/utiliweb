<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IP no Mapa | UtiliWeb</title>

<link rel="stylesheet" href="../../assets/style.css">

<style>
.box {
    margin-top: 20px;
    padding: 20px;
    background: #fff;
    border-radius: 12px;
}

#map {
    width: 100%;
    height: 320px;
    margin-top: 15px;
    border-radius: 10px;
    overflow: hidden;
}
</style>

</head>

<body>

<header>
<h1>🗺️ IP no Mapa</h1>
</header>

<div class="container">

<a href="../../index.html">← Voltar</a>

<div class="box">

<p id="info">Carregando IP...</p>

<div id="map"></div>

</div>

</div>

<script>

async function load() {
    try {
        // 1. IP
        const ipRes = await fetch("https://api.ipify.org?format=json");
        const ipData = await ipRes.json();

        // 2. GEO mais estável (ipwho.is)
        const geoRes = await fetch(`https://ipwho.is/${ipData.ip}`);
        const geo = await geoRes.json();

        if (!geo.success) {
            document.getElementById("info").innerText = "Erro ao localizar IP";
            return;
        }

        document.getElementById("info").innerHTML =
            `IP: <b>${geo.ip}</b><br>${geo.city}, ${geo.country}`;

        const lat = geo.latitude;
        const lon = geo.longitude;

        document.getElementById("map").innerHTML = `
            <iframe
                width="100%"
                height="320"
                style="border:0"
                loading="lazy"
                src="https://maps.google.com/maps?q=${lat},${lon}&z=10&output=embed">
            </iframe>
        `;

    } catch (e) {
        document.getElementById("info").innerText = "Erro ao carregar dados";
    }
}

load();

</script>

</body>
</html>
