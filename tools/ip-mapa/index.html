```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IP no Mapa | UtiliWeb</title>

<meta name="description" content="Veja a localização aproximada do seu IP em um mapa.">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="../../assets/style.css">

<style>
.box{
    margin-top:20px;
    padding:20px;
    background:#fff;
    border-radius:12px;
}

#map{
    width:100%;
    height:350px;
    margin-top:20px;
    border-radius:10px;
    overflow:hidden;
}
</style>
</head>

<body>

<header>
    <h1>🗺️ IP no Mapa</h1>
    <p>Veja a localização aproximada do seu IP</p>
</header>

<div class="container">

<a href="../../index.html">← Voltar</a>

<div class="box">

<p id="info">Carregando informações...</p>

<div id="map"></div>

</div>

</div>

<script>

async function load() {

    const info = document.getElementById("info");

    try {

        const response = await fetch("https://ipapi.co/json/");
        const data = await response.json();

        if (!data.latitude || !data.longitude) {
            info.innerText = "Não foi possível localizar o IP.";
            return;
        }

        info.innerHTML = `
            <strong>IP:</strong> ${data.ip}<br>
            <strong>Cidade:</strong> ${data.city}<br>
            <strong>País:</strong> ${data.country_name}
        `;

        document.getElementById("map").innerHTML = `
            <iframe
                width="100%"
                height="350"
                style="border:0"
                loading="lazy"
                src="https://maps.google.com/maps?q=${data.latitude},${data.longitude}&z=10&output=embed">
            </iframe>
        `;

    } catch (error) {
        info.innerText = "Erro ao carregar os dados.";
    }

}

load();

</script>

</body>
</html>
```
