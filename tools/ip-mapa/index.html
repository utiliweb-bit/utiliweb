<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>IP no Mapa | UtiliWeb</title>

<meta name="description" content="Veja a localização aproximada do seu IP em um mapa.">
<meta name="robots" content="index, follow">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html, body {
    width: 100%;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
    background: linear-gradient(135deg, #2ecc71, #27ae60);
}

/* CONTAINER */
.wrapper {
    width: 100%;
    max-width: 1000px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
}

/* PAINÉIS */
.left, .right {
    padding: 28px;
}

/* TÍTULOS */
h1 {
    font-size: 22px;
    margin-bottom: 6px;
}

p {
    font-size: 12px;
    color: #777;
}

/* INFO BOX */
.info {
    margin-top: 18px;
    padding: 14px;
    background: #f4f4f4;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.6;
}

/* MAPA */
#map {
    width: 100%;
    height: 360px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #ddd;
    margin-top: 10px;
}

iframe {
    width: 100%;
    height: 100%;
    border: 0;
}

/* STATUS */
.status {
    margin-top: 10px;
    font-size: 12px;
    color: #27ae60;
}

/* RESPONSIVO */
@media (max-width: 768px) {
    .wrapper {
        grid-template-columns: 1fr;
    }

    html, body {
        padding: 12px;
    }

    .left, .right {
        padding: 18px;
    }

    #map {
        height: 300px;
    }
}
</style>

</head>

<body>

<div class="wrapper">

    <!-- INFO -->
    <div class="left">

        <h1>🗺️ IP no Mapa</h1>
        <p>Localização aproximada do seu IP em tempo real</p>

        <div id="info" class="info">
            ⏳ Carregando dados do IP...
        </div>

        <div class="status" id="status"></div>

    </div>

    <!-- MAPA -->
    <div class="right">

        <h2>Mapa</h2>

        <div id="map">
            <!-- iframe aqui -->
        </div>

    </div>

</div>

<script>
async function load() {

    const info = document.getElementById("info");
    const status = document.getElementById("status");

    try {
        status.textContent = "Carregando localização...";

        const response = await fetch("https://ipapi.co/json/");
        const data = await response.json();

        if (!data.latitude || !data.longitude) {
            info.textContent = "Não foi possível localizar o IP.";
            status.textContent = "";
            return;
        }

        info.innerHTML = `
            <strong>IP:</strong> ${data.ip}<br>
            <strong>Cidade:</strong> ${data.city || "N/A"}<br>
            <strong>País:</strong> ${data.country_name || "N/A"}
        `;

        document.getElementById("map").innerHTML = `
            <iframe
                loading="lazy"
                src="https://maps.google.com/maps?q=${data.latitude},${data.longitude}&z=10&output=embed">
            </iframe>
        `;

        status.textContent = "✔ Localização carregada com sucesso";

    } catch (e) {
        info.textContent = "Erro ao carregar informações do IP.";
        status.textContent = "";
    }
}

load();
</script>

</body>
</html>
