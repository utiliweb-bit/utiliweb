<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IP no Mapa | UtiliWeb</title>

<meta name="description" content="Veja a localização aproximada do seu IP em um mapa.">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="../../assets/style.css">

<style>
.container {
    max-width: 900px;
}

.box {
    display: grid;
    gap: 15px;
}

.result {
    font-size: 14px;
    line-height: 1.6;
    padding: 12px;
    border-radius: 10px;
    background: rgba(0,0,0,0.03);
}

#map {
    width: 100%;
    height: 360px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border, #ddd);
}

iframe {
    width: 100%;
    height: 100%;
    border: 0;
}
</style>

</head>

<body>

<header>
    <h1>🗺️ IP no Mapa</h1>
    <p>Localização aproximada do seu IP em tempo real</p>
</header>

<div class="container">

    <a href="../../index.html">← Voltar</a>

    <div class="box">

        <div id="info" class="result">
            Carregando dados do IP...
        </div>

        <div id="map"></div>

    </div>

</div>

<script>
async function load() {

    const info = document.getElementById("info");

    try {
        const response = await fetch("https://ipapi.co/json/");
        const data = await response.json();

        if (!data.latitude || !data.longitude) {
            info.textContent = "Não foi possível localizar o IP.";
            return;
        }

        info.innerHTML = `
            <strong>IP:</strong> ${data.ip}<br>
            <strong>Cidade:</strong> ${data.city}<br>
            <strong>País:</strong> ${data.country_name}
        `;

        document.getElementById("map").innerHTML = `
            <iframe
                loading="lazy"
                src="https://maps.google.com/maps?q=${data.latitude},${data.longitude}&z=10&output=embed">
            </iframe>
        `;

    } catch (e) {
        info.textContent = "Erro ao carregar informações do IP.";
    }
}

load();
</script>

</body>
</html>
