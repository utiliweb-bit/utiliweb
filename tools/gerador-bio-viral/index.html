<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Gerador de Bio Viral | UtiliWeb</title>

<meta name="description" content="Crie bios prontas para Instagram, TikTok e YouTube em segundos.">
<meta name="keywords" content="bio instagram, bio tiktok, gerador de bio, utiliweb">

<style>
:root{
    --pad: clamp(10px, 2vw, 20px);
    --radius: 18px;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    width:100%;
    min-height:100dvh;
    font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial;
    background:linear-gradient(135deg,#2ecc71,#27ae60);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:var(--pad);
}

/* WRAPPER */
.wrapper{
    width:100%;
    max-width:1000px;
    background:#fff;
    border-radius:var(--radius);
    box-shadow:0 20px 60px rgba(0,0,0,0.3);
    display:grid;
    grid-template-columns:1fr 1fr;
    overflow:hidden;
}

/* LEFT / RIGHT */
.left-panel,
.right-panel{
    padding:clamp(16px, 3vw, 30px);
}

/* ESQUERDA */
.left-panel{
    border-right:1px solid #eee;
}

/* HEADER */
header h1{
    font-size:clamp(20px, 2.2vw, 26px);
}

.subtitle{
    font-size:clamp(12px, 1.4vw, 14px);
    color:#777;
}

/* INPUTS */
input, select, textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:2px solid #ddd;
    font-size:14px;
    outline:none;
}

input:focus,
select:focus,
textarea:focus{
    border-color:#27ae60;
}

/* BOTÕES */
button{
    width:100%;
    margin-top:12px;
    padding:12px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    font-weight:700;
    background:#27ae60;
    color:#fff;
    min-height:44px;
    touch-action:manipulation;
}

button:hover{
    opacity:0.9;
}

/* OUTPUT */
.output{
    margin-top:18px;
}

textarea{
    height:140px;
    resize:none;
}

/* DIREITA */
.right-panel{
    background:#eafaf1;
}

/* RESPONSIVO */
@media (max-width: 900px){
    .wrapper{
        grid-template-columns:1fr;
    }

    .left-panel{
        border-right:none;
        border-bottom:1px solid #eee;
    }
}

@media (max-width: 480px){
    html, body{
        padding:10px;
    }

    .wrapper{
        border-radius:14px;
    }

    input, select, textarea{
        font-size:13px;
        padding:10px;
    }

    button{
        font-size:13px;
        padding:11px;
    }
}
</style>
</head>

<body>

<div class="wrapper">

    <!-- ESQUERDA -->
    <div class="left-panel">

        <header>
            <h1>🔥 Gerador de Bio Viral</h1>
            <p class="subtitle">Bios para Instagram, TikTok e YouTube</p>
        </header>

        <br>

        <a href="../../index.html">← Voltar</a>

        <input id="name" placeholder="Seu nome ou marca">

        <select id="niche">
            <option value="creator">Criador de conteúdo</option>
            <option value="fitness">Fitness</option>
            <option value="business">Negócios</option>
            <option value="music">Música</option>
            <option value="gaming">Games</option>
        </select>

        <select id="style">
            <option value="viral">🔥 Viral</option>
            <option value="pro">💼 Profissional</option>
            <option value="fun">😂 Engraçado</option>
        </select>

        <button onclick="generate()">Gerar Bio</button>

        <div class="output" id="output"></div>

    </div>

    <!-- DIREITA -->
    <div class="right-panel">

        <h2>Como funciona</h2>
        <p>
            Escolha seu estilo e nicho, depois gere uma bio pronta para redes sociais em segundos.
            Ideal para criadores e marcas.
        </p>

    </div>

</div>

<script>
function generate() {
    const name = document.getElementById("name").value;
    const niche = document.getElementById("niche").value;
    const style = document.getElementById("style").value;

    let bio = "";

    if (style === "viral") {
        bio = `🔥 ${name || "Criador de conteúdo"}\n💥 Conteúdo de ${niche}\n📈 Crescendo todos os dias\n👇 Veja meus conteúdos`;
    }

    if (style === "pro") {
        bio = `👤 ${name || "Profissional"}\n🎯 Especialista em ${niche}\n📊 Resultados reais\n📩 Contato na bio`;
    }

    if (style === "fun") {
        bio = `😂 ${name || "Criador engraçado"}\n🎮 ${niche} na área\n🚀 Só conteúdo leve\n👇 Cola aqui`;
    }

    document.getElementById("output").innerHTML = `
        <textarea readonly>${bio}</textarea>
        <button onclick="copyBio(this.getAttribute('data-bio'))" data-bio="${bio.replace(/"/g,'&quot;')}">
            📋 Copiar Bio
        </button>
    `;
}

function copyBio(text) {
    navigator.clipboard.writeText(text);
}
</script>

</body>
</html>
