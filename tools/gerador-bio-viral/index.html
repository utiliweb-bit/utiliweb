<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gerador de Bio Viral PRO | UtiliWeb</title>
<meta name="description" content="Gerador de bios para Instagram, TikTok, YouTube e Twitch.">
<style>
:root{--green:#27ae60}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial;background:linear-gradient(135deg,#2ecc71,#27ae60);min-height:100dvh;padding:14px}
.wrapper{max-width:1200px;margin:auto;background:#fff;border-radius:18px;overflow:hidden;display:grid;grid-template-columns:1fr 1fr;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.left,.right{padding:24px}
.left{border-right:1px solid #eee}
h1{font-size:28px}.subtitle{color:#777;margin:6px 0 16px}
input,select,button{width:100%;padding:12px;border-radius:10px;border:2px solid #ddd;margin-top:10px}
input:focus,select:focus{outline:none;border-color:var(--green)}
button{background:var(--green);color:#fff;border:none;font-weight:700;cursor:pointer}
.preview,.bio-card,.box{background:#f8fff9;border:1px solid #d7f5e3;border-radius:12px;padding:12px;margin-top:12px}
.bio-card button{margin-top:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.small{font-size:13px;color:#666}
@media(max-width:900px){.wrapper{grid-template-columns:1fr}.left{border-right:none;border-bottom:1px solid #eee}}
</style>
</head>
<body>
<div class="wrapper">
<div class="left">
<h1>🔥 Gerador de Bio Viral</h1>
<div class="subtitle">Instagram, TikTok, YouTube e Twitch</div>

<input id="name" placeholder="Seu nome ou marca">

<select id="platform">
<option>Instagram</option>
<option>TikTok</option>
<option>YouTube</option>
<option>Twitch</option>
</select>

<select id="niche">
<option>Música</option><option>Games</option><option>Fitness</option>
<option>Tecnologia</option><option>Finanças</option><option>Marketing</option>
<option>Anime</option><option>Humor</option><option>Viagem</option>
<option>Culinária</option><option>Moda</option><option>IA</option>
</select>

<select id="style">
<option>Viral</option>
<option>Profissional</option>
<option>Minimalista</option>
<option>Criador</option>
</select>

<button onclick="generate()">Gerar 5 Bios</button>

<div class="box">
<b>📛 Usernames</b>
<div id="users" class="small">---</div>
</div>

<div class="box">
<b>💡 Slogan</b>
<div id="slogan" class="small">---</div>
</div>

<div class="box">
<b>📜 Histórico</b>
<div id="history" class="small">Nenhum</div>
</div>

</div>

<div class="right">
<h2>📱 Preview</h2>
<div id="preview" class="preview">Preencha os dados e gere suas bios.</div>
<div id="bios"></div>
</div>
</div>

<script>
const slogans={
"Música":"Transformando emoções em música.",
"Games":"Jogando, evoluindo e compartilhando.",
"Fitness":"Evolução diária, sem atalhos.",
"Tecnologia":"Tecnologia sem complicação.",
"Finanças":"Decisões melhores, resultados maiores.",
"Marketing":"Ideias que geram resultados.",
"Anime":"Vivendo cada episódio.",
"Humor":"Mais risadas, menos estresse.",
"Viagem":"Colecionando experiências.",
"Culinária":"Sabores que inspiram.",
"Moda":"Estilo em cada detalhe.",
"IA":"O futuro começa agora."
};

function saveHistory(item){
 let h=JSON.parse(localStorage.getItem('bioHistory')||'[]');
 h.unshift(item);
 h=h.slice(0,10);
 localStorage.setItem('bioHistory',JSON.stringify(h));
 renderHistory();
}

function renderHistory(){
 let h=JSON.parse(localStorage.getItem('bioHistory')||'[]');
 document.getElementById('history').innerHTML=h.length?h.join('<br>'):'Nenhum';
}

function copyText(t,b){
 navigator.clipboard.writeText(t);
 b.textContent='✅ Copiado';
 setTimeout(()=>b.textContent='📋 Copiar',1500);
}

function generate(){
 const name=document.getElementById('name').value||'Criador';
 const niche=document.getElementById('niche').value;
 const style=document.getElementById('style').value;
 const platform=document.getElementById('platform').value;

 const templates=[
 `🔥 ${name}\n🎯 ${niche}\n🚀 Conteúdo novo toda semana\n👇 Acompanhe agora`,
 `✨ ${name}\n📌 ${niche}\n💡 Dicas e experiências reais\n👇 Faça parte da comunidade`,
 `⚡ ${name}\n🌎 ${niche}\n📈 Evoluindo todos os dias\n👇 Confira o conteúdo`,
 `🎯 ${name}\n🔥 ${niche}\n📲 Atualizações frequentes\n👇 Veja mais`,
 `🚀 ${name}\n💬 ${niche}\n⭐ Conteúdo exclusivo\n👇 Siga para acompanhar`
 ];

 document.getElementById('preview').innerHTML=`
 <b>${name}</b><br>
 <span class="small">${platform} • ${niche} • ${style}</span>
 `;

 const bios=document.getElementById('bios');
 bios.innerHTML='';

 templates.forEach((bio,i)=>{
   const chars=bio.length;
   const card=document.createElement('div');
   card.className='bio-card';
   card.innerHTML=`
   <b>Bio ${i+1}</b>
   <pre style="white-space:pre-wrap;margin-top:8px">${bio}</pre>
   <div class="small">Caracteres: ${chars}</div>
   <button>📋 Copiar</button>`;
   card.querySelector('button').onclick=(e)=>copyText(bio,e.target);
   bios.appendChild(card);
 });

 const slug=name.toLowerCase().replace(/[^a-z0-9]/gi,'');
 document.getElementById('users').innerHTML=`
 @${slug}<br>
 @${slug}.oficial<br>
 @${slug}.${niche.toLowerCase()}<br>
 @${slug}tv<br>
 @real${slug}`;

 document.getElementById('slogan').textContent=slogans[niche]||'Crie. Compartilhe. Cresça.';

 saveHistory(new Date().toLocaleTimeString()+' - '+name);
}
renderHistory();
</script>
</body>
</html>
