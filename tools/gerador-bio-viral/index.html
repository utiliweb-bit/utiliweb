<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerador de Bio Viral | UtiliWeb</title>

<meta name="description" content="Crie bios prontas para Instagram, TikTok e YouTube em segundos.">
<meta name="keywords" content="bio instagram, bio tiktok, gerador de bio, utiliweb">

<link rel="stylesheet" href="../../assets/style.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial;
    background: linear-gradient(135deg, #2ecc71, #27ae60);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

/* WRAPPER */
.wrapper {
    width: 100%;
    max-width: 1000px;
    min-height: 600px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
}

/* ESQUERDA */
.left-panel {
    padding: 30px;
    border-right: 1px solid #eee;
}

header h1 {
    font-size: 26px;
}

.subtitle {
    font-size: 14px;
    color: #777;
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: 2px solid #ddd;
    font-size: 14px;
}

input:focus, select:focus {
    border-color: #27ae60;
    outline: none;
}

/* BOTÃO */
button {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: #27ae60;
    color: white;
}

button:hover {
    opacity: 0.9;
}

/* OUTPUT */
.output {
    margin-top: 20px;
}

textarea {
    width: 100%;
    height: 140px;
    padding: 12px;
    border-radius: 8px;
    border: 2px solid #ddd;
    resize: none;
    font-size: 14px;
}

textarea:focus {
    border-color: #27ae60;
    outline: none;
}

/* DIREITA */
.right-panel {
    padding: 30px;
    background: #eafaf1;
}

/* RESPONSIVO */
@media (max-width: 900px) {
    .wrapper {
        grid-template-columns: 1fr;
    }

    .left-panel {
        border-right: none;
        border-bottom: 1px solid #eee;
    }
}
</style>

</head>

<body>

<div class="wrapper">

    <!-- ESQUERDA -->
    <div class="left-panel">

        <header>
            <h1>🔥 Gerador de Bio Viral</h1>
            <p class="subtitle">Bios para Instagram, TikTok e YouTube</p>
        </header>

        <br>

        <a href="../../index.html">← Voltar</a>

        <input id="name" placeholder="Seu nome ou marca">

        <select id="niche">
            <option value="creator">Criador de conteúdo</option>
            <option value="fitness">Fitness</option>
            <option value="business">Negócios</option>
            <option value="music">Música</option>
            <option value="gaming">Games</option>
        </select>

        <select id="style">
            <option value="viral">🔥 Viral</option>
            <option value="pro">💼 Profissional</option>
            <option value="fun">😂 Engraçado</option>
        </select>

        <button onclick="generate()">Gerar Bio</button>

        <div class="output" id="output"></div>

    </div>

    <!-- DIREITA -->
    <div class="right-panel">

        <h2>Como funciona</h2>
        <p>
            Escolha seu estilo e nicho, depois gere uma bio pronta para redes sociais em segundos.
            Ideal para criadores e marcas.
        </p>

    </div>

</div>

<script>
function generate() {
    const name = document.getElementById("name").value;
    const niche = document.getElementById("niche").value;
    const style = document.getElementById("style").value;

    let bio = "";

    if (style === "viral") {
        bio = `🔥 ${name || "Criador de conteúdo"}\n💥 Conteúdo de ${niche}\n📈 Crescendo todos os dias\n👇 Veja meus conteúdos`;
    }

    if (style === "pro") {
        bio = `👤 ${name || "Profissional"}\n🎯 Especialista em ${niche}\n📊 Resultados reais\n📩 Contato na bio`;
    }

    if (style === "fun") {
        bio = `😂 ${name || "Criador engraçado"}\n🎮 ${niche} na área\n🚀 Só conteúdo leve\n👇 Cola aqui`;
    }

    document.getElementById("output").innerHTML = `
        <textarea readonly>${bio}</textarea>
        <button onclick="copyBio(\`${bio}\`)">📋 Copiar Bio</button>
    `;
}

function copyBio(text) {
    navigator.clipboard.writeText(text);
}
</script>

</body>
</html>
