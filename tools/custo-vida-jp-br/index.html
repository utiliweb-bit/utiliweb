<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Poder de Compra Japão vs Brasil | UtiliWeb</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#1f7a4d,#27ae60);
    min-height:100dvh;
    padding:12px;
}

.wrapper{
    width:100%;
    max-width:1100px;
    margin:auto;
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    display:grid;
    grid-template-columns:1fr 1fr;
    box-shadow:0 20px 60px rgba(0,0,0,.30);
}

.left-panel,
.right-panel{
    padding:24px;
}

.left-panel{
    border-right:1px solid #e8e8e8;
}

h2{
    font-size:24px;
    margin-bottom:5px;
}

.subtitle{
    color:#777;
    font-size:13px;
    margin-bottom:18px;
}

label{
    display:block;
    font-size:12px;
    font-weight:700;
    color:#666;
    margin-top:12px;
}

input,
select{
    width:100%;
    padding:13px;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:16px;
    margin-top:5px;
}

input:focus,
select:focus{
    outline:none;
    border-color:#27ae60;
}

button{
    width:100%;
    margin-top:18px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#27ae60;
    color:#fff;
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
}

.right-panel{
    background:linear-gradient(135deg,#e8f8f5,#d5f4e6);
}

.result-title{
    color:#27ae60;
    font-size:13px;
    font-weight:700;
    border-bottom:2px solid #27ae60;
    padding-bottom:8px;
    margin-bottom:15px;
}

.result{
    font-size:14px;
    line-height:1.8;
}

.big{
    margin-top:18px;
    font-size:22px;
    font-weight:bold;
    color:#27ae60;
}

.progress{
    width:100%;
    height:14px;
    background:#d8d8d8;
    border-radius:999px;
    overflow:hidden;
    margin-top:15px;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#27ae60;
    transition:.4s;
}

.status{
    margin-top:12px;
    font-size:16px;
    font-weight:bold;
}

.info-box{
    margin-top:15px;
    background:#fff;
    padding:12px;
    border-radius:10px;
    border:1px solid #d6eadf;
    font-size:13px;
    line-height:1.6;
}

@media(max-width:768px){

    body{
        padding:8px;
    }

    .wrapper{
        grid-template-columns:1fr;
    }

    .left-panel{
        border-right:none;
        border-bottom:1px solid #e8e8e8;
    }

    .left-panel,
    .right-panel{
        padding:18px;
    }

    h2{
        font-size:22px;
    }

    .big{
        font-size:20px;
    }
}

</style>
</head>
<body>

<div class="wrapper">

<div class="left-panel">

<h2>🌍 Japão vs Brasil</h2>
<div class="subtitle">
Simulador de Poder de Compra
</div>

<label>País</label>
<select id="pais">
<option value="JP">🇯🇵 Japão</option>
<option value="BR">🇧🇷 Brasil</option>
</select>

<label>Salário Mensal</label>
<input id="salario" type="number" placeholder="Ex: 300000">

<label>Moradia / Aluguel</label>
<input id="aluguel" type="number" placeholder="Ex: 80000">

<label>Alimentação</label>
<input id="comida" type="number" placeholder="Ex: 40000">

<label>Transporte</label>
<input id="transporte" type="number" placeholder="Ex: 15000">

<label>Outras Despesas</label>
<input id="extras" type="number" placeholder="Ex: 20000">

<button onclick="calcular()">
Calcular Poder de Compra
</button>

</div>

<div class="right-panel">

<div class="result-title">
Resultado
</div>

<div class="result" id="out">
Preencha os dados para calcular.
</div>

<div class="progress">
<div id="bar" class="progress-bar"></div>
</div>

<div class="status" id="status"></div>

<div class="big" id="score"></div>

<div class="info-box" id="dica">
A porcentagem representa quanto do salário sobra após as despesas.
</div>

</div>

</div>

<script>

function calcular(){

const salario =
parseFloat(document.getElementById("salario").value)||0;

const aluguel =
parseFloat(document.getElementById("aluguel").value)||0;

const comida =
parseFloat(document.getElementById("comida").value)||0;

const transporte =
parseFloat(document.getElementById("transporte").value)||0;

const extras =
parseFloat(document.getElementById("extras").value)||0;

const pais =
document.getElementById("pais").value;

if(salario <= 0){

document.getElementById("out").innerHTML =
"❌ Informe um salário válido.";

return;
}

const moeda = pais === "JP" ? "¥" : "R$";

const gastos =
aluguel + comida + transporte + extras;

const sobra =
salario - gastos;

const percentual =
Math.max(0,(sobra/salario)*100);

let status = "";
let dica = "";

if(percentual >= 50){
status = "🟢 Excelente";
dica = "Você consegue guardar uma parte significativa da renda.";
}
else if(percentual >= 30){
status = "🟡 Boa";
dica = "Sua situação financeira parece equilibrada.";
}
else if(percentual >= 15){
status = "🟠 Atenção";
dica = "Pouca margem para emergências e imprevistos.";
}
else{
status = "🔴 Crítica";
dica = "Grande parte da renda está comprometida.";
}

document.getElementById("out").innerHTML = `

💰 Salário: ${moeda}${salario.toLocaleString()}

<br><br>

🏠 Moradia: ${moeda}${aluguel.toLocaleString()}

<br>

🍜 Alimentação: ${moeda}${comida.toLocaleString()}

<br>

🚆 Transporte: ${moeda}${transporte.toLocaleString()}

<br>

💡 Outras despesas: ${moeda}${extras.toLocaleString()}

<br><br>

📉 Gastos totais:
<b>${moeda}${gastos.toLocaleString()}</b>

<br><br>

💵 Dinheiro livre:
<b>${moeda}${sobra.toLocaleString()}</b>

`;

document.getElementById("score").innerHTML =
"📊 " + percentual.toFixed(1) + "% livres";

document.getElementById("status").innerHTML =
status;

document.getElementById("bar").style.width =
percentual + "%";

document.getElementById("dica").innerHTML =
dica;
}

</script>

</body>
</html>
