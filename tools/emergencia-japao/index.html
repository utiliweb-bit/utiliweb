<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>🚨 Emergência Japão</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f3f3f3;
}

header{
background:#c62828;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:700px;
margin:auto;
padding:15px;
}

.box{
background:white;
border-radius:15px;
padding:15px;
margin:15px 0;
box-shadow:0 3px 10px #ddd;
}

button{
border:0;
padding:10px;
border-radius:10px;
cursor:pointer;
margin:5px;
}

.call{
display:flex;
gap:10px;
}

.call a{
flex:1;
padding:15px;
color:white;
text-align:center;
border-radius:12px;
text-decoration:none;
}

.police{background:#1565c0}
.help{background:#d32f2f}
.sea{background:#00897b}

.jp{
font-size:22px;
}

.romaji{
color:#1565c0;
font-weight:bold;
font-size:18px;
}

.pt{
color:#555;
}

.search{
width:100%;
padding:15px;
border-radius:10px;
border:1px solid #ccc;
}

.star{
float:right;
font-size:25px;
}

.favorite{
color:#ff9800;
}

</style>

</head>


<body>


<header>

<h1>🚨 Emergência Japão</h1>

<p>Ajuda rápida em português</p>

</header>


<div class="container">


<div class="box">

<h2>📞 Ligações</h2>

<div class="call">

<a class="police" href="tel:110">
👮 110<br>Polícia
</a>

<a class="help" href="tel:119">
🚑 119<br>Ambulância
</a>

<a class="sea" href="tel:118">
🌊 118<br>Mar
</a>

</div>

</div>



<div class="box">

<button onclick="localizacao()">
📍 Mostrar minha localização
</button>


<button onclick="mostrarEndereco()">
🏠 Meu endereço
</button>


</div>



<div class="box">


<input 
class="search"
placeholder="🔎 Procurar frase..."
onkeyup="buscar(this.value)">


</div>




<div id="lista"></div>



</div>




<script>


const frases=[


["警察を呼んでください",
"Keisatsu o yonde kudasai",
"Chame a polícia"],


["救急車を呼んでください",
"Kyūkyūsha o yonde kudasai",
"Chame uma ambulância"],


["火事です",
"Kaji desu",
"É um incêndio"],


["助けてください",
"Tasukete kudasai",
"Preciso de ajuda"],


["日本語が話せません",
"Nihongo ga hanasemasen",
"Não falo japonês"],


["ゆっくり話してください",
"Yukkuri hanashite kudasai",
"Fale devagar"],


["住所はここです",
"Jūsho wa koko desu",
"O endereço é aqui"],


["通訳が必要です",
"Tsūyaku ga hitsuyō desu",
"Preciso de intérprete"],


["怪我をしています",
"Kega o shiteimasu",
"Estou machucado"],


["病院に行きたいです",
"Byōin ni ikitai desu",
"Quero ir ao hospital"]

];



function carregar(){


let html="";

let fav=
JSON.parse(localStorage.getItem("fav")||"[]");


frases.forEach((f,i)=>{


let ativo=fav.includes(i);


html+=`

<div class="box frase">


<span class="star ${ativo?'favorite':''}"
onclick="favorito(${i})">
⭐
</span>


<div class="pt">
${f[2]}
</div>


<div class="jp">
${f[0]}
</div>


<div class="romaji">
${f[1]}
</div>


<button onclick="ouvir('${f[0]}')">
🔊 Ouvir
</button>


<button onclick="copiar('${f[1]}')">
📋 Copiar
</button>


</div>


`;


});


document.getElementById("lista").innerHTML=html;


}



function ouvir(txt){

let fala=new SpeechSynthesisUtterance(txt);

fala.lang="ja-JP";

speechSynthesis.speak(fala);

}



function copiar(txt){

navigator.clipboard.writeText(txt);

alert("Copiado!");

}



function favorito(i){

let fav=
JSON.parse(localStorage.getItem("fav")||"[]");


if(fav.includes(i)){

fav=fav.filter(x=>x!=i);

}else{

fav.push(i);

}


localStorage.setItem(
"fav",
JSON.stringify(fav)
);


carregar();

}



function buscar(t){

document.querySelectorAll(".frase")
.forEach(x=>{


x.style.display=
x.innerText
.toLowerCase()
.includes(t.toLowerCase())
?
"block"
:
"none";


});


}



function localizacao(){


navigator.geolocation.getCurrentPosition(

p=>{

let url=
`https://maps.google.com/?q=${p.coords.latitude},${p.coords.longitude}`;

window.open(url);

},

()=>{

alert("Não foi possível obter localização");

}

);


}



function mostrarEndereco(){


let end=
localStorage.getItem("endereco");


if(!end){

end=
prompt("Digite seu endereço em japonês:");

localStorage.setItem(
"endereco",
end
);

}


alert(
"住所はここです\n\n"+end
);


}



carregar();


</script>


</body>

</html>
