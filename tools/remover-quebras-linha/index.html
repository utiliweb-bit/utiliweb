<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Remover Quebras de Linha | UtiliWeb</title>
    <meta name="description" content="Ferramenta profissional para remover quebras de linha e formatar textos automaticamente.">
    <meta name="robots" content="index, follow">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* CONTAINER PRINCIPAL */
        .container {
            width: 100%;
            max-width: 1200px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15), 0 0 1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
        }

        /* HEADER */
        .header {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .header p {
            font-size: 15px;
            opacity: 0.95;
            font-weight: 300;
        }

        /* PAINÉIS */
        .panel {
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        .panel.left {
            border-right: 1px solid #f0f0f0;
        }

        .panel.right {
            background: #fafafa;
        }

        /* SEÇÃO */
        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: #667eea;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title i {
            font-size: 16px;
        }

        /* TEXTAREA */
        .textarea-wrapper {
            margin-bottom: 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        textarea {
            width: 100%;
            flex: 1;
            min-height: 200px;
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            resize: none;
            transition: all 0.3s ease;
            background: #fff;
            color: #333;
            line-height: 1.6;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea::placeholder {
            color: #999;
        }

        /* RESULTADO */
        .result-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .result-box {
            flex: 1;
            background: #fff;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 16px;
            font-size: 14px;
            line-height: 1.6;
            word-break: break-word;
            white-space: pre-wrap;
            overflow-y: auto;
            color: #333;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            min-height: 200px;
            transition: all 0.3s ease;
        }

        .result-box.empty {
            color: #999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-style: italic;
        }

        /* BOTÕES */
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 120px;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover {
            background: #e8e8e8;
            border-color: #d0d0d0;
        }

        .btn-secondary:active {
            background: #e0e0e0;
        }

        /* MENSAGENS */
        .feedback-message {
            margin-top: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            display: none;
            align-items: center;
            gap: 8px;
            animation: slideIn 0.3s ease;
        }

        .feedback-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .feedback-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ESTATÍSTICAS */
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .stat-item {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        /* RESPONSIVO */
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }

            .panel.left {
                border-right: none;
                border-bottom: 1px solid #f0f0f0;
            }

            .panel.right {
                background: #ffffff;
            }
        }

        @media (max-width: 768px) {
            html, body {
                padding: 12px;
            }

            .header {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .panel {
                padding: 24px;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 20px;
                flex-direction: column;
                gap: 8px;
            }

            .section-title {
                font-size: 12px;
            }

            textarea, .result-box {
                min-height: 150px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <h1>
                <i class="fas fa-file-alt"></i>
                Remover Quebras de Linha
            </h1>
            <p>Ferramenta profissional para formatar e limpar textos automaticamente</p>
        </div>

        <!-- PAINEL ESQUERDO - INPUT -->
        <div class="panel left">
            <div class="section-title">
                <i class="fas fa-keyboard"></i>
                Texto de Entrada
            </div>
            <div class="textarea-wrapper">
                <textarea id="text" placeholder="Cole ou digite seu texto aqui. Quebras de linha dentro de parágrafos serão removidas..."></textarea>
            </div>
            <div class="button-group">
                <button class="btn-primary" onclick="removeLines()">
                    <i class="fas fa-magic"></i>
                    Processar
                </button>
                <button class="btn-secondary" onclick="resetAll()">
                    <i class="fas fa-trash"></i>
                    Limpar
                </button>
            </div>
            <div class="feedback-message success" id="copyMsg">
                <i class="fas fa-check-circle"></i>
                <span>Copiado com sucesso!</span>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="charCount">0</div>
                    <div class="stat-label">Caracteres</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="lineCount">0</div>
                    <div class="stat-label">Linhas</div>
                </div>
            </div>
        </div>

        <!-- PAINEL DIREITO - RESULTADO -->
        <div class="panel right">
            <div class="section-title">
                <i class="fas fa-eye"></i>
                Resultado
            </div>
            <div class="result-wrapper">
                <div id="result" class="result-box empty" aria-live="polite">
                    Seu resultado aparecerá aqui
                </div>
            </div>
            <button class="btn-secondary" onclick="copyText()" style="margin-top: 24px;">
                <i class="fas fa-copy"></i>
                Copiar Resultado
            </button>
        </div>
    </div>

    <script>
        const input = document.getElementById("text");
        const result = document.getElementById("result");
        const copyMsg = document.getElementById("copyMsg");
        const charCount = document.getElementById("charCount");
        const lineCount = document.getElementById("lineCount");

        // Adicionar botão de modo escuro dinamicamente
        const darkModeBtn = document.createElement('button');
        darkModeBtn.className = 'btn-secondary';
        darkModeBtn.style.position = 'fixed';
        darkModeBtn.style.bottom = '20px';
        darkModeBtn.style.right = '20px';
        darkModeBtn.style.width = '50px';
        darkModeBtn.style.height = '50px';
        darkModeBtn.style.borderRadius = '50%';
        darkModeBtn.style.zIndex = '1000';
        darkModeBtn.innerHTML = '<i class="fas fa-moon"></i>';
        darkModeBtn.onclick = toggleDarkMode;
        document.body.appendChild(darkModeBtn);

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            darkModeBtn.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            localStorage.setItem('darkMode', isDark);
        }

        // Estilos para o modo escuro
        const style = document.createElement('style');
        style.textContent = `
            body.dark-mode { background: #1a1a1a; }
            body.dark-mode .container { background: #2d2d2d; box-shadow: 0 25px 50px rgba(0,0,0,0.4); }
            body.dark-mode .panel.left { border-color: #444; }
            body.dark-mode .panel.right { background: #252525; }
            body.dark-mode .section-title { color: #8194f2; }
            body.dark-mode textarea, body.dark-mode .result-box { background: #333; border-color: #444; color: #eee; }
            body.dark-mode .btn-secondary { background: #3d3d3d; border-color: #555; color: #eee; }
            body.dark-mode .stat-item { background: #3d3d3d; }
            body.dark-mode .stat-value { color: #8194f2; }
        `;
        document.head.appendChild(style);

        if (localStorage.getItem('darkMode') === 'true') toggleDarkMode();

        const PLACEHOLDER_TEXT = "Seu resultado aparecerá aqui";
        const EMPTY_MESSAGE = "Nada para processar";

        function updateStats() {
            const text = input.value;
            charCount.textContent = text.length;
            lineCount.textContent = text.split('\n').length;
        }

        function removeLines() {
            const raw = (input.value || "");

            if (!raw.trim()) {
                result.textContent = EMPTY_MESSAGE;
                result.classList.add("empty");
                return;
            }

            // Divide em parágrafos (linhas em branco separam parágrafos)
            const paragraphs = raw.split(/(?:\r?\n|\r){2,}/);

            // Dentro de cada parágrafo, junta as linhas com espaço
            const cleaned = paragraphs
                .map(p => p.replace(/\r\n|\r|\n/g, " ").replace(/\s+/g, " ").trim())
                .filter(p => p.length > 0)
                .join("\n\n");

            result.textContent = cleaned || EMPTY_MESSAGE;
            result.classList.remove("empty");
        }

        async function copyText() {
            const texto = result.textContent.trim();

            if (!texto || texto === PLACEHOLDER_TEXT || texto === EMPTY_MESSAGE) {
                showFeedback("Nada para copiar", "error");
                return;
            }

            try {
                await navigator.clipboard.writeText(texto);
                showFeedback("Copiado com sucesso!", "success");
            } catch (error) {
                showFeedback("Erro ao copiar. Tente novamente.", "error");
            }
        }

        function showFeedback(message, type) {
            copyMsg.textContent = message;
            copyMsg.className = `feedback-message ${type}`;
            copyMsg.style.display = "flex";

            setTimeout(() => {
                copyMsg.style.display = "none";
            }, 2500);
        }

        function resetAll() {
            input.value = "";
            result.textContent = PLACEHOLDER_TEXT;
            result.classList.add("empty");
            updateStats();
        }

        // Event listeners
        input.addEventListener("input", () => {
            removeLines();
            updateStats();
        });

        // Inicializar
        updateStats();
    </script>
</body>
</html>
