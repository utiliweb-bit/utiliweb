<script>
let lembretes = JSON.parse(localStorage.getItem('lembretes-prazos-desktop')) || [];
let abaAtiva = 'diferenca';

function mudarAba(aba, event) {
    abaAtiva = aba;

    document.querySelectorAll('.aba-btn').forEach(btn => btn.classList.remove('ativo'));
    if (event) event.currentTarget.classList.add('ativo');

    document.querySelectorAll('.aba-conteudo').forEach(el => el.classList.remove('ativo'));
    document.getElementById(`aba-${aba}`).classList.add('ativo');

    limparResultado();
}

window.addEventListener('load', () => {
    const hoje = new Date().toISOString().split('T')[0];
    const el = document.getElementById('dataFinal');
    if (el) el.value = hoje;

    atualizarLembretes();
});

// 🔥 cálculo principal
function calcular() {
    if (abaAtiva === 'diferenca') {
        calcularDiferenca();
    } else {
        calcularDataFutura();
    }
}

// 📅 diferença entre datas
function calcularDiferenca() {
    let dataInicial = document.getElementById('dataInicial').value;
    const dataFinal = document.getElementById('dataFinal').value;

    if (!dataFinal) return mostrarStatus("Preencha a data final", "urgente");

    if (!dataInicial) {
        dataInicial = new Date().toISOString().split('T')[0];
    }

    const d1 = new Date(dataInicial + "T00:00:00");
    const d2 = new Date(dataFinal + "T00:00:00");

    const diffMs = d2.getTime() - d1.getTime();
    const totalDias = Math.round(diffMs / 86400000);

    const tempo = calcularTempoComposto(d1, d2);

    exibirResultadoDiferenca(tempo, totalDias);

    adicionarLembrete(dataFinal, `Prazo até ${dataFinal}`);
}

// 📊 tempo composto
function calcularTempoComposto(data1, data2) {
    if (data1 > data2) [data1, data2] = [data2, data1];

    let anos = 0, meses = 0, dias = 0;
    let temp = new Date(data1);

    while (new Date(temp.getFullYear() + 1, temp.getMonth(), temp.getDate()) <= data2) {
        anos++;
        temp.setFullYear(temp.getFullYear() + 1);
    }

    while (new Date(temp.getFullYear(), temp.getMonth() + 1, temp.getDate()) <= data2) {
        meses++;
        temp.setMonth(temp.getMonth() + 1);
    }

    while (temp < data2) {
        dias++;
        temp.setDate(temp.getDate() + 1);
    }

    return { anos, meses, dias };
}

// 🔮 data futura
function calcularDataFutura() {
    const dataFutura = document.getElementById('dataFutura').value;

    if (!dataFutura) return mostrarStatus("Preencha a data futura", "urgente");

    const hoje = new Date();
    const data = new Date(dataFutura + "T00:00:00");

    const dias = Math.round((data - hoje) / 86400000);

    exibirResultadoFutura(data.toLocaleDateString('pt-BR'), dias);

    adicionarLembrete(dataFutura, `Prazo: ${dataFutura}`);
}

// 📊 resultado diferença
function exibirResultadoDiferenca(tempo, totalDias) {
    const { anos, meses, dias } = tempo;

    mostrarResultados(true);

    setText('resultado1Label', 'Anos');
    setText('resultado1Valor', anos);

    setText('resultado2Label', 'Meses');
    setText('resultado2Valor', meses);

    setText('resultado3Label', 'Dias');
    setText('resultado3Valor', dias);

    const partes = [];
    if (anos) partes.push(`${anos}a`);
    if (meses) partes.push(`${meses}m`);
    if (dias) partes.push(`${dias}d`);

    setText('totalLabel', partes.length ? `Faltam ${partes.join(" ")}` : "Hoje é o dia!");
    setText('total', totalDias);
    setText('diasAuxiliar', `${totalDias} dias`);

    setBadge(totalDias);
}

// 📊 resultado futura
function exibirResultadoFutura(data, dias) {
    mostrarResultados(true);

    setText('resultado1Label', 'Data');
    setText('resultado1Valor', data);

    document.getElementById('resultado2').style.display = 'none';
    document.getElementById('resultado3').style.display = 'none';

    setText('totalLabel', 'Dias restantes');
    setText('total', dias);
    setText('diasAuxiliar', '');

    setBadge(dias);
}

// 🟢 badge status
function setBadge(dias) {
    const badge = document.getElementById('statusBadge');
    if (!badge) return;

    let html = '';

    if (dias < 0) {
        html = '❌ Vencido';
    } else if (dias <= 30) {
        html = '⚠️ Urgente';
    } else if (dias <= 90) {
        html = '⏰ Próximo';
    } else {
        html = '✓ OK';
    }

    badge.innerHTML = `<div class="status-badge">${html}</div>`;
}

// 📋 copiar
function copiarResultado() {
    const texto = `${document.getElementById('totalLabel').textContent} - ${document.getElementById('total').textContent}`;
    navigator.clipboard.writeText(texto);

    const btn = event?.target;
    if (!btn) return;

    const old = btn.textContent;
    btn.textContent = "✓ Copiado!";
    setTimeout(() => btn.textContent = old, 1200);
}

// 🧹 limpar
function limpar() {
    ['dataInicial','dataFinal','dataFutura'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
    });

    limparResultado();
}

// 🧼 reset UI
function limparResultado() {
    mostrarResultados(false);

    const badge = document.getElementById('statusBadge');
    if (badge) badge.innerHTML = '';
}

// 👁 helpers UI
function mostrarResultados(show) {
    document.getElementById('resultadoItems').style.display = show ? 'block' : 'none';
    document.getElementById('resultadoTotal').style.display = show ? 'block' : 'none';
}

function setText(id, value) {
    const el = document.getElementById(id);
    if (el) el.textContent = value;
}

// ⚠ status simples
function mostrarStatus(msg) {
    setBadge(0);
    document.getElementById('statusBadge').innerHTML =
        `<div class="status-badge urgente">${msg}</div>`;
}
</script>
