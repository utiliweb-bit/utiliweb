<script>
/* =========================
   UTILIWEB CORE - PRAZOS PRO
========================= */

let lembretes = JSON.parse(localStorage.getItem('lembretes-prazos-desktop')) || [];
let abaAtiva = 'diferenca';

/* =========================
   ABA SWITCH
========================= */
function mudarAba(aba, event) {
    abaAtiva = aba;

    document.querySelectorAll('.aba-btn').forEach(btn => btn.classList.remove('ativo'));
    if (event?.currentTarget) event.currentTarget.classList.add('ativo');

    document.querySelectorAll('.aba-conteudo').forEach(el => el.classList.remove('ativo'));
    const alvo = document.getElementById(`aba-${aba}`);
    if (alvo) alvo.classList.add('ativo');

    limparResultado();
}

/* =========================
   INIT
========================= */
window.addEventListener('load', () => {
    const hoje = new Date().toISOString().split('T')[0];
    const dataFinal = document.getElementById('dataFinal');

    if (dataFinal) dataFinal.value = hoje;

    atualizarLembretes?.();
});

/* =========================
   MAIN CALC
========================= */
function calcular() {
    abaAtiva === 'diferenca'
        ? calcularDiferenca()
        : calcularDataFutura();
}

/* =========================
   DIFERENÇA ENTRE DATAS
========================= */
function calcularDiferenca() {
    let inicio = document.getElementById('dataInicial')?.value;
    const fim = document.getElementById('dataFinal')?.value;

    if (!fim) return mostrarStatus("Preencha a data final");

    if (!inicio) {
        inicio = new Date().toISOString().split('T')[0];
    }

    const d1 = new Date(inicio + "T00:00:00");
    const d2 = new Date(fim + "T00:00:00");

    const diffMs = d2 - d1;
    const totalDias = Math.round(diffMs / 86400000);

    const tempo = calcularTempoComposto(d1, d2);

    exibirResultadoDiferenca(tempo, totalDias);

    adicionarLembrete?.(fim, `Prazo até ${fim}`);
}

/* =========================
   TEMPO COMPOSTO
========================= */
function calcularTempoComposto(d1, d2) {
    if (d1 > d2) [d1, d2] = [d2, d1];

    let anos = 0, meses = 0, dias = 0;
    let temp = new Date(d1);

    while (new Date(temp.getFullYear() + 1, temp.getMonth(), temp.getDate()) <= d2) {
        anos++;
        temp.setFullYear(temp.getFullYear() + 1);
    }

    while (new Date(temp.getFullYear(), temp.getMonth() + 1, temp.getDate()) <= d2) {
        meses++;
        temp.setMonth(temp.getMonth() + 1);
    }

    while (temp < d2) {
        dias++;
        temp.setDate(temp.getDate() + 1);
    }

    return { anos, meses, dias };
}

/* =========================
   DATA FUTURA
========================= */
function calcularDataFutura() {
    const input = document.getElementById('dataFutura')?.value;

    if (!input) return mostrarStatus("Preencha a data futura");

    const hoje = new Date();
    const data = new Date(input + "T00:00:00");

    const dias = Math.round((data - hoje) / 86400000);

    exibirResultadoFutura(
        data.toLocaleDateString('pt-BR'),
        dias
    );

    adicionarLembrete?.(input, `Prazo: ${input}`);
}

/* =========================
   RESULTADOS
========================= */
function exibirResultadoDiferenca(t, totalDias) {
    mostrarResultados(true);

    setText('resultado1Label', 'Anos');
    setText('resultado1Valor', t.anos);

    setText('resultado2Label', 'Meses');
    setText('resultado2Valor', t.meses);

    setText('resultado3Label', 'Dias');
    setText('resultado3Valor', t.dias);

    const partes = [];
    if (t.anos) partes.push(`${t.anos}a`);
    if (t.meses) partes.push(`${t.meses}m`);
    if (t.dias) partes.push(`${t.dias}d`);

    setText('totalLabel', partes.length ? `Faltam ${partes.join(" ")}` : "Hoje é o dia!");
    setText('total', totalDias);
    setText('diasAuxiliar', `${totalDias} dias`);

    setBadge(totalDias);
}

function exibirResultadoFutura(data, dias) {
    mostrarResultados(true);

    setText('resultado1Label', 'Data');
    setText('resultado1Valor', data);

    hide('resultado2');
    hide('resultado3');

    setText('totalLabel', 'Dias restantes');
    setText('total', dias);
    setText('diasAuxiliar', '');

    setBadge(dias);
}

/* =========================
   BADGE STATUS
========================= */
function setBadge(dias) {
    const badge = document.getElementById('statusBadge');
    if (!badge) return;

    let text = '✓ OK';

    if (dias < 0) text = '❌ Vencido';
    else if (dias <= 30) text = '⚠️ Urgente';
    else if (dias <= 90) text = '⏰ Próximo';

    badge.innerHTML = `<div class="status-badge">${text}</div>`;
}

/* =========================
   COPIAR
========================= */
function copiarResultado() {
    const texto =
        `${getText('totalLabel')} - ${getText('total')}`;

    navigator.clipboard.writeText(texto);

    const btn = event?.target;
    if (!btn) return;

    const old = btn.textContent;
    btn.textContent = "✓ Copiado!";
    setTimeout(() => btn.textContent = old, 1200);
}

/* =========================
   LIMPAR
========================= */
function limpar() {
    ['dataInicial','dataFinal','dataFutura'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
    });

    limparResultado();
}

function limparResultado() {
    mostrarResultados(false);

    const badge = document.getElementById('statusBadge');
    if (badge) badge.innerHTML = '';
}

/* =========================
   HELPERS UI
========================= */
function mostrarResultados(show) {
    const items = document.getElementById('resultadoItems');
    const total = document.getElementById('resultadoTotal');

    if (items) items.style.display = show ? 'block' : 'none';
    if (total) total.style.display = show ? 'block' : 'none';
}

function setText(id, value) {
    const el = document.getElementById(id);
    if (el) el.textContent = value;
}

function getText(id) {
    const el = document.getElementById(id);
    return el ? el.textContent : '';
}

function hide(id) {
    const el = document.getElementById(id);
    if (el) el.style.display = 'none';
}

/* =========================
   STATUS
========================= */
function mostrarStatus(msg) {
    setBadge(0);

    const badge = document.getElementById('statusBadge');
    if (badge) {
        badge.innerHTML = `<div class="status-badge urgente">${msg}</div>`;
    }
}
</script>
