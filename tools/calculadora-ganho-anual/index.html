<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Calculadora Premium de Ganho Anual — Interface sofisticada para gerenciar seus rendimentos.">
    <title>Calculadora Premium | Ganho Anual</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00d4ff;
            --primary-dark: #0099cc;
            --accent: #ff006e;
            --accent-light: #ff4d94;
            --success: #00f5a0;
            --bg-dark: #0a0e27;
            --bg-darker: #050812;
            --surface: rgba(255, 255, 255, 0.05);
            --surface-light: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #b0b9c3;
            --border-color: rgba(255, 255, 255, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1a1f3a, var(--bg-darker));
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            background-attachment: fixed;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 24px;
            align-items: start;
        }

        /* Glassmorphism Panel */
        .panel {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        /* Header */
        .header {
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Controls */
        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 32px;
        }

        .select-field label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        select {
            width: 100%;
            padding: 14px;
            background: var(--surface-light);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            outline: none;
        }

        /* Months Grid */
        .months-title {
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .months-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .months-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .month-card {
            background: var(--surface-light);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            transition: var(--transition);
        }

        .month-card:hover {
            border-color: var(--primary);
            background: rgba(0, 212, 255, 0.05);
            transform: translateY(-2px);
        }

        .month-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .month-name {
            font-size: 13px;
            font-weight: 700;
        }

        .month-jp {
            font-size: 11px;
            color: var(--primary);
            opacity: 0.8;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .currency-symbol {
            position: absolute;
            left: 12px;
            font-size: 14px;
            font-weight: 700;
            color: var(--primary);
        }

        .month-input {
            width: 100%;
            padding: 12px 12px 12px 34px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            outline: none;
            transition: var(--transition);
        }

        .month-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        /* Results Panel */
        .results-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: sticky;
            top: 40px;
        }

        .metric-card {
            background: var(--surface-light);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            transition: var(--transition);
        }

        .metric-card.featured {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15) 0%, rgba(255, 0, 110, 0.1) 100%);
            border: 1px solid var(--primary);
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.15);
        }

        .metric-label {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 32px;
            font-weight: 900;
            color: var(--primary);
            font-family: 'Courier New', monospace;
        }

        .metric-footer {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        /* Actions */
        .actions-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            padding: 16px;
            border-radius: 14px;
            border: none;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--bg-darker);
            grid-column: span 2;
        }

        .btn-secondary {
            background: var(--surface-light);
            color: white;
            border: 1px solid var(--border-color);
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        /* Chart */
        .chart-container {
            margin-top: 10px;
        }

        .chart-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .chart-label {
            width: 30px;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-secondary);
        }

        .chart-bar-bg {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
        }

        .chart-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent-light));
            width: 0%;
            transition: width 0.6s ease;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
            .results-panel {
                position: static;
            }
        }

        @media (max-width: 600px) {
            .months-grid {
                grid-template-columns: 1fr;
            }
            body {
                padding: 20px 10px;
            }
        }

        /* Status Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success);
            color: var(--bg-darker);
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 4px 20px rgba(0, 245, 160, 0.3);
            z-index: 1000;
            display: none;
        }
    </style>
</head>
<body>

<div id="toast" class="toast">✓ Copiado!</div>

<div class="container">
    <!-- INPUTS -->
    <div class="panel">
        <div class="header">
            <h1>💰 Ganho Anual</h1>
            <p>Gestão Premium de Rendimentos</p>
        </div>

        <div class="controls-grid">
            <div class="select-field">
                <label>Ano Fiscal</label>
                <select id="year-select"></select>
            </div>
            <div class="select-field">
                <label>Moeda</label>
                <select id="currency-select">
                    <option value="BRL">R$ Real (BRL)</option>
                    <option value="JPY">¥ Iene (JPY)</option>
                    <option value="USD">$ Dólar (USD)</option>
                    <option value="EUR">€ Euro (EUR)</option>
                </select>
            </div>
        </div>

        <div class="months-title">Rendimentos Mensais</div>
        <div class="months-grid" id="months-grid"></div>

        <div class="actions-grid">
            <button class="btn btn-primary" onclick="calculateAll()">Calcular Total Anual</button>
            <button class="btn btn-secondary" onclick="copySummary()">Copiar Resumo</button>
            <button class="btn btn-secondary" onclick="exportCSV()">Exportar CSV</button>
            <button class="btn btn-secondary" onclick="clearData()" style="grid-column: span 2; margin-top: 8px; background: rgba(255,0,0,0.1); border-color: rgba(255,0,0,0.2); color: #ff4d4d;">Limpar Todos os Dados</button>
        </div>
    </div>

    <!-- RESULTS -->
    <div class="results-panel">
        <div class="panel metric-card featured">
            <div class="metric-label">Total Anual Bruto</div>
            <div class="metric-value" id="res-total">0,00</div>
            <div class="metric-footer" id="res-footer">Ano 2026 • 0 meses ativos</div>
        </div>

        <div class="panel metric-card">
            <div class="metric-label">Média Mensal</div>
            <div class="metric-value" id="res-avg">0,00</div>
            <div class="metric-footer">Baseado nos meses preenchidos</div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div class="panel metric-card">
                <div class="metric-label">Pico</div>
                <div class="metric-value" style="font-size: 18px;" id="res-max">0,00</div>
                <div class="metric-footer" id="res-max-month">-</div>
            </div>
            <div class="panel metric-card">
                <div class="metric-label">Mínimo</div>
                <div class="metric-value" style="font-size: 18px;" id="res-min">0,00</div>
                <div class="metric-footer" id="res-min-month">-</div>
            </div>
        </div>

        <div class="panel">
            <div class="metric-label">Distribuição por Mês</div>
            <div class="chart-container" id="chart-bars"></div>
        </div>
    </div>
</div>

<script>
    const MONTHS = [
        { n: 'Janeiro', s: 'Jan', jp: '1月' }, { n: 'Fevereiro', s: 'Fev', jp: '2月' },
        { n: 'Março', s: 'Mar', jp: '3月' }, { n: 'Abril', s: 'Abr', jp: '4月' },
        { n: 'Maio', s: 'Mai', jp: '5月' }, { n: 'Junho', s: 'Jun', jp: '6月' },
        { n: 'Julho', s: 'Jul', jp: '7月' }, { n: 'Agosto', s: 'Ago', jp: '8月' },
        { n: 'Setembro', s: 'Set', jp: '9月' }, { n: 'Outubro', s: 'Out', jp: '10月' },
        { n: 'Novembro', s: 'Nov', jp: '11月' }, { n: 'Dezembro', s: 'Dez', jp: '12月' }
    ];

    const CURRENCIES = {
        BRL: { locale: 'pt-BR', symbol: 'R$' },
        JPY: { locale: 'ja-JP', symbol: '¥' },
        USD: { locale: 'en-US', symbol: '$' },
        EUR: { locale: 'de-DE', symbol: '€' }
    };

    let state = {
        year: new Date().getFullYear(),
        currency: 'BRL',
        values: Array(12).fill(0)
    };

    function init() {
        loadState();
        setupYearSelect();
        renderGrid();
        renderChart();
        updateDisplay();

        document.getElementById('year-select').addEventListener('change', e => {
            state.year = e.target.value;
            saveState();
            updateDisplay();
        });

        document.getElementById('currency-select').addEventListener('change', e => {
            state.currency = e.target.value;
            saveState();
            updateDisplay();
            renderGrid();
        });
    }

    function setupYearSelect() {
        const select = document.getElementById('year-select');
        const currentYear = new Date().getFullYear();
        for (let i = currentYear + 1; i >= currentYear - 5; i--) {
            const opt = document.createElement('option');
            opt.value = i; opt.textContent = i;
            if (i === parseInt(state.year)) opt.selected = true;
            select.appendChild(opt);
        }
    }

    function renderGrid() {
        const grid = document.getElementById('months-grid');
        grid.innerHTML = '';
        const symbol = CURRENCIES[state.currency].symbol;

        MONTHS.forEach((m, i) => {
            const card = document.createElement('div');
            card.className = 'month-card';
            card.innerHTML = `
                <div class="month-label">
                    <span class="month-name">${m.n}</span>
                    <span class="month-jp">${m.jp}</span>
                </div>
                <div class="input-wrapper">
                    <span class="currency-symbol">${symbol}</span>
                    <input type="text" class="month-input" placeholder="0,00" 
                           value="${state.values[i] > 0 ? formatInput(state.values[i]) : ''}"
                           oninput="handleInput(this, ${i})">
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function renderChart() {
        const container = document.getElementById('chart-bars');
        container.innerHTML = '';
        MONTHS.forEach((m, i) => {
            const row = document.createElement('div');
            row.className = 'chart-row';
            row.innerHTML = `
                <div class="chart-label">${m.s}</div>
                <div class="chart-bar-bg"><div class="chart-bar-fill" id="bar-${i}"></div></div>
            `;
            container.appendChild(row);
        });
    }

    function handleInput(el, index) {
        let val = el.value.replace(/\D/g, '');
        let numericVal = parseFloat(val) / 100;
        if (isNaN(numericVal)) numericVal = 0;
        state.values[index] = numericVal;
        el.value = formatInput(numericVal);
        saveState();
        calculateAll();
    }

    function formatInput(val) {
        if (val === 0) return '';
        return val.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function formatCurrency(val) {
        const config = CURRENCIES[state.currency];
        return new Intl.NumberFormat(config.locale, { style: 'currency', currency: state.currency }).format(val);
    }

    function calculateAll() {
        const active = state.values.filter(v => v > 0);
        const total = state.values.reduce((a, b) => a + b, 0);
        const avg = active.length > 0 ? total / active.length : 0;
        const max = active.length > 0 ? Math.max(...active) : 0;
        const min = active.length > 0 ? Math.min(...active) : 0;

        document.getElementById('res-total').textContent = formatCurrency(total);
        document.getElementById('res-avg').textContent = formatCurrency(avg);
        document.getElementById('res-max').textContent = formatCurrency(max);
        document.getElementById('res-min').textContent = formatCurrency(min);
        document.getElementById('res-footer').textContent = `Ano ${state.year} • ${active.length} meses ativos`;

        if (active.length > 0) {
            document.getElementById('res-max-month').textContent = MONTHS[state.values.indexOf(max)].n;
            document.getElementById('res-min-month').textContent = MONTHS[state.values.lastIndexOf(min)].n;
        }

        const limit = max || 1;
        state.values.forEach((v, i) => {
            document.getElementById(`bar-${i}`).style.width = v > 0 ? `${(v / limit) * 100}%` : '0%';
        });
    }

    function updateDisplay() {
        document.getElementById('currency-select').value = state.currency;
        document.getElementById('year-select').value = state.year;
        calculateAll();
    }

    function saveState() { localStorage.setItem('ganho_premium_v2', JSON.stringify(state)); }
    function loadState() {
        const saved = localStorage.getItem('ganho_premium_v2');
        if (saved) state = JSON.parse(saved);
    }

    function clearData() {
        if (confirm('Deseja apagar todos os valores inseridos?')) {
            state.values = Array(12).fill(0);
            saveState();
            renderGrid();
            calculateAll();
        }
    }

    function copySummary() {
        const total = state.values.reduce((a, b) => a + b, 0);
        if (total === 0) return;
        let text = `💰 GANHO ANUAL ${state.year}\n\n`;
        MONTHS.forEach((m, i) => { if (state.values[i] > 0) text += `${m.n}: ${formatCurrency(state.values[i])}\n`; });
        text += `\nTOTAL: ${formatCurrency(total)}`;
        navigator.clipboard.writeText(text).then(() => showToast());
    }

    function showToast() {
        const t = document.getElementById('toast');
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    function exportCSV() {
        let csv = `Mes,Valor\n`;
        MONTHS.forEach((m, i) => csv += `${m.n},${state.values[i]}\n`);
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `ganho-${state.year}.csv`;
        a.click();
    }

    window.onload = init;
</script>
</body>
</html>
