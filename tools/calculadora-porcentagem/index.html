<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Calculadora de Porcentagem PRO | UtiliWeb</title>

<meta name="description" content="Calculadora de porcentagem completa com desconto, aumento, imposto, cashback, comissão e reajuste salarial.">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
    background:linear-gradient(135deg,#2ecc71,#27ae60);
    min-height:100dvh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:16px;
}

.wrapper{
    width:100%;
    max-width:1200px;
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,.25);
    display:grid;
    grid-template-columns:1fr 1fr;
}

.left,
.right{
    padding:24px;
    min-width:0;
}

.left{
    border-right:1px solid #eee;
}

h1{
    font-size:28px;
    margin-bottom:6px;
}

h2{
    font-size:22px;
    margin-bottom:12px;
}

.subtitle{
    color:#777;
    font-size:14px;
    margin-bottom:18px;
}

label{
    display:block;
    margin-top:14px;
    margin-bottom:6px;
    font-size:13px;
    font-weight:700;
    color:#444;
}

input,
select{
    width:100%;
    padding:13px;
    border-radius:12px;
    border:2px solid #ddd;
    font-size:15px;
}

input:focus,
select:focus{
    outline:none;
    border-color:#27ae60;
}

.result{
    background:#f8fff9;
    border:1px solid #d7f5e3;
    border-radius:14px;
    padding:18px;
    min-height:220px;
    line-height:1.8;
}

.big{
    font-size:34px;
    font-weight:800;
    color:#27ae60;
    margin-bottom:10px;
}

.progress{
    height:16px;
    background:#eee;
    border-radius:999px;
    overflow:hidden;
    margin-top:12px;
}

.bar{
    height:100%;
    width:0%;
    background:#27ae60;
    transition:.3s;
}

.actions{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:16px;
}

button{
    padding:13px;
    border:none;
    border-radius:12px;
    font-weight:700;
    cursor:pointer;
}

.primary{
    background:#27ae60;
    color:#fff;
}

.secondary{
    background:#fff;
    color:#27ae60;
    border:2px solid #27ae60;
}

.history{
    margin-top:20px;
}

.history-box{
    background:#f8fff9;
    border:1px solid #d7f5e3;
    border-radius:12px;
    padding:12px;
    max-height:240px;
    overflow:auto;
    font-size:14px;
    line-height:1.8;
}

.muted{
    color:#777;
    font-size:13px;
}

.card{
    margin-top:12px;
    background:#fff;
    border:1px solid #d7f5e3;
    border-radius:10px;
    padding:12px;
}

@media(max-width:900px){

    .wrapper{
        grid-template-columns:1fr;
    }

    .left{
        border-right:none;
        border-bottom:1px solid #eee;
    }

    .left,
    .right{
        padding:18px;
    }

}

@media(max-width:500px){

    .actions{
        grid-template-columns:1fr;
    }

    h1{
        font-size:24px;
    }

    .big{
        font-size:28px;
    }

}

</style>
</head>
<body>

<div class="wrapper">

<div class="left">

<h1>📊 Calculadora de Porcentagem PRO</h1>

<div class="subtitle">
Desconto, aumento, imposto, cashback, comissão e muito mais.
</div>

<label>Modo de cálculo</label>

<select id="tipo">

<option value="percentOf">
Quanto é X% de Y
</option>

<option value="whatPercent">
X é quantos % de Y
</option>

<option value="increase">
Aumentar valor
</option>

<option value="discount">
Aplicar desconto
</option>

<option value="tax">
Adicionar imposto
</option>

<option value="cashback">
Cashback
</option>

<option value="salary">
Reajuste salarial
</option>

<option value="commission">
Comissão
</option>

</select>

<label id="label1">
Valor
</label>

<input
type="number"
id="valor1"
placeholder="Digite um valor">

<label id="label2">
Porcentagem
</label>

<input
type="number"
id="valor2"
placeholder="Digite uma porcentagem">

<div class="actions">

<button class="primary" onclick="calcular()">
Calcular
</button>

<button class="secondary" onclick="limpar()">
Limpar
</button>

</div>

</div>

<div class="right">

<h2>Resultado</h2>

<div class="result" id="resultado">

<div class="muted">
Preencha os campos para calcular.
</div>

</div>

<div class="history">

<h2>📜 Histórico</h2>

<div class="history-box" id="historico">
Nenhum cálculo realizado.
</div>

</div>

</div>

</div>

<script>

const tipo =
document.getElementById("tipo");

const valor1 =
document.getElementById("valor1");

const valor2 =
document.getElementById("valor2");

const resultado =
document.getElementById("resultado");

const historicoBox =
document.getElementById("historico");

function moeda(v){

return Number(v)
.toLocaleString(
'pt-BR',
{
minimumFractionDigits:2,
maximumFractionDigits:2
}
);

}

function atualizarLabels(){

switch(tipo.value){

case "percentOf":
document.getElementById("label1").innerText =
"Valor Total";
document.getElementById("label2").innerText =
"Porcentagem (%)";
break;

case "whatPercent":
document.getElementById("label1").innerText =
"Parte";
document.getElementById("label2").innerText =
"Total";
break;

default:
document.getElementById("label1").innerText =
"Valor";
document.getElementById("label2").innerText =
"Porcentagem (%)";
}

}

tipo.addEventListener(
"change",
()=>{
atualizarLabels();
calcular();
}
);

valor1.addEventListener("input",calcular);
valor2.addEventListener("input",calcular);

function salvarHistorico(texto){

let hist =
JSON.parse(
localStorage.getItem("utiliweb_percent_history")
|| "[]"
);

hist.unshift(texto);

hist = hist.slice(0,15);

localStorage.setItem(
"utiliweb_percent_history",
JSON.stringify(hist)
);

mostrarHistorico();
}

function mostrarHistorico(){

let hist =
JSON.parse(
localStorage.getItem("utiliweb_percent_history")
|| "[]"
);

if(hist.length===0){

historicoBox.innerHTML =
"Nenhum cálculo realizado.";

return;
}

historicoBox.innerHTML =
hist.map(item =>
`• ${item}`
).join("<br>");

}

function calcular(){

const a =
parseFloat(valor1.value);

const b =
parseFloat(valor2.value);

if(
isNaN(a) ||
isNaN(b)
){
return;
}

let html = "";
let textoHist = "";
let resultadoFinal = 0;
let percentualBarra = 0;

switch(tipo.value){

case "percentOf":

resultadoFinal =
(a*b)/100;

percentualBarra = b;

html = `
<div class="big">
${moeda(resultadoFinal)}
</div>

📊 ${b}% de ${moeda(a)}

<div class="card">
Fórmula:<br>
(${a} × ${b}) ÷ 100
</div>
`;

textoHist =
`${b}% de ${a} = ${resultadoFinal.toFixed(2)}`;

break;

case "whatPercent":

resultadoFinal =
(a/b)*100;

percentualBarra =
resultadoFinal;

html = `
<div class="big">
${resultadoFinal.toFixed(2)}%
</div>

📊 ${a} representa
${resultadoFinal.toFixed(2)}%
de ${b}
`;

textoHist =
`${a} é ${resultadoFinal.toFixed(2)}% de ${b}`;

break;

case "increase":

const aumento =
(a*b)/100;

resultadoFinal =
a + aumento;

percentualBarra = b;

html = `
<div class="big">
${moeda(resultadoFinal)}
</div>

📈 Valor original:
${moeda(a)}

<br>

➕ Acréscimo:
${moeda(aumento)}

<br>

📊 Aumento:
${b}%
`;

textoHist =
`${a} + ${b}% = ${resultadoFinal.toFixed(2)}`;

break;

case "discount":

const desconto =
(a*b)/100;

resultadoFinal =
a - desconto;

percentualBarra = b;

html = `
<div class="big">
${moeda(resultadoFinal)}
</div>

🏷️ Valor original:
${moeda(a)}

<br>

💰 Economia:
${moeda(desconto)}

<br>

📉 Desconto:
${b}%
`;

textoHist =
`${a} - ${b}% = ${resultadoFinal.toFixed(2)}`;

break;

case "tax":

const imposto =
(a*b)/100;

resultadoFinal =
a + imposto;

percentualBarra = b;

html = `
<div class="big">
${moeda(resultadoFinal)}
</div>

🧾 Imposto:
${moeda(imposto)}

<br>

📊 Alíquota:
${b}%
`;

textoHist =
`Imposto ${b}% sobre ${a}`;

break;

case "cashback":

resultadoFinal =
(a*b)/100;

percentualBarra = b;

html = `
<div class="big">
${moeda(resultadoFinal)}
</div>

💸 Cashback recebido

<br>

Compra:
${moeda(a)}

<br>

Taxa:
${b}%
`;

textoHist =
`Cashback ${b}% de ${a}`;

break;

case "salary":

const ganho =
(a*b)/100;

resultadoFinal =
a + ganho;

percentualBarra = b;

html = `
<div class="big">
${moeda(resultadoFinal)}
</div>

💼 Novo salário

<br>

📈 Aumento mensal:
${moeda(ganho)}

<br>

📅 Ganho anual:
${moeda(ganho*12)}
`;

textoHist =
`Salário ${a} reajuste ${b}%`;

break;

case "commission":

resultadoFinal =
(a*b)/100;

percentualBarra = b;

html = `
<div class="big">
${moeda(resultadoFinal)}
</div>

💰 Comissão

<br>

Vendas:
${moeda(a)}

<br>

Taxa:
${b}%
`;

textoHist =
`Comissão ${b}% de ${a}`;

break;
}

html += `

<div class="progress">
<div
class="bar"
style="width:${Math.min(percentualBarra,100)}%">
</div>
</div>

`;

html += `
<div style="margin-top:12px;">
<button
class="secondary"
onclick="copiarResultado()">
📋 Copiar Resultado
</button>
</div>
`;

resultado.innerHTML = html;

clearTimeout(window.histTimer);

window.histTimer =
setTimeout(
()=>salvarHistorico(textoHist),
800
);

}

function copiarResultado(){

navigator.clipboard.writeText(
resultado.innerText
);

alert("Resultado copiado!");
}

function limpar(){

valor1.value = "";
valor2.value = "";

resultado.innerHTML =
'<div class="muted">Preencha os campos para calcular.</div>';

}

atualizarLabels();
mostrarHistorico();

</script>

</body>
</html>
