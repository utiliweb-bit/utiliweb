<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de Porcentagem | UtiliWeb</title>

<meta name="description" content="Calcule porcentagens de forma rápida e precisa.">
<meta name="keywords" content="porcentagem, calculadora, utiliweb">

<link rel="stylesheet" href="../../assets/style.css">

<style>
.tool-box {
    margin-top: 20px;
}

label {
    display: block;
    margin-top: 12px;
    font-weight: 500;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
}

.btn-group {
    display: flex;
    gap: 10px;
    margin-top: 15px;
    flex-wrap: wrap;
}

button {
    padding: 12px 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #111;
    color: #fff;
}

button:hover {
    opacity: 0.9;
}

.result {
    margin-top: 20px;
    padding: 12px;
    background: #f5f5f5;
    border-radius: 8px;
    min-height: 40px;
}
</style>

</head>

<body>

<header>
    <h1>📊 Calculadora de Porcentagem</h1>
    <p>Calcule valores percentuais rapidamente</p>
</header>

<div class="container">

    <a href="../../index.html">← Voltar</a>

    <div class="tool-box">

        <label>Valor total</label>
        <input id="total" type="number" placeholder="Ex: 200">

        <label>Porcentagem (%)</label>
        <input id="percent" type="number" placeholder="Ex: 10">

        <div class="btn-group">
            <button onclick="calcular()">Calcular</button>
            <button onclick="limpar()">Limpar</button>
        </div>

        <div id="resultado" class="result">---</div>

    </div>

</div>

<script>
function calcular() {

    const total = parseFloat(document.getElementById("total").value);
    const percent = parseFloat(document.getElementById("percent").value);
    const resultado = document.getElementById("resultado");

    if (isNaN(total) || isNaN(percent)) {
        resultado.textContent = "Digite valores válidos.";
        return;
    }

    const result = (total * percent) / 100;

    resultado.innerHTML = `
        <strong>${percent}% de ${total}</strong><br><br>
        Resultado: <strong>${result.toLocaleString("pt-BR")}</strong>
    `;
}

function limpar() {
    document.getElementById("total").value = "";
    document.getElementById("percent").value = "";
    document.getElementById("resultado").textContent = "---";
}
</script>

</body>
</html>
