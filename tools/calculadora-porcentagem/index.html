<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de Porcentagem | UtiliWeb</title>

<meta name="description" content="Calcule porcentagens de forma rápida e precisa.">
<link rel="stylesheet" href="../../assets/style.css">
</head>

<body>

<header>
    <h1>📊 Calculadora de Porcentagem</h1>
    <p>Calcule valores percentuais rapidamente</p>
</header>

<div class="container">

    <a href="../../index.html">← Voltar</a>

    <div class="box">

        <label>Valor total</label>
        <input id="total" type="number" placeholder="Ex: 200">

        <label style="margin-top:12px;">Porcentagem (%)</label>
        <input id="percent" type="number" placeholder="Ex: 10">

        <div style="margin-top:15px;">
            <button onclick="calcular()">Calcular</button>
        </div>

        <div id="resultado" class="result hidden"></div>

    </div>

    <div class="box">
        <h2>Como funciona</h2>
        <p>
            Informe o valor total e a porcentagem desejada.
            O sistema calcula automaticamente o valor correspondente.
        </p>

        <h2 style="margin-top:15px;">Exemplo</h2>
        <p>10% de 200 = 20</p>
    </div>

</div>

<script>
function calcular() {

    const total = parseFloat(document.getElementById("total").value);
    const percent = parseFloat(document.getElementById("percent").value);
    const resultado = document.getElementById("resultado");

    if (isNaN(total) || isNaN(percent)) {
        resultado.classList.remove("hidden");
        resultado.textContent = "Digite valores válidos.";
        return;
    }

    const result = (total * percent) / 100;

    resultado.classList.remove("hidden");
    resultado.innerHTML = `
        <strong>${percent}% de ${total}</strong>
        <br><br>
        Resultado: <strong>${result.toLocaleString("pt-BR")}</strong>
    `;
}
</script>

</body>
</html>
