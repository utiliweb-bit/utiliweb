<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Gerador de QR Code | UtiliWeb</title>

<meta name="description" content="Gere QR Codes online grátis para links, textos e PIX.">
<meta name="keywords" content="qr code, gerador qr code, utiliweb">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html, body {
    width: 100%;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial;
    background: linear-gradient(135deg, #2ecc71, #27ae60);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
}

/* WRAPPER */
.wrapper {
    width: 100%;
    max-width: 1100px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
    max-height: 90vh;
}

/* LEFT */
.left-panel {
    padding: 28px;
    overflow-y: auto;
    border-right: 1px solid #e0e0e0;
}

/* RIGHT */
.right-panel {
    padding: 28px;
    background: #eafaf1;
    overflow-y: auto;
}

/* HEADER */
header {
    text-align: center;
    margin-bottom: 18px;
}

h1 {
    font-size: 26px;
    color: #333;
}

.subtitle {
    font-size: 13px;
    color: #777;
}

/* VOLTAR */
a {
    display: inline-block;
    margin-bottom: 14px;
    color: #27ae60;
    font-weight: 600;
    text-decoration: none;
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 2px solid #ddd;
    font-size: 14px;
    margin-top: 10px;
}

input:focus, select:focus {
    border-color: #27ae60;
    outline: none;
}

/* BUTTONS */
.buttons {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-top: 15px;
}

button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: 700;
    font-size: 12px;
    background: #27ae60;
    color: white;
    text-transform: uppercase;
    transition: 0.2s;
}

button:active {
    transform: scale(0.97);
}

/* QR */
.qr-box {
    margin-top: 20px;
    background: #f7f7f7;
    padding: 20px;
    border-radius: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 260px;
}

/* RESPONSIVO */
@media (max-width: 900px) {
    .wrapper {
        grid-template-columns: 1fr;
        max-height: none;
        border-radius: 12px;
    }

    .left-panel {
        border-right: none;
        border-bottom: 1px solid #e0e0e0;
    }

    .buttons {
        grid-template-columns: 1fr;
    }
}

@media (max-width: 480px) {
    html, body {
        padding: 10px;
    }

    .wrapper {
        border-radius: 10px;
    }

    .left-panel, .right-panel {
        padding: 16px;
    }

    h1 {
        font-size: 20px;
    }
}
</style>

</head>

<body>

<div class="wrapper">

    <!-- LEFT -->
    <div class="left-panel">

        <header>
            <h1>📱 QR Code</h1>
            <p class="subtitle">Gerador rápido e responsivo</p>
        </header>

        <a href="../../index.html">← Voltar</a>

        <input id="text" type="text" placeholder="Digite link ou texto">

        <select id="size">
            <option value="120">Pequeno</option>
            <option value="200" selected>Médio</option>
            <option value="300">Grande</option>
        </select>

        <div class="buttons">
            <button onclick="generate()">Gerar</button>
            <button onclick="downloadQR()">Baixar</button>
            <button onclick="copyText()">Copiar</button>
        </div>

        <div class="qr-box">
            <div id="qrcode"></div>
        </div>

    </div>

    <!-- RIGHT -->
    <div class="right-panel">

        <h2>Como funciona</h2>
        <p>
            Gere QR Codes instantaneamente para links, textos e pagamentos.
            Interface otimizada para celular e desktop.
        </p>

    </div>

</div>

<script>
let currentText = "";

function generate() {
    const text = document.getElementById("text").value.trim();
    const size = parseInt(document.getElementById("size").value);

    if (!text) return;

    currentText = text;

    const container = document.getElementById("qrcode");
    container.innerHTML = "";

    new QRCode(container, {
        text: text,
        width: size,
        height: size
    });
}

function downloadQR() {
    const img = document.querySelector("#qrcode img");
    if (!img) return;

    const link = document.createElement("a");
    link.href = img.src;
    link.download = "qrcode.png";
    link.click();
}

function copyText() {
    if (!currentText) return;
    navigator.clipboard.writeText(currentText);
}
</script>

</body>
</html>
