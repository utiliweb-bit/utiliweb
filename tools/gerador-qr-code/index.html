<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerador de QR Code Online | UtiliWeb</title>

<meta name="description" content="Gere QR Codes online grátis. Converta links e textos em QR Code instantaneamente com download em PNG.">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="../../assets/style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body>

<header>
    <h1>📱 Gerador de QR Code</h1>
    <p>Crie QR Codes para links, PIX e textos</p>
</header>

<div class="container">

    <a href="../../index.html">← Voltar</a>

    <div style="margin-top:20px;">

        <input id="text" type="text" placeholder="Digite link ou texto" style="width:100%;">

        <div style="margin-top:15px;">
            <label>Tamanho:</label>
            <select id="size">
                <option value="120">Pequeno</option>
                <option value="200" selected>Médio</option>
                <option value="300">Grande</option>
            </select>
        </div>

        <div style="margin-top:15px; display:flex; gap:10px; flex-wrap:wrap;">
            <button onclick="generate()">Gerar</button>
            <button onclick="downloadQR()">Baixar PNG</button>
            <button onclick="copyText()">Copiar texto</button>
        </div>

    </div>

    <div class="result" style="margin-top:20px; text-align:center;">
        <div id="qrcode"></div>
    </div>

    <section style="margin-top:40px;">
        <h2>Como usar</h2>
        <p>Digite um texto ou link, clique em gerar e baixe o QR Code instantaneamente.</p>
    </section>

</div>

<script>
let currentText = "";

function generate() {

    const text = document.getElementById("text").value.trim();
    const size = parseInt(document.getElementById("size").value);

    if (!text) return;

    currentText = text;

    const container = document.getElementById("qrcode");
    container.innerHTML = "";

    new QRCode(container, {
        text: text,
        width: size,
        height: size
    });
}

function downloadQR() {

    const img = document.querySelector("#qrcode img");

    if (!img) return;

    const link = document.createElement("a");
    link.href = img.src;
    link.download = "qrcode.png";
    link.click();
}

function copyText() {

    if (!currentText) return;

    navigator.clipboard.writeText(currentText);
    alert("Texto copiado!");
}

// auto gerar
document.getElementById("text").addEventListener("input", generate);
</script>

</body>
</html>
