<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerador de QR Code | UtiliWeb</title>

<meta name="description" content="Gere QR Codes online grátis para links, textos e PIX.">
<meta name="keywords" content="qr code, gerador qr code, utiliweb">

<link rel="stylesheet" href="../../assets/style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial;
    background: linear-gradient(135deg, #2ecc71, #27ae60);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

/* WRAPPER */
.wrapper {
    width: 100%;
    max-width: 1000px;
    min-height: 650px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
}

/* LEFT */
.left-panel {
    padding: 30px;
    border-right: 1px solid #eee;
}

header h1 {
    font-size: 26px;
}

.subtitle {
    font-size: 14px;
    color: #777;
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: 2px solid #ddd;
    font-size: 14px;
}

input:focus, select:focus {
    border-color: #27ae60;
    outline: none;
}

/* BOTÕES */
.buttons {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

button {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: #27ae60;
    color: white;
}

button:hover {
    opacity: 0.9;
}

/* QR AREA */
.qr-box {
    margin-top: 20px;
    text-align: center;
    padding: 20px;
    border-radius: 10px;
    background: #f7f7f7;
}

/* RIGHT */
.right-panel {
    padding: 30px;
    background: #eafaf1;
}

/* RESPONSIVO */
@media (max-width: 900px) {
    .wrapper {
        grid-template-columns: 1fr;
    }

    .left-panel {
        border-right: none;
        border-bottom: 1px solid #eee;
    }

    .buttons {
        flex-direction: column;
    }
}
</style>

</head>

<body>

<div class="wrapper">

    <!-- LEFT -->
    <div class="left-panel">

        <header>
            <h1>📱 Gerador de QR Code</h1>
            <p class="subtitle">Links, textos e PIX</p>
        </header>

        <br>

        <a href="../../index.html">← Voltar</a>

        <input id="text" type="text" placeholder="Digite link ou texto">

        <label>Tamanho</label>
        <select id="size">
            <option value="120">Pequeno</option>
            <option value="200" selected>Médio</option>
            <option value="300">Grande</option>
        </select>

        <div class="buttons">
            <button onclick="generate()">Gerar</button>
            <button onclick="downloadQR()">Baixar</button>
            <button onclick="copyText()">Copiar</button>
        </div>

        <div class="qr-box">
            <div id="qrcode"></div>
        </div>

    </div>

    <!-- RIGHT -->
    <div class="right-panel">

        <h2>Como funciona</h2>
        <p>
            Digite um texto ou link e gere um QR Code instantaneamente.
            Ideal para sites, cartões e pagamentos.
        </p>

    </div>

</div>

<script>
let currentText = "";

function generate() {

    const text = document.getElementById("text").value.trim();
    const size = parseInt(document.getElementById("size").value);

    if (!text) return;

    currentText = text;

    const container = document.getElementById("qrcode");
    container.innerHTML = "";

    new QRCode(container, {
        text: text,
        width: size,
        height: size
    });
}

function downloadQR() {
    const img = document.querySelector("#qrcode img");
    if (!img) return;

    const link = document.createElement("a");
    link.href = img.src;
    link.download = "qrcode.png";
    link.click();
}

function copyText() {
    if (!currentText) return;
    navigator.clipboard.writeText(currentText);
}
</script>

</body>
</html>
