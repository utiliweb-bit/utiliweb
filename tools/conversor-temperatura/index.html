<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Conversor de Temperatura | UtiliWeb</title>

<meta name="description" content="Converta Celsius e Fahrenheit de forma rápida e precisa online.">
<meta name="keywords" content="temperatura, celsius, fahrenheit, conversor, utiliweb">

<style>
:root{
    --pad: clamp(10px, 2vw, 20px);
    --radius: 18px;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    width:100%;
    min-height:100dvh;
    font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial;
    background:linear-gradient(135deg,#2ecc71,#27ae60);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:var(--pad);
}

/* WRAPPER */
.wrapper{
    width:100%;
    max-width:1000px;
    background:#fff;
    border-radius:var(--radius);
    box-shadow:0 20px 60px rgba(0,0,0,.3);
    display:grid;
    grid-template-columns:1fr 1fr;
    overflow:hidden;
}

/* PAINÉIS */
.left-panel,
.right-panel{
    padding:clamp(16px, 3vw, 30px);
}

/* ESQUERDA */
.left-panel{
    border-right:1px solid #eee;
}

/* TIPOGRAFIA */
header h1{
    font-size:clamp(20px, 2.2vw, 26px);
}

.subtitle{
    font-size:clamp(12px, 1.4vw, 14px);
    color:#777;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    margin-top:8px;
    border-radius:10px;
    border:2px solid #ddd;
    font-size:14px;
    outline:none;
}

input:focus{
    border-color:#27ae60;
}

/* BOTÕES */
.buttons{
    display:flex;
    gap:10px;
    margin-top:15px;
}

button{
    flex:1;
    padding:12px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    font-weight:700;
    min-height:44px;
    touch-action:manipulation;
}

/* PRIMARY */
.btn-primary{
    background:#27ae60;
    color:#fff;
}

/* SECONDARY */
.btn-secondary{
    background:#fff;
    border:2px solid #27ae60;
    color:#27ae60;
}

/* RESULTADO */
.result{
    margin-top:20px;
    font-size:clamp(18px, 2vw, 22px);
    font-weight:700;
    color:#27ae60;
}

/* DIREITA */
.right-panel{
    background:#eafaf1;
}

/* RESPONSIVO */
@media (max-width: 900px){
    .wrapper{
        grid-template-columns:1fr;
    }

    .left-panel{
        border-right:none;
        border-bottom:1px solid #eee;
    }

    .buttons{
        flex-direction:column;
    }
}

@media (max-width: 480px){
    html, body{
        padding:10px;
    }

    input{
        font-size:13px;
        padding:10px;
    }

    button{
        font-size:13px;
        padding:11px;
    }
}
</style>
</head>

<body>

<div class="wrapper">

    <!-- ESQUERDA -->
    <div class="left-panel">

        <header>
            <h1>🌡️ Conversor de Temperatura</h1>
            <p class="subtitle">Celsius ↔ Fahrenheit</p>
        </header>

        <br>

        <a href="../../index.html">← Voltar</a>

        <br><br>

        <label>Temperatura</label>
        <input id="temp" type="number" placeholder="Digite o valor">

        <div class="buttons">
            <button class="btn-primary" onclick="toF()">C → F</button>
            <button class="btn-secondary" onclick="toC()">F → C</button>
        </div>

        <div class="result" id="result">Resultado aparecerá aqui</div>

    </div>

    <!-- DIREITA -->
    <div class="right-panel">

        <h2>Como funciona</h2>
        <p>
            Converta temperaturas entre Celsius e Fahrenheit de forma rápida e precisa.
            Ideal para estudos, viagens e uso diário.
        </p>

    </div>

</div>

<script>
function toF() {
    const c = parseFloat(document.getElementById("temp").value);

    if (isNaN(c)) {
        document.getElementById("result").textContent = "Valor inválido";
        return;
    }

    const f = (c * 9/5) + 32;
    document.getElementById("result").textContent = f.toFixed(2) + " °F";
}

function toC() {
    const f = parseFloat(document.getElementById("temp").value);

    if (isNaN(f)) {
        document.getElementById("result").textContent = "Valor inválido";
        return;
    }

    const c = (f - 32) * 5/9;
    document.getElementById("result").textContent = c.toFixed(2) + " °C";
}
</script>

</body>
</html>
