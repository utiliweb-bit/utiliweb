<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Calculadora de Peso | UtiliWeb</title>
<meta name="description" content="Calcule seu IMC, taxa metabólica basal e necessidade calórica diária com aconselhamentos por sexo.">
<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    -webkit-text-size-adjust: 100%;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    background: linear-gradient(135deg, #2ecc71, #27ae60);
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 12px;
}

.wrapper {
    width: 100%;
    max-width: 1100px;
    background: #fff;
    border-radius: 18px;
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr 1fr;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
}

.left, .right {
    padding: 24px;
    min-width: 0;
}

.left {
    border-right: 1px solid #eee;
}

.right {
    background: #f6fff8;
}

h1 {
    font-size: 28px;
    margin-bottom: 6px;
}

h2 {
    font-size: 24px;
    margin-bottom: 12px;
}

.subtitle {
    color: #666;
    font-size: 14px;
    margin-bottom: 18px;
}

a {
    display: inline-block;
    margin-bottom: 14px;
    text-decoration: none;
    color: #27ae60;
    font-weight: 700;
}

label {
    display: block;
    margin-bottom: 8px;
    font-size: 14px;
    font-weight: 700;
    color: #444;
}

.hint {
    font-size: 12px;
    color: #999;
    margin-top: 4px;
    font-weight: 400;
}

.toggle-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 18px;
}

.toggle-btn {
    padding: 11px;
    border-radius: 12px;
    border: 2px solid #ddd;
    background: #fff;
    font-size: 14px;
    font-weight: 700;
    color: #666;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 0;
    width: 100%;
}

.toggle-btn.ativo {
    background: #27ae60;
    border-color: #27ae60;
    color: #fff;
}

.input-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.input-group {
    margin-bottom: 16px;
}

input[type="number"], select {
    width: 100%;
    padding: 13px;
    border-radius: 12px;
    border: 2px solid #ddd;
    font-size: 16px;
    background: #fff;
    color: #333;
    font-family: inherit;
}

input[type="number"]:focus, select:focus {
    outline: none;
    border-color: #27ae60;
}

button.btn-calcular {
    width: 100%;
    margin-top: 4px;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: #27ae60;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
}

button.btn-calcular:hover {
    opacity: .95;
}

.result-box {
    background: #fff;
    border: 1px solid #d7f5e3;
    border-radius: 14px;
    padding: 18px;
    line-height: 1.8;
    min-height: 260px;
    font-size: 15px;
    color: #333;
}

.highlight {
    font-size: 32px;
    font-weight: 800;
    color: #27ae60;
    margin-bottom: 4px;
}

.highlight-sub {
    font-size: 15px;
    color: #555;
    margin-bottom: 14px;
}

.stat {
    margin-top: 10px;
    padding: 12px;
    background: #f6fff8;
    border-radius: 10px;
    border: 1px solid #e7f7ec;
}

.stat strong {
    color: #27ae60;
}

.advice {
    margin-top: 10px;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid;
    font-size: 14px;
    line-height: 1.6;
}

.faixa {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 5px;
}

.faixa.atual {
    outline: 3px solid #27ae60;
}

.empty-msg {
    color: #999;
    font-size: 15px;
}

@media (max-width: 900px) {
    body { align-items: flex-start; padding: 10px; }
    .wrapper { grid-template-columns: 1fr; }
    .left { border-right: none; border-bottom: 1px solid #eee; }
    .left, .right { padding: 18px; }
    h1 { font-size: 24px; }
    h2 { font-size: 22px; }
    .highlight { font-size: 28px; }
}

@media (max-width: 480px) {
    .input-row { grid-template-columns: 1fr; }
    .toggle-row { grid-template-columns: 1fr; }
}

</style>
</head>
<body>

<div class="wrapper">

    <div class="left">

        <h1>⚖️ Calculadora de Peso</h1>
        <p class="subtitle">IMC, taxa metabólica basal e necessidade calórica diária</p>

        <a href="../../index.html">← Voltar</a>

        <label>Sexo</label>
        <div class="toggle-row">
            <button class="toggle-btn ativo" id="btn-M" onclick="setSexo('M')">♂ Masculino</button>
            <button class="toggle-btn" id="btn-F" onclick="setSexo('F')">♀ Feminino</button>
        </div>

        <label>Modo</label>
        <div class="toggle-row">
            <button class="toggle-btn ativo" id="btn-imc" onclick="setModo('imc')">⚖️ IMC</button>
            <button class="toggle-btn" id="btn-cal" onclick="setModo('cal')">🔥 Calorias (TMB)</button>
        </div>

        <!-- CAMPOS IMC -->
        <div id="campos-imc">
            <div class="input-row">
                <div class="input-group">
                    <label>Peso (kg)</label>
                    <input type="number" id="imc-p" value="70" min="1" step="0.1">
                </div>
                <div class="input-group">
                    <label>Altura (cm)</label>
                    <input type="number" id="imc-h" value="170" min="1" step="0.1">
                </div>
            </div>
            <div class="input-group">
                <label>% de gordura corporal <span style="font-weight:400;color:#999">(opcional)</span></label>
                <input type="number" id="imc-g" placeholder="ex: 22" min="1" max="70" step="0.1">
                <p class="hint">Permite aconselhamento de gordura corporal por sexo</p>
            </div>
        </div>

        <!-- CAMPOS CALORIAS -->
        <div id="campos-cal" style="display:none">
            <label>Fórmula</label>
            <div class="toggle-row">
                <button class="toggle-btn ativo" id="btn-miff" onclick="setFormula('mifflin')">Mifflin-St Jeor</button>
                <button class="toggle-btn" id="btn-harr" onclick="setFormula('harris')">Harris-Benedict</button>
            </div>
            <div class="input-row">
                <div class="input-group">
                    <label>Peso (kg)</label>
                    <input type="number" id="cal-p" value="70" min="1" step="0.1">
                </div>
                <div class="input-group">
                    <label>Altura (cm)</label>
                    <input type="number" id="cal-h" value="170" min="1" step="0.1">
                </div>
            </div>
            <div class="input-group">
                <label>Idade (anos)</label>
                <input type="number" id="cal-i" value="30" min="1" max="120" step="1">
            </div>
            <div class="input-group">
                <label>Nível de atividade física</label>
                <select id="cal-at">
                    <option value="1.2">Sedentário — sem exercício</option>
                    <option value="1.375" selected>Leve — 1 a 3x por semana</option>
                    <option value="1.55">Moderado — 3 a 5x por semana</option>
                    <option value="1.725">Intenso — 6 a 7x por semana</option>
                    <option value="1.9">Muito intenso — atleta ou trabalho físico pesado</option>
                </select>
            </div>
            <div class="input-group">
                <label>Objetivo</label>
                <select id="cal-obj">
                    <option value="manter">Manter o peso</option>
                    <option value="perder">Perder peso</option>
                    <option value="ganhar">Ganhar massa muscular</option>
                </select>
            </div>
        </div>

        <button class="btn-calcular" onclick="calcular()">Calcular</button>

    </div>

    <div class="right">

        <h2>Resultado</h2>
        <div class="result-box" id="resultado">
            <p class="empty-msg">Preencha os dados e clique em Calcular.</p>
        </div>

    </div>

</div>

<script>

let modo = 'imc';
let sexo = 'M';
let formula = 'mifflin';

const FAIXAS = [
    { min: 0,   max: 18.5, lbl: 'Abaixo do peso',    bg: '#e6f1fb', col: '#185fa5' },
    { min: 18.5,max: 25,   lbl: 'Peso normal',        bg: '#eaf3de', col: '#3b6d11' },
    { min: 25,  max: 30,   lbl: 'Sobrepeso',          bg: '#faeeda', col: '#854f0b' },
    { min: 30,  max: 35,   lbl: 'Obesidade grau I',   bg: '#fcebeb', col: '#a32d2d' },
    { min: 35,  max: 40,   lbl: 'Obesidade grau II',  bg: '#f7c1c1', col: '#791f1f' },
    { min: 40,  max: 999,  lbl: 'Obesidade grau III', bg: '#f09595', col: '#501313' }
];

const GORD = {
    M: { min: 6,  fit: 18, max: 25 },
    F: { min: 14, fit: 28, max: 35 }
};

function setSexo(s) {
    sexo = s;
    document.getElementById('btn-M').classList.toggle('ativo', s === 'M');
    document.getElementById('btn-F').classList.toggle('ativo', s === 'F');
}

function setModo(m) {
    modo = m;
    document.getElementById('btn-imc').classList.toggle('ativo', m === 'imc');
    document.getElementById('btn-cal').classList.toggle('ativo', m === 'cal');
    document.getElementById('campos-imc').style.display = m === 'imc' ? 'block' : 'none';
    document.getElementById('campos-cal').style.display = m === 'cal' ? 'block' : 'none';
    document.getElementById('resultado').innerHTML = '<p class="empty-msg">Preencha os dados e clique em Calcular.</p>';
}

function setFormula(f) {
    formula = f;
    document.getElementById('btn-miff').classList.toggle('ativo', f === 'mifflin');
    document.getElementById('btn-harr').classList.toggle('ativo', f === 'harris');
}

function calcIMC(p, h) {
    return p / Math.pow(h / 100, 2);
}

function getFaixa(imc) {
    return FAIXAS.find(f => imc >= f.min && imc < f.max) || FAIXAS[FAIXAS.length - 1];
}

function calcTMB(p, h, i, s, f) {
    if (f === 'mifflin') {
        const b = 10 * p + 6.25 * h - 5 * i;
        return s === 'M' ? b + 5 : b - 161;
    }
    return s === 'M'
        ? 88.362 + 13.397 * p + 4.799 * h - 5.677 * i
        : 447.593 + 9.247 * p + 3.098 * h - 4.330 * i;
}

function calcular() {
    const el = document.getElementById('resultado');

    if (modo === 'imc') {
        const p = parseFloat(document.getElementById('imc-p').value) || 0;
        const h = parseFloat(document.getElementById('imc-h').value) || 0;
        if (!p || !h) { el.innerHTML = '<p class="empty-msg">Preencha peso e altura.</p>'; return; }

        const imc = calcIMC(p, h);
        const faixa = getFaixa(imc);
        const hm = h / 100;
        const pMin = (18.5 * hm * hm).toFixed(1);
        const pMax = (25 * hm * hm).toFixed(1);
        const diff = p < parseFloat(pMin)
            ? `+${(parseFloat(pMin) - p).toFixed(1)} kg a ganhar`
            : p > parseFloat(pMax)
            ? `-${(p - parseFloat(pMax)).toFixed(1)} kg a perder`
            : 'Dentro do peso ideal';

        // Aconselhamento IMC por sexo
        let advBg, advBorder, advText;
        if (imc < 18.5) {
            advBg = '#e6f1fb'; advBorder = '#b5d4f4';
            advText = sexo === 'M'
                ? '⚠️ Baixo peso pode comprometer os níveis de testosterona, a densidade óssea e a imunidade. Busque orientação nutricional para ganho saudável de massa.'
                : '⚠️ Baixo peso pode causar irregularidades menstruais, redução da fertilidade e perda de massa óssea. Consulte um nutricionista.';
        } else if (imc < 25) {
            advBg = '#eaf3de'; advBorder = '#c0dd97';
            advText = sexo === 'M'
                ? '✅ Peso saudável! Para homens, manter o peso nesta faixa favorece a saúde cardiovascular, hormonal e metabólica. Continue com alimentação equilibrada e atividade física regular.'
                : '✅ Peso saudável! Para mulheres, o peso normal protege a saúde hormonal, reprodutiva e cardiovascular. Mantenha alimentação equilibrada e exercício regular.';
        } else if (imc < 30) {
            advBg = '#faeeda'; advBorder = '#fac775';
            advText = sexo === 'M'
                ? '⚠️ Sobrepeso aumenta o risco de hipertensão, resistência à insulina e disfunção erétil em homens. Atividade física (150 min/semana) e reeducação alimentar são os primeiros passos.'
                : '⚠️ Sobrepeso pode influenciar o ciclo menstrual e aumentar o risco de síndrome metabólica em mulheres. Exercício regular e reeducação alimentar ajudam.';
        } else {
            advBg = '#fcebeb'; advBorder = '#f7c1c1';
            const grau = imc < 35 ? 'I' : imc < 40 ? 'II' : 'III';
            advText = sexo === 'M'
                ? `⛔ Obesidade grau ${grau}. Em homens, eleva fortemente o risco de doenças cardiovasculares, apneia do sono, diabetes tipo 2 e baixa testosterona. Acompanhamento médico é essencial.`
                : `⛔ Obesidade grau ${grau}. Em mulheres, está ligada a maior risco cardiovascular, irregularidades hormonais, SOP e complicações na gestação. Busque acompanhamento multidisciplinar.`;
        }

        // Gordura corporal
        const g = parseFloat(document.getElementById('imc-g').value) || null;
        let gordBlock = '';
        if (g !== null) {
            const ref = GORD[sexo];
            const nome = sexo === 'M' ? 'homens' : 'mulheres';
            let gMsg;
            if (g < ref.min) gMsg = `${g}% está muito abaixo do mínimo saudável para ${nome} — pode indicar desnutrição ou excesso de treinamento.`;
            else if (g < ref.fit) gMsg = `${g}% está na faixa atlética para ${nome}.`;
            else if (g < ref.max) gMsg = `${g}% está dentro da faixa aceitável para ${nome}.`;
            else gMsg = `${g}% está acima do recomendado para ${nome} — risco metabólico aumentado.`;
            gordBlock = `<div class="stat">💧 <strong>Gordura corporal</strong><br>${gMsg}</div>`;
        }

        // Faixas de referência
        const faixasHTML = FAIXAS.map(f => {
            const ok = imc >= f.min && imc < f.max;
            const range = f.max === 999 ? `${f.min}+` : `${f.min} – ${f.max}`;
            return `<div class="faixa${ok ? ' atual' : ''}" style="background:${f.bg};color:${f.col}">${f.lbl}<span>${range}</span></div>`;
        }).join('');

        el.innerHTML = `
            <div class="highlight">${imc.toFixed(1)}</div>
            <div class="highlight-sub">${faixa.lbl}</div>

            <div class="stat">
                📅 <strong>Peso ideal</strong><br>
                Entre <strong>${pMin}</strong> e <strong>${pMax} kg</strong> para sua altura<br>
                ${diff}
            </div>

            <div class="advice" style="background:${advBg};border-color:${advBorder}">
                <strong>Aconselhamento — ${sexo === 'M' ? 'masculino' : 'feminino'}</strong><br><br>
                ${advText}
            </div>

            ${gordBlock}

            <div class="stat">
                📊 <strong>Faixas de IMC (OMS)</strong><br><br>
                ${faixasHTML}
            </div>

            <p style="font-size:12px;color:#bbb;margin-top:14px;font-style:italic">Estimativas gerais. Não substituem orientação médica ou nutricional. O IMC não diferencia massa muscular de gordura.</p>
        `;

    } else {
        const p = parseFloat(document.getElementById('cal-p').value) || 0;
        const h = parseFloat(document.getElementById('cal-h').value) || 0;
        const i = parseFloat(document.getElementById('cal-i').value) || 0;
        if (!p || !h || !i) { el.innerHTML = '<p class="empty-msg">Preencha todos os campos.</p>'; return; }

        const at = parseFloat(document.getElementById('cal-at').value);
        const obj = document.getElementById('cal-obj').value;
        const tmb = calcTMB(p, h, i, sexo, formula);
        const get = tmb * at;
        const def = get - 500;
        const sup = get + 300;

        let alvo, alvoLabel;
        if (obj === 'perder') { alvo = def; alvoLabel = 'para perder peso'; }
        else if (obj === 'ganhar') { alvo = sup; alvoLabel = 'para ganhar massa'; }
        else { alvo = get; alvoLabel = 'para manter o peso'; }

        // Aconselhamento calorias por sexo + objetivo
        let advBg, advBorder, advText;
        if (obj === 'manter') {
            advBg = '#e6f1fb'; advBorder = '#b5d4f4';
            advText = sexo === 'M'
                ? '✅ Para homens, manter a ingestão próxima ao gasto total preserva massa muscular e equilíbrio hormonal.'
                : '✅ Para mulheres, manter a ingestão adequada é essencial para saúde hormonal e óssea — dietas muito restritivas podem comprometer esses sistemas.';
        } else if (obj === 'perder') {
            advBg = '#faeeda'; advBorder = '#fac775';
            advText = sexo === 'M'
                ? '⚠️ Homens respondem bem a déficits moderados com proteína elevada (1,6–2,2 g/kg) e treino de força. Perda saudável estimada: 0,5–1 kg por semana.'
                : '⚠️ Mulheres devem evitar déficits muito agressivos — podem impactar o ciclo menstrual e a saúde óssea. Mantenha proteína em 1,6–2 g/kg e não pule refeições.';
        } else {
            advBg = '#eaf3de'; advBorder = '#c0dd97';
            advText = sexo === 'M'
                ? '💪 Superávit de 200–400 kcal com treino de força progressivo permite ganho muscular com mínimo acúmulo de gordura. Priorize proteína de qualidade (1,8–2,2 g/kg).'
                : '💪 Mulheres têm taxa de síntese muscular menor, mas respondem muito bem ao treino de força. Superávit moderado (200–300 kcal) evita ganho excessivo de gordura. Proteína: 1,8–2,2 g/kg.';
        }

        // Tabela de gordura corporal por sexo
        const ref = GORD[sexo];
        const gordRows = [
            { lbl: 'Atleta',    range: `${ref.min}–${ref.min + 5}%`,  bg: '#e6f1fb', col: '#185fa5' },
            { lbl: 'Fitness',   range: `${ref.min + 5}–${ref.fit}%`,  bg: '#eaf3de', col: '#3b6d11' },
            { lbl: 'Aceitável', range: `${ref.fit}–${ref.max}%`,      bg: '#faeeda', col: '#854f0b' },
            { lbl: 'Alto risco',range: `>${ref.max}%`,                 bg: '#fcebeb', col: '#a32d2d' },
        ];
        const gordTbl = gordRows.map(r =>
            `<div class="faixa" style="background:${r.bg};color:${r.col}">${r.lbl}<span>${r.range}</span></div>`
        ).join('');

        el.innerHTML = `
            <div class="highlight">${Math.round(alvo).toLocaleString('pt-BR')} kcal/dia</div>
            <div class="highlight-sub">${alvoLabel.charAt(0).toUpperCase() + alvoLabel.slice(1)}</div>

            <div class="stat">
                🔥 <strong>TMB</strong> (taxa em repouso total)<br>
                <strong>${Math.round(tmb).toLocaleString('pt-BR')} kcal/dia</strong>

                <br><br>

                📊 <strong>Gasto total com atividade</strong><br>
                <strong>${Math.round(get).toLocaleString('pt-BR')} kcal/dia</strong>
            </div>

            <div class="stat">
                📉 Para perder peso (déficit −500 kcal): <strong>${Math.round(def).toLocaleString('pt-BR')} kcal/dia</strong><br>
                📈 Para ganhar massa (superávit +300 kcal): <strong>${Math.round(sup).toLocaleString('pt-BR')} kcal/dia</strong>
            </div>

            <div class="advice" style="background:${advBg};border-color:${advBorder}">
                <strong>Aconselhamento — ${sexo === 'M' ? 'masculino' : 'feminino'}</strong><br><br>
                ${advText}
            </div>

            <div class="stat">
                💧 <strong>Referência de gordura corporal — ${sexo === 'M' ? 'masculino' : 'feminino'}</strong><br><br>
                ${gordTbl}
            </div>

            <p style="font-size:12px;color:#bbb;margin-top:14px;font-style:italic">Estimativas gerais. Não substituem orientação de nutricionista, médico ou educador físico.</p>
        `;
    }
}

</script>

</body>
</html>
