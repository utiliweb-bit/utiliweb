<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerador de Senha Forte | UtiliWeb</title>

<meta name="description" content="Gere senhas fortes e seguras com letras, números e símbolos.">
<meta name="keywords" content="senha forte, gerador de senha, segurança, utiliweb">

<link rel="stylesheet" href="../../assets/style.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial;
    background: linear-gradient(135deg, #2ecc71, #27ae60);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

/* WRAPPER */
.wrapper {
    width: 100%;
    max-width: 1000px;
    min-height: 650px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
}

/* LEFT */
.left-panel {
    padding: 30px;
    border-right: 1px solid #eee;
}

header h1 {
    font-size: 26px;
}

.subtitle {
    font-size: 14px;
    color: #777;
}

/* INPUTS */
input[type="number"] {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: 2px solid #ddd;
    font-size: 14px;
}

input:focus {
    border-color: #27ae60;
    outline: none;
}

/* CHECKBOX */
.checks {
    margin-top: 12px;
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    font-size: 14px;
}

/* BOTÕES */
.buttons {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

button {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: #27ae60;
    color: white;
}

button:hover {
    opacity: 0.9;
}

/* RESULT */
.result-box {
    margin-top: 20px;
    padding: 15px;
    background: #f7f7f7;
    border-radius: 10px;
    word-break: break-all;
    font-weight: bold;
}

/* RIGHT */
.right-panel {
    padding: 30px;
    background: #eafaf1;
}

/* RESPONSIVO */
@media (max-width: 900px) {
    .wrapper {
        grid-template-columns: 1fr;
    }

    .left-panel {
        border-right: none;
        border-bottom: 1px solid #eee;
    }

    .buttons {
        flex-direction: column;
    }
}
</style>

</head>

<body>

<div class="wrapper">

    <!-- LEFT -->
    <div class="left-panel">

        <header>
            <h1>🔐 Gerador de Senha Forte</h1>
            <p class="subtitle">Senhas seguras e aleatórias</p>
        </header>

        <br>

        <a href="../../index.html">← Voltar</a>

        <label>Tamanho da senha</label>
        <input id="length" type="number" value="12" min="6" max="64">

        <div class="checks">
            <label><input type="checkbox" id="numbers" checked> Números</label>
            <label><input type="checkbox" id="symbols" checked> Símbolos</label>
        </div>

        <div class="buttons">
            <button onclick="generate()">Gerar</button>
            <button onclick="copyPassword()">Copiar</button>
        </div>

        <div class="result-box" id="result">---</div>

    </div>

    <!-- RIGHT -->
    <div class="right-panel">

        <h2>Como funciona</h2>
        <p>
            Gere senhas seguras usando criptografia do navegador.
            Ideal para redes sociais, bancos e sistemas.
        </p>

    </div>

</div>

<script>
let currentPassword = "";

function generate() {

    const length = parseInt(document.getElementById("length").value) || 12;
    const useNumbers = document.getElementById("numbers").checked;
    const useSymbols = document.getElementById("symbols").checked;

    let chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";

    if (useNumbers) chars += "0123456789";
    if (useSymbols) chars += "!@#$%^&*()-_=+[]{}<>?/";

    let password = "";

    if (window.crypto && crypto.getRandomValues) {

        const array = new Uint32Array(length);
        crypto.getRandomValues(array);

        for (let i = 0; i < length; i++) {
            password += chars[array[i] % chars.length];
        }

    } else {

        for (let i = 0; i < length; i++) {
            password += chars[Math.floor(Math.random() * chars.length)];
        }
    }

    currentPassword = password;
    document.getElementById("result").textContent = password;
}

function copyPassword() {
    if (!currentPassword) return;
    navigator.clipboard.writeText(currentPassword);
}
</script>

</body>
</html>
