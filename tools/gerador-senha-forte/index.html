<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Gerador de Senha Forte | UtiliWeb</title>

<meta name="description" content="Gere senhas fortes e seguras com letras, números e símbolos.">
<meta name="keywords" content="senha forte, gerador de senha, segurança, utiliweb">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html, body {
    width: 100%;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial;
    background: linear-gradient(135deg, #2ecc71, #27ae60);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
}

/* WRAPPER */
.wrapper {
    width: 100%;
    max-width: 1050px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
    max-height: 90vh;
}

/* LEFT */
.left-panel {
    padding: 28px;
    overflow-y: auto;
    border-right: 1px solid #e0e0e0;
}

/* RIGHT */
.right-panel {
    padding: 28px;
    background: #eafaf1;
    overflow-y: auto;
}

/* HEADER */
header {
    text-align: center;
    margin-bottom: 16px;
}

h1 {
    font-size: 24px;
    color: #333;
}

.subtitle {
    font-size: 13px;
    color: #777;
}

/* LINK VOLTAR */
a {
    display: inline-block;
    margin-bottom: 14px;
    color: #27ae60;
    font-weight: 600;
    text-decoration: none;
}

/* INPUT */
input[type="number"] {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 2px solid #ddd;
    font-size: 14px;
    margin-top: 10px;
}

input:focus {
    border-color: #27ae60;
    outline: none;
}

/* CHECKBOX */
.checks {
    margin-top: 12px;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    font-size: 13px;
    color: #333;
}

/* BUTTONS */
.buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 16px;
}

button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: 700;
    font-size: 12px;
    background: #27ae60;
    color: white;
    text-transform: uppercase;
    transition: 0.2s;
}

button:active {
    transform: scale(0.97);
}

/* RESULT */
.result-box {
    margin-top: 18px;
    padding: 14px;
    background: #f7f7f7;
    border-radius: 10px;
    word-break: break-all;
    font-weight: 700;
    font-size: 14px;
    min-height: 48px;
}

/* RESPONSIVO */
@media (max-width: 900px) {
    .wrapper {
        grid-template-columns: 1fr;
        max-height: none;
        border-radius: 12px;
    }

    .left-panel {
        border-right: none;
        border-bottom: 1px solid #e0e0e0;
    }

    .buttons {
        grid-template-columns: 1fr;
    }
}

@media (max-width: 480px) {
    html, body {
        padding: 10px;
    }

    .left-panel, .right-panel {
        padding: 16px;
    }

    h1 {
        font-size: 20px;
    }
}
</style>

</head>

<body>

<div class="wrapper">

    <!-- LEFT -->
    <div class="left-panel">

        <header>
            <h1>🔐 Senha Forte</h1>
            <p class="subtitle">Gerador seguro e rápido</p>
        </header>

        <a href="../../index.html">← Voltar</a>

        <label>Tamanho da senha</label>
        <input id="length" type="number" value="12" min="6" max="64">

        <div class="checks">
            <label><input type="checkbox" id="numbers" checked> Números</label>
            <label><input type="checkbox" id="symbols" checked> Símbolos</label>
        </div>

        <div class="buttons">
            <button onclick="generate()">Gerar</button>
            <button onclick="copyPassword()">Copiar</button>
        </div>

        <div class="result-box" id="result">---</div>

    </div>

    <!-- RIGHT -->
    <div class="right-panel">

        <h2>Como funciona</h2>
        <p>
            Senhas são geradas localmente no navegador usando aleatoriedade criptográfica.
            Ideal para segurança em redes sociais, bancos e sistemas.
        </p>

    </div>

</div>

<script>
let currentPassword = "";

function generate() {

    const length = parseInt(document.getElementById("length").value) || 12;
    const useNumbers = document.getElementById("numbers").checked;
    const useSymbols = document.getElementById("symbols").checked;

    let chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";

    if (useNumbers) chars += "0123456789";
    if (useSymbols) chars += "!@#$%^&*()-_=+[]{}<>?/";

    let password = "";

    if (window.crypto && crypto.getRandomValues) {

        const array = new Uint32Array(length);
        crypto.getRandomValues(array);

        for (let i = 0; i < length; i++) {
            password += chars[array[i] % chars.length];
        }

    } else {

        for (let i = 0; i < length; i++) {
            password += chars[Math.floor(Math.random() * chars.length)];
        }
    }

    currentPassword = password;
    document.getElementById("result").textContent = password;
}

function copyPassword() {
    if (!currentPassword) return;
    navigator.clipboard.writeText(currentPassword);
}
</script>

</body>
</html>
