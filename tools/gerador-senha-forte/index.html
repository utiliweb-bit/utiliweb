<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerador de Senha Forte Online | UtiliWeb</title>

<meta name="description" content="Gere senhas fortes e seguras online com letras, números e símbolos. Ferramenta grátis do UtiliWeb.">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="../../assets/style.css">
</head>

<body>

<header>
    <h1>Gerador de Senha Forte</h1>
    <p>Crie senhas seguras com nível profissional</p>
</header>

<div class="container">

    <a href="../../index.html">← Voltar</a>

    <div style="margin-top:20px;">

        <label for="length">Tamanho da senha:</label>
        <input id="length" type="number" value="12" min="6" max="64">

        <div style="margin-top:10px;">
            <label><input type="checkbox" id="numbers" checked> Números</label>
            <label><input type="checkbox" id="symbols" checked> Símbolos</label>
        </div>

        <button style="margin-top:15px;" onclick="generate()">
            Gerar Senha
        </button>

        <button style="margin-top:15px;" onclick="copyPassword()">
            Copiar Senha
        </button>

    </div>

    <div class="result" style="margin-top:20px;">
        <p><strong>Sua senha:</strong></p>
        <div id="result" style="word-break: break-all;">---</div>
    </div>

    <section style="margin-top:40px;">
        <h2>Como funciona</h2>
        <p>Escolha o tamanho e opções. A senha é gerada com segurança criptográfica usando o sistema do navegador.</p>
    </section>

</div>

<script>
let currentPassword = "";

function generate() {

    const length = parseInt(document.getElementById("length").value);
    const useNumbers = document.getElementById("numbers").checked;
    const useSymbols = document.getElementById("symbols").checked;

    let chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";

    if (useNumbers) chars += "0123456789";
    if (useSymbols) chars += "!@#$%^&*()-_=+[]{}<>?/";

    const array = new Uint32Array(length);
    crypto.getRandomValues(array);

    let password = "";

    for (let i = 0; i < length; i++) {
        password += chars[array[i] % chars.length];
    }

    currentPassword = password;
    document.getElementById("result").textContent = password;
}

function copyPassword() {

    if (!currentPassword) {
        alert("Gere uma senha primeiro.");
        return;
    }

    navigator.clipboard.writeText(currentPassword);
    alert("Senha copiada!");
}

// gera automaticamente ao abrir
generate();
</script>

</body>
</html>
