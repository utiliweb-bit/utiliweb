<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Encurtador de Links Gratuito">
<meta name="keywords" content="encurtador de links, short url, cloudflare workers">
<title>Encurtador de Links</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:linear-gradient(135deg,#2ecc71 0%,#27ae60 100%);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:16px;
}

.wrapper{
    width:100%;
    max-width:1200px;
    background:white;
    border-radius:16px;
    overflow:hidden;
    display:grid;
    grid-template-columns:1fr 1fr;
    box-shadow:0 20px 60px rgba(0,0,0,.25);
}

.left-panel{
    padding:32px;
    border-right:1px solid #e0e0e0;
}

.right-panel{
    padding:32px;
    background:linear-gradient(135deg,#e8f8f5 0%,#d5f4e6 100%);
}

header{
    text-align:center;
    margin-bottom:24px;
}

h1{
    font-size:28px;
    color:#333;
    margin-bottom:6px;
}

.subtitle{
    color:#999;
    font-size:13px;
}

.info-box{
    background:#e8f8f5;
    border-left:4px solid #27ae60;
    padding:12px;
    border-radius:8px;
    color:#27ae60;
    font-size:11px;
    margin-bottom:24px;
}

.section-title{
    font-size:12px;
    font-weight:700;
    color:#333;
    text-transform:uppercase;
    border-bottom:2px solid #27ae60;
    padding-bottom:8px;
    margin-bottom:16px;
}

.input-group{
    margin-bottom:16px;
}

.input-label{
    display:block;
    font-size:11px;
    font-weight:700;
    color:#666;
    margin-bottom:6px;
}

.input-hint{
    font-size:10px;
    color:#999;
    margin-top:4px;
}

input{
    width:100%;
    padding:12px;
    border:2px solid #e0e0e0;
    border-radius:8px;
    font-size:14px;
    transition:.2s;
}

input:focus{
    outline:none;
    border-color:#27ae60;
    background:#f0f9f7;
}

.btn-gerar{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#2ecc71 0%,#27ae60 100%);
    color:white;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 4px 12px rgba(46,204,113,.3);
}

.resultado-header{
    font-size:12px;
    font-weight:700;
    color:#27ae60;
    border-bottom:2px solid #27ae60;
    padding-bottom:8px;
    margin-bottom:16px;
}

.resultado-box{
    background:white;
    border:2px solid #27ae60;
    border-radius:10px;
    padding:16px;
    margin-bottom:16px;
}

.resultado-label{
    font-size:11px;
    color:#666;
    margin-bottom:8px;
}

.resultado-link{
    color:#27ae60;
    font-weight:700;
    word-break:break-all;
}

.qrcode-box{
    background:white;
    border-radius:10px;
    padding:16px;
    margin-bottom:16px;
    text-align:center;
}

.historico-pesquisa{
    width:100%;
    margin-bottom:12px;
}

.historico-titulo{
    font-size:11px;
    font-weight:700;
    color:#27ae60;
    margin-bottom:10px;
}

.historico{
    list-style:none;
    max-height:250px;
    overflow-y:auto;
}

.historico li{
    padding:10px;
    background:rgba(255,255,255,.5);
    border-radius:8px;
    margin-bottom:8px;
    font-size:11px;
    color:#27ae60;
    cursor:pointer;
}

.botoes{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-bottom:16px;
}

button{
    padding:11px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:700;
}

.btn-copiar{
    background:white;
    border:2px solid #27ae60;
    color:#27ae60;
}

.btn-abrir{
    background:#27ae60;
    color:white;
}

.status{
    text-align:center;
    color:#27ae60;
    font-size:11px;
    margin-top:10px;
}

@media(max-width:900px){

.wrapper{
    grid-template-columns:1fr;
}

.left-panel{
    border-right:none;
    border-bottom:1px solid #e0e0e0;
}

}

@media(max-width:768px){

.left-panel,
.right-panel{
    padding:16px;
}

h1{
    font-size:22px;
}

}

</style>
</head>

<body>

<div class="wrapper">

<div class="left-panel">

<header>
<h1>🔗 Encurtador de Links</h1>
<p class="subtitle">Cloudflare Workers + KV</p>
</header>

<div class="info-box">
<strong>Dica:</strong> Gere links curtos gratuitamente e compartilhe facilmente.
</div>

<div class="section-title">
Criar Link
</div>

<div class="input-group">
<label class="input-label">
URL ORIGINAL
</label>

<input
type="text"
id="urlOriginal"
placeholder="https://youtube.com/...">

<div class="input-hint">
Cole a URL completa.
</div>
</div>

<div class="input-group">
<label class="input-label">
ALIAS PERSONALIZADO (Opcional)
</label>

<input
type="text"
id="alias"
placeholder="youtube">

<div class="input-hint">
Exemplo: meu-canal
</div>
</div>

<button class="btn-gerar">
Gerar Link Curto
</button>

</div>

<div class="right-panel">

<div class="resultado-header">
Resultado
</div>

<div class="resultado-box">

<div class="resultado-label">
LINK CURTO
</div>

<div class="resultado-link" id="resultado">
Nenhum link gerado
</div>

</div>

<div class="botoes">

<button class="btn-copiar">
📋 Copiar
</button>

<button class="btn-abrir">
🌐 Abrir
</button>

</div>

<div class="qrcode-box">

<div class="resultado-label">
QR CODE
</div>

<div id="qrcode">
QR Code aparecerá aqui
</div>

</div>

<input
class="historico-pesquisa"
type="text"
id="pesquisaHistorico"
placeholder="Pesquisar histórico">

<div class="historico-titulo">
📌 Histórico
</div>

<ul class="historico" id="historico">

<li>Nenhum link criado</li>

</ul>

<div class="status" id="status"></div>

</div>

</div>

  <!-- Adicione antes do fechamento </body> -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>

const API_URL = "https://SEU-WORKER.workers.dev";

let historico = JSON.parse(
    localStorage.getItem("historico-links")
) || [];

atualizarHistorico();

document.querySelector(".btn-gerar")
.addEventListener("click", gerarLink);

document.querySelector(".btn-copiar")
.addEventListener("click", copiarLink);

document.querySelector(".btn-abrir")
.addEventListener("click", abrirLink);

document
.getElementById("pesquisaHistorico")
.addEventListener("input", pesquisarHistorico);


// =====================
// GERAR LINK
// =====================

async function gerarLink(){

    const url = document
        .getElementById("urlOriginal")
        .value
        .trim();

    const alias = document
        .getElementById("alias")
        .value
        .trim();

    if(!url){

        mostrarStatus("Preencha a URL");

        return;

    }

    try{

        new URL(url);

    }
    catch{

        mostrarStatus("URL inválida");

        return;

    }

    try{

        const resposta = await fetch(
            API_URL + "/create",
            {

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({
                    url:url,
                    alias:alias
                })

            }
        );

        const dados = await resposta.json();

        if(dados.error){

            mostrarStatus(dados.error);

            return;

        }

        document
        .getElementById("resultado")
        .textContent = dados.shortUrl;

        gerarQRCode(dados.shortUrl);

        salvarHistorico(dados.shortUrl);

        copiarAutomaticamente(dados.shortUrl);

        mostrarStatus("✓ Link criado");

    }
    catch{

        mostrarStatus("Erro ao conectar");

    }

}


// =====================
// QR CODE
// =====================

function gerarQRCode(link){

    const area = document.getElementById("qrcode");

    area.innerHTML = "";

    new QRCode(area,{
        text:link,
        width:180,
        height:180
    });

}


// =====================
// COPIAR AUTOMÁTICO
// =====================

function copiarAutomaticamente(texto){

    navigator.clipboard.writeText(texto);

}


// =====================
// BOTÃO COPIAR
// =====================

function copiarLink(){

    const texto = document
        .getElementById("resultado")
        .textContent;

    if(texto === "Nenhum link gerado"){

        return;

    }

    navigator.clipboard.writeText(texto);

    const btn = document.querySelector(".btn-copiar");

    const original = btn.textContent;

    btn.textContent = "✓ Copiado";

    setTimeout(()=>{

        btn.textContent = original;

    },1500);

}


// =====================
// ABRIR LINK
// =====================

function abrirLink(){

    const texto = document
        .getElementById("resultado")
        .textContent;

    if(texto === "Nenhum link gerado"){

        return;

    }

    window.open(texto,"_blank");

}


// =====================
// HISTÓRICO
// =====================

function salvarHistorico(link){

    historico = historico.filter(
        item => item !== link
    );

    historico.unshift(link);

    if(historico.length > 20){

        historico.pop();

    }

    localStorage.setItem(
        "historico-links",
        JSON.stringify(historico)
    );

    atualizarHistorico();

}


function atualizarHistorico(){

    const lista = document.getElementById("historico");

    if(historico.length === 0){

        lista.innerHTML =
        "<li>Nenhum link criado</li>";

        return;

    }

    lista.innerHTML = historico.map(link => `

        <li onclick="restaurarLink('${link}')">
            ${link}
        </li>

    `).join("");

}


function restaurarLink(link){

    document
    .getElementById("resultado")
    .textContent = link;

    gerarQRCode(link);

}


// =====================
// PESQUISA
// =====================

function pesquisarHistorico(){

    const termo = document
        .getElementById("pesquisaHistorico")
        .value
        .toLowerCase();

    const lista = document.getElementById("historico");

    const filtrado = historico.filter(
        item => item.toLowerCase().includes(termo)
    );

    lista.innerHTML = filtrado.map(link => `

        <li onclick="restaurarLink('${link}')">
            ${link}
        </li>

    `).join("");

}


// =====================
// EXPORTAR JSON
// =====================

function exportarHistorico(){

    const blob = new Blob(

        [
            JSON.stringify(
                historico,
                null,
                2
            )
        ],

        {
            type:"application/json"
        }

    );

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");

    a.href = url;

    a.download = "historico-links.json";

    a.click();

}


// =====================
// STATUS
// =====================

function mostrarStatus(texto){

    const status = document
        .getElementById("status");

    status.textContent = texto;

    setTimeout(()=>{

        status.textContent = "";

    },2000);

}

</script>

</body>
</html>
