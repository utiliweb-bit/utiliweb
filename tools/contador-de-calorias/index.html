<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Contador de Calorias | UtiliWeb</title>
<meta name="description" content="Consulte calorias, proteínas, carboidratos e gorduras de centenas de alimentos e monte seu diário alimentar.">
<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html { -webkit-text-size-adjust: 100%; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    background: linear-gradient(135deg, #2ecc71, #27ae60);
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 12px;
}

.wrapper {
    width: 100%;
    max-width: 1100px;
    background: #fff;
    border-radius: 18px;
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr 1fr;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
    margin: auto;
}

.left, .right {
    padding: 24px;
    min-width: 0;
}

.left { border-right: 1px solid #eee; }
.right { background: #f6fff8; }

h1 { font-size: 28px; margin-bottom: 6px; }
h2 { font-size: 24px; margin-bottom: 16px; }

.subtitle { color: #666; font-size: 14px; margin-bottom: 18px; }

a.back {
    display: inline-block;
    margin-bottom: 14px;
    text-decoration: none;
    color: #27ae60;
    font-weight: 700;
}

label {
    display: block;
    margin-bottom: 8px;
    font-size: 14px;
    font-weight: 700;
    color: #444;
}

input[type="text"], input[type="number"], select {
    width: 100%;
    padding: 13px;
    border-radius: 12px;
    border: 2px solid #ddd;
    font-size: 16px;
    background: #fff;
    color: #333;
    font-family: inherit;
}

input[type="text"]:focus, input[type="number"]:focus, select:focus {
    outline: none;
    border-color: #27ae60;
}

.search-wrap {
    position: relative;
    margin-bottom: 8px;
}

.suggestions {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: #fff;
    border: 2px solid #27ae60;
    border-radius: 12px;
    max-height: 220px;
    overflow-y: auto;
    z-index: 100;
    display: none;
}

.suggestion-item {
    padding: 10px 14px;
    cursor: pointer;
    font-size: 14px;
    color: #333;
    border-bottom: 1px solid #f0f0f0;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.suggestion-item:last-child { border-bottom: none; }
.suggestion-item:hover { background: #f6fff8; }

.suggestion-kcal {
    font-size: 12px;
    color: #27ae60;
    font-weight: 700;
}

.input-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
}

.input-group { margin-bottom: 16px; }

.btn-add {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: #27ae60;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 4px;
}

.btn-add:hover { opacity: .95; }

.btn-limpar {
    width: 100%;
    padding: 11px;
    border: 2px solid #27ae60;
    border-radius: 12px;
    background: #fff;
    color: #27ae60;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 10px;
}

.btn-limpar:hover { background: #f6fff8; }

/* Painel nutricional do alimento selecionado */
.nutri-preview {
    background: #f6fff8;
    border: 1px solid #d7f5e3;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 16px;
    display: none;
}

.nutri-name {
    font-size: 15px;
    font-weight: 700;
    color: #333;
    margin-bottom: 10px;
}

.nutri-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
}

.nutri-item {
    background: #fff;
    border-radius: 8px;
    padding: 8px 6px;
    text-align: center;
    border: 1px solid #e7f7ec;
}

.nutri-val {
    font-size: 16px;
    font-weight: 800;
    color: #27ae60;
    display: block;
}

.nutri-lbl {
    font-size: 10px;
    color: #888;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    margin-top: 2px;
    display: block;
}

/* Diário */
.section-label {
    font-size: 12px;
    font-weight: 700;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
}

.total-card {
    background: #fff;
    border: 2px solid #27ae60;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 14px;
}

.total-kcal {
    font-size: 38px;
    font-weight: 800;
    color: #27ae60;
    line-height: 1;
    margin-bottom: 4px;
}

.total-sub {
    font-size: 13px;
    color: #888;
    margin-bottom: 12px;
}

.macro-bar-wrap {
    margin-bottom: 6px;
}

.macro-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 4px;
}

.macro-bar-track {
    height: 8px;
    background: #eee;
    border-radius: 99px;
    overflow: hidden;
}

.macro-bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.3s;
}

.macros-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-top: 10px;
}

.macro-pill {
    background: #f6fff8;
    border: 1px solid #e7f7ec;
    border-radius: 8px;
    padding: 8px 6px;
    text-align: center;
}

.macro-pill-val {
    font-size: 15px;
    font-weight: 800;
    display: block;
}

.macro-pill-lbl {
    font-size: 10px;
    color: #888;
    font-weight: 700;
    text-transform: uppercase;
    margin-top: 1px;
    display: block;
}

/* Lista de itens */
.diary-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 320px;
    overflow-y: auto;
}

.diary-item {
    background: #fff;
    border: 1px solid #e7f7ec;
    border-radius: 10px;
    padding: 10px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
}

.diary-item-info { flex: 1; min-width: 0; }

.diary-item-name {
    font-size: 14px;
    font-weight: 700;
    color: #333;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.diary-item-meta {
    font-size: 12px;
    color: #888;
    margin-top: 2px;
}

.diary-item-kcal {
    font-size: 16px;
    font-weight: 800;
    color: #27ae60;
    white-space: nowrap;
}

.diary-item-del {
    background: none;
    border: none;
    cursor: pointer;
    color: #ccc;
    font-size: 18px;
    line-height: 1;
    padding: 0 0 0 6px;
    margin-top: 0;
    width: auto;
    font-weight: 400;
}

.diary-item-del:hover { color: #e74c3c; }

.empty-msg { color: #999; font-size: 15px; }

@media (max-width: 900px) {
    body { align-items: flex-start; }
    .wrapper { grid-template-columns: 1fr; }
    .left { border-right: none; border-bottom: 1px solid #eee; }
    h1 { font-size: 22px; }
    h2 { font-size: 20px; }
}

@media (max-width: 480px) {
    .input-row { grid-template-columns: 1fr; }
    .nutri-grid { grid-template-columns: repeat(2, 1fr); }
    .total-kcal { font-size: 30px; }
}

</style>
</head>
<body>

<div class="wrapper">
    <div class="left">
        <h1>🥗 Contador de Calorias</h1>
        <p class="subtitle">Consulte a tabela nutricional e monte seu diário alimentar</p>
        <a class="back" href="../../index.html">← Voltar</a>

        <label>Buscar alimento</label>
        <div class="search-wrap">
            <input type="text" id="busca" placeholder="Ex: arroz, frango, banana…" autocomplete="off" oninput="buscar()">
            <div class="suggestions" id="sugestoes"></div>
        </div>
        <p style="font-size:12px;color:#aaa;margin-bottom:16px">Tabela com mais de 280 alimentos, incluindo pratos da culinária japonesa</p>

        <div class="nutri-preview" id="nutri-preview">
            <div class="nutri-name" id="nutri-nome">—</div>
            <div class="nutri-grid">
                <div class="nutri-item"><span class="nutri-val" id="prev-kcal">0</span><span class="nutri-lbl">kcal</span></div>
                <div class="nutri-item"><span class="nutri-val" id="prev-prot" style="color:#3498db">0g</span><span class="nutri-lbl">proteína</span></div>
                <div class="nutri-item"><span class="nutri-val" id="prev-carb" style="color:#e67e22">0g</span><span class="nutri-lbl">carboidrato</span></div>
                <div class="nutri-item"><span class="nutri-val" id="prev-gord" style="color:#e74c3c">0g</span><span class="nutri-lbl">gordura</span></div>
            </div>
            <p style="font-size:11px;color:#aaa;margin-top:8px">Valores por 100g</p>
            <p id="colher-info" style="display:none;font-size:12px;color:#27ae60;font-weight:700;margin-top:6px;background:#fff;border-radius:8px;padding:6px 8px;border:1px solid #d7f5e3"></p>
        </div>

        <div class="input-row">
            <div>
                <label>Quantidade (g)</label>
                <input type="number" id="quantidade" value="100" min="1" step="1" oninput="atualizarColherQtd()">
                <p id="qtd-colher" style="display:none;font-size:12px;color:#27ae60;font-weight:700;margin-top:6px">🥄 —</p>
            </div>
            <div>
                <label>Refeição</label>
                <select id="refeicao">
                    <option value="Café da manhã">☀️ Café da manhã</option>
                    <option value="Lanche da manhã">🍎 Lanche da manhã</option>
                    <option value="Almoço" selected>🍽️ Almoço</option>
                    <option value="Lanche da tarde">🥪 Lanche da tarde</option>
                    <option value="Jantar">🌙 Jantar</option>
                    <option value="Ceia">🌛 Ceia</option>
                </select>
            </div>
        </div>

        <button class="btn-add" onclick="adicionar()">+ Adicionar ao diário</button>
        <button class="btn-limpar" onclick="limparDiario()">🗑️ Limpar diário</button>
    </div>

    <div class="right">
        <h2>Diário alimentar</h2>
        <div id="painel"><p class="empty-msg">Adicione alimentos para ver o total.</p></div>
    </div>
</div>

let selecionado = null;
let diario = [];

function normalizar(s) {
    return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function buscar() {
    const q = normalizar(document.getElementById('busca').value);
    const box = document.getElementById('sugestoes');
    if (q.length < 2) { box.style.display = 'none'; return; }
    const res = ALIMENTOS.filter(a => normalizar(a[0]).includes(q)).slice(0, 12);
    if (!res.length) { box.style.display = 'none'; return; }
    box.innerHTML = res.map((a, i) =>
        `<div class="suggestion-item" onclick="selecionar(${ALIMENTOS.indexOf(a)})">
            <span>${a[0]}</span>
            <span class="suggestion-kcal">${a[1]} kcal</span>
        </div>`
    ).join('');
    box.style.display = 'block';
}

function formatColher(n, curto) {
    const r = Math.round(n * 2) / 2; // arredonda para o ½ mais próximo
    if (r <= 0) return curto ? '< ½ colher' : 'menos de ½ colher de sopa';
    const numTxt = (r % 1 === 0) ? String(r) : r.toFixed(1).replace('.', ',');
    if (curto) return numTxt + ' c.sopa';
    const plural = r !== 1;
    return numTxt + (plural ? ' colheres de sopa' : ' colher de sopa');
}

function atualizarColherQtd() {
    const el = document.getElementById('qtd-colher');
    if (!selecionado || !selecionado[5]) { el.style.display = 'none'; return; }
    const qtd = parseFloat(document.getElementById('quantidade').value) || 0;
    if (qtd <= 0) { el.style.display = 'none'; return; }
    const colheres = qtd / selecionado[5];
    el.textContent = `🥄 ${qtd}g ≈ ${formatColher(colheres)}`;
    el.style.display = 'block';
}

function selecionar(idx) {
    selecionado = ALIMENTOS[idx];
    document.getElementById('busca').value = selecionado[0];
    document.getElementById('sugestoes').style.display = 'none';
    const prev = document.getElementById('nutri-preview');
    prev.style.display = 'block';
    document.getElementById('nutri-nome').textContent = selecionado[0] + ' — por 100g';
    document.getElementById('prev-kcal').textContent = selecionado[1];
    document.getElementById('prev-prot').textContent = selecionado[2] + 'g';
    document.getElementById('prev-carb').textContent = selecionado[3] + 'g';
    document.getElementById('prev-gord').textContent = selecionado[4] + 'g';

    const colherEl = document.getElementById('colher-info');
    if (selecionado[5]) {
        const colheres100g = 100 / selecionado[5];
        colherEl.textContent = `🥄 100g ≈ ${formatColher(colheres100g)} (${selecionado[5]}g por colher)`;
        colherEl.style.display = 'block';
    } else {
        colherEl.style.display = 'none';
    }
    atualizarColherQtd();
}

document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap')) {
        document.getElementById('sugestoes').style.display = 'none';
    }
});

function adicionar() {
    if (!selecionado) { alert('Selecione um alimento primeiro.'); return; }
    const qtd = parseFloat(document.getElementById('quantidade').value) || 100;
    const ref = document.getElementById('refeicao').value;
    const fator = qtd / 100;
    diario.push({
        nome: selecionado[0],
        qtd,
        ref,
        kcal: Math.round(selecionado[1] * fator),
        prot: +(selecionado[2] * fator).toFixed(1),
        carb: +(selecionado[3] * fator).toFixed(1),
        gord: +(selecionado[4] * fator).toFixed(1),
        colher: selecionado[5] ? qtd / selecionado[5] : null,
    });
    renderDiario();
}

function remover(i) {
    diario.splice(i, 1);
    renderDiario();
}

function limparDiario() {
    diario = [];
    renderDiario();
}

function renderDiario() {
    const el = document.getElementById('painel');
    if (!diario.length) {
        el.innerHTML = '<p class="empty-msg">Adicione alimentos para ver o total.</p>';
        return;
    }

    const totKcal = diario.reduce((s, i) => s + i.kcal, 0);
    const totProt = +diario.reduce((s, i) => s + i.prot, 0).toFixed(1);
    const totCarb = +diario.reduce((s, i) => s + i.carb, 0).toFixed(1);
    const totGord = +diario.reduce((s, i) => s + i.gord, 0).toFixed(1);

    const totalMacro = totProt + totCarb + totGord || 1;
    const pProt = Math.round(totProt / totalMacro * 100);
    const pCarb = Math.round(totCarb / totalMacro * 100);
    const pGord = Math.round(totGord / totalMacro * 100);

    const refeicoes = {};
    diario.forEach((item, idx) => {
        if (!refeicoes[item.ref]) refeicoes[item.ref] = [];
        refeicoes[item.ref].push({ ...item, idx });
    });

    const listaHTML = Object.entries(refeicoes).map(([ref, itens]) => {
        const refKcal = itens.reduce((s, i) => s + i.kcal, 0);
        const items = itens.map(it => `
            <div class="diary-item">
                <div class="diary-item-info">
                    <div class="diary-item-name">${it.nome}</div>
                    <div class="diary-item-meta">${it.qtd}g${it.colher ? ' (' + formatColher(it.colher, true) + ')' : ''} · P: ${it.prot}g · C: ${it.carb}g · G: ${it.gord}g</div>
                </div>
                <div class="diary-item-kcal">${it.kcal} kcal</div>
                <button class="diary-item-del" onclick="remover(${it.idx})">×</button>
            </div>
        `).join('');
        return `
            <div style="margin-bottom:10px">
                <div style="font-size:12px;font-weight:700;color:#27ae60;margin-bottom:5px;display:flex;justify-content:space-between">
                    <span>${ref}</span><span>${refKcal} kcal</span>
                </div>
                ${items}
            </div>
        `;
    }).join('');

    el.innerHTML = `
        <div class="total-card">
            <div class="total-kcal">${totKcal.toLocaleString('pt-BR')} kcal</div>
            <div class="total-sub">total consumido hoje</div>

            <div class="macro-bar-wrap">
                <div class="macro-bar-label">
                    <span style="color:#3498db">Proteína ${pProt}%</span>
                    <span style="color:#e67e22">Carboidrato ${pCarb}%</span>
                    <span style="color:#e74c3c">Gordura ${pGord}%</span>
                </div>
                <div class="macro-bar-track">
                    <div style="display:flex;height:100%">
                        <div class="macro-bar-fill" style="width:${pProt}%;background:#3498db"></div>
                        <div class="macro-bar-fill" style="width:${pCarb}%;background:#e67e22"></div>
                        <div class="macro-bar-fill" style="width:${pGord}%;background:#e74c3c"></div>
                    </div>
                </div>
            </div>

            <div class="macros-row">
                <div class="macro-pill">
                    <span class="macro-pill-val" style="color:#3498db">${totProt}g</span>
                    <span class="macro-pill-lbl">Proteína</span>
                </div>
                <div class="macro-pill">
                    <span class="macro-pill-val" style="color:#e67e22">${totCarb}g</span>
                    <span class="macro-pill-lbl">Carboidrato</span>
                </div>
                <div class="macro-pill">
                    <span class="macro-pill-val" style="color:#e74c3c">${totGord}g</span>
                    <span class="macro-pill-lbl">Gordura</span>
                </div>
            </div>
        </div>

        <div class="section-label">📋 Refeições do dia</div>
        <div class="diary-list">${listaHTML}</div>

        <p style="font-size:12px;color:#bbb;margin-top:12px;font-style:italic">Valores nutricionais aproximados baseados na Tabela TACO e IBGE. Conversões em colheres de sopa são estimativas (variam por densidade do alimento). Para acompanhamento clínico, consulte um nutricionista.</p>
    `;
}
