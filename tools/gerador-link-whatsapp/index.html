<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Gerador de Link WhatsApp | UtiliWeb</title>

<meta name="description" content="Crie links de WhatsApp com mensagem automática de forma rápida e gratuita.">
<meta name="keywords" content="whatsapp link, wa.me, gerador whatsapp, utiliweb">

<style>
:root{
    --pad: clamp(10px, 2vw, 20px);
    --radius: 18px;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    width:100%;
    min-height:100dvh;
    font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial;
    background:linear-gradient(135deg,#2ecc71,#27ae60);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:var(--pad);
}

/* WRAPPER */
.wrapper{
    width:100%;
    max-width:1000px;
    background:#fff;
    border-radius:var(--radius);
    box-shadow:0 20px 60px rgba(0,0,0,.3);
    display:grid;
    grid-template-columns:1fr 1fr;
    overflow:hidden;
}

/* PAINÉIS */
.left-panel,
.right-panel{
    padding:clamp(16px, 3vw, 30px);
}

/* ESQUERDA */
.left-panel{
    border-right:1px solid #eee;
}

/* HEADER */
header h1{
    font-size:clamp(20px, 2.2vw, 26px);
}

.subtitle{
    font-size:clamp(12px, 1.4vw, 14px);
    color:#777;
}

/* INPUTS */
input, textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:2px solid #ddd;
    font-size:14px;
    outline:none;
}

textarea{
    height:120px;
    resize:none;
}

input:focus,
textarea:focus{
    border-color:#27ae60;
}

/* BOTÕES */
.buttons{
    display:flex;
    gap:10px;
    margin-top:15px;
}

button{
    flex:1;
    padding:12px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    font-weight:700;
    background:#27ae60;
    color:#fff;
    min-height:44px;
    touch-action:manipulation;
}

button:hover{
    opacity:0.9;
}

/* RESULTADO */
.result-box{
    margin-top:20px;
}

.result-box input{
    background:#f7f7f7;
    font-size:13px;
}

/* DIREITA */
.right-panel{
    background:#eafaf1;
}

/* RESPONSIVO */
@media (max-width: 900px){
    .wrapper{
        grid-template-columns:1fr;
    }

    .left-panel{
        border-right:none;
        border-bottom:1px solid #eee;
    }

    .buttons{
        flex-direction:column;
    }
}

@media (max-width: 480px){
    html, body{
        padding:10px;
    }

    input, textarea{
        font-size:13px;
        padding:11px;
    }

    textarea{
        height:110px;
    }

    button{
        font-size:13px;
        padding:11px;
    }
}
</style>
</head>

<body>

<div class="wrapper">

    <!-- ESQUERDA -->
    <div class="left-panel">

        <header>
            <h1>💬 Gerador de Link WhatsApp</h1>
            <p class="subtitle">Links com mensagem automática</p>
        </header>

        <br>

        <a href="../../index.html">← Voltar</a>

        <br><br>

        <label>Número do WhatsApp</label>
        <input id="number" type="text" placeholder="Ex: 5511999999999" inputmode="numeric">

        <label>Mensagem</label>
        <textarea id="message" placeholder="Olá, gostaria de mais informações."></textarea>

        <div class="buttons">
            <button onclick="gerarLink()">Gerar</button>
            <button onclick="copiarLink()">Copiar</button>
        </div>

        <div class="result-box">
            <label>Seu link</label>
            <input id="resultado" readonly placeholder="Gerar link para aparecer aqui">
        </div>

    </div>

    <!-- DIREITA -->
    <div class="right-panel">

        <h2>Como funciona</h2>
        <p>
            Gere links do WhatsApp com mensagem automática para usar em Instagram,
            sites, anúncios e atendimento rápido.
        </p>

    </div>

</div>

<script>
function gerarLink() {
    const number = document.getElementById("number").value.replace(/\D/g, "");
    const message = document.getElementById("message").value.trim();

    if (!number) {
        alert("Digite um número válido");
        return;
    }

    const url = `https://wa.me/${number}?text=${encodeURIComponent(message)}`;
    document.getElementById("resultado").value = url;
}

function copiarLink() {
    const campo = document.getElementById("resultado");

    if (!campo.value) {
        alert("Gere um link primeiro");
        return;
    }

    navigator.clipboard.writeText(campo.value);
}
</script>

</body>
</html>
