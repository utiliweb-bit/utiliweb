<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerador de Link WhatsApp Online | UtiliWeb</title>

<meta name="description" content="Crie links de WhatsApp com mensagem automática gratuitamente. Gere links clicáveis para clientes e redes sociais com o UtiliWeb.">

<meta name="robots" content="index, follow">

<link rel="stylesheet" href="../../assets/style.css">
</head>

<body>

<header>
    <h1>Gerador de Link WhatsApp</h1>
    <p>Crie links clicáveis com mensagem automática</p>
</header>

<div class="container">

    <a href="../../index.html">← Voltar</a>

    <div style="margin-top:20px;">

        <label for="number">
            Número do WhatsApp (com código do país):
        </label>

        <input
            id="number"
            type="text"
            inputmode="numeric"
            placeholder="Ex: 5511999999999"
            style="width:100%; margin-top:10px;">

        <label
            for="message"
            style="display:block; margin-top:20px;">

            Mensagem automática:

        </label>

        <textarea
            id="message"
            placeholder="Olá, gostaria de mais informações."
            style="width:100%; height:120px; margin-top:10px;"></textarea>

        <div style="margin-top:20px; display:flex; gap:10px; flex-wrap:wrap;">

            <button onclick="gerarLink()">
                Gerar Link
            </button>

            <button onclick="copiarLink()">
                Copiar Link
            </button>

        </div>

    </div>

    <div class="result" style="margin-top:20px;">

        <p><strong>Seu link:</strong></p>

        <input
            id="resultado"
            type="text"
            readonly
            value=""
            style="width:100%;">

    </div>

    <section style="margin-top:40px;">
        <h2>Como usar</h2>

        <p>
            Digite o número do WhatsApp com o código do país, escreva uma mensagem e clique em "Gerar Link". O link poderá ser usado em sites, Instagram, Facebook e outras redes sociais.
        </p>

    </section>

</div>

<script>
function gerarLink() {

    const number = document
        .getElementById("number")
        .value
        .replace(/\D/g, "");

    const message = document
        .getElementById("message")
        .value
        .trim();

    if (!number) {
        alert("Digite um número válido.");
        return;
    }

    const url =
        `https://wa.me/${number}?text=${encodeURIComponent(message)}`;

    document.getElementById("resultado").value = url;
}

function copiarLink() {

    const campo = document.getElementById("resultado");

    if (!campo.value) {
        alert("Gere um link primeiro.");
        return;
    }

    navigator.clipboard.writeText(campo.value);

    alert("Link copiado!");
}
</script>

</body>
</html>
