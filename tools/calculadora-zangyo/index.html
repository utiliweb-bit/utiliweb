<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zangyō PRO Real</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#1f7a4d;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:12px;
}

.wrapper{
    width:100%;
    max-width:900px;
    background:#fff;
    border-radius:14px;
    padding:16px;
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:6px 0;
    font-size:16px;
    border-radius:10px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#27ae60;
    color:#fff;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:bold;
}

.result{
    margin-top:14px;
    padding:12px;
    background:#f3f3f3;
    border-radius:10px;
    line-height:1.6;
}

.bar{
    height:16px;
    background:#ddd;
    border-radius:10px;
    overflow:hidden;
    margin-top:10px;
}

.bar-fill{
    height:100%;
    width:0%;
    background:#27ae60;
}
</style>
</head>

<body>

<div class="wrapper">

<h2>💼 Zangyō PRO REAL</h2>

<input id="jikyu" type="number" placeholder="Valor da hora ¥">

<input id="horasNormal" type="number" placeholder="Horas normais">

<input id="horasExtra" type="number" placeholder="Horas extras">

<input id="horasNoturnas" type="number" placeholder="Horas noturnas (22h-05h)">

<button onclick="calcular()">Calcular</button>

<div class="result" id="out">Preencha os dados</div>

<div class="bar">
    <div class="bar-fill" id="bar"></div>
</div>

</div>

<script>
function calcular(){

    const jikyu = parseFloat(document.getElementById("jikyu").value)||0;
    const normal = parseFloat(document.getElementById("horasNormal").value)||0;
    const extra = parseFloat(document.getElementById("horasExtra").value)||0;
    const noturno = parseFloat(document.getElementById("horasNoturnas").value)||0;

    if(jikyu<=0){
        document.getElementById("out").innerText="❌ Insira valor da hora";
        return;
    }

    // ===== REGRAS JAPÃO =====
    const valorNormal = jikyu * normal;
    const valorExtra = jikyu * extra * 1.25;
    const valorNoturno = jikyu * noturno * 1.25;
    const bonusExtraNoturno = jikyu * extra * 0.25; // simplificação leve

    const total = valorNormal + valorExtra + valorNoturno + bonusExtraNoturno;

    // estimativa mensal (22 dias)
    const mensal = total * 22;

    document.getElementById("out").innerHTML = `
💰 Diário: ¥${total.toFixed(0)}<br>
📆 Mensal estimado: ¥${mensal.toFixed(0)}<br><br>

🕒 Normais: ¥${valorNormal.toFixed(0)}<br>
⚡ Extras: ¥${valorExtra.toFixed(0)}<br>
🌙 Noturnas: ¥${valorNoturno.toFixed(0)}<br><br>

💵 Total dia: ¥${total.toFixed(0)}
`;

    document.getElementById("bar").style.width = "80%";
}
</script>

</body>
</html>
