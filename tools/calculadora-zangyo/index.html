<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Título da Ferramenta | UtiliWeb</title>

<meta name="description" content="Descrição curta da ferramenta.">
<meta name="keywords" content="utiliweb, ferramentas, japão, calculadora">

<link rel="stylesheet" href="../../assets/style.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    background: linear-gradient(135deg, #2ecc71, #27ae60);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

/* CONTAINER PRINCIPAL */
.wrapper {
    width: 100%;
    max-width: 1200px;
    min-height: 700px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
}

/* PAINÉIS */
.left-panel, .right-panel {
    padding: 30px;
    overflow-y: auto;
}

.left-panel {
    border-right: 1px solid #eee;
}

.right-panel {
    background: #eafaf1;
}

/* TÍTULO */
header h1 {
    font-size: 28px;
    margin-bottom: 5px;
}

.subtitle {
    font-size: 14px;
    color: #777;
}

/* INPUTS */
input, textarea {
    width: 100%;
    padding: 12px;
    border: 2px solid #ddd;
    border-radius: 8px;
    margin-top: 6px;
    font-size: 14px;
}

input:focus, textarea:focus {
    outline: none;
    border-color: #27ae60;
}

/* BOTÕES */
button {
    padding: 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.btn-primary {
    background: #27ae60;
    color: white;
}

.btn-secondary {
    background: white;
    border: 2px solid #27ae60;
    color: #27ae60;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
}

/* CARD */
.card {
    background: white;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

/* RESPONSIVO */
@media (max-width: 1024px) {
    .wrapper {
        grid-template-columns: 1fr;
        min-height: auto;
    }

    .left-panel {
        border-right: none;
        border-bottom: 1px solid #eee;
    }
}

@media (max-width: 600px) {
    body {
        padding: 10px;
    }

    .wrapper {
        border-radius: 12px;
    }

    .left-panel, .right-panel {
        padding: 15px;
    }

    header h1 {
        font-size: 22px;
    }

    .grid {
        grid-template-columns: 1fr;
    }
}
</style>

</head>

<body>

<div class="wrapper">

    <!-- ESQUERDA -->
    <div class="left-panel">

        <header>
            <h1>📌 Nome da Ferramenta</h1>
            <p class="subtitle">Descrição curta aqui</p>
        </header>

        <br>

        <a href="../../index.html">← Voltar</a>

        <div class="box">

            <label>Campo 1</label>
            <input id="input1" type="number">

            <label>Campo 2</label>
            <input id="input2" type="number">

            <div style="margin-top:15px; display:flex; gap:10px;">
                <button class="btn-primary" onclick="calcular()">Calcular</button>
                <button class="btn-secondary" onclick="limpar()">Limpar</button>
            </div>

        </div>

    </div>

    <!-- DIREITA -->
    <div class="right-panel">

        <h2>Resultado</h2>

        <div class="grid">
            <div class="card">Valor 1: <span id="r1">0</span></div>
            <div class="card">Valor 2: <span id="r2">0</span></div>
        </div>

        <br>

        <div class="card">
            <strong>Total:</strong>
            <div id="total">0</div>
        </div>

    </div>

</div>

<script>
function calcular() {
    const i1 = parseFloat(document.getElementById("input1").value) || 0;
    const i2 = parseFloat(document.getElementById("input2").value) || 0;

    document.getElementById("r1").textContent = i1;
    document.getElementById("r2").textContent = i2;
    document.getElementById("total").textContent = i1 + i2;
}

function limpar() {
    document.getElementById("input1").value = "";
    document.getElementById("input2").value = "";

    document.getElementById("r1").textContent = "0";
    document.getElementById("r2").textContent = "0";
    document.getElementById("total").textContent = "0";
}
</script>

</body>
</html>
