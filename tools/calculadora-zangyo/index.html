<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Zangyo PRO Responsivo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background: linear-gradient(135deg,#1f7a4d,#27ae60);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:12px;
}

.wrapper{
    width:100%;
    max-width:900px;
    background:#fff;
    border-radius:14px;
    padding:16px;
    color:#000;
}

/* HEADER */
h2{
    text-align:center;
    margin-bottom:12px;
    font-size:22px;
}

/* INPUTS */
input{
    width:100%;
    padding:12px;
    margin:6px 0;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px; /* evita zoom no mobile */
}

/* BOTÃO */
button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#27ae60;
    color:#fff;
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
}

/* RESULTADO */
.result{
    margin-top:14px;
    padding:12px;
    background:#f4f4f4;
    border-radius:10px;
    font-size:14px;
    line-height:1.5;
}

/* BARRA */
.bar{
    height:18px;
    background:#ddd;
    border-radius:10px;
    overflow:hidden;
    margin-top:10px;
}

.bar-fill{
    height:100%;
    width:0%;
    background:#27ae60;
    transition:0.4s;
}

/* MOBILE AJUSTE FINO */
@media (max-width:480px){

    .wrapper{
        padding:12px;
    }

    h2{
        font-size:18px;
    }

    input, button{
        font-size:15px;
        padding:11px;
    }

    .result{
        font-size:13px;
    }

    .bar{
        height:14px;
    }
}
</style>
</head>

<body>

<div class="wrapper">

<h2>💼 Zangyō PRO</h2>

<input id="jikyu" type="number" placeholder="Valor da hora ¥">
<input id="horas" type="number" placeholder="Horas totais">

<button onclick="calcular()">Calcular</button>

<div class="result" id="out">Preencha os dados e calcule</div>

<div class="bar">
    <div class="bar-fill" id="bar"></div>
</div>

</div>

<script>
function calcular(){

    const jikyu = parseFloat(document.getElementById("jikyu").value)||0;
    const horas = parseFloat(document.getElementById("horas").value)||0;

    if(jikyu<=0 || horas<=0){
        document.getElementById("out").innerText="❌ Dados inválidos";
        return;
    }

    // bruto diário
    const diario = jikyu * horas;

    // mensal (22 dias)
    const mensal = diario * 22;

    // imposto progressivo simplificado
    let impostoRate = 0.10;
    if(mensal>1000000) impostoRate=0.15;
    if(mensal>2000000) impostoRate=0.20;

    const imposto = mensal * impostoRate;

    // seguro social Japão (~14%)
    const seguro = mensal * 0.14;

    const liquido = mensal - imposto - seguro;

    const descontos = imposto + seguro;
    const pct = (descontos / mensal) * 100;

    document.getElementById("out").innerHTML = `
        💰 Bruto mensal: ¥${mensal.toFixed(0)}<br>
        📆 Diário: ¥${diario.toFixed(0)}<br><br>

        🧾 Imposto: ¥${imposto.toFixed(0)}<br>
        🏥 Seguro social: ¥${seguro.toFixed(0)}<br><br>

        💵 Líquido final: ¥${liquido.toFixed(0)}<br>
        📉 Descontos: ${pct.toFixed(1)}%
    `;

    document.getElementById("bar").style.width = pct + "%";
}
</script>

</body>
</html>
