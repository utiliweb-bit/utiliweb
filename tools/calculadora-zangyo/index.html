<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Zangyō PRO Real</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial;
}

body{
    background:#1f7a4d;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:12px;
}

/* WRAPPER PRINCIPAL */
.wrapper{
    width:100%;
    max-width:1000px;
    background:#fff;
    border-radius:16px;
    display:grid;
    grid-template-columns:1fr 1fr;
    overflow:hidden; /* 🔥 evita vazamento visual */
    box-shadow:0 20px 60px rgba(0,0,0,0.3);
}

/* PAINÉIS */
.left-panel,
.right-panel{
    padding:24px;
    min-width:0; /* 🔥 evita overflow em grid */
}

/* LEFT */
h2{
    font-size:22px;
    margin-bottom:6px;
}

.subtitle{
    font-size:12px;
    color:#777;
    margin-bottom:14px;
}

/* INPUTS */
input{
    width:100%;
    max-width:100%;
    padding:12px;
    margin:6px 0;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:16px;
    display:block;
}

input:focus{
    border-color:#27ae60;
    outline:none;
}

/* BOTÃO */
button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#27ae60;
    color:#fff;
    font-weight:bold;
    font-size:14px;
}

/* RIGHT */
.right-panel{
    background: linear-gradient(135deg,#e8f8f5,#d5f4e6);
}

.result-title{
    font-size:12px;
    font-weight:700;
    color:#27ae60;
    margin-bottom:10px;
    border-bottom:2px solid #27ae60;
    padding-bottom:6px;
}

.result{
    font-size:13px;
    line-height:1.6;
    color:#222;
}

.big{
    font-size:18px;
    font-weight:bold;
    color:#27ae60;
    margin-top:10px;
}

/* RESPONSIVO */
@media(max-width:768px){
    .wrapper{
        grid-template-columns:1fr;
    }

    .left-panel{
        border-bottom:1px solid #ddd;
    }
}
</style>
</head>

<body>

<div class="wrapper">

    <!-- INPUT -->
    <div class="left-panel">

        <h2>💼 Zangyō PRO</h2>
        <div class="subtitle">Simulador de Salário no Japão</div>

        <input id="jikyu" type="number" placeholder="Valor da hora ¥">
        <input id="horasNormal" type="number" placeholder="Horas normais">
        <input id="horasExtra" type="number" placeholder="Horas extras (+25%)">
        <input id="horasNoturnas" type="number" placeholder="Horas noturnas (+25%)">

        <button onclick="calcular()">Calcular</button>

    </div>

    <!-- RESULTADO -->
    <div class="right-panel">

        <div class="result-title">Resultado</div>

        <div class="result" id="out">
            Preencha os dados e calcule
        </div>

        <div class="big" id="total"></div>

    </div>

</div>

<script>

function calcular(){

    const jikyu =
        parseFloat(document.getElementById("jikyu").value) || 0;

    const normal =
        parseFloat(document.getElementById("horasNormal").value) || 0;

    const extra =
        parseFloat(document.getElementById("horasExtra").value) || 0;

    const noturno =
        parseFloat(document.getElementById("horasNoturnas").value) || 0;

    if(jikyu <= 0){
        document.getElementById("out").innerHTML =
        "❌ Informe o valor da hora.";
        document.getElementById("total").innerHTML = "";
        return;
    }

    // ==========================
    // BRUTO
    // ==========================

    const valorNormal =
        jikyu * normal;

    const valorExtra =
        jikyu * extra * 1.25;

    const valorNoturno =
        jikyu * noturno * 1.25;

    const brutoDia =
        valorNormal +
        valorExtra +
        valorNoturno;

    // Média padrão fábrica Japão
    const diasMes = 22;

    const brutoMes =
        brutoDia * diasMes;

    // ==========================
    // DESCONTOS REAIS ESTIMADOS
    // ==========================

    let percentualDesconto;

    if(brutoMes < 150000){
        percentualDesconto = 0.11;
    }
    else if(brutoMes < 200000){
        percentualDesconto = 0.13;
    }
    else if(brutoMes < 250000){
        percentualDesconto = 0.16;
    }
    else if(brutoMes < 300000){
        percentualDesconto = 0.18;
    }
    else if(brutoMes < 350000){
        percentualDesconto = 0.20;
    }
    else if(brutoMes < 450000){
        percentualDesconto = 0.22;
    }
    else{
        percentualDesconto = 0.25;
    }

    const descontoTotal =
        brutoMes * percentualDesconto;

    const liquidoMes =
        brutoMes - descontoTotal;

    // ==========================
    // DETALHAMENTO
    // ==========================

    const adicionalExtra =
        valorExtra - (jikyu * extra);

    const adicionalNoturno =
        valorNoturno - (jikyu * noturno);

    document.getElementById("out").innerHTML = `

🕒 Salário Base:
¥${valorNormal.toLocaleString('ja-JP')}

<br><br>

⚡ Hora Extra (+25%):
¥${valorExtra.toLocaleString('ja-JP')}

<br>

📈 Acréscimo recebido:
¥${adicionalExtra.toLocaleString('ja-JP')}

<br><br>

🌙 Horário Noturno (+25%):
¥${valorNoturno.toLocaleString('ja-JP')}

<br>

🌃 Acréscimo noturno:
¥${adicionalNoturno.toLocaleString('ja-JP')}

<br><br>

━━━━━━━━━━━━━━

<br>

📆 Bruto Diário:
<b>¥${brutoDia.toLocaleString('ja-JP')}</b>

<br>

📅 Bruto Mensal (22 dias):
<b>¥${brutoMes.toLocaleString('ja-JP')}</b>

<br><br>

🏥 Saúde + Pensão + Seguro:
≈ ${(percentualDesconto*100).toFixed(0)}%

<br>

💸 Descontos estimados:
- ¥${descontoTotal.toLocaleString('ja-JP')}

<br><br>

━━━━━━━━━━━━━━

<br>

💰 Líquido estimado:
<b>¥${liquidoMes.toLocaleString('ja-JP')}</b>

<br><br>

<small style="color:#666">
Estimativa baseada em descontos médios praticados no Japão.
Valores reais podem variar conforme prefeitura, idade, contrato, dependentes e renda anual.
</small>

`;

    document.getElementById("total").innerHTML =
    "💴 ¥" + liquidoMes.toLocaleString('ja-JP');

}

</script>

</body>
</html>
