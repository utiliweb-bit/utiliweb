<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Calculadora de Salário e Horas Extras (Zangyo) para brasileiros no Japão - Responsiva">
    <meta name="keywords" content="zangyo, horas extras japão, calculadora salário, jikyū, brasileiros no japão">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Calculadora Zangyo</title>

<style>
/* ===== SEU CSS ORIGINAL (MANTIDO INTACTO) ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html, body {
    width: 100%;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
    margin: 0;
}

.wrapper {
    width: 100%;
    max-width: 1200px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
}

.left-panel {
    padding: 32px;
    border-right: 1px solid #e0e0e0;
}

.right-panel {
    padding: 32px;
    background: linear-gradient(135deg, #e8f8f5 0%, #d5f4e6 100%);
}

/* resto do CSS permanece igual */
</style>
</head>

<body>
<div class="wrapper">

    <div class="left-panel">
        <h1>💼 Zangyo</h1>

        <input id="jikyu" type="number" placeholder="Valor hora ¥">

        <input id="horas" type="number" placeholder="Total horas">

        <button onclick="calcular()">Calcular</button>
    </div>

    <div class="right-panel">

        <h2>Resultado</h2>

        <div id="resultado">-</div>

        <!-- 🔥 NOVOS CAMPOS -->
        <div id="mensal"></div>
        <div id="imposto"></div>
        <div id="liquido"></div>

    </div>

</div>

<script>
function calcular() {

    const jikyu = parseFloat(document.getElementById("jikyu").value) || 0;
    const horas = parseFloat(document.getElementById("horas").value) || 0;

    if (jikyu <= 0 || horas <= 0) {
        document.getElementById("resultado").innerText = "Dados inválidos";
        return;
    }

    const total = jikyu * horas;

    // 💰 mensal (22 dias)
    const mensal = total * 22;

    // 💸 imposto simples Japão
    let taxa = 0;
    if (mensal <= 1000000) taxa = 0.10;
    else if (mensal <= 2000000) taxa = 0.15;
    else taxa = 0.20;

    const imposto = mensal * taxa;
    const liquido = mensal - imposto;

    // OUTPUT
    document.getElementById("resultado").innerText = "¥ " + total.toFixed(0);
    document.getElementById("mensal").innerText = "Mensal: ¥ " + mensal.toFixed(0);
    document.getElementById("imposto").innerText = "Imposto: ¥ " + imposto.toFixed(0);
    document.getElementById("liquido").innerText = "Líquido: ¥ " + liquido.toFixed(0);
}
</script>

</body>
</html>
