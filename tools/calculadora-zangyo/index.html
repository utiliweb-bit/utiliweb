<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Zangyō PRO Real</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial;
}

body{
    background:#1f7a4d;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:12px;
}

/* WRAPPER PRINCIPAL */
.wrapper{
    width:100%;
    max-width:1000px;
    background:#fff;
    border-radius:16px;
    display:grid;
    grid-template-columns:1fr 1fr;
    overflow:hidden; /* 🔥 evita vazamento visual */
    box-shadow:0 20px 60px rgba(0,0,0,0.3);
}

/* PAINÉIS */
.left-panel,
.right-panel{
    padding:24px;
    min-width:0; /* 🔥 evita overflow em grid */
}

/* LEFT */
h2{
    font-size:22px;
    margin-bottom:6px;
}

.subtitle{
    font-size:12px;
    color:#777;
    margin-bottom:14px;
}

/* INPUTS */
input{
    width:100%;
    max-width:100%;
    padding:12px;
    margin:6px 0;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:16px;
    display:block;
}

input:focus{
    border-color:#27ae60;
    outline:none;
}

/* BOTÃO */
button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#27ae60;
    color:#fff;
    font-weight:bold;
    font-size:14px;
}

/* RIGHT */
.right-panel{
    background: linear-gradient(135deg,#e8f8f5,#d5f4e6);
}

.result-title{
    font-size:12px;
    font-weight:700;
    color:#27ae60;
    margin-bottom:10px;
    border-bottom:2px solid #27ae60;
    padding-bottom:6px;
}

.result{
    font-size:13px;
    line-height:1.6;
    color:#222;
}

.big{
    font-size:18px;
    font-weight:bold;
    color:#27ae60;
    margin-top:10px;
}

/* RESPONSIVO */
@media(max-width:768px){
    .wrapper{
        grid-template-columns:1fr;
    }

    .left-panel{
        border-bottom:1px solid #ddd;
    }
}
</style>
</head>

<body>

<div class="wrapper">

    <!-- INPUT -->
    <div class="left-panel">

        <h2>💼 Zangyō PRO</h2>
        <div class="subtitle">Calculadora de horas Japão</div>

        <input id="jikyu" type="number" placeholder="Valor da hora ¥">
        <input id="horasNormal" type="number" placeholder="Horas normais">
        <input id="horasExtra" type="number" placeholder="Horas extras (+25%)">
        <input id="horasNoturnas" type="number" placeholder="Horas noturnas (+25%)">

        <button onclick="calcular()">Calcular</button>

    </div>

    <!-- RESULTADO -->
    <div class="right-panel">

        <div class="result-title">Resultado</div>

        <div class="result" id="out">
            Preencha os dados e calcule
        </div>

        <div class="big" id="total"></div>

    </div>

</div>

<script>
function calcular(){

    const jikyu = parseFloat(document.getElementById("jikyu").value)||0;
    const normal = parseFloat(document.getElementById("horasNormal").value)||0;
    const extra = parseFloat(document.getElementById("horasExtra").value)||0;
    const noturno = parseFloat(document.getElementById("horasNoturnas").value)||0;

    if(jikyu<=0){
        document.getElementById("out").innerText="❌ Insira valor da hora";
        return;
    }

    // ===== CÁLCULO =====
    const vNormal = jikyu * normal;
    const vExtra = jikyu * extra * 1.25;
    const vNoturno = jikyu * noturno * 1.25;

    const totalDia = vNormal + vExtra + vNoturno;
    const mensal = totalDia * 22;

    document.getElementById("out").innerHTML = `
🕒 Normal: ¥${vNormal.toFixed(0)}<br>
⚡ Extra (+25%): ¥${vExtra.toFixed(0)}<br>
🌙 Noturno (+25%): ¥${vNoturno.toFixed(0)}<br><br>

📆 Diário: ¥${totalDia.toFixed(0)}<br>
💰 Mensal (22 dias): ¥${mensal.toFixed(0)}
`;

    document.getElementById("total").innerText =
        "💵 Total: ¥" + totalDia.toFixed(0);
}
</script>

</body>
</html>
