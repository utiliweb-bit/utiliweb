<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora Zangyo | UtiliWeb</title>

<meta name="description" content="Calcule salário com horas extras no Japão de forma rápida e precisa.">
<link rel="stylesheet" href="../../assets/style.css">
</head>

<body>

<header>
    <h1>⏱️ Calculadora Zangyo</h1>
    <p>Horas extras no Japão de forma simples</p>
</header>

<div class="container">

    <a href="../../index.html">← Voltar</a>

    <div class="box">

        <label>Valor da hora (¥)</label>
        <input id="jikyu" type="number" placeholder="Ex: 1200">

        <label>Horas diurnas</label>
        <input id="day" type="number" value="0">

        <label>Horas noturnas (+25%)</label>
        <input id="night" type="number" value="0">

        <label>Horas extra diurnas (+25%)</label>
        <input id="extraDay" type="number" value="0">

        <label>Horas extra noturnas (+50%)</label>
        <input id="extraNight" type="number" value="0">

        <div style="margin-top:15px; display:flex; gap:10px; flex-wrap:wrap;">
            <button onclick="calcular()">Calcular</button>
            <button class="btn-secondary" onclick="limpar()">Limpar</button>
        </div>

        <div id="result" class="result hidden"></div>

    </div>

    <div class="box">
        <h2>Como funciona</h2>
        <p>
            Esta calculadora aplica os adicionais padrão no Japão:
            noturno (+25%), hora extra (+25%) e extra noturna (+50%).
        </p>
    </div>

</div>

<script>
function calcular() {

    const jikyu = parseFloat(document.getElementById("jikyu").value) || 0;
    const day = parseFloat(document.getElementById("day").value) || 0;
    const night = parseFloat(document.getElementById("night").value) || 0;
    const extraDay = parseFloat(document.getElementById("extraDay").value) || 0;
    const extraNight = parseFloat(document.getElementById("extraNight").value) || 0;

    const result = document.getElementById("result");

    if (jikyu <= 0) {
        result.classList.remove("hidden");
        result.textContent = "Insira o valor da hora.";
        return;
    }

    const total =
        (jikyu * day) +
        (jikyu * night * 1.25) +
        (jikyu * extraDay * 1.25) +
        (jikyu * extraNight * 1.5);

    result.classList.remove("hidden");
    result.innerHTML = `
        <strong>Total a receber:</strong>
        <br><br>
        ¥ ${total.toLocaleString("ja-JP", { minimumFractionDigits: 2 })}
    `;
}

function limpar() {

    document.getElementById("jikyu").value = "";
    document.getElementById("day").value = 0;
    document.getElementById("night").value = 0;
    document.getElementById("extraDay").value = 0;
    document.getElementById("extraNight").value = 0;

    const result = document.getElementById("result");
    result.classList.add("hidden");
    result.textContent = "";
}
</script>

</body>
</html>
