<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora Zangyo (Horas Extras Japão) | UtiliWeb</title>

<meta name="description" content="Calcule salário com horas extras no Japão (Zangyo). Ferramenta grátis para brasileiros no Japão.">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="../../assets/style.css">

<style>
/* ajuste leve para integrar com tema escuro UtiliWeb */
body {
    background: #0f0f0f;
    color: #eee;
}

.wrapper {
    max-width: 900px;
    margin: 40px auto;
    padding: 20px;
}

.card-box {
    background: #1a1a1a;
    padding: 20px;
    border-radius: 12px;
    margin-top: 15px;
    border: 1px solid #2a2a2a;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid #333;
    background: #111;
    color: #fff;
}

button {
    padding: 12px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: #2ecc71;
    color: #000;
    font-weight: bold;
    margin-right: 10px;
    margin-top: 10px;
}

button:hover {
    opacity: 0.9;
}

.result {
    margin-top: 20px;
    background: #111;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #2a2a2a;
}

h1 {
    font-size: 26px;
}
</style>
</head>

<body>

<header>
    <h1>⏱️ Calculadora Zangyo</h1>
    <p>Horas extras no Japão de forma simples</p>
</header>

<div class="wrapper">

    <a href="../../index.html" style="color:#2ecc71;">← Voltar</a>

    <div class="card-box">

        <label>Valor da hora (¥)</label>
        <input id="jikyu" type="number" placeholder="Ex: 1200">

        <label>Horas diurnas</label>
        <input id="day" type="number" value="0">

        <label>Horas noturnas (+25%)</label>
        <input id="night" type="number" value="0">

        <label>Horas extra diurnas (+25%)</label>
        <input id="extraDay" type="number" value="0">

        <label>Horas extra noturnas (+50%)</label>
        <input id="extraNight" type="number" value="0">

        <button onclick="calcular()">Calcular</button>
        <button onclick="limpar()">Limpar</button>

        <div class="result" id="result">Preencha os dados e calcule</div>

    </div>

</div>

<script>
function calcular() {

    const jikyu = parseFloat(document.getElementById("jikyu").value) || 0;
    const day = parseFloat(document.getElementById("day").value) || 0;
    const night = parseFloat(document.getElementById("night").value) || 0;
    const extraDay = parseFloat(document.getElementById("extraDay").value) || 0;
    const extraNight = parseFloat(document.getElementById("extraNight").value) || 0;

    if (jikyu <= 0) {
        document.getElementById("result").innerHTML = "Insira o valor da hora.";
        return;
    }

    const total =
        (jikyu * day) +
        (jikyu * night * 1.25) +
        (jikyu * extraDay * 1.25) +
        (jikyu * extraNight * 1.5);

    document.getElementById("result").innerHTML = `
        <strong>Total a receber:</strong><br>
        ¥ ${total.toLocaleString("ja-JP", {minimumFractionDigits: 2})}
    `;
}

function limpar() {
    document.getElementById("jikyu").value = "";
    document.getElementById("day").value = 0;
    document.getElementById("night").value = 0;
    document.getElementById("extraDay").value = 0;
    document.getElementById("extraNight").value = 0;
    document.getElementById("result").innerHTML = "Preencha os dados e calcule";
}
</script>

</body>
</html>
