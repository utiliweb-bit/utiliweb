<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Zangyō PRO Real</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
}

body{
    background:#1f7a4d;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:12px;
}

.wrapper{
    width:100%;
    max-width:1100px;
    background:#fff;
    border-radius:16px;
    display:grid;
    grid-template-columns:1fr 1fr;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,.30);
}

.left-panel,
.right-panel{
    padding:24px;
    min-width:0;
}

h2{
    font-size:24px;
    margin-bottom:6px;
}

.subtitle{
    font-size:13px;
    color:#777;
    margin-bottom:16px;
}

input{
    width:100%;
    padding:12px;
    margin:6px 0;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:16px;
}

input:focus{
    border-color:#27ae60;
    outline:none;
}

button{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:10px;
    background:#27ae60;
    color:#fff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:.95;
}

.right-panel{
    background:linear-gradient(135deg,#e8f8f5,#d5f4e6);
}

.result-title{
    font-size:13px;
    font-weight:700;
    color:#27ae60;
    margin-bottom:12px;
    border-bottom:2px solid #27ae60;
    padding-bottom:8px;
}

.result{
    font-size:14px;
    line-height:1.7;
    color:#222;
    word-break:break-word;
}

.big{
    font-size:24px;
    font-weight:bold;
    color:#27ae60;
    margin-top:18px;
}

hr{
    border:none;
    border-top:1px solid #c7e9d6;
    margin:12px 0;
}

@media(max-width:768px){

    body{
        align-items:flex-start;
        padding:10px;
    }

    .wrapper{
        grid-template-columns:1fr;
    }

    .left-panel{
        border-bottom:1px solid #ddd;
    }

    .left-panel,
    .right-panel{
        padding:18px;
    }

    h2{
        font-size:22px;
    }

    .big{
        font-size:22px;
    }
}
</style>
</head>

<body>

<div class="wrapper">

    <div class="left-panel">

        <h2>💼 Zangyō PRO</h2>
        <div class="subtitle">
            Simulador Realista de Salário no Japão
        </div>

        <input id="jikyu" type="number" placeholder="Valor da hora (時給) ¥">

        <input id="horasNormal" type="number" placeholder="Horas normais diurnas">

        <input id="horasNoturnas" type="number" placeholder="Horas normais noturnas (+25%)">

        <input id="horasExtra" type="number" placeholder="Horas extras diurnas (+25%)">

        <input id="horasExtraNoturna" type="number" placeholder="Horas extras noturnas (+50%)">

        <input id="horasFeriado" type="number" placeholder="Horas em feriado (+35%)">

        <input id="horasFeriadoNoturno" type="number" placeholder="Feriado noturno (+60%)">

        <input id="diasMes" type="number" value="22" placeholder="Dias trabalhados no mês">

        <button onclick="calcular()">
            Calcular Salário
        </button>

    </div>

    <div class="right-panel">

        <div class="result-title">
            Resultado da Simulação
        </div>

        <div id="out" class="result">
            Preencha os dados e clique em calcular.
        </div>

        <div id="total" class="big"></div>

    </div>

</div>

<script>

function calcular(){

    const jikyu =
    parseFloat(document.getElementById("jikyu").value) || 0;

    const normal =
    parseFloat(document.getElementById("horasNormal").value) || 0;

    const noturno =
    parseFloat(document.getElementById("horasNoturnas").value) || 0;

    const extra =
    parseFloat(document.getElementById("horasExtra").value) || 0;

    const extraNoturna =
    parseFloat(document.getElementById("horasExtraNoturna").value) || 0;

    const feriado =
    parseFloat(document.getElementById("horasFeriado").value) || 0;

    const feriadoNoturno =
    parseFloat(document.getElementById("horasFeriadoNoturno").value) || 0;

    const diasMes =
    parseFloat(document.getElementById("diasMes").value) || 22;

    if(jikyu <= 0){

        document.getElementById("out").innerHTML =
        "❌ Informe um valor válido para o salário por hora.";

        document.getElementById("total").innerHTML = "";

        return;
    }

    // =====================
    // GANHOS
    // =====================

    const valorNormal =
    jikyu * normal;

    const valorNoturno =
    jikyu * noturno * 1.25;

    const valorExtra =
    jikyu * extra * 1.25;

    const valorExtraNoturna =
    jikyu * extraNoturna * 1.50;

    const valorFeriado =
    jikyu * feriado * 1.35;

    const valorFeriadoNoturno =
    jikyu * feriadoNoturno * 1.60;

    const brutoDia =
    valorNormal +
    valorNoturno +
    valorExtra +
    valorExtraNoturna +
    valorFeriado +
    valorFeriadoNoturno;

    const brutoMes =
    brutoDia * diasMes;

    // =====================
    // DESCONTOS ESTIMADOS
    // =====================

    let descontoPct;

    if(brutoMes < 150000){
        descontoPct = 0.11;
    }
    else if(brutoMes < 200000){
        descontoPct = 0.13;
    }
    else if(brutoMes < 250000){
        descontoPct = 0.16;
    }
    else if(brutoMes < 300000){
        descontoPct = 0.18;
    }
    else if(brutoMes < 350000){
        descontoPct = 0.20;
    }
    else if(brutoMes < 450000){
        descontoPct = 0.22;
    }
    else{
        descontoPct = 0.25;
    }

    const descontoTotal =
    brutoMes * descontoPct;

    const liquidoMes =
    brutoMes - descontoTotal;

    // =====================
    // RESULTADO
    // =====================

    document.getElementById("out").innerHTML = `

🕒 Horas Normais<br>
<b>¥${valorNormal.toLocaleString('ja-JP')}</b>

<hr>

🌙 Horas Noturnas (+25%)<br>
<b>¥${valorNoturno.toLocaleString('ja-JP')}</b>

<hr>

⚡ Horas Extras (+25%)<br>
<b>¥${valorExtra.toLocaleString('ja-JP')}</b>

<hr>

🌃 Horas Extras Noturnas (+50%)<br>
<b>¥${valorExtraNoturna.toLocaleString('ja-JP')}</b>

<hr>

🎌 Trabalho em Feriado (+35%)<br>
<b>¥${valorFeriado.toLocaleString('ja-JP')}</b>

<hr>

🎌🌙 Feriado Noturno (+60%)<br>
<b>¥${valorFeriadoNoturno.toLocaleString('ja-JP')}</b>

<hr>

📆 Bruto Diário<br>
<b>¥${brutoDia.toLocaleString('ja-JP')}</b>

<hr>

📅 Bruto Mensal (${diasMes} dias)<br>
<b>¥${brutoMes.toLocaleString('ja-JP')}</b>

<hr>

🏥 Saúde + Pensão + Seguro + Imposto<br>
≈ ${(descontoPct*100).toFixed(0)}%

<br><br>

💸 Descontos Estimados<br>
<b>- ¥${descontoTotal.toLocaleString('ja-JP')}</b>

<hr>

💰 Salário Líquido Estimado<br>
<b style="font-size:20px;color:#27ae60;">
¥${liquidoMes.toLocaleString('ja-JP')}
</b>

<br><br>

<small style="color:#666;">
Estimativa baseada em descontos médios praticados no Japão
(健康保険, 厚生年金, 雇用保険 e imposto de renda).
Os valores reais podem variar conforme província,
idade, dependentes, empresa e faixa salarial.
</small>

`;

    document.getElementById("total").innerHTML =
    "💴 ¥" + liquidoMes.toLocaleString('ja-JP');
}

</script>

</body>
</html>
