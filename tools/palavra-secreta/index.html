<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Palavra Secreta</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f9f9f7;
      color: #1a1a18;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
      min-height: 100vh;
    }

    .gw { max-width: 380px; width: 100%; }
    .gt { text-align: center; font-size: 20px; font-weight: 500; margin-bottom: 4px; }
    .gs { text-align: center; font-size: 12px; color: #666; margin-bottom: 1rem; }

    .board { display: flex; flex-direction: column; gap: 5px; align-items: center; margin-bottom: 1rem; }
    .row { display: flex; gap: 5px; }

    .cell {
      width: 52px; height: 52px;
      border: 2px solid #ccc; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 500;
      background: #fff;
      transition: background .2s, border-color .2s, color .2s;
      user-select: none;
    }

    .cell.filled  { border-color: #888; }
    .cell.correct { background: #27500A !important; border-color: #27500A !important; color: #EAF3DE !important; }
    .cell.present { background: #EF9F27 !important; border-color: #EF9F27 !important; color: #412402 !important; }
    .cell.absent  { background: #888780 !important; border-color: #888780 !important; color: #F1EFE8 !important; }

    .keyboard { display: flex; flex-direction: column; gap: 4px; align-items: center; }
    .kb-row { display: flex; gap: 3px; }

    .key {
      width: 28px; height: 42px; padding: 0 2px;
      border: 1px solid #ccc; border-radius: 6px;
      background: #e8e8e6; color: #1a1a18;
      font-size: 11px; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-family: inherit; transition: background .1s; flex-shrink: 0;
    }

    .key:hover   { background: #d8d8d6; }
    .key.correct { background: #27500A; border-color: #27500A; color: #EAF3DE; }
    .key.present { background: #EF9F27; border-color: #EF9F27; color: #412402; }
    .key.absent  { background: #888780; border-color: #888780; color: #F1EFE8; }
    .key.wide    { width: 44px; font-size: 10px; }

    .msg { text-align: center; font-size: 13px; font-weight: 500; min-height: 20px; margin-bottom: 6px; }

    .legend { display: flex; justify-content: center; gap: 12px; font-size: 11px; color: #666; margin-bottom: 10px; }
    .leg { display: flex; align-items: center; gap: 4px; }
    .dot { width: 11px; height: 11px; border-radius: 3px; }

    .btn-row { display: flex; justify-content: center; margin-top: 10px; }
    .btn-new {
      width: 130px; height: 40px;
      border: 1px solid #ccc; border-radius: 8px;
      background: #fff; font-size: 13px; font-weight: 500;
      cursor: pointer; font-family: inherit;
    }
    .btn-new:hover { background: #f0f0ee; }

    @media (prefers-color-scheme: dark) {
      body        { background: #1a1a18; color: #f0f0ee; }
      .cell       { background: #2a2a28; border-color: #555; color: #f0f0ee; }
      .cell.filled { border-color: #aaa; }
      .key        { background: #3a3a38; border-color: #555; color: #f0f0ee; }
      .key:hover  { background: #4a4a48; }
      .btn-new    { background: #2a2a28; border-color: #555; color: #f0f0ee; }
      .btn-new:hover { background: #3a3a38; }
      .gs, .legend { color: #aaa; }
    }
  </style>
</head>
<body>
<div class="gw">
  <h1 class="gt">Palavra Secreta</h1>
  <p class="gs">6 tentativas para descobrir a palavra</p>
  <div class="msg" id="msg"></div>
  <div class="legend">
    <span class="leg"><span class="dot" style="background:#27500A"></span>certa</span>
    <span class="leg"><span class="dot" style="background:#EF9F27"></span>errada</span>
    <span class="leg"><span class="dot" style="background:#888780"></span>ausente</span>
  </div>
  <div class="board" id="board"></div>
  <div class="keyboard" id="keyboard"></div>
  <div class="btn-row"><button class="btn-new" onclick="newGame()">↺ nova palavra</button></div>
</div>

<script>
const WORDS = [
  "ABRIR","ABRIL","ACASO","ACENO","ACESO","ADEUS","ADIAR","AGORA","AGUDO","AINDA",
  "AJUDA","ALADO","ALTAR","AMADO","AMENO","AMIGA","AMIGO","AMORA","AMPLO","ANDAR",
  "ANIMO","ANTES","ANZOL","APITO","ARAME","ARDOR","ARENA","ARMAR","ARROZ","ARTES",
  "ASSAR","ASTRO","ATADO","ATIVO","ATROZ","ATUAR","AUDAZ","AVARO","AVEIA","AVISO",
  "AZEDO","BANCO","BAIXO","BALAR","BANDO","BANHA","BANHO","BARBA","BARCA","BARRO",
  "BATER","BEBER","BEIJO","BISPO","BLOCO","BOCAL","BOLSA","BOMBA","BORDO","BRASA",
  "BRAVO","BREVE","BRISA","BROTO","BURRO","BUSTO","CABRA","CACAU","CALMA","CALOR",
  "CAMPO","CANAL","CAPAZ","CARGO","CARNE","CARRO","CARTA","CASCA","CAULE","CAUSA",
  "CAVAR","CEDER","CERTO","CHAMA","CHAVE","CHEIA","CHEIO","CHORO","CHUVA","CINCO",
  "CINZA","CIRCO","CISNE","CITAR","CLARO","COBRA","COLAR","COMBO","COMUM","CONDE",
  "CONTO","CORAL","CORPO","CORTE","CORVO","COSTA","COURO","COUVE","COZER","CRISE",
  "CRUEL","CUNHA","CURTO","CURVA","DANCE","DARDO","DENSO","DIGNO","DISCO","DITAR",
  "DOBRA","DOGMA","DORSO","DUETO","DUPLO","DURAR","EBANO","ERETO","ERGUE","ERRAR",
  "ETAPA","ETNIA","EXTRA","FACIL","FALAR","FALHA","FALSO","FARDO","FARSA","FAVOR",
  "FEBRE","FEITO","FELIZ","FEROZ","FERRO","FESTA","FICAR","FINCA","FIRMA","FIXAR",
  "FLOCO","FLUIR","FONTE","FORTE","FOSCO","FOSSO","FRACO","FRADE","FREVO","FRUTO",
  "FUGIR","FUMAR","FUNDO","FUNIL","FURTO","FUZIL","GARFO","GEADA","GEMER","GENTE",
  "GESSO","GINGA","GLOBO","GOLPE","GORDO","GRAMA","GRILO","GRUPO","HUMOR","IDEAL",
  "IGUAL","IMPAR","INATO","IRADO","ISOLA","JUNTO","JURAR","LADRO","LAICO","LAMPO",
  "LANCA","LAPSO","LARGO","LARVA","LASER","LAVAR","LAZER","LEBRE","LEIGO","LENCO",
  "LEQUE","LEVAR","LIGAR","LIMBO","LIMPA","LIMPO","LINDA","LIRIO","LIVRE","LOUCO",
  "LUGAR","LUNAR","LUTAR","MACRO","MAGIA","MAGRO","MALHA","MANGA","MANSO","MANTO",
  "MARCA","MARCO","MASSA","MELRO","MEXER","MILHO","MISTO","MIUDO","MOEDA","MOLDE",
  "MOLHO","MONGE","MONTE","MORAL","MOSCA","MUNDO","MURRO","MUSGO","NADAR","NARIZ",
  "NAVIO","NOBRE","NOITE","NORMA","NUVEM","OLHAR","ORDEM","OUTRO","PAGAR","PAPEL",
  "PARAR","PARDO","PARVO","PASTA","PAUSA","PEDIR","PEDRA","PEGAR","PERTO","PICAR",
  "PILHA","PINGO","PISTA","PLANO","PLENO","PODER","POEMA","POLVO","POMAR","POMBO",
  "PORTA","POUCO","PRAZO","PREGO","PRESO","PRIMA","PROVA","PUDOR","PULAR","PULGA",
  "PULSO","PURGA","QUASE","QUEDA","QUOTA","RAIVA","RAMAL","RAMPA","RAPAZ","RASGO",
  "RASPA","RAZAO","REDOR","REGAR","REINO","REMAR","REZAR","RINDO","RISOS","RIVAL",
  "ROLAR","ROMBO","ROUPA","RUIDO","RUMOR","SABOR","SACAR","SALMO","SALTO","SALVA",
  "SALVO","SAQUE","SARAR","SAUDE","SINAL","SOBRE","SOFRE","SOLAR","SONHO","SOPRO",
  "SORTE","SUBIR","SUAVE","SUMIR","SURDO","TALCO","TALHA","TANGO","TARDE","TARSO",
  "TELHA","TENAZ","TENDA","TENSO","TERRA","TIRAR","TOCAR","TOLDO","TOMAR","TOMBO",
  "TOURO","TRAPO","TREVO","TROCA","TROMP","TUMBA","TUNEL","TURBO","TURNO","USUAL",
  "VALOR","VALSA","VAPOR","VEADO","VERDE","VERSO","VIGOR","VIRAR","VIRIL","VISTA",
  "VITAL","VOLTA","VOTAR","VULTO","XEQUE","ZEBRA","ZINCO"
].filter(w => w.length === 5);

let target, guesses, current, done;

function newGame() {
  target  = WORDS[Math.floor(Math.random() * WORDS.length)];
  guesses = []; current = ""; done = false;
  document.getElementById("msg").textContent = "";
  renderBoard(); renderKeyboard();
}

function renderBoard() {
  const b = document.getElementById("board"); b.innerHTML = "";
  for (let r = 0; r < 6; r++) {
    const row = document.createElement("div"); row.className = "row";
    const g    = guesses[r];
    const word = g ? g.word : (r === guesses.length ? current : "");
    for (let c = 0; c < 5; c++) {
      const cell = document.createElement("div"); cell.className = "cell";
      const ch = word[c] || ""; cell.textContent = ch;
      if (g) cell.classList.add(g.colors[c]);
      else if (r === guesses.length && ch) cell.classList.add("filled");
      row.appendChild(cell);
    }
    b.appendChild(row);
  }
}

function renderKeyboard() {
  const kb = document.getElementById("keyboard"); kb.innerHTML = "";
  const rows = [
    ["Q","W","E","R","T","Y","U","I","O","P"],
    ["A","S","D","F","G","H","J","K","L"],
    ["ENTER","Z","X","C","V","B","N","M","⌫"]
  ];
  const st = {};
  guesses.forEach(g => g.colors.forEach((col, i) => {
    const l = g.word[i];
    if (!st[l] || col === "correct" || (col === "present" && st[l] === "absent")) st[l] = col;
  }));
  rows.forEach(r => {
    const row = document.createElement("div"); row.className = "kb-row";
    r.forEach(k => {
      const btn = document.createElement("button");
      btn.className = "key" + (k.length > 1 ? " wide" : "");
      btn.textContent = k;
      if (st[k]) btn.classList.add(st[k]);
      btn.onclick = () => handleKey(k);
      row.appendChild(btn);
    });
    kb.appendChild(row);
  });
}

function scoreWord(guess, tgt) {
  const res = Array(5).fill("absent");
  const pool = {};
  for (let i = 0; i < 5; i++) {
    if (guess[i] === tgt[i]) res[i] = "correct";
    else pool[tgt[i]] = (pool[tgt[i]] || 0) + 1;
  }
  for (let i = 0; i < 5; i++) {
    if (res[i] !== "correct" && pool[guess[i]]) { res[i] = "present"; pool[guess[i]]--; }
  }
  return res;
}

function handleKey(k) {
  if (done) return;
  const msg = document.getElementById("msg");
  if (k === "⌫" || k === "Backspace") {
    current = current.slice(0, -1); renderBoard();
  } else if (k === "ENTER" || k === "Enter") {
    if (current.length < 5) { msg.textContent = "Digite 5 letras!"; return; }
    const colors = scoreWord(current, target);
    guesses.push({ word: current, colors });
    const won = colors.every(c => c === "correct");
    current = ""; renderBoard(); renderKeyboard();
    if (won)                      { msg.textContent = "Parabéns! Você acertou!"; done = true; }
    else if (guesses.length === 6) { msg.textContent = "Era: " + target; done = true; }
    else                           { msg.textContent = ""; }
  } else if (/^[a-zA-Z]$/.test(k)) {
    if (current.length < 5) { current += k.toUpperCase(); renderBoard(); }
  }
}

document.addEventListener("keydown", e => {
  if (e.key === "Backspace")   handleKey("Backspace");
  else if (e.key === "Enter")  handleKey("Enter");
  else if (e.key.length === 1) handleKey(e.key);
});

newGame();
</script>
</body>
</html>
