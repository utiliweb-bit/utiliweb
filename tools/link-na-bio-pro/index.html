<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Link na Bio PRO | UtiliWeb</title>

<meta name="description" content="Crie sua página estilo Linktree com múltiplos links.">
<meta name="robots" content="index, follow">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html, body {
    width: 100%;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
    background: linear-gradient(135deg, #2ecc71, #27ae60);
}

/* CONTAINER */
.wrapper {
    width: 100%;
    max-width: 1000px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
}

/* PAINÉIS */
.left, .right {
    padding: 28px;
}

/* INPUTS */
label {
    display: block;
    margin-top: 14px;
    font-size: 12px;
    font-weight: 700;
    color: #333;
}

input, textarea {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 14px;
}

textarea {
    min-height: 140px;
    resize: vertical;
}

/* BOTÕES */
button {
    width: 100%;
    margin-top: 14px;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #27ae60;
    color: #fff;
    font-weight: 700;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

/* RESULTADO */
.result {
    background: #f4f4f4;
    padding: 14px;
    border-radius: 10px;
    font-size: 13px;
    word-break: break-word;
}

/* LINKS PÚBLICOS */
.link-btn {
    display: block;
    text-align: center;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    background: #111;
    color: #fff;
    text-decoration: none;
    font-weight: 700;
}

/* RESPONSIVO */
@media (max-width: 768px) {
    .wrapper {
        grid-template-columns: 1fr;
    }

    html, body {
        padding: 12px;
    }

    .left, .right {
        padding: 18px;
    }
}
</style>

</head>

<body>

<div class="wrapper">

    <!-- CRIADOR -->
    <div class="left">

        <h1>🔗 Link na Bio PRO</h1>
        <p style="font-size:12px;color:#777;margin-top:6px;">
            Crie sua página estilo Linktree
        </p>

        <label>Seu nome</label>
        <input id="name" placeholder="Ex: Meu perfil">

        <label>Links (um por linha)</label>
        <textarea id="links" placeholder="https://youtube.com
https://instagram.com
https://tiktok.com"></textarea>

        <button onclick="generate()">Gerar link</button>

        <div id="result" class="result" style="margin-top:14px;">---</div>

    </div>

    <!-- PREVIEW / PÁGINA PÚBLICA -->
    <div class="right" id="pageBox">

        <h2>Preview</h2>
        <div id="page" style="margin-top:12px;">---</div>

    </div>

</div>

<script>
function generate() {

    const name = document.getElementById("name").value || "Meu perfil";

    const links = document
        .getElementById("links")
        .value
        .split("\n")
        .map(l => l.trim())
        .filter(Boolean)
        .map(l => l.startsWith("http") ? l : "https://" + l);

    const encoded = encodeURIComponent(JSON.stringify(links));

    const base = window.location.href.split('?')[0];

    const url = `${base}?name=${encodeURIComponent(name)}&data=${encoded}`;

    document.getElementById("result").innerHTML = `
        <strong>Seu link:</strong><br>
        ${url}
    `;

    renderPreview(name, links);
}

function renderPreview(name, links) {

    let html = `<h2>${name}</h2>`;

    links.forEach(link => {
        html += `<a class="link-btn" href="${link}" target="_blank">🔗 Abrir link</a>`;
    });

    document.getElementById("page").innerHTML = html;
}

/* modo público */
const params = new URLSearchParams(window.location.search);
const name = params.get("name");
const data = params.get("data");

if (name && data) {

    let links = [];

    try {
        links = JSON.parse(decodeURIComponent(data));
    } catch {
        links = [];
    }

    document.querySelector(".left").style.display = "none";

    document.getElementById("pageBox").innerHTML = `
        <h2>${name}</h2>
        ${links.map(l => `<a class="link-btn" href="${l}" target="_blank">🔗 Abrir link</a>`).join("")}
    `;
}
</script>

</body>
</html>
