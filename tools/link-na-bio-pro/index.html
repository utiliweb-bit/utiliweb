<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Link na Bio PRO | UtiliWeb</title>

<meta name="description" content="Crie sua página estilo Linktree com múltiplos links.">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="../../assets/style.css">

<style>
.container {
    max-width: 900px;
}

.box {
    display: grid;
    gap: 15px;
}

input, textarea {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid var(--border, #ddd);
    font-size: 14px;
}

textarea {
    min-height: 120px;
    resize: vertical;
}

.result {
    font-size: 14px;
    line-height: 1.6;
    word-break: break-word;
    background: rgba(0,0,0,0.03);
    padding: 12px;
    border-radius: 10px;
}

.btn {
    display: block;
    margin-top: 10px;
    padding: 12px;
    background: #111;
    color: #fff;
    text-decoration: none;
    border-radius: 8px;
    text-align: center;
    transition: 0.2s;
}

.btn:hover {
    opacity: 0.85;
}
</style>

</head>

<body>

<header>
    <h1>🔗 Link na Bio PRO</h1>
    <p>Crie sua página estilo Linktree</p>
</header>

<div class="container">

    <a href="../../index.html">← Voltar</a>

    <!-- CRIADOR -->
    <div id="creator" class="box">

        <label>Seu nome</label>
        <input id="name" placeholder="Ex: Meu perfil">

        <label>Links (um por linha)</label>
        <textarea id="links" placeholder="https://youtube.com
https://instagram.com
https://tiktok.com"></textarea>

        <button onclick="generate()">Gerar Link</button>

        <div id="result" class="result"></div>

    </div>

    <!-- PÁGINA PÚBLICA -->
    <div id="page" class="box" style="display:none;"></div>

</div>

<script>
function generate() {

    const name = document.getElementById("name").value;

    const links = document
        .getElementById("links")
        .value
        .split("\n")
        .map(l => l.trim())
        .filter(Boolean)
        .map(l => l.startsWith("http") ? l : "https://" + l);

    const encodedLinks = encodeURIComponent(JSON.stringify(links));

    const base = window.location.href.split('?')[0];

    const url = `${base}?name=${encodeURIComponent(name)}&data=${encodedLinks}`;

    document.getElementById("result").innerHTML = `
        <strong>Seu link:</strong><br>
        <a href="${url}" target="_blank">${url}</a>
    `;
}

/* normalize URL */
function normalize(url) {
    if (!url) return null;
    try {
        return new URL(url.startsWith("http") ? url : "https://" + url).href;
    } catch {
        return null;
    }
}

/* modo público */
const params = new URLSearchParams(window.location.search);
const name = params.get("name");
const data = params.get("data");

if (name && data) {

    document.getElementById("creator").style.display = "none";

    let links = [];

    try {
        links = JSON.parse(decodeURIComponent(data));
    } catch {
        links = [];
    }

    let html = `<h2>${name}</h2>`;

    links.forEach(link => {

        const safe = normalize(link);
        if (!safe) return;

        html += `
            <a class="btn" href="${safe}" target="_blank">
                🔗 Abrir link
            </a>
        `;
    });

    document.getElementById("page").innerHTML = html;
    document.getElementById("page").style.display = "grid";
}
</script>

</body>
</html>
