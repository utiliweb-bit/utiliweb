<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Link na Bio PRO Premium</title>
<meta name="description" content="Crie sua página profissional de links.">
<style>
:root{--primary:#27ae60}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#2ecc71,#27ae60);padding:12px;min-height:100dvh}
.wrapper{max-width:1300px;margin:auto;background:#fff;border-radius:20px;overflow:hidden;display:grid;grid-template-columns:420px 1fr;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.left,.right{padding:22px}
.left{border-right:1px solid #eee;overflow:auto}
input,textarea,select,button{width:100%;padding:12px;margin-top:8px;border-radius:12px;border:2px solid #ddd;font-size:16px}
button{background:var(--primary);color:#fff;border:none;font-weight:700;cursor:pointer}
.secondary{background:#fff;color:var(--primary);border:2px solid var(--primary)}
.preview{max-width:500px;margin:auto;background:#fff;border-radius:26px;overflow:hidden;border:1px solid #eee}
.banner{height:160px;background:linear-gradient(135deg,var(--primary),#2ecc71)}
.avatar{width:110px;height:110px;border-radius:50%;display:block;margin:-55px auto 10px;border:5px solid #fff;object-fit:cover;background:#f1f1f1}
.name{text-align:center;font-size:24px;font-weight:700}
.bio{text-align:center;color:#666;padding:0 15px 15px}
.link{display:block;margin:10px 16px;padding:14px;border-radius:14px;text-decoration:none;color:#fff;font-weight:700;text-align:center;background:var(--primary)}
.mainlink{font-size:18px;box-shadow:0 8px 20px rgba(0,0,0,.15)}
.card{background:#f8f8f8;border-radius:12px;padding:12px;margin-top:12px}
#qrcode{text-align:center;margin:15px}
@media(max-width:950px){.wrapper{grid-template-columns:1fr}.left{border-right:none;border-bottom:1px solid #eee}}
</style>
</head>
<body>
<div class="wrapper">
<div class="left">
<h2>🔗 Link na Bio PRO Premium</h2>

<label>Banner</label>
<input type="file" id="bannerFile" accept="image/*">

<label>Avatar</label>
<input type="file" id="avatarFile" accept="image/*">

<label>Nome</label>
<input id="name" placeholder="Seu nome">

<label>Bio</label>
<textarea id="bio" placeholder="Descreva você ou sua marca"></textarea>

<label>Tema</label>
<select id="theme">
<option value="#27ae60">Verde</option>
<option value="#3498db">Azul</option>
<option value="#8e44ad">Roxo</option>
<option value="#222222">Escuro</option>
<option value="#e67e22">Laranja</option>
</select>

<label>⭐ Link Principal (Título|URL)</label>
<input id="mainlink" placeholder="Ouça Agora|https://...">

<label>Links (Título|URL)</label>
<textarea id="links" placeholder="Instagram|https://instagram.com
YouTube|https://youtube.com"></textarea>

<button onclick="render()">Atualizar Preview</button>
<button class="secondary" onclick="exportData()">⬇ Exportar JSON</button>

<div class="card">
<b>📊 Score do Perfil</b>
<div id="score">0/100</div>
</div>

<div class="card">
<b>📜 Histórico</b>
<div id="history">Nenhum</div>
</div>
</div>

<div class="right">
<div class="preview">
<div class="banner" id="banner"></div>
<img class="avatar" id="avatar">
<div class="name" id="pname">Seu Nome</div>
<div class="bio" id="pbio">Sua bio aparecerá aqui.</div>
<div id="main"></div>
<div id="plist"></div>
<div id="qrcode">QR Code disponível quando publicado</div>
</div>
</div>
</div>

<script>

let avatarData = '';
let bannerData = '';

const bannerFile = document.getElementById('bannerFile');
const avatarFile = document.getElementById('avatarFile');
const nameInput = document.getElementById('name');
const bioInput = document.getElementById('bio');
const themeSelect = document.getElementById('theme');
const mainLinkInput = document.getElementById('mainlink');
const linksInput = document.getElementById('links');

function fileToData(input, callback){

    const file = input.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = e => callback(e.target.result);

    reader.readAsDataURL(file);
}

bannerFile.addEventListener('change', () => {

    fileToData(bannerFile, value => {

        bannerData = value;

        render();

    });

});

avatarFile.addEventListener('change', () => {

    fileToData(avatarFile, value => {

        avatarData = value;

        render();

    });

});

function saveHistory(profileName){

    const historyBox = document.getElementById('history');

    let historyList =
        JSON.parse(localStorage.getItem('bioHist') || '[]');

    historyList.unshift(profileName);

    historyList =
        [...new Set(historyList)]
        .slice(0,8);

    localStorage.setItem(
        'bioHist',
        JSON.stringify(historyList)
    );

    historyBox.innerHTML =
        historyList.join('<br>');
}

function render(){

    const color =
        themeSelect.value;

    document.documentElement
    .style
    .setProperty('--primary', color);

    const profileName =
        nameInput.value.trim();

    const profileBio =
        bioInput.value.trim();

    document.getElementById('pname').textContent =
        profileName || 'Seu Nome';

    document.getElementById('pbio').textContent =
        profileBio || 'Sua bio aparecerá aqui.';

    if(avatarData){

        document.getElementById('avatar').src =
            avatarData;

    }

    if(bannerData){

        document.getElementById('banner').style.background =
            `url(${bannerData}) center/cover`;

    }

    const main =
        document.getElementById('main');

    main.innerHTML = '';

    const principal =
        mainLinkInput.value.trim();

    const parts =
        principal.split('|');

    if(parts.length >= 2){

        main.innerHTML = `
        <a
            class="link mainlink"
            href="${parts[1].trim()}"
            target="_blank"
            rel="noopener"
        >
            ⭐ ${parts[0].trim()}
        </a>
        `;
    }

    const list =
        document.getElementById('plist');

    list.innerHTML = '';

    const lines =
        linksInput.value
        .split('\n')
        .map(x => x.trim())
        .filter(Boolean);

    lines.forEach(line => {

        const p = line.split('|');

        if(p.length >= 2){

            list.innerHTML += `
            <a
                class="link"
                href="${p[1].trim()}"
                target="_blank"
                rel="noopener"
            >
                ${p[0].trim()}
            </a>
            `;
        }

    });

    let score = 0;

    if(profileName) score += 20;
    if(profileBio) score += 20;
    if(avatarData) score += 20;
    if(bannerData) score += 15;
    if(lines.length) score += 15;
    if(parts.length >= 2) score += 10;

    document.getElementById('score').textContent =
        score + '/100';

    saveHistory(
        profileName || 'Perfil sem nome'
    );
}

function exportData(){

    const data = {

        name: nameInput.value,
        bio: bioInput.value,
        theme: themeSelect.value,
        mainlink: mainLinkInput.value,
        links: linksInput.value

    };

    const blob = new Blob(
        [JSON.stringify(data,null,2)],
        {type:'application/json'}
    );

    const a =
        document.createElement('a');

    a.href =
        URL.createObjectURL(blob);

    a.download =
        'link-na-bio.json';

    a.click();
}

nameInput.addEventListener('input', render);
bioInput.addEventListener('input', render);
themeSelect.addEventListener('change', render);
mainLinkInput.addEventListener('input', render);
linksInput.addEventListener('input', render);

const savedHistory =
    JSON.parse(
        localStorage.getItem('bioHist') || '[]'
    );

document.getElementById('history').innerHTML =
    savedHistory.length
    ? savedHistory.join('<br>')
    : 'Nenhum';

render();

</script>
</body>
</html>
