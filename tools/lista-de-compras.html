```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lista de Compras Online | UtiliWeb</title>

<meta name="description" content="Crie sua lista de compras online gratuitamente. Adicione produtos, marque como comprados, compartilhe e salve automaticamente.">

<style>
:root{
    --forest:#0f3326;
    --forest-light:#1a4d38;
    --mint:#5fe3a8;
    --paper:#fbfaf6;
    --paper-dim:#f1efe6;
    --ink:#1c1b1f;
    --line:rgba(0,0,0,.1);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:var(--paper-dim);
    color:var(--ink);
}

header{
    background:var(--forest);
    color:white;
    text-align:center;
    padding:30px 20px;
}

header h1{
    font-size:28px;
    margin-bottom:8px;
}

header p{
    opacity:.8;
}

.container{
    max-width:700px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    border-radius:16px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.input-group{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

input,select{
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:14px;
}

#itemNome{
    flex:1;
}

button{
    cursor:pointer;
    border:none;
    border-radius:10px;
    padding:12px 16px;
    font-weight:bold;
}

.btn-primary{
    background:var(--forest);
    color:white;
}

.btn-secondary{
    background:#ddd;
}

.btn-danger{
    background:#d9534f;
    color:white;
}

.btn-share{
    background:var(--mint);
    color:var(--forest);
}

.lista{
    margin-top:20px;
}

.item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px;
    border-bottom:1px solid var(--line);
}

.item:last-child{
    border-bottom:none;
}

.item span{
    flex:1;
}

.comprado{
    text-decoration:line-through;
    opacity:.5;
}

.categoria{
    font-size:12px;
    color:#666;
}

.stats{
    display:flex;
    justify-content:space-between;
    margin-top:15px;
    font-weight:bold;
}

    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:20px;
}

    text-align:center;
    padding:30px;

    .input-group{
        flex-direction:column;
    }

    button{
        width:100%;
    }

        flex-direction:column;
    }

</style>
</head>
<body>

<header>
    <h1>🛒 Lista de Compras</h1>
    <p>Organize suas compras de forma simples</p>
</header>

<div class="container">

    <div class="card">

        <div class="input-group">

            <input
                type="text"
                id="itemNome"
                placeholder="Ex.: Arroz"
            >

            <input
                type="text"
                id="itemQtd"
                placeholder="Qtd"
                style="width:100px"
            >

            <select id="itemCategoria">
                <option>🥩 Carnes</option>
                <option>🥛 Laticínios</option>
                <option>🍎 Frutas</option>
                <option>🥦 Verduras</option>
                <option>🧹 Limpeza</option>
                <option>🧻 Higiene</option>
                <option>🏠 Casa</option>
                <option selected>📦 Outros</option>
            </select>

            <button
                class="btn-primary"
                onclick="adicionarItem()">
                + Adicionar
            </button>

        </div>

    </div>

    <div class="card">

        <div id="lista" class="lista"></div>

        <div class="stats">
            <span id="totalItens">0 itens</span>
            <span id="totalComprados">0 comprados</span>
        </div>

        <div class="acoes">

            <button
                class="btn-share"
                onclick="compartilharLista()">
                📤 Compartilhar
            </button>

            <button
                class="btn-secondary"
                onclick="exportarTXT()">
                📄 Exportar TXT
            </button>

            <button
                class="btn-danger"
                onclick="limparLista()">
                🗑 Limpar Lista
            </button>

        </div>

    </div>

</div>

<script>

let listaCompras =
    JSON.parse(
        localStorage.getItem("listaCompras")
    ) || [];

function salvar(){
    localStorage.setItem(
        "listaCompras",
        JSON.stringify(listaCompras)
    );
}

function adicionarItem(){

    const nome =
        document.getElementById("itemNome")
        .value.trim();

    const qtd =
        document.getElementById("itemQtd")
        .value.trim();

    const categoria =
        document.getElementById("itemCategoria")
        .value;

    if(!nome){
        alert("Digite um item.");
        return;
    }

    listaCompras.push({
        nome,
        qtd,
        categoria,
        comprado:false
    });

    salvar();
    renderizar();

    document.getElementById("itemNome").value="";
    document.getElementById("itemQtd").value="";
}

function alternar(index){

    listaCompras[index].comprado =
        !listaCompras[index].comprado;

    salvar();
    renderizar();
}

function remover(index){

    listaCompras.splice(index,1);

    salvar();
    renderizar();
}

function renderizar(){

    const lista =
        document.getElementById("lista");

    if(listaCompras.length===0){

        lista.innerHTML=
        '<div class="empty">Nenhum item adicionado.</div>';

        atualizarStats();
        return;
    }

    lista.innerHTML="";

    listaCompras.forEach((item,index)=>{

        lista.innerHTML += `
        <div class="item">

            <input
                type="checkbox"
                ${item.comprado ? "checked":""}
                onchange="alternar(${index})">

            <span class="${item.comprado ? "comprado":""}">

                ${item.nome}
                ${item.qtd ? `(${item.qtd})` : ""}

                <div class="categoria">
                    ${item.categoria}
                </div>

            </span>

            <button
                onclick="remover(${index})">
                ❌
            </button>

        </div>
        `;
    });

    atualizarStats();
}

function atualizarStats(){

    const total =
        listaCompras.length;

    const comprados =
        listaCompras.filter(
            item=>item.comprado
        ).length;

    document.getElementById(
        "totalItens"
    ).textContent =
        total + " itens";

    document.getElementById(
        "totalComprados"
    ).textContent =
        comprados + " comprados";
}

function compartilharLista(){

    let texto =
        "🛒 LISTA DE COMPRAS\n\n";

    listaCompras.forEach(item=>{

        texto +=
            (item.comprado ? "☑ " : "☐ ")
            + item.nome
            + (item.qtd ? " ("+item.qtd+")" : "")
            + "\n";
    });

    if(navigator.share){

        navigator.share({
            text:texto
        });

    }else{

        navigator.clipboard
        .writeText(texto);

        alert("Lista copiada.");
    }
}

function exportarTXT(){

    let texto =
        "LISTA DE COMPRAS\n\n";

    listaCompras.forEach(item=>{

        texto +=
            (item.comprado ? "☑ " : "☐ ")
            + item.nome
            + (item.qtd ? " ("+item.qtd+")" : "")
            + "\n";
    });

    const blob =
        new Blob(
            [texto],
            {type:"text/plain"}
        );

    const a =
        document.createElement("a");

    a.href =
        URL.createObjectURL(blob);

    a.download =
        "lista-de-compras.txt";

    a.click();
}

function limparLista(){

    if(
        !confirm(
            "Deseja apagar toda a lista?"
        )
    ) return;

    listaCompras=[];

    salvar();
    renderizar();
}

renderizar();

</script>

</body>
</html>
