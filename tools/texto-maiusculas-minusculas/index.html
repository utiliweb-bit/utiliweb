<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Texto em Maiúsculas e Minúsculas Online | UtiliWeb</title>

<meta name="description" content="Converta texto para maiúsculas, minúsculas ou capitalize frases online gratuitamente.">
<meta name="keywords" content="utiliweb, maiúsculas, minúsculas, texto, converter texto">

<link rel="stylesheet" href="../../assets/style.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    background: linear-gradient(135deg, #2ecc71, #27ae60);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.wrapper {
    width: 100%;
    max-width: 1100px;
    background: #fff;
    border-radius: 18px;
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr 1fr;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
}

.left, .right {
    padding: 25px;
}

.left {
    border-right: 1px solid #eee;
}

h1 {
    font-size: 26px;
    margin-bottom: 5px;
}

.subtitle {
    color: #666;
    font-size: 14px;
    margin-bottom: 15px;
}

textarea {
    width: 100%;
    height: 200px;
    padding: 12px;
    border-radius: 10px;
    border: 2px solid #ddd;
    resize: none;
    margin-top: 10px;
}

textarea:focus {
    outline: none;
    border-color: #27ae60;
}

button {
    margin-top: 10px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

.primary {
    background: #27ae60;
    color: #fff;
}

.secondary {
    background: #fff;
    border: 2px solid #27ae60;
    color: #27ae60;
}

.buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

a {
    display: inline-block;
    margin-bottom: 10px;
    text-decoration: none;
    color: #27ae60;
    font-weight: bold;
}

.result-box {
    white-space: pre-wrap;
    font-size: 16px;
    line-height: 1.5;
    background: #f6fff8;
    border: 1px solid #d7f5e3;
    padding: 15px;
    border-radius: 10px;
    min-height: 200px;
}

/* RESPONSIVO */
@media(max-width: 900px) {
    .wrapper {
        grid-template-columns: 1fr;
    }

    .left {
        border-right: none;
        border-bottom: 1px solid #eee;
    }

    .buttons {
        grid-template-columns: 1fr;
    }
}
</style>

</head>

<body>

<div class="wrapper">

    <!-- ESQUERDA -->
    <div class="left">

        <h1>🔤 Conversor de Texto</h1>
        <p class="subtitle">Maiúsculas, minúsculas e capitalização</p>

        <a href="../../index.html">← Voltar</a>

        <textarea id="text" placeholder="Digite ou cole seu texto aqui..."></textarea>

        <div class="buttons">

            <button class="primary" onclick="maiusculas()">MAIÚSCULAS</button>
            <button class="secondary" onclick="minusculas()">minúsculas</button>
            <button class="secondary" onclick="capitalizar()">Capitalizar</button>
            <button class="secondary" onclick="copiar()">Copiar</button>

        </div>

    </div>

    <!-- DIREITA -->
    <div class="right">

        <h2>Resultado</h2>

        <div class="result-box" id="resultado">O resultado aparecerá aqui...</div>

    </div>

</div>

<script>
const input = document.getElementById("text");
const output = document.getElementById("resultado");

function maiusculas() {
    output.textContent = input.value.toUpperCase();
}

function minusculas() {
    output.textContent = input.value.toLowerCase();
}

function capitalizar() {
    output.textContent = input.value
        .toLowerCase()
        .replace(/\b\w/g, c => c.toUpperCase());
}

function copiar() {
    const text = output.textContent;
    if (!text || text.includes("aparecerá")) return;
    navigator.clipboard.writeText(text);
}
</script>

</body>
</html>
