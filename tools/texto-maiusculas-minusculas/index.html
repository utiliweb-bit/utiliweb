<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Texto em Maiúsculas e Minúsculas Online | UtiliWeb</title>

<meta name="description" content="Converta texto para maiúsculas, minúsculas ou capitalize frases online gratuitamente com o UtiliWeb.">

<link rel="stylesheet" href="../../assets/style.css">
</head>

<body>

<header>
    <h1>Texto em Maiúsculas e Minúsculas</h1>
    <p>Converta letras rapidamente e copie o resultado</p>
</header>

<div class="container">

    <a href="../../index.html">← Voltar</a>

    <textarea
        id="text"
        placeholder="Digite ou cole seu texto aqui..."
        style="width:100%; height:150px; margin-top:20px;"></textarea>

    <div style="margin-top:20px; display:flex; gap:10px; flex-wrap:wrap;">

        <button onclick="converterMaiusculas()">
            MAIÚSCULAS
        </button>

        <button onclick="converterMinusculas()">
            minúsculas
        </button>

        <button onclick="capitalizarTexto()">
            Primeira Letra Maiúscula
        </button>

        <button onclick="copiarResultado()">
            Copiar
        </button>

    </div>

    <textarea
        id="resultado"
        readonly
        placeholder="O resultado aparecerá aqui..."
        style="width:100%; height:150px; margin-top:20px;"></textarea>

    <section style="margin-top:40px;">
        <h2>Como usar</h2>

        <p>
            Digite ou cole seu texto na caixa acima e escolha uma das opções:
            converter para MAIÚSCULAS, minúsculas ou capitalizar cada palavra.
        </p>
    </section>

</div>

<script>
const text = document.getElementById("text");
const resultado = document.getElementById("resultado");

function converterMaiusculas() {
    resultado.value = text.value.toUpperCase();
}

function converterMinusculas() {
    resultado.value = text.value.toLowerCase();
}

function capitalizarTexto() {
    resultado.value = text.value
        .toLowerCase()
        .replace(/\b\w/g, letra => letra.toUpperCase());
}

function copiarResultado() {
    if (!resultado.value) return;

    navigator.clipboard.writeText(resultado.value);
    alert("Texto copiado!");
}
</script>

</body>
</html>
