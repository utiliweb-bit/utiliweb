<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UtiliWeb - Ferramentas Online Gratuitas</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
}

header {
    text-align: center;
    padding: 40px 20px;
    background: linear-gradient(135deg, #2563eb, #7c3aed);
}

header h1 {
    margin: 0;
    font-size: 40px;
}

header p {
    margin-top: 10px;
    opacity: 0.9;
}

.container {
    max-width: 1000px;
    margin: 40px auto;
    padding: 0 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    text-decoration: none;
    color: #e2e8f0;
    transition: 0.3s;
    border: 1px solid transparent;
}

.card:hover {
    transform: translateY(-5px);
    border: 1px solid #3b82f6;
    background: #111827;
}

.badge {
    font-size: 12px;
    opacity: 0.7;
    margin-top: 5px;
}
</style>
</head>

<body>

<header>
    <h1>UtiliWeb</h1>
    <p>Ferramentas Online Gratuitas para o Dia a Dia</p>
</header>

<div class="container">

    <div class="grid">

        <a class="card" href="contador-caracteres.html">
            📝 Contador de Caracteres
            <div class="badge">Texto</div>
        </a>

        <a class="card" href="calculadora-porcentagem.html">
            🧮 Calculadora de Porcentagem
            <div class="badge">Matemática</div>
        </a>

        <div class="card">
            🌡️ Conversor Celsius ↔ Fahrenheit
            <div class="badge">Em breve</div>
        </div>

        <div class="card">
            🔐 Gerador de Senhas
            <div class="badge">Em breve</div>
        </div>

    </div>

</div>

</body>
</html>
