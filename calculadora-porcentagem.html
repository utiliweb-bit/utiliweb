<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Porcentagem | UtiliWeb</title>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 600px;
    margin: 40px auto;
    padding: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    font-size: 16px;
}

button {
    padding: 10px 15px;
    font-size: 16px;
    cursor: pointer;
}

.resultado {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>Calculadora de Porcentagem</h1>

<p>Digite os valores abaixo:</p>

<label>Valor:</label>
<input type="number" id="valor" placeholder="Ex: 200">

<label>Porcentagem (%):</label>
<input type="number" id="porcentagem" placeholder="Ex: 10">

<button onclick="calcular()">Calcular</button>

<div class="resultado" id="resultado"></div>

<script>
function calcular() {
    let valor = document.getElementById("valor").value;
    let porcentagem = document.getElementById("porcentagem").value;

    let resultado = (valor * porcentagem) / 100;

    document.getElementById("resultado").innerHTML =
        porcentagem + "% de " + valor + " = " + resultado;
}
</script>

</body>
</html>
