
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UtiliWeb - Ferramentas Online Gratuitas</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1220;
    color: #e5e7eb;
}

/* HEADER */
header {
    text-align: center;
    padding: 50px 20px 20px;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
}

header h1 {
    margin: 0;
    font-size: 42px;
}

header p {
    opacity: 0.9;
}

/* SEARCH */
.search-box {
    max-width: 600px;
    margin: 20px auto;
    padding: 0 20px;
}

.search-box input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 16px;
}

/* CONTAINER */
.container {
    max-width: 1100px;
    margin: 30px auto;
    padding: 0 20px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 15px;
}

/* CARD */
.card {
    background: #111827;
    padding: 18px;
    border-radius: 12px;
    text-decoration: none;
    color: #e5e7eb;
    border: 1px solid #1f2937;
    transition: 0.2s;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-5px);
    border-color: #3b82f6;
}

.badge {
    font-size: 12px;
    opacity: 0.6;
    margin-top: 6px;
}

/* CATEGORY */
.section-title {
    margin: 35px 0 15px;
    color: #93c5fd;
    font-size: 18px;
}

/* HIDE */
.hidden {
    display: none;
}
</style>
</head>

<body>

<header>
    <h1>UtiliWeb</h1>
    <p>Ferramentas Online Gratuitas para o Dia a Dia</p>
</header>

<!-- SEARCH -->
<div class="search-box">
    <input type="text" id="search" placeholder="Buscar ferramenta (ex: senha, porcentagem, texto...)">
</div>

<div class="container">

    <div class="section-title">🧠 Ferramentas</div>

    <div class="grid" id="tools">

        <a class="card" href="contador-caracteres.html" data-name="texto caracteres palavras contador">
            📝 Contador de Caracteres
            <div class="badge">Texto</div>
        </a>

        <a class="card" href="calculadora-porcentagem.html" data-name="porcentagem calculadora matemática">
            🧮 Calculadora de Porcentagem
            <div class="badge">Matemática</div>
        </a>

        <div class="card" data-name="senha gerador segurança password">
            🔐 Gerador de Senhas (em breve)
            <div class="badge">Segurança</div>
        </div>

        <div class="card" data-name="conversor temperatura celsius fahrenheit">
            🌡️ Conversor de Temperatura (em breve)
            <div class="badge">Conversor</div>
        </div>

        <div class="card" data-name="ip internet meu ip">
            🌐 Descobrir meu IP (em breve)
            <div class="badge">Internet</div>
        </div>

    </div>

</div>

<script>
// BUSCA INTELIGENTE
const search = document.getElementById("search");
const tools = document.querySelectorAll("#tools .card");

search.addEventListener("input", function () {
    let value = this.value.toLowerCase();

    tools.forEach(tool => {
        let name = tool.getAttribute("data-name");

        if (name.includes(value)) {
            tool.classList.remove("hidden");
        } else {
            tool.classList.add("hidden");
        }
    });
});
</script>

</body>
</html>
