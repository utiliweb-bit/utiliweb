<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UtiliWeb - Ferramentas Online</title>

<link rel="stylesheet" href="assets/style.css">
</head>

<body>

<header>
    <h1>UtiliWeb</h1>
    <p>Ferramentas rápidas, simples e gratuitas</p>
</header>

<div class="container">

    <input
        id="search"
        type="text"
        placeholder="Buscar ferramentas (ex: senha, texto, porcentagem...)"
    />

    <h2 style="margin-top:30px;">🧠 Ferramentas</h2>

    <div class="grid" id="tools">

        <a class="card" href="tools/contador-caracteres.html" data-key="texto caracteres palavras contador">
            📝 Contador de Caracteres
            <div class="badge">Texto</div>
        </a>

        <a class="card" href="tools/calculadora-porcentagem.html" data-key="porcentagem calculadora matemática">
            🧮 Calculadora de Porcentagem
            <div class="badge">Matemática</div>
        </a>

        <div class="card" data-key="senha gerador password segurança">
            🔐 Gerador de Senhas
            <div class="badge">Em breve</div>
        </div>

        <div class="card" data-key="conversor temperatura celsius fahrenheit">
            🌡️ Conversor de Temperatura
            <div class="badge">Em breve</div>
        </div>

        <div class="card" data-key="ip internet meu ip">
            🌐 Descobrir meu IP
            <div class="badge">Em breve</div>
        </div>

    </div>

</div>

<script src="assets/app.js"></script>

</body>
</html>
