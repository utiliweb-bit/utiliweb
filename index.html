<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UtiliWeb - Ferramentas Online Gratuitas</title>

<link rel="stylesheet" href="assets/style.css">
</head>

<body>

<header>
    <h1>UtiliWeb</h1>
    <p>Ferramentas Online Gratuitas para o Dia a Dia</p>
</header>

<!-- NAV -->
<div class="container" style="text-align:center; margin-top:10px;">
    <a href="/">🏠 Início</a> |
    <a href="#tools">🧠 Ferramentas</a>
</div>

<!-- SEARCH -->
<div class="search-box">
    <input type="text" id="search" placeholder="Buscar ferramenta (ex: senha, porcentagem, texto...)">
</div>

<div class="container">

    <h2 id="tools">🧠 Ferramentas</h2>

    <div class="grid">

        <a class="card" href="tools/contador-caracteres.html" data-name="texto caracteres palavras contador">
            📝 Contador de Caracteres
            <div class="badge">Texto</div>
        </a>

        <a class="card" href="tools/calculadora-porcentagem.html" data-name="porcentagem calculadora matemática">
            🧮 Calculadora de Porcentagem
            <div class="badge">Matemática</div>
        </a>

        <div class="card" data-name="senha gerador segurança password">
            🔐 Gerador de Senhas (em breve)
            <div class="badge">Segurança</div>
        </div>

        <div class="card" data-name="conversor temperatura celsius fahrenheit">
            🌡️ Conversor de Temperatura (em breve)
            <div class="badge">Conversor</div>
        </div>

        <div class="card" data-name="ip internet meu ip">
            🌐 Descobrir meu IP (em breve)
            <div class="badge">Internet</div>
        </div>

    </div>

</div>

<script>
// UX SEARCH (produto real)
const search = document.getElementById("search");
const cards = document.querySelectorAll(".card");

search.addEventListener("input", (e) => {
    const value = e.target.value.toLowerCase().trim();

    cards.forEach(card => {
        const text = card.innerText.toLowerCase();
        const match = text.includes(value);

        card.style.display = match ? "block" : "none";
    });
});
</script>

</body>
</html>
